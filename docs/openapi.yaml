openapi: 3.1.0
info:
  title: Behavior Verification System API
  description: |
    行为验证系统API文档 v17.1
    
    提供多种验证码类型、用户认证、环境检测、风险分析等功能。
    
    支持的验证码类型:
    - 滑块验证码 (Slider)
    - 点击验证码 (Click)
    - 手势验证码 (Gesture)
    - 3D验证码 (3D)
    - 语音验证码 (Voice)
    - Emoji验证码 (Emoji)
    - 连连看验证码 (Lianliankan)
    - 视频验证码 (Video)
    - AR验证码 (AR)
    - 无感验证 (Seamless)
  version: 17.1.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.example.com/api/v1
    description: 生产环境
  - url: http://localhost:8080/api/v1
    description: 开发环境
tags:
  - name: captcha
    description: 验证码相关接口
  - name: captcha-video
    description: 视频验证码接口
  - name: captcha-ar
    description: AR验证码接口
  - name: auth
    description: 用户认证接口
  - name: user
    description: 用户资料接口
  - name: detect
    description: 环境检测接口
  - name: admin-auth
    description: 管理端认证接口
  - name: admin-stats
    description: 管理端统计接口
  - name: admin-applications
    description: 管理端应用管理接口
  - name: admin-logs
    description: 管理端日志接口
  - name: admin-blacklist
    description: 管理端黑名单接口
  - name: admin-risk-rules
    description: 管理端风控规则接口
  - name: admin-analytics
    description: 高级分析接口
paths:
  /captcha/slider:
    get:
      tags:
        - captcha
      summary: 获取滑块验证码
      description: 生成滑块验证码，返回会话ID和图片数据
      parameters:
        - name: width
          in: query
          description: 验证码图片宽度
          required: false
          schema:
            type: integer
            default: 320
        - name: height
          in: query
          description: 验证码图片高度
          required: false
          schema:
            type: integer
            default: 160
        - name: tolerance
          in: query
          description: 容差值
          required: false
          schema:
            type: integer
            default: 8
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      session_id:
                        type: string
                        example: slider_abc123def456
                      image_url:
                        type: string
                        format: byte
                      puzzle_url:
                        type: string
                        format: byte
                      hint_url:
                        type: string
                        format: byte
                      shape:
                        type: integer
                        example: 1
                      secret_y:
                        type: integer
                        example: 100
                      image_width:
                        type: integer
                        example: 320
                      image_height:
                        type: integer
                        example: 160
  /captcha/click:
    get:
      tags:
        - captcha
      summary: 获取点击验证码
      description: 生成点击验证码
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      session_id:
                        type: string
                      image_url:
                        type: string
                        format: byte
                      hint:
                        type: string
                      max_points:
                        type: integer
  /captcha/verify:
    post:
      tags:
        - captcha
      summary: 验证验证码
      description: 提交验证码答案进行验证
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - session_id
                - x
              properties:
                session_id:
                  type: string
                  description: 验证码会话ID
                x:
                  type: integer
                  description: X坐标
                y:
                  type: integer
                  description: Y坐标
                trajectory:
                  type: array
                  items:
                    type: object
                    properties:
                      x:
                        type: integer
                      y:
                        type: integer
                      t:
                        type: integer
                        format: int64
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      message:
                        type: string
                      remaining_attempts:
                        type: integer
                      trajectory_result:
                        type: object
                        properties:
                          score:
                            type: number
                            format: float
                          passed:
                            type: boolean
                          reasons:
                            type: array
                            items:
                              type: string
  /captcha/gesture:
    get:
      tags:
        - captcha
      summary: 获取手势验证码
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      session_id:
                        type: string
                      pattern:
                        type: string
                      grid_size:
                        type: integer
  /captcha/gesture/verify:
    post:
      tags:
        - captcha
      summary: 验证手势验证码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - session_id
                - pattern
              properties:
                session_id:
                  type: string
                pattern:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      message:
                        type: string
  /captcha/video/generate:
    post:
      tags:
        - captcha-video
      summary: 生成视频验证码
      description: 生成视频验证码，返回视频URL和问题
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                width:
                  type: integer
                  description: 视频宽度
                  default: 320
                height:
                  type: integer
                  description: 视频高度
                  default: 240
                difficulty:
                  type: integer
                  description: 难度等级 (1-简单, 2-中等, 3-困难)
                  default: 1
                  minimum: 1
                  maximum: 3
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      session_id:
                        type: string
                        example: video_abc123def456
                      video_url:
                        type: string
                        description: 视频文件URL
                      question:
                        type: string
                        description: 验证问题
                        example: 请识别视频中的人物动作
                      action_type:
                        type: string
                        description: 动作类型
                        example: wave
                      difficulty:
                        type: integer
                        example: 2
                      expires_at:
                        type: string
                        format: date-time
  /captcha/video/verify:
    post:
      tags:
        - captcha-video
      summary: 验证视频验证码
      description: 提交视频验证码答案进行验证
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - session_id
                - answer
              properties:
                session_id:
                  type: string
                  description: 验证码会话ID
                answer:
                  type: string
                  description: 用户答案
                behavior_data:
                  type: object
                  description: 行为数据
                  properties:
                    response_time:
                      type: number
                      format: float
                    interactions:
                      type: array
                      items:
                        type: object
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      score:
                        type: number
                        format: float
                      remaining_attempts:
                        type: integer
  /captcha/video/options:
    get:
      tags:
        - captcha-video
      summary: 获取视频验证码配置选项
      description: 获取支持的视频验证码难度选项、视频格式等配置
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      difficulty_options:
                        type: array
                        items:
                          type: object
                          properties:
                            value:
                              type: integer
                            label:
                              type: string
                            description:
                              type: string
                      video_formats:
                        type: array
                        items:
                          type: string
                      supported_actions:
                        type: array
                        items:
                          type: string
  /captcha/ar/generate:
    post:
      tags:
        - captcha-ar
      summary: 生成AR验证码
      description: 生成增强现实的AR验证码，提供3D交互体验
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                scene_type:
                  type: string
                  description: 场景类型
                  enum:
                    - object_placement
                    - gesture_recognition
                    - spatial_puzzle
                    - object_tracking
                    - depth_estimation
                difficulty:
                  type: string
                  description: 难度等级
                  enum:
                    - easy
                    - medium
                    - hard
                    - expert
                  default: medium
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      session_id:
                        type: string
                        example: ar_abc123def456
                      scene_type:
                        type: string
                        example: object_placement
                      scene_data:
                        type: object
                        description: AR场景数据
                        properties:
                          objects:
                            type: array
                            items:
                              type: object
                              properties:
                                id:
                                  type: integer
                                type:
                                  type: string
                                position:
                                  type: object
                                model_url:
                                  type: string
                      target_object:
                        type: object
                        description: 目标对象信息
                      instructions:
                        type: string
                        description: 用户操作指引
                      difficulty:
                        type: string
                        example: medium
                      expires_at:
                        type: string
                        format: date-time
  /captcha/ar/verify:
    post:
      tags:
        - captcha-ar
      summary: 验证AR验证码
      description: 提交AR验证码答案进行验证
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - session_id
                - user_gesture
              properties:
                session_id:
                  type: string
                  description: 验证码会话ID
                user_gesture:
                  type: object
                  description: 用户手势信息
                  properties:
                    gesture_type:
                      type: string
                      description: 手势类型
                      example: tap
                    start_time:
                      type: integer
                      format: int64
                    end_time:
                      type: integer
                      format: int64
                    points:
                      type: array
                      items:
                        type: object
                object_id:
                  type: integer
                  description: 交互对象ID
                position_x:
                  type: number
                  format: float
                  description: X坐标
                position_y:
                  type: number
                  format: float
                  description: Y坐标
                position_z:
                  type: number
                  format: float
                  description: Z坐标
                risk_score:
                  type: number
                  format: float
                  description: 风险分数
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      accuracy:
                        type: number
                        format: float
                        description: 精确度
                      score:
                        type: number
                        format: float
                        description: 综合得分
                      remaining_attempts:
                        type: integer
                      feedback:
                        type: string
                        description: 反馈信息
  /captcha/ar/options:
    get:
      tags:
        - captcha-ar
      summary: 获取AR验证码配置选项
      description: 获取支持的AR验证码场景类型、难度选项、手势类型等配置
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      scene_types:
                        type: array
                        items:
                          type: object
                          properties:
                            value:
                              type: string
                            label:
                              type: string
                      difficulty_options:
                        type: array
                        items:
                          type: object
                          properties:
                            value:
                              type: string
                            label:
                              type: string
                      gesture_types:
                        type: array
                        items:
                          type: string
                      object_types:
                        type: array
                        items:
                          type: string
                      features:
                        type: array
                        items:
                          type: string
  /auth/register:
    post:
      tags:
        - auth
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 50
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                behavior_data:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user_id:
                        type: integer
                      username:
                        type: string
                      email:
                        type: string
                      verification_link:
                        type: string
        '409':
          description: 用户已存在
  /auth/login:
    post:
      tags:
        - auth
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
                captcha_token:
                  type: string
                behavior_data:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      refresh_token:
                        type: string
                      expires_in:
                        type: integer
                        example: 900
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                          username:
                            type: string
                          email:
                            type: string
        '401':
          description: 认证失败
  /auth/refresh:
    post:
      tags:
        - auth
      summary: 刷新Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                      refresh_token:
                        type: string
                      expires_in:
                        type: integer
                        example: 900
  /auth/logout:
    post:
      tags:
        - auth
      summary: 用户登出
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    nullable: true
  /auth/verify-email:
    get:
      tags:
        - auth
      summary: 验证邮箱
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      message:
                        type: string
  /auth/resend-verification:
    post:
      tags:
        - auth
      summary: 重新发送验证邮件
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: 成功
  /auth/request-password-reset:
    post:
      tags:
        - auth
      summary: 请求重置密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: 成功
  /auth/reset-password:
    post:
      tags:
        - auth
      summary: 重置密码
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - new_password
              properties:
                token:
                  type: string
                new_password:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: 成功
  /user/profile:
    get:
      tags:
        - user
      summary: 获取用户资料
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      username:
                        type: string
                      email:
                        type: string
                      nickname:
                        type: string
                      avatar:
                        type: string
                      phone:
                        type: string
                      bio:
                        type: string
                      is_verified:
                        type: boolean
                      created_at:
                        type: string
                        format: date-time
    put:
      tags:
        - user
      summary: 更新用户资料
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nickname:
                  type: string
                avatar:
                  type: string
                phone:
                  type: string
                bio:
                  type: string
      responses:
        '200':
          description: 成功
  /user/change-password:
    post:
      tags:
        - user
      summary: 修改密码
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - old_password
                - new_password
              properties:
                old_password:
                  type: string
                new_password:
                  type: string
                  minLength: 6
      responses:
        '200':
          description: 成功
  /detect/script:
    get:
      tags:
        - detect
      summary: 获取检测脚本
      parameters:
        - name: callback
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/javascript:
              schema:
                type: string
  /detect/submit:
    post:
      tags:
        - detect
      summary: 提交检测数据
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - detection_id
                - risk_score
              properties:
                detection_id:
                  type: string
                risk_score:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 100
                chain:
                  type: array
                  items:
                    type: string
                fingerprint:
                  type: string
                session_id:
                  type: string
                timestamp:
                  type: integer
                  format: int64
                details:
                  type: object
      responses:
        '200':
          description: 成功
  /detect/check:
    post:
      tags:
        - detect
      summary: 环境检测
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fingerprint
              properties:
                fingerprint:
                  type: string
                canvas_hash:
                  type: string
                webgl_vendor:
                  type: string
                webgl_renderer:
                  type: string
                fonts:
                  type: array
                  items:
                    type: string
                plugins:
                  type: array
                  items:
                    type: string
                proxy_detected:
                  type: boolean
                screen_info:
                  type: object
                timezone:
                  type: string
                language:
                  type: string
                user_agent:
                  type: string
                ip_address:
                  type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      is_bot:
                        type: boolean
                      risk_level:
                        type: string
                        enum: [low, medium, high]
                      risk_score:
                        type: number
                        format: float
                      detected_flags:
                        type: array
                        items:
                          type: string
                      fingerprint:
                        type: string
                      is_unique:
