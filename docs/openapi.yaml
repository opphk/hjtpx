openapi: 3.1.0
info:
  title: HJTPX Behavior Verification System API
  description: |
    # HJTPX 行为验证系统 API 文档 v3

    提供多种验证码类型、用户认证、环境检测、风险分析等功能的完整RESTful API。

    ## 功能特性

    - **多类型验证码**: 滑块、点击、手势、3D、语音、连连看等
    - **行为分析**: 高级人机识别能力
    - **环境检测**: Canvas、WebGL、音频指纹等设备识别
    - **风险评估**: 实时风险评分和威胁检测
    - **管理后台**: 完整的管理功能和统计分析

  version: 3.0.0
  contact:
    name: API Support
    email: support@hjtpx.com
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.hjtpx.com/v3
    description: 生产环境
    variables:
      basePath:
        default: /v3
  - url: http://localhost:8080/v3
    description: 开发环境

tags:
  - name: captcha
    description: 验证码相关接口
  - name: auth
    description: 用户认证接口
  - name: user
    description: 用户资料接口
  - name: detect
    description: 环境检测接口
  - name: admin-auth
    description: 管理端认证接口
  - name: admin-stats
    description: 管理端统计接口
  - name: admin-applications
    description: 管理端应用管理接口
  - name: admin-logs
    description: 管理端日志接口
  - name: admin-blacklist
    description: 管理端黑名单接口
  - name: admin-risk-rules
    description: 管理端风控规则接口
  - name: admin-analytics
    description: 高级分析接口
  - name: seamless
    description: 无感验证接口
  - name: biometrics
    description: 生物特征验证接口

paths:
  /captcha/slider:
    get:
      tags:
        - captcha
      summary: 获取滑块验证码
      description: 生成滑块验证码，返回会话ID和图片数据
      operationId: getSliderCaptcha
      parameters:
        - name: width
          in: query
          description: 验证码图片宽度
          required: false
          schema:
            type: integer
            default: 320
            minimum: 200
            maximum: 500
        - name: height
          in: query
          description: 验证码图片高度
          required: false
          schema:
            type: integer
            default: 160
            minimum: 100
            maximum: 300
        - name: tolerance
          in: query
          description: 容差值（像素）
          required: false
          schema:
            type: integer
            default: 8
            minimum: 1
            maximum: 20
        - name: theme
          in: query
          description: 主题样式
          required: false
          schema:
            type: string
            enum: [default, modern, minimal]
            default: default
      responses:
        '200':
          description: 成功生成滑块验证码
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SliderCaptchaResponse'
              examples:
                success:
                  summary: 成功响应示例
                  value:
                    code: 0
                    message: success
                    data:
                      session_id: slider_abc123def456
                      image_url: data:image/png;base64,iVBORw0KGgo...
                      puzzle_url: data:image/png;base64,iVBORw0KGgo...
                      hint_url: data:image/png;base64,iVBORw0KGgo...
                      shape: 1
                      secret_y: 100
                      image_width: 320
                      image_height: 160
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /captcha/click:
    get:
      tags:
        - captcha
      summary: 获取点击验证码
      description: 生成点击验证码，要求用户点击特定位置
      operationId: getClickCaptcha
      parameters:
        - name: mode
          in: query
          description: 验证码模式
          required: false
          schema:
            type: string
            enum: [number, letter, chinese, emoji]
            default: number
        - name: points
          in: query
          description: 需要点击的点数
          required: false
          schema:
            type: integer
            default: 3
            minimum: 2
            maximum: 6
        - name: width
          in: query
          description: 图片宽度
          required: false
          schema:
            type: integer
            default: 320
        - name: height
          in: query
          description: 图片高度
          required: false
          schema:
            type: integer
            default: 200
      responses:
        '200':
          description: 成功生成点击验证码
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClickCaptchaResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /captcha/verify:
    post:
      tags:
        - captcha
      summary: 验证验证码
      description: 提交验证码答案进行验证，支持多种验证码类型
      operationId: verifyCaptcha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRequest'
            examples:
              slider:
                summary: 滑块验证码验证
                value:
                  session_id: slider_abc123def456
                  type: slider
                  x: 180
                  y: 100
                  trajectory:
                    - x: 0
                      y: 100
                      t: 0
                    - x: 90
                      y: 98
                      t: 150
                    - x: 180
                      y: 101
                      t: 300
              click:
                summary: 点击验证码验证
                value:
                  session_id: click_abc123def456
                  type: click
                  points:
                    - x: 50
                      y: 80
                    - x: 150
                      y: 120
                    - x: 250
                      y: 60
      responses:
        '200':
          description: 验证完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyResponse'
              examples:
                success:
                  summary: 验证成功
                  value:
                    code: 0
                    message: success
                    data:
                      success: true
                      message: 验证通过
                      remaining_attempts: 4
                      token: captcha_token_abc123
                      trajectory_result:
                        score: 95.5
                        passed: true
                        reasons:
                          - 轨迹速度正常
                          - 轨迹曲线自然
                failure:
                  summary: 验证失败
                  value:
                    code: 0
                    message: success
                    data:
                      success: false
                      message: 验证失败，请重试
                      remaining_attempts: 3
                      trajectory_result:
                        score: 25.3
                        passed: false
                        reasons:
                          - 轨迹过于直线
                          - 速度异常
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 验证失败次数过多，暂时锁定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /captcha/gesture:
    get:
      tags:
        - captcha
      summary: 获取手势验证码
      description: 生成手势验证码，要求用户绘制特定图案
      operationId: getGestureCaptcha
      parameters:
        - name: pattern_type
          in: query
          description: 手势图案类型
          required: false
          schema:
            type: string
            enum: [L, Z, N, M, V, W, custom]
            default: L
        - name: difficulty
          in: query
          description: 难度级别
          required: false
          schema:
            type: string
            enum: [easy, medium, hard]
            default: medium
      responses:
        '200':
          description: 成功生成手势验证码
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GestureCaptchaResponse'

  /captcha/gesture/verify:
    post:
      tags:
        - captcha
      summary: 验证手势验证码
      operationId: verifyGestureCaptcha
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - session_id
                - pattern
              properties:
                session_id:
                  type: string
                  description: 验证码会话ID
                pattern:
                  type: array
                  description: 用户绘制的手势路径点
                  items:
                    type: object
                    properties:
                      x:
                        type: integer
                      y:
                        type: integer
                      t:
                        type: integer
                        format: int64
              additionalProperties: false
      responses:
        '200':
          description: 验证完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyResponse'

  /captcha/3d:
    get:
      tags:
        - captcha
      summary: 获取3D验证码
      description: 生成3D验证码，要求用户旋转到正确角度
      operationId: get3DCaptcha
      parameters:
        - name: model_type
          in: query
          description: 3D模型类型
          required: false
          schema:
            type: string
            enum: [cube, sphere, cylinder, cone]
            default: cube
        - name: difficulty
          in: query
          description: 难度级别
          required: false
          schema:
            type: string
            enum: [easy, medium, hard]
            default: medium
      responses:
        '200':
          description: 成功生成3D验证码
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreeDCaptchaResponse'

  /captcha/emoji:
    get:
      tags:
        - captcha
      summary: 获取Emoji验证码
      description: 生成Emoji验证码，要求用户选择指定的表情
      operationId: getEmojiCaptcha
      parameters:
        - name: count
          in: query
          description: 需要选择的Emoji数量
          required: false
          schema:
            type: integer
            default: 4
            minimum: 2
            maximum: 8
        - name: difficulty
          in: query
          description: 难度级别
          required: false
          schema:
            type: string
            enum: [easy, medium, hard]
            default: medium
      responses:
        '200':
          description: 成功生成Emoji验证码
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmojiCaptchaResponse'

  /captcha/voice:
    get:
      tags:
        - captcha
      summary: 获取语音验证码
      description: 生成语音验证码，适合视障用户
      operationId: getVoiceCaptcha
      parameters:
        - name: mode
          in: query
          description: 验证码内容模式
          required: false
          schema:
            type: string
            enum: [number, letter, mixed]
            default: number
        - name: count
          in: query
          description: 验证码位数
          required: false
          schema:
            type: integer
            default: 4
            minimum: 4
            maximum: 8
        - name: language
          in: query
          description: 语音语言
          required: false
          schema:
            type: string
            enum: [zh-CN, en-US, ja-JP, ko-KR]
            default: zh-CN
      responses:
        '200':
          description: 成功生成语音验证码
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoiceCaptchaResponse'

  /captcha/lianliankan:
    get:
      tags:
        - captcha
      summary: 获取连连看验证码
      description: 生成连连看验证码，要求用户配对相同图标
      operationId: getLianliankanCaptcha
      parameters:
        - name: pairs
          in: query
          description: 配对数量
          required: false
          schema:
            type: integer
            default: 6
            minimum: 4
            maximum: 12
        - name: difficulty
          in: query
          description: 难度级别
          required: false
          schema:
            type: string
            enum: [easy, medium, hard]
            default: medium
      responses:
        '200':
          description: 成功生成连连看验证码
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LianliankanCaptchaResponse'

  /auth/register:
    post:
      tags:
        - auth
      summary: 用户注册
      description: 创建新用户账户
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                summary: 注册请求示例
                value:
                  username: testuser
                  email: test@example.com
                  password: SecurePass123!
                  behavior_data: eyJ0cmFja2V0IjpbXX0=
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 用户已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - auth
      summary: 用户登录
      description: 用户登录获取访问令牌
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                summary: 登录请求示例
                value:
                  username: testuser
                  password: SecurePass123!
                  captcha_token: captcha_abc123
                  behavior_data: eyJ0cmFja2V0IjpbXX0=
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - auth
      summary: 刷新Token
      description: 使用刷新令牌获取新的访问令牌
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: 刷新令牌
              additionalProperties: false
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 刷新令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - auth
      summary: 用户登出
      description: 使当前令牌失效
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/verify-email:
    get:
      tags:
        - auth
      summary: 验证邮箱
      description: 使用邮箱验证链接验证用户邮箱
      operationId: verifyEmail
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
            description: 邮箱验证令牌
      responses:
        '200':
          description: 验证成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: 令牌无效或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/request-password-reset:
    post:
      tags:
        - auth
      summary: 请求重置密码
      description: 发送密码重置链接到用户邮箱
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
              additionalProperties: false
      responses:
        '200':
          description: 请求已处理
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/reset-password:
    post:
      tags:
        - auth
      summary: 重置密码
      description: 使用重置令牌设置新密码
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - new_password
              properties:
                token:
                  type: string
                  description: 密码重置令牌
                new_password:
                  type: string
                  minLength: 6
                  description: 新密码
              additionalProperties: false
      responses:
        '200':
          description: 密码重置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: 令牌无效或密码不符合要求
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/profile:
    get:
      tags:
        - user
      summary: 获取用户资料
      description: 获取当前登录用户的详细资料
      operationId: getUserProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - user
      summary: 更新用户资料
      description: 更新当前登录用户的资料
      operationId: updateUserProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /user/change-password:
    post:
      tags:
        - user
      summary: 修改密码
      description: 修改当前登录用户的密码
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - old_password
                - new_password
              properties:
                old_password:
                  type: string
                  description: 当前密码
                new_password:
                  type: string
                  minLength: 6
                  description: 新密码
              additionalProperties: false
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: 密码错误或新密码不符合要求
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /detect/script:
    get:
      tags:
        - detect
      summary: 获取检测脚本
      description: 获取客户端环境检测脚本
      operationId: getDetectionScript
      parameters:
        - name: callback
          in: query
          description: 回调函数名
          required: false
          schema:
            type: string
            default: onDetectionComplete
      responses:
        '200':
          description: 获取成功
          content:
            application/javascript:
              schema:
                type: string

  /detect/submit:
    post:
      tags:
        - detect
      summary: 提交检测数据
      description: 提交客户端环境检测数据进行分析
      operationId: submitDetection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectionRequest'
      responses:
        '200':
          description: 提交成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResponse'

  /detect/check:
    post:
      tags:
        - detect
      summary: 环境检测
      description: 检测客户端环境是否存在异常
      operationId: checkEnvironment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvironmentCheckRequest'
      responses:
        '200':
          description: 检测完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentCheckResponse'

  /detect/fingerprint:
    get:
      tags:
        - detect
      summary: 获取指纹信息
      description: 根据指纹获取设备信息
      operationId: getFingerprintInfo
      parameters:
        - name: fingerprint
          in: query
          required: true
          schema:
            type: string
            description: 设备指纹
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FingerprintResponse'

  /seamless/check:
    post:
      tags:
        - seamless
      summary: 无感验证检查
      description: 检查设备是否可信任，无需显示验证码
      operationId: checkSeamless
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - device_fingerprint
              properties:
                device_fingerprint:
                  type: string
                  description: 设备指纹
                behavior_sequence:
                  type: array
                  items:
                    type: object
                  description: 行为序列数据
                trusted_tokens:
                  type: array
                  items:
                    type: string
                  description: 信任令牌列表
              additionalProperties: false
      responses:
        '200':
          description: 检查完成
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeamlessResponse'

  /seamless/trust:
    post:
      tags:
        - seamless
      summary: 信任设备
      description: 将设备标记为信任设备
      operationId: trustDevice
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - device_fingerprint
              properties:
                device_fingerprint:
                  type: string
                  description: 设备指纹
