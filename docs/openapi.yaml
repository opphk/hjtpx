components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer Token认证
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API密钥认证
    basicAuth:
      type: http
      scheme: basic
      description: 基本认证（仅用于测试环境）
  
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          description: 错误码
          example: 1001
        message:
          type: string
          description: 错误信息
          example: Invalid request
        details:
          type: string
          description: 错误详情
        timestamp:
          type: string
          format: date-time
          description: 错误发生时间
        request_id:
          type: string
          description: 请求唯一标识
      required:
        - code
        - message
    CaptchaSession:
      type: object
      description: 验证码会话对象
      properties:
        session_id:
          type: string
          description: 会话ID
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, verified, expired, failed]
    CaptchaVerifyRequest:
      type: object
      description: 验证码验证请求
      required:
        - session_id
      properties:
        session_id:
          type: string
          description: 验证码会话ID
        user_answer:
          type: object
          description: 用户答案（根据验证码类型不同而不同）
    CaptchaVerifyResponse:
      type: object
      description: 验证码验证响应
      properties:
        success:
          type: boolean
          description: 是否验证通过
        message:
          type: string
          description: 验证消息
        remaining_attempts:
          type: integer
          description: 剩余尝试次数
        risk_score:
          type: number
          format: float
          description: 风险评分
        token:
          type: string
          description: 验证成功后返回的Token
    Pagination:
      type: object
      description: 分页对象
      properties:
        page:
          type: integer
          description: 当前页码
        page_size:
          type: integer
          description: 每页数量
        total:
          type: integer
          description: 总记录数
        total_pages:
          type: integer
          description: 总页数
    PaginationRequest:
      type: object
      description: 分页请求参数
      properties:
        page:
          type: integer
          default: 1
          minimum: 1
        page_size:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
    DateRangeRequest:
      type: object
      description: 日期范围请求
      properties:
        start_date:
          type: string
          format: date
          description: 开始日期
        end_date:
          type: string
          format: date
          description: 结束日期
    UserProfile:
      type: object
      description: 用户资料
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        nickname:
          type: string
        avatar:
          type: string
        phone:
          type: string
        bio:
          type: string
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Application:
      type: object
      description: 应用对象
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        app_key:
          type: string
          description: 应用Key
        app_secret:
          type: string
          description: 应用密钥（仅在创建时返回）
        status:
          type: string
          enum: [active, inactive]
        domain:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    VerificationLog:
      type: object
      description: 验证日志
      properties:
        id:
          type: integer
        session_id:
          type: string
        app_id:
          type: integer
        captcha_type:
          type: string
          enum: [slider, click, gesture, 3d, voice, lianliankan]
        status:
          type: string
          enum: [success, failed]
        risk_score:
          type: number
          format: float
        ip_address:
          type: string
        user_agent:
          type: string
        fingerprint:
          type: string
        created_at:
          type: string
          format: date-time
    BlacklistEntry:
      type: object
      description: 黑名单条目
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [ip, fingerprint, user_id]
        value:
          type: string
        reason:
          type: string
        created_by:
          type: integer
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    RiskRule:
      type: object
      description: 风控规则
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [behavior, device, network]
        risk_score:
          type: integer
          minimum: 0
          maximum: 100
        conditions:
          type: object
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    DashboardStats:
      type: object
      description: 仪表盘统计数据
      properties:
        total_requests:
          type: integer
          description: 总请求数
        successful_verifications:
          type: integer
          description: 成功验证数
        failed_verifications:
          type: integer
          description: 失败验证数
        blocked_requests:
          type: integer
          description: 拦截请求数
        average_response_time:
          type: number
          format: float
          description: 平均响应时间（毫秒）
        current_qps:
          type: number
          format: float
          description: 当前QPS
        active_sessions:
          type: integer
          description: 活跃会话数
    HealthStatus:
      type: object
      description: 健康状态
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
        uptime:
          type: integer
          description: 运行时间（秒）
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          properties:
            database:
              type: object
              properties:
                status:
                  type: string
                latency:
                  type: number
            redis:
              type: object
              properties:
                status:
                  type: string
                latency:
                  type: number
        system:
          type: object
          properties:
            cpu_usage:
              type: number
            memory_usage:
              type: number
            disk_usage:
              type: number
    WebSocketMessage:
      type: object
      description: WebSocket消息格式
      properties:
        type:
          type: string
          enum: [metrics, alert, notification]
        data:
          type: object
        timestamp:
          type: string
          format: date-time

externalDocs:
  description: 查找更多关于HJTPX的信息
