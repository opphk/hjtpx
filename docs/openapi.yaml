components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 使用JWT令牌进行认证，格式为 Bearer <token>

  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误码
          example: 400
        message:
          type: string
          description: 错误信息
          example: 请求参数错误
        data:
          nullable: true
          description: 附加数据
      required:
        - code
        - message

    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          nullable: true

    SliderCaptchaResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            session_id:
              type: string
              description: 会话ID
            image_url:
              type: string
              description: 背景图片URL（base64编码）
            puzzle_url:
              type: string
              description: 滑块图片URL（base64编码）
            hint_url:
              type: string
              description: 提示图片URL（base64编码）
            shape:
              type: integer
              description: 滑块形状类型
            secret_y:
              type: integer
              description: 目标Y坐标
            image_width:
              type: integer
              description: 图片宽度
            image_height:
              type: integer
              description: 图片高度

    ClickCaptchaResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            session_id:
              type: string
            image_url:
              type: string
            hint:
              type: string
              description: 点击提示
            max_points:
              type: integer
              description: 需要点击的最大点数

    GestureCaptchaResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            session_id:
              type: string
            pattern:
              type: string
              description: 目标手势图案
            grid_size:
              type: integer
              description: 网格大小

    ThreeDCaptchaResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            session_id:
              type: string
            model_type:
              type: string
              description: 3D模型类型
            target_rotation:
              type: object
              description: 目标旋转角度
              properties:
                x:
                  type: number
                y:
                  type: number
                z:
                  type: number

    EmojiCaptchaResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            session_id:
              type: string
            target_emojis:
              type: array
              items:
                type: string
              description: 需要选择的目标Emoji列表
            options:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  emoji:
                    type: string
              description: 所有可选的Emoji选项

    VoiceCaptchaResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            session_id:
              type: string
            audio_url:
              type: string
              description: 语音文件URL
            text:
              type: string
              description: 验证码文本（用于测试）

    LianliankanCaptchaResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            session_id:
              type: string
            grid:
              type: array
              items:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    icon:
                      type: string
                    pair_id:
                      type: integer
              description: 连连看网格数据

    VerifyRequest:
      type: object
      required:
        - session_id
        - type
      properties:
        session_id:
          type: string
          description: 验证码会话ID
        type:
          type: string
          enum: [slider, click, gesture, 3d, emoji, voice, lianliankan]
          description: 验证码类型
        x:
          type: integer
          description: X坐标（滑块/点击）
        y:
          type: integer
          description: Y坐标（滑块/点击）
        points:
          type: array
          items:
            type: object
            properties:
              x:
                type: integer
              y:
                type: integer
          description: 点击点列表（点击验证码）
        trajectory:
          type: array
          items:
            type: object
            properties:
              x:
                type: integer
              y:
                type: integer
              t:
                type: integer
                format: int64
          description: 轨迹数据
        pattern:
          type: array
          items:
            type: object
          description: 手势图案
        rotation:
          type: object
          properties:
            x:
              type: number
            y:
              type: number
            z:
              type: number
          description: 3D旋转角度
        selected_ids:
          type: array
          items:
            type: integer
          description: 选中的Emoji ID列表
        answer:
          type: string
          description: 语音验证码答案
        matching_pairs:
          type: array
          items:
            type: array
            items:
              type: integer
          description: 连连看配对结果

    VerifyResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            success:
              type: boolean
              description: 验证是否成功
            message:
              type: string
              description: 验证结果消息
            remaining_attempts:
              type: integer
              description: 剩余尝试次数
            token:
              type: string
              description: 验证成功后的令牌
            trajectory_result:
              type: object
              properties:
                score:
                  type: number
                  format: float
                  description: 轨迹分数
                passed:
                  type: boolean
                  description: 轨迹验证是否通过
                reasons:
                  type: array
                  items:
                    type: string
                  description: 轨迹验证原因

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          description: 用户名
        email:
          type: string
          format: email
          description: 邮箱地址
        password:
          type: string
          minLength: 6
          description: 密码
        behavior_data:
          type: string
          description: 行为数据（Base64编码）

    RegisterResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            user_id:
              type: integer
              description: 用户ID
            username:
              type: string
              description: 用户名
            email:
              type: string
              description: 邮箱地址
            verification_link:
              type: string
              description: 邮箱验证链接

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用户名或邮箱
        password:
          type: string
          description: 密码
        captcha_token:
          type: string
          description: 验证码令牌
        behavior_data:
          type: string
          description: 行为数据

    LoginResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          properties:
            access_token:
              type: string
              description: 访问令牌
            refresh_token:
              type: string
              description: 刷新令牌
            expires_in:
              type: integer
