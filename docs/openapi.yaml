components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer Token认证
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API密钥认证
  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
          description: 错误码
          example: 400
        message:
          type: string
          description: 错误信息
          example: 请求参数错误
        data:
          nullable: true
          description: 错误详情
    CaptchaSession:
      type: object
      properties:
        session_id:
          type: string
          description: 验证码会话ID
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        type:
          type: string
          description: 验证码类型
    VerificationResult:
      type: object
      properties:
        success:
          type: boolean
          description: 验证是否成功
        score:
