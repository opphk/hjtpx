server:
  http_listen_address: :9080
  http_listen_port: 9080
  grpc_listen_address: ""
  grpc_listen_port: 0

positions:
  filename: /var/log/promtail/positions.yaml

client:
  url: http://loki:3100/loki/api/v1/push
  timeout: 10s
  batchwait: 1s
  batchsize: 1048576

scrape_configs:
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          __path__: /var/log/nginx/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>[^ ]+) - (?P<remote_user>[^ ]+) \[(?P<time>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>[^ ]+) (?P<body_bytes_sent>[^ ]+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
      - labels:
          job: nginx
          status:
          remote_addr:
          request:
          http_user_agent:

  - job_name: app
    static_configs:
      - targets:
          - localhost
        labels:
          job: hjtpx-app
          __path__: /var/log/hjtpx/*.log
    pipeline_stages:
      - json:
          expression: "^(?P<time>\\d{4}/\\d{2}/\\d{2} \\d{2}:\\d{2}:\\d{2}) \\| (?P<status>\\d+) \\| (?P<latency>[^|]+) \\| (?P<ip>[^|]+) \\| (?P<method>[^|]+) \\| (?P<path>.*)$"
          time: time
          status: status
          latency: latency
          ip: ip
          method: method
          path: path
      - labels:
          job: hjtpx-app
          status:
          method:
          path:
