server:
  http_listen_address: :9080
  http_listen_port: 9080
  grpc_listen_address: ""
  grpc_listen_port: 0

positions:
  filename: /var/log/promtail/positions.yaml
  ignore_invalid_lines: true

client:
  url: http://loki:3100/loki/api/v1/push
  timeout: 30s
  batchwait: 1s
  batchsize: 1048576
  backoff_config:
    min_period: 100ms
    max_period: 30s
    max_retries: 10

scrape_configs:
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          env: ${ENV:-production}
          __path__: /var/log/nginx/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>[^ ]+) - (?P<remote_user>[^ ]+) \[(?P<time>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>[^ ]+) (?P<body_bytes_sent>[^ ]+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
      - labels:
          job: nginx
          status:
          remote_addr:
          request:
          http_user_agent:

  - job_name: app
    static_configs:
      - targets:
          - localhost
        labels:
          job: hjtpx-app
          env: ${ENV:-production}
          __path__: /var/log/hjtpx/*.log
    pipeline_stages:
      - json:
          expressions:
            time: time
            status: status
            latency: latency
            ip: ip
            method: method
            path: path
            error: error
            request_id: request_id
            user_id: user_id
      - labels:
          job: hjtpx-app
          status:
          method:
          path:
          error:
          request_id:
          user_id:

  - job_name: docker
    type: journal
    journal:
      max_age: 12h
      labels:
        job: docker-logs
        env: ${ENV:-production}
    relabel_configs:
      - source_labels: ['__journal_unit']
        target_label: 'unit'
      - source_labels: ['__journal_container_name']
        target_label: 'container_name'
