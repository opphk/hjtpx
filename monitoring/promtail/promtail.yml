server:
  http_listen_address: :9080
  http_listen_port: 9080
  grpc_listen_address: ""
  grpc_listen_port: 0

positions:
  filename: /var/log/promtail/positions.yaml
  ignore_invalid_lines: true

client:
  url: http://loki:3100/loki/api/v1/push
  timeout: 30s
  batchwait: 1s
  batchsize: 1048576
  backoff_config:
    min_period: 100ms
    max_period: 30s
    max_retries: 10

scrape_configs:
  - job_name: nginx
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx
          env: ${ENV:-production}
          __path__: /var/log/nginx/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>[^ ]+) - (?P<remote_user>[^ ]+) \[(?P<time>[^\]]+)\] "(?P<request>[^"]+)" (?P<status>[^ ]+) (?P<body_bytes_sent>[^ ]+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
      - labels:
          job: nginx
          status:
          remote_addr:
          request:
          http_user_agent:

  - job_name: app
    static_configs:
      - targets:
          - localhost
        labels:
          job: hjtpx-app
          env: ${ENV:-production}
          __path__: /var/log/hjtpx/*.log
    pipeline_stages:
      - json:
          expressions:
            time: time
            level: level
            status: status
            latency: latency
            ip: ip
            method: method
            path: path
            error: error
            request_id: request_id
            user_id: user_id
            captcha_type: captcha_type
            captcha_result: captcha_result
            client_id: client_id
      - labels:
          job: hjtpx-app
          level:
          status:
          method:
          path:
          error:
          captcha_type:
          captcha_result:
      - match:
          selector: '{level="error"}'
          stages:
            - regex:
                expression: 'error=(?P<error_type>\w+).*?(?P<error_message>[^|]+)'
      - match:
          selector: '{captcha_type!=""}'
          stages:
            - metrics:
                captcha_requests_total:
                  type: Counter
                  source: captures
                  config:
                    action: inc

  - job_name: captcha
    static_configs:
      - targets:
          - localhost
        labels:
          job: captcha
          env: ${ENV:-production}
          __path__: /var/log/hjtpx/captcha*.log
    pipeline_stages:
      - json:
          expressions:
            time: time
            captcha_id: captcha_id
            captcha_type: captcha_type
            action: action
            result: result
            duration_ms: duration_ms
            client_ip: client_ip
            user_id: user_id
            user_agent: user_agent
            risk_score: risk_score
      - labels:
          job: captcha
          captcha_type:
          action:
          result:
      - regex:
          expression: 'duration_ms="(?P<duration>\d+)"'
      - metrics:
          captcha_duration_seconds:
            type: Histogram
            source: duration
            config:
              buckets: [0.1, 0.25, 0.5, 1.0, 2.5, 5.0]

  - job_name: security
    static_configs:
      - targets:
          - localhost
        labels:
          job: security
          env: ${ENV:-production}
          __path__: /var/log/hjtpx/security*.log
    pipeline_stages:
      - json:
          expressions:
            time: time
            event_type: event_type
            severity: severity
            source_ip: source_ip
            target: target
            action: action
            details: details
      - labels:
          job: security
          event_type:
          severity:
          action:
      - match:
          selector: '{severity="critical"}'
          stages:
            - logfmt:
                mapping:
                  alert: alert
            - metrics:
                critical_security_events_total:
                  type: Counter
                  config:
                    action: inc

  - job_name: websocket
    static_configs:
      - targets:
          - localhost
        labels:
          job: websocket
          env: ${ENV:-production}
          __path__: /var/log/hjtpx/websocket*.log
    pipeline_stages:
      - json:
          expressions:
            time: time
            connection_id: connection_id
            event: event
            client_ip: client_ip
            duration_ms: duration_ms
            message_type: message_type
      - labels:
          job: websocket
          event:
          message_type:
      - regex:
          expression: 'duration_ms="(?P<duration>\d+)"'
      - metrics:
          websocket_duration_seconds:
            type: Histogram
            source: duration
            config:
              buckets: [0.01, 0.05, 0.1, 0.25, 0.5, 1.0]

  - job_name: docker
    type: journal
    journal:
      max_age: 12h
      labels:
        job: docker-logs
        env: ${ENV:-production}
    relabel_configs:
      - source_labels: ['__journal_unit']
        target_label: 'unit'
      - source_labels: ['__journal_container_name']
        target_label: 'container_name'
    pipeline_stages:
      - json:
          expressions:
            container_name: container_name
            container_id: container_id
            message: message
      - labels:
          container_name:

