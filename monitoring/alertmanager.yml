global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-receiver'

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: ${ALERT_EMAIL:-alerts@example.com}
        from: ${SMTP_FROM:-alerts@example.com}
        smarthost: ${SMTP_HOST:-smtp.example.com:587}
        auth_username: ${SMTP_USER:-}
        auth_password: ${SMTP_PASSWORD:-}
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL:-}
        channel: '#alerts'
        send_resolved: true
        title: |
          {{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} {{ .GroupLabels.alertname }}
        text: |
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} *{{ .Labels.alertname }}*
          Severity: {{ .Labels.severity }}
          {{ .Annotations.description }}
          Started: {{ .StartsAt }}
          {{ end }}

  - name: 'critical-receiver'
    email_configs:
      - to: ${CRITICAL_EMAIL:-critical@example.com}
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL:-}
        channel: '#critical-alerts'
        send_resolved: true
    pagerduty_configs:
      - service_key: ${PAGERDUTY_SERVICE_KEY:-}
        severity: critical

  - name: 'warning-receiver'
    email_configs:
      - to: ${WARNING_EMAIL:-warnings@example.com}
    slack_configs:
      - api_url: ${SLACK_WEBHOOK_URL:-}
        channel: '#warnings'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
