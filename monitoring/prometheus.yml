global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'hjtpx'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - 'alerts.yml'
  - 'recording_rules.yml'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'hjtpx-api'
    static_configs:
      - targets: ['backend:3000']
    metrics_path: '/api/v1/metrics/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'hjtpx-nginx'
    static_configs:
      - targets: ['nginx-proxy:9113']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
