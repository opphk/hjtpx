groups:
  - name: hjtpx_alerts
    interval: 30s
    rules:
      - alert: HjtpxDown
        expr: up{job="hjtpx"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Hjtpx application is down"
          description: "Hjtpx has been down for more than 1 minute"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "P99 latency is {{ $value | humanizeDuration }}"

      - alert: DatabaseConnectionPoolExhausted
        expr: postgres_db_connections_open / postgres_db_connections_max > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Connection pool usage is {{ $value | humanizePercentage }}"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is high"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      - alert: CaptchaGenerationFailure
        expr: rate(captcha_generation_total{status="failed"}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High captcha generation failure rate"
          description: "Failure rate is {{ $value | humanizePercentage }}"

      - alert: VerificationFailureRate
        expr: rate(verification_total{status="failed"}[5m]) / rate(verification_total[5m]) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High verification failure rate"
          description: "Failure rate is {{ $value | humanizePercentage }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space is low"
          description: "Available disk space is {{ $value | humanizePercentage }}"

      - alert: MemoryUsageHigh
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage is high"
          description: "Available memory is {{ $value | humanizePercentage }}"

      - alert: NGINXUpstreamErrors
        expr: rate(nginx_nginx_http_requests_total{status=~"5.."}[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NGINX upstream errors detected"
          description: "Error rate is {{ $value | humanizePercentage }}"
