global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'hjtpx'
    environment: 'production'
  retention: 30d

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s
      api_version: v2

rule_files:
  - /etc/prometheus/rules/*.yml
  - /etc/prometheus/rules/*.rules

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - source_labels: [__address__]
        regex: '(.+):.*'
        target_label: instance
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'prometheus_.*'
        action: keep

  - job_name: 'hjtpx-app'
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'hjtpx-app'
      - source_labels: [__metrics_path__]
        target_label: metrics_path
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: '(go_|http_|process_|app_|captcha_|auth_|security_|cache_|db_|redis_|middleware_|websocket_|mfa_|bot_|trace_|fingerprint_|proxy_|environment_|profiling_).*'
        action: keep
      - source_labels: [__name__]
        regex: '.*_internal.*'
        action: drop

  - job_name: 'hjtpx-app-slow'
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    params:
      type: ['slow']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: metrics_path
        replacement: '/metrics'

  - job_name: 'hjtpx-health'
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/health/ready'
    scrape_interval: 15s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'hjtpx-health'

  - job_name: 'hjtpx-tracing'
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/metrics/tracing'
    scrape_interval: 15s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'hjtpx-tracing'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'trace_.*'
        action: keep

  - job_name: 'hjtpx-profiling'
    static_configs:
      - targets: ['app:8080']
    metrics_path: '/metrics/profiling'
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'hjtpx-profiling'
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'profiling_.*'
        action: keep

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
