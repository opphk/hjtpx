groups:
  - name: hjtpx-api
    rules:
      - alert: HighErrorRate
        expr: rate(http_request_errors_total[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time"
          description: "95th percentile response time is {{ $value | humanizeDuration }}"

      - alert: CriticalResponseTime
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 5
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Critical response time detected"
          description: "99th percentile response time is {{ $value | humanizeDuration }}"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) * 100 > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"

      - alert: CriticalCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) * 100 > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"

      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / node_memory_MemTotal_bytes) > 0.85
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      - alert: CriticalMemoryUsage
        expr: (process_resident_memory_bytes / node_memory_MemTotal_bytes) > 0.95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}"

      - alert: HighHeapMemoryUsage
        expr: (process_memory_bytes{type="heap_used"} / process_memory_bytes{type="heap_total"}) > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High heap memory usage"
          description: "Heap memory usage is {{ $value | humanizePercentage }}"

      - alert: HighConnectionCount
        expr: http_active_connections > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High connection count"
          description: "Active connections: {{ $value }}"

      - alert: AuthenticationFailures
        expr: rate(authentication_attempts_total{result="failure"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High authentication failure rate"
          description: "Authentication failures: {{ $value | humanize }} per second"

      - alert: RateLimitHits
        expr: rate(rate_limit_hits_total[5m]) > 100
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Rate limiting being triggered"
          description: "Rate limit hits: {{ $value | humanize }} per second"

      - alert: LowCacheHitRatio
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low cache hit ratio"
          description: "Cache hit ratio is {{ $value | humanizePercentage }}"

      - alert: DatabaseQueryErrors
        expr: rate(database_query_errors_total[5m]) > 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database query errors"
          description: "Database query errors: {{ $value | humanize }} per second"

      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, rate(database_query_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries"
          description: "95th percentile query time is {{ $value | humanizeDuration }}"

      - alert: CriticalSlowDatabaseQueries
        expr: histogram_quantile(0.99, rate(database_query_duration_seconds_bucket[5m])) > 3
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Critical slow database queries"
          description: "99th percentile query time is {{ $value | humanizeDuration }}"

      - alert: SlowRedisOperations
        expr: histogram_quantile(0.95, rate(redis_operation_duration_seconds_bucket[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow Redis operations"
          description: "95th percentile Redis operation time is {{ $value | humanizeDuration }}"

      - alert: HighWebSocketConnections
        expr: websocket_connections_active > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High WebSocket connection count"
          description: "Active WebSocket connections: {{ $value }}"

  - name: infrastructure
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Instance down"
          description: "{{ $labels.job }} ({{ $labels.instance }}) has been down for more than 2 minutes"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Disk space is {{ $value | humanizePercentage }}"

      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is down"

      - alert: RedisSlowResponses
        expr: rate(redis_operation_duration_seconds_bucket[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis slow responses"
          description: "Redis response time is high"

      - alert: PostgreSQLDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance {{ $labels.instance }} is down"

      - alert: PostgreSQLSlowQueries
        expr: rate(database_query_duration_seconds_bucket[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL slow queries"
          description: "PostgreSQL query performance degraded"

      - alert: NginxDown
        expr: up{job="nginx"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Nginx is down"
          description: "Nginx instance {{ $labels.instance }} is down"

      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Node exporter is down"
          description: "Node exporter {{ $labels.instance }} is down"

  - name: business
    rules:
      - alert: NoTraffic
        expr: rate(http_requests_total[5m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No traffic"
          description: "No HTTP traffic in the last 10 minutes"

      - alert: UnusualTraffic
        expr: rate(http_requests_total[5m]) > 1000
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Unusual high traffic"
          description: "HTTP traffic is unusually high: {{ $value | humanize }} requests per second"

      - alert: HighErrorRateTrend
        expr: increase(http_request_errors_total[1h]) > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate trend"
          description: "Errors increased by {{ $value }} in the last hour"

      - alert: SlowResponseTrend
        expr: increase(http_request_duration_seconds_bucket[1h]) > 1000
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Slow response trend"
          description: "Response times are trending upward"

  - name: sentry-performance
    rules:
      - alert: SentryTransactionLatency
        expr: histogram_quantile(0.95, rate(sentry_transactions_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Sentry transaction latency"
          description: "Sentry transaction p95 latency is {{ $value | humanizeDuration }}"

      - alert: SentryErrorRate
        expr: rate(sentry_errors_total[5m]) / rate(sentry_transactions_total[5m]) > 0.01
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Sentry error rate"
          description: "Error rate in Sentry is {{ $value | humanizePercentage }}"
