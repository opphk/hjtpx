app:
  level: production

rules:
  - name: High Error Rate
    condition:
      op: and
      inner:
        - op: eq
          name: event.type
          value: error
        - op: gt
          name: count
          value: 100
    filters:
      - op: eq
        name: environment
        value: production
    action:
      type: notify
      target:
        type: slack
        channel: "#alerts"
    throttle: 15m

  - name: Performance Degradation - P95 Latency
    condition:
      op: gt
      name: measurements.p95
      value: 3000
    filters:
      - op: eq
        name: transaction.op
        value: http.server
    action:
      type: notify
      target:
        type: slack
        channel: "#performance-alerts"
    throttle: 5m

  - name: New Error Type
    condition:
      op: eq
      name: event.first_seen
      value: true
    filters:
      - op: eq
        name: event.type
        value: error
    action:
      type: notify
      target:
        type: email
        recipients:
          - dev-team@example.com
    throttle: 1h

  - name: Database Connection Errors
    condition:
      op: and
      inner:
        - op: eq
          name: event.type
          value: error
        - op: or
          inner:
            - op: like
              name: exception.value
              value: "%ECONNREFUSED%"
            - op: like
              name: exception.value
              value: "%connection refused%"
    action:
      type: notify
      target:
        type: slack
        channel: "#database-alerts"
    throttle: 10m

  - name: Authentication Errors Spike
    condition:
      op: and
      inner:
        - op: eq
          name: event.type
          value: error
        - op: gt
          name: count
          value: 50
    filters:
      - op: or
        inner:
          - op: like
            name: exception.value
            value: "%Invalid token%"
          - op: like
            name: exception.value
            value: "%Unauthorized%"
    action:
      type: notify
      target:
        type: slack
        channel: "#security-alerts"
    throttle: 5m

  - name: Error Rate Spike
    condition:
      op: and
      inner:
        - op: eq
          name: event.type
          value: error
        - op: gt
          name: count
          value: 20
    filters:
      - op: eq
        name: environment
        value: production
    action:
      type: notify
      target:
        type: slack
        channel: "#alerts"
      email:
        recipients:
          - dev-team@example.com
    throttle: 10m

  - name: API Latency Degradation
    condition:
      op: gt
      name: measurements.p99
      value: 5000
    filters:
      - op: eq
        name: transaction.op
        value: http.server
      - op: eq
        name: environment
        value: production
    action:
      type: notify
      target:
        type: slack
        channel: "#performance-alerts"
    throttle: 15m

  - name: Memory Usage High
    condition:
      op: gt
      name: measurements.memory
      value: 512
    filters:
      - op: eq
        name: environment
        value: production
    action:
      type: notify
      target:
        type: slack
        channel: "#performance-alerts"
    throttle: 30m
