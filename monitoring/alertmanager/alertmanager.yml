global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  smtp_auth_username: 'alertmanager'
  smtp_auth_password: 'changeme'
  slack_api_url: 'https://hooks.slack.com/services/XXXXX/XXXXX/XXXXX'
  victorops_api_key: 'your-victorops-api-key'
  victorops_api_url: 'https://alert.victorops.com/integrations/generic/20140514/alert'

templates:
  - '/etc/alertmanager/template/*.tmpl'

route:
  group_by: ['alertname', 'cluster', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-receiver'
      continue: true
    - match:
        alertname: CaptchaLowSuccessRate
      receiver: 'captcha-team-receiver'
      continue: true
    - match:
        alertname: CaptchaCriticalSuccessRate
      receiver: 'captcha-team-receiver'
      continue: true
    - match:
        alertname: SecurityCriticalBlockRate
      receiver: 'security-team-receiver'
      continue: true
    - match:
        alertname: AuthBruteForceSuspected
      receiver: 'security-team-receiver'
      continue: true
    - match:
        alertname: PostgreSQLDown
      receiver: 'dba-oncall-receiver'
      continue: true
    - match:
        alertname: RedisDown
      receiver: 'dba-oncall-receiver'
      continue: true

receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'ops-team@example.com'
        send_resolved: true
        headers:
          subject: 'HJTPX Alert: {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: 'HJTPX Alert: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Labels.alertname }}
          *Severity:* {{ .Labels.severity }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Instance:* {{ .Labels.instance }}
          *Time:* {{ .StartsAt }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
    webhook_configs:
      - url: 'http://webhook-service:5000/alerts'
        send_resolved: true

  - name: 'critical-receiver'
    email_configs:
      - to: 'critical-team@example.com'
        send_resolved: true
        headers:
          subject: '[CRITICAL] HJTPX: {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#critical-alerts'
        send_resolved: true
        title: '[CRITICAL] HJTPX Alert: {{ .GroupLabels.alertname }}'
        text: |
          :rotating_light: *CRITICAL ALERT*
          *Alert:* {{ .Labels.alertname }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Instance:* {{ .Labels.instance }}
          *Time:* {{ .StartsAt }}
        color: 'danger'
    pagerduty_configs:
      - service_key: 'your-pagerduty-service-key'
        severity: critical
    webhook_configs:
      - url: 'http://webhook-service:5000/critical-alerts'
        send_resolved: true

  - name: 'warning-receiver'
    email_configs:
      - to: 'ops-team@example.com'
        send_resolved: true
        headers:
          subject: '[WARNING] HJTPX: {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '[WARNING] HJTPX Alert: {{ .GroupLabels.alertname }}'
        text: |
          :warning: *WARNING ALERT*
          *Alert:* {{ .Labels.alertname }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Instance:* {{ .Labels.instance }}
          *Time:* {{ .StartsAt }}
        color: 'warning'

  - name: 'captcha-team-receiver'
    email_configs:
      - to: 'captcha-team@example.com'
        send_resolved: true
        headers:
          subject: '[CAPTCHA] HJTPX: {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#captcha-alerts'
        send_resolved: true
        title: '[CAPTCHA] HJTPX Alert: {{ .GroupLabels.alertname }}'
        text: |
          :robot_face: *CAPTCHA ALERT*
          *Alert:* {{ .Labels.alertname }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Time:* {{ .StartsAt }}

  - name: 'security-team-receiver'
    email_configs:
      - to: 'security-team@example.com'
        send_resolved: true
        headers:
          subject: '[SECURITY] HJTPX: {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#security-alerts'
        send_resolved: true
        title: '[SECURITY] HJTPX Alert: {{ .GroupLabels.alertname }}'
        text: |
          :shield: *SECURITY ALERT*
          *Alert:* {{ .Labels.alertname }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Time:* {{ .StartsAt }}
        color: 'danger'
    webhook_configs:
      - url: 'http://security-service:8080/alerts'
        send_resolved: true

  - name: 'dba-oncall-receiver'
    email_configs:
      - to: 'dba-oncall@example.com'
        send_resolved: true
        headers:
          subject: '[DATABASE] HJTPX: {{ .GroupLabels.alertname }}'
    slack_configs:
      - channel: '#database-alerts'
        send_resolved: true
        title: '[DATABASE] HJTPX Alert: {{ .GroupLabels.alertname }}'
        text: |
          :database: *DATABASE ALERT*
          *Alert:* {{ .Labels.alertname }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Instance:* {{ .Labels.instance }}
          *Time:* {{ .StartsAt }}
    pagerduty_configs:
      - service_key: 'your-pagerduty-service-key'
        severity: critical

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

  - source_match:
      alertname: 'HJTXPAppDown'
    target_match_re:
      alertname: 'HJTXP.*'
    equal: ['instance']

  - source_match:
      alertname: 'PostgreSQLDown'
    target_match_re:
      alertname: 'PostgreSQL.*'
    equal: ['instance']

  - source_match:
      alertname: 'RedisDown'
    target_match_re:
      alertname: 'Redis.*'
    equal: ['instance']
