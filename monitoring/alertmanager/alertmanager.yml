global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  smtp_auth_username: 'alertmanager@example.com'
  smtp_auth_password: 'CHANGEME'
  smtp_require_tls: true
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'
  opsgenie_api_key: 'CHANGEME'
  opsgenie_api_url: 'https://api.opsgenie.com/v2/alerts'
  webhook_url: 'http://alertmanager-webhook:5001/webhook'
  victorops_api_key: 'CHANGEME'
  victorops_api_url: 'https://alert.victorops.com/directembed/v1/alert'
  telegram_bot_token: 'CHANGEME'

templates:
  - '/etc/alertmanager/template/*.tmpl'

route:
  group_by: ['alertname', 'cluster', 'service', 'severity', 'instance']
  group_wait: 30s
  group_interval: 1m
  repeat_interval: 12h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: critical
      continue: true
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: warning
      continue: true
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    - match:
        severity: info
      receiver: info
      continue: false
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 8h

    - match:
        team: security
      receiver: security-team
      continue: true

    - match:
        team: dba
      receiver: dba-team
      continue: true

    - match:
        team: infrastructure
      receiver: infra-team
      continue: true

    - match:
        team: backend
      receiver: backend-team
      continue: true

    - match:
        team: product
      receiver: product-team
      continue: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service', 'instance']

  - source_match:
      alertname: 'HJTXPAppDown'
    target_match_re:
      severity: 'warning'
    equal: ['instance']

  - source_match:
      alertname: 'PostgreSQLDown'
    target_match_re:
      severity: 'warning'
    equal: ['instance']

  - source_match:
      alertname: 'RedisDown'
    target_match_re:
      severity: 'warning'
    equal: ['instance']

  - source_match:
      alertname: 'NodeExporterDown'
    target_match_re:
      severity: 'warning'
    equal: ['instance']

  - source_match:
      alertname: 'HighErrorRate'
    target_match:
      alertname: 'HighLatency'
    equal: ['instance', 'service']

receivers:
  - name: 'default'
    email_configs:
      - to: 'oncall@example.com'
        send_resolved: true
        headers:
          subject: 'HJTPX Alert: {{ .GroupLabels.alertname }}'
        html: |
          <html>
          <body>
          <h2>HJTPX Alert</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
          <p><strong>Status:</strong> {{ .Status }}</p>
          <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          {{ if gt (len .Alerts.Firing) 0 }}
          <h3>Firing Alerts</h3>
          <table border="1">
            <tr><th>Alert</th><th>Instance</th><th>Value</th><th>Time</th></tr>
            {{ range .Alerts.Firing }}
            <tr>
              <td>{{ .Labels.alertname }}</td>
              <td>{{ .Labels.instance }}</td>
              <td>{{ .Annotations.description }}</td>
              <td>{{ .StartsAt }}</td>
            </tr>
            {{ end }}
          </table>
          {{ end }}
          {{ if gt (len .Alerts.Resolved) 0 }}
          <h3>Resolved Alerts</h3>
          <table border="1">
            <tr><th>Alert</th><th>Instance</th><th>Duration</th></tr>
            {{ range .Alerts.Resolved }}
            <tr>
              <td>{{ .Labels.alertname }}</td>
              <td>{{ .Labels.instance }}</td>
              <td>{{ .Duration.String }}</td>
            </tr>
            {{ end }}
          </table>
          {{ end }}
          <p><a href="{{ .ExternalURL }}">View in Alertmanager</a></p>
          </body>
          </html>

  - name: 'critical'
    pagerduty_configs:
      - service_key: 'CHANGEME'
        severity: critical
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        details:
          alertname: '{{ .GroupLabels.alertname }}'
          severity: '{{ .GroupLabels.severity }}'
          description: '{{ .CommonAnnotations.description }}'
          cluster: '{{ .GroupLabels.cluster }}'
          service: '{{ .GroupLabels.service }}'
          instance: '{{ .GroupLabels.instance }}'
        client: 'HJTPX'
        client_url: '{{ .ExternalURL }}'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGEME'
        channel: '#alerts-critical'
        send_resolved: true
        title: 'HJTPX Critical Alert'
        text: '<!channel> Critical: {{ .GroupLabels.alertname }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        footer: 'HJTPX Alertmanager'
        pretext: |
          *HJTPX Critical Alert*
        fields:
          - title: Alert
            value: '{{ .GroupLabels.alertname }}'
            short: true
          - title: Severity
            value: '{{ .GroupLabels.severity }}'
            short: true
          - title: Status
            value: '{{ .Status }}'
            short: true
          - title: Service
            value: '{{ .GroupLabels.service }}'
            short: true
          - title: Instance
            value: '{{ .GroupLabels.instance }}'
            short: true
        actions:
          - type: button
            text: 'View Dashboard'
            url: '{{ .CommonAnnotations.dashboard_url }}'
          - type: button
            text: 'View Runbook'
            url: '{{ .CommonAnnotations.runbook_url }}'
          - type: button
            text: 'View Traces'
            url: '{{ .CommonAnnotations.trace_url }}'
    webhook_configs:
      - url: 'http://alertmanager-webhook:5001/webhook'
        send_resolved: true

  - name: 'warning'
    email_configs:
      - to: 'team@example.com'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGEME'
        channel: '#alerts-warning'
        send_resolved: true
        title: 'HJTPX Warning Alert'
        text: 'Warning: {{ .GroupLabels.alertname }}'
        color: 'warning'
        footer: 'HJTPX Alertmanager'
        fields:
          - title: Service
            value: '{{ .GroupLabels.service }}'
            short: true
          - title: Instance
            value: '{{ .GroupLabels.instance }}'
            short: true

  - name: 'info'
    email_configs:
      - to: 'team@example.com'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGEME'
        channel: '#alerts-info'
        send_resolved: true
        title: 'HJTPX Info Alert'
        text: 'Info: {{ .GroupLabels.alertname }}'
        color: '#439FE0'
        footer: 'HJTPX Alertmanager'

  - name: 'security-team'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGEME'
        channel: '#security-alerts'
        send_resolved: true
        title: 'Security Alert'
        text: ':rotating_light: Security: {{ .GroupLabels.alertname }}'
        color: 'danger'
        fields:
          - title: Instance
            value: '{{ .GroupLabels.instance }}'
            short: true
          - title: Source
            value: '{{ .GroupLabels.source }}'
            short: true

  - name: 'dba-team'
    email_configs:
      - to: 'dba@example.com'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGEME'
        channel: '#dba-alerts'
        send_resolved: true
        title: 'Database Alert'
        text: 'Database: {{ .GroupLabels.alertname }}'
        color: 'warning'
        fields:
          - title: Database
            value: '{{ .GroupLabels.database }}'
            short: true
          - title: Query
            value: '{{ .CommonAnnotations.query }}'
            short: true

  - name: 'infra-team'
    email_configs:
      - to: 'infra@example.com'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGEME'
        channel: '#infra-alerts'
        send_resolved: true
        title: 'Infrastructure Alert'
        text: 'Infrastructure: {{ .GroupLabels.alertname }}'
        color: 'warning'
        fields:
          - title: Host
            value: '{{ .GroupLabels.instance }}'
            short: true
          - title: Metric
            value: '{{ .CommonAnnotations.metric }}'
            short: true

  - name: 'backend-team'
    email_configs:
      - to: 'backend@example.com'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGEME'
        channel: '#backend-alerts'
        send_resolved: true
        title: 'Backend Alert'
        text: 'Backend: {{ .GroupLabels.alertname }}'
        color: 'warning'
        fields:
          - title: Service
            value: '{{ .GroupLabels.service }}'
            short: true
          - title: Endpoint
            value: '{{ .GroupLabels.endpoint }}'
            short: true

  - name: 'product-team'
    email_configs:
      - to: 'product@example.com'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/CHANGEME'
        channel: '#product-alerts'
        send_resolved: true
        title: 'Product Alert'
        text: 'Product: {{ .GroupLabels.alertname }}'
        color: 'good'
