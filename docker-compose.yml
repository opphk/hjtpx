version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: standard
      args:
        - BUILD_VERSION=${BUILD_VERSION:-v20.0}
        - BUILD_TIME=${BUILD_TIME:-}
        - BUILD_FLAGS=${BUILD_FLAGS:--s -w}
    container_name: hjtpx_app
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - GIN_MODE=release
      - SERVER_PORT=8080
      - DATABASE_HOST=${POSTGRES_HOST}
      - DATABASE_PORT=${POSTGRES_PORT}
      - DATABASE_USER=${POSTGRES_USER}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_NAME=${POSTGRES_DB}
      - DATABASE_SSLMODE=${POSTGRES_SSLMODE:-disable}
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-25}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-5}
      - DATABASE_CONN_MAX_LIFETIME=${DATABASE_CONN_MAX_LIFETIME:-5m}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-10}
      - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-5}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      - GOMAXPROCS=${GOMAXPROCS:-2}
      - GOGC=${GOGC:-100}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - METRICS_PATH=${METRICS_PATH:-/metrics}
      - HEALTH_CHECK_PATH=${HEALTH_CHECK_PATH:-/health}
      - AGI_ENABLED=${AGI_ENABLED:-true}
      - MULTIMODAL_ENABLED=${MULTIMODAL_ENABLED:-true}
      - TRAJECTORY_ENCRYPTION=${TRAJECTORY_ENCRYPTION:-true}
    volumes:
      - ./logs:/var/log/hjtpx
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
      start_interval: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - hjtpx_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"
        labels: "service,instance"
    labels:
      - "hjtpx.service=app"
      - "hjtpx.version=${BUILD_VERSION:-v20.0}"
      - "hjtpx.environment=${ENVIRONMENT:-development}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: '64mb'
    ulimits:
      nproc: 4096
      nofile:
        soft: 65535
        hard: 65535
    stop_grace_period: 30s
    cpus: 1.0
    cpu_count: 0
    cpu_percent: 100
    mem_limit: 512m
    mem_reservation: 128m
    OOM_score_adj: -500
    pids_limit: 1024

  postgres:
    image: postgres:14-alpine
    container_name: hjtpx_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8
      - POSTGRES_HOST_AUTH_METHOD=md5
      - POSTGRES_MAX_CONNECTIONS=100
      - POSTGRES_SHARED_BUFFERS=256MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=512MB
      - POSTGRES_MAINTENANCE_WORK_MEM=64MB
      - POSTGRES_WAL_BUFFERS=4MB
      - POSTGRES_DEFAULT_STATISTICS_TARGET=100
      - POSTGRES_RANDOM_PAGE_COST=1.1
      - POSTGRES_EFFECTIVE_IO_CONCURRENCY=200
      - POSTGRES_WORK_MEM=4MB
      - POSTGRES_MIN_WAL_SIZE=1GB
      - POSTGRES_MAX_WAL_SIZE=4GB
      - POSTGRES_LOG_DESTINATION=stderr
      - POSTGRES_LOGGING_COLLECTOR=on
      - POSTGRES_LOG_DIRECTORY=log
      - POSTGRES_LOG_ROTATION_AGE=1d
      - POSTGRES_LOG_ROTATION_SIZE=100MB
      - POSTGRES_LOG_MIN_DURATION_STATEMENT=1000
      - POSTGRES_LOG_LINE_PREFIX=%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/docker/postgres-init.sh:/docker-entrypoint-initdb.d/init.sh:ro
      - postgres_logs:/var/log/postgresql
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost && pg_settings=$(psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -t -c \"SELECT count(*) FROM pg_stat_activity WHERE state = 'active'\") && test $pg_settings -lt 90"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
      start_interval: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    networks:
      - hjtpx_network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
        labels: "service,instance"
    labels:
      - "hjtpx.service=postgres"
      - "hjtpx.version=14-alpine"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    shm_size: '128mb'
    stop_grace_period: 1m
    cpus: 1.0
    mem_limit: 1g
    mem_reservation: 512m
    OOM_score_adj: -500
    pids_limit: 256

  redis:
    image: redis:7-alpine
    container_name: hjtpx_redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 5
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --replica-lazy-flush yes
      --activerehashing yes
      --hz 10
      --dynamic-hz yes
      --loglevel notice
      --logfile ""
      --databases 16
      --save 900 1
      --save 300 10
      --save 60 10000
      --stop-writes-on-bgsave-error yes
      --rdbcompression yes
      --rdbchecksum yes
      --activerehashing yes
      --client-output-buffer-limit normal 0 0 0
      --client-output-buffer-limit replica 256mb 64mb 60
      --client-output-buffer-limit pubsub 32mb 8mb 60
    volumes:
      - redis_data:/data
      - ./scripts/docker/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_logs:/var/log/redis
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
      start_interval: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - hjtpx_network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
        labels: "service,instance"
    labels:
      - "hjtpx.service=redis"
      - "hjtpx.version=7-alpine"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
      nproc:
        soft: 4096
        hard: 8192
      memlock:
        soft: -1
        hard: -1
    stop_grace_period: 10s
    cpus: 0.5
    mem_limit: 256m
    mem_reservation: 64m
    OOM_score_adj: -500
    pids_limit: 512

networks:
  hjtpx_network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
          ip_range: 172.28.5.0/24
    driver_opts:
      com.docker.network.bridge.name: hjtpx-bridge
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
      com.docker.network.bridge.enable_bridge_linux: "true"
    labels:
      - "hjtpx.network=main"
      - "hjtpx.network.type=bridge"

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${POSTGRES_DATA_PATH:-./data/postgres}
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${REDIS_DATA_PATH:-./data/redis}
  postgres_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs/postgres
  redis_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs/redis
