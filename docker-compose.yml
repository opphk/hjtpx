version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_VERSION=${BUILD_VERSION:-v15.0}
        - BUILD_TIME=${BUILD_TIME:-}
        - BUILD_FLAGS=-s -w
    image: hjtpx/backend:${BUILD_VERSION:-latest}
    container_name: hjtpx_backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - SERVER_PORT=8080
      - SERVER_READ_TIMEOUT=60s
      - SERVER_WRITE_TIMEOUT=60s
      - SERVER_IDLE_TIMEOUT=120s
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${DATABASE_USER:-hjtpx}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-hjtpx123456}
      - DATABASE_NAME=${DATABASE_NAME:-hjtpx}
      - DATABASE_SSLMODE=${DATABASE_SSLMODE:-disable}
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-25}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-5}
      - DATABASE_CONN_MAX_LIFETIME=${DATABASE_CONN_MAX_LIFETIME:-300s}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-hjtpx123456}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-10}
      - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-2}
      - REDIS_MAX_RETRIES=${REDIS_MAX_RETRIES:-3}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-min-32-characters}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      - JWT_REFRESH_EXPIRE_HOURS=${JWT_REFRESH_EXPIRE_HOURS:-168}
      - GOMAXPROCS=${GOMAXPROCS:-2}
      - GOGC=${GOGC:-100}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_OUTPUT=${LOG_OUTPUT:-stdout}
      - CAPTCHA_EXPIRE_MINUTES=${CAPTCHA_EXPIRE_MINUTES:-5}
      - CAPTCHA_MAX_ATTEMPTS=${CAPTCHA_MAX_ATTEMPTS:-3}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-true}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-1000}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60s}
    volumes:
      - ./logs:/var/log/hjtpx:rw
      - backend_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - hjtpx_network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    labels:
      - "com.hjtpx.service=backend"
      - "com.hjtpx.version=${BUILD_VERSION:-v15.0}"
      - "com.hjtpx.managedby=compose"

  postgres:
    image: postgres:14-alpine
    container_name: hjtpx_postgres
    restart: unless-stopped
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DATABASE_USER:-hjtpx}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-hjtpx123456}
      - POSTGRES_DB=${DATABASE_NAME:-hjtpx}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
      - POSTGRES_MAX_CONNECTIONS=${DATABASE_MAX_CONNECTIONS:-100}
      - POSTGRES_SHARED_BUFFERS=${DATABASE_SHARED_BUFFERS:-256MB}
      - POSTGRES_EFFECTIVE_CACHE_SIZE=${DATABASE_EFFECTIVE_CACHE_SIZE:-1GB}
      - POSTGRES_MAINTENANCE_WORK_MEM=${DATABASE_MAINTENANCE_WORK_MEM:-64MB}
      - POSTGRES_WAL_BUFFERS=${DATABASE_WAL_BUFFERS:-4MB}
      - POSTGRES_CHECKPOINT_COMPLETION_TARGET=${DATABASE_CHECKPOINT_COMPLETION_TARGET:-0.9}
      - POSTGRES_MAX_WAL_SIZE=${DATABASE_MAX_WAL_SIZE:-1GB}
      - POSTGRES_MIN_WAL_SIZE=${DATABASE_MIN_WAL_SIZE:-80MB}
      - POSTGRES_RANDOM_PAGE_COST=${DATABASE_RANDOM_PAGE_COST:-1.1}
      - POSTGRES_EFFECTIVE_IO_CONCURRENCY=${DATABASE_EFFECTIVE_IO_CONCURRENCY:-200}
      - POSTGRES_WORK_MEM=${DATABASE_WORK_MEM:-4MB}
      - POSTGRES_MIN_WAL_SIZE=${DATABASE_MIN_WAL_SIZE:-64MB}
      - POSTGRES_MAX_WORKER_PROCESSES=${DATABASE_MAX_WORKER_PROCESSES:-8}
      - POSTGRES_MAX_PARALLEL_WORKERS_PER_GATHER=${DATABASE_MAX_PARALLEL_WORKERS_PER_GATHER:-2}
      - POSTGRES_MAX_PARALLEL_WORKERS=${DATABASE_MAX_PARALLEL_WORKERS:-8}
      - POSTGRES_MAX_PARALLEL_MAINTENANCE_WORKERS=${DATABASE_MAX_PARALLEL_MAINTENANCE_WORKERS:-2}
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-hjtpx} -d ${DATABASE_NAME:-hjtpx}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hjtpx_network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "com.hjtpx.service=database"
      - "com.hjtpx.version=${BUILD_VERSION:-v15.0}"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

  redis:
    image: redis:7-alpine
    container_name: hjtpx_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --maxmemory-samples 5
      --lazyfree-lazy-eviction yes
      --lazyfree-lazy-expire yes
      --lazyfree-lazy-server-del yes
      --replica-read-only yes
      --repl-diskless-sync yes
      --repl-diskless-sync-delay 5
      --repl-timeout 60
      --timeout 0
      --tcp-keepalive 300
      --hash-max-ziplist-entries 512
      --hash-max-ziplist-value 64
      --set-max-intset-entries 512
      --zset-max-ziplist-entries 128
      --zset-max-ziplist-value 64
      --activerehashing yes
      --hz 10
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data:rw
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-hjtpx123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - hjtpx_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    labels:
      - "com.hjtpx.service=cache"
      - "com.hjtpx.version=${BUILD_VERSION:-v15.0}"
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"

  prometheus:
    image: prom/prometheus:latest
    container_name: hjtpx_prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus:rw
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-10GB}'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - hjtpx_network
    depends_on:
      - backend
    labels:
      - "com.hjtpx.service=monitoring"
      - "com.hjtpx.version=${BUILD_VERSION:-v15.0}"

  grafana:
    image: grafana/grafana:latest
    container_name: hjtpx_grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana:rw
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=warn
    networks:
      - hjtpx_network
    depends_on:
      - prometheus
    labels:
      - "com.hjtpx.service=monitoring"
      - "com.hjtpx.version=${BUILD_VERSION:-v15.0}"

volumes:
  backend_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  hjtpx_network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: hjtpx_bridge
      com.docker.network.enable_ipv6: "false"
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
