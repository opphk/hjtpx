version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://captcha:captcha123@postgres:5432/captcha_db
      REDIS_ADDR: redis:6379

  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: captcha
      POSTGRES_PASSWORD: captcha123
      POSTGRES_DB: captcha_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
