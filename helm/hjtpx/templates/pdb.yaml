{{- if .Values.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "hjtpx.fullname" . }}-pdb
  labels:
    {{- include "hjtpx.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "hjtpx.selectorLabels" . | nindent 6 }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
{{- end }}
