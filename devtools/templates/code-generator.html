{{define "content"}}
<div class="section-title">SDK代码生成器</div>
<p class="section-desc">自动生成不同编程语言的验证码集成代码</p>

<div class="row">
    <div class="col-md-4">
        <div class="card mb-4">
            <div class="card-header">
                <i class="bi bi-gear"></i> 配置
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">编程语言</label>
                    <select class="form-select" id="languageSelect">
                        <option value="python">Python</option>
                        <option value="javascript">JavaScript</option>
                        <option value="go">Go</option>
                        <option value="java">Java</option>
                        <option value="php">PHP</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">验证码类型</label>
                    <select class="form-select" id="captchaTypeSelect">
                        <option value="slider">滑动验证码</option>
                        <option value="click">点击验证码</option>
                        <option value="gesture">手势验证码</option>
                        <option value="jigsaw">拼图验证码</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">API地址</label>
                    <input type="text" class="form-control" id="apiUrl" value="http://localhost:8080">
                </div>
                <div class="mb-3">
                    <label class="form-label">应用ID</label>
                    <input type="text" class="form-control" id="appId" placeholder="your-app-id">
                </div>
                <div class="mb-3">
                    <label class="form-label">应用密钥</label>
                    <input type="text" class="form-control" id="appKey" placeholder="your-app-key">
                </div>
                <button class="btn btn-primary w-100" id="generateBtn">
                    <i class="bi bi-code"></i> 生成代码
                </button>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <i class="bi bi-file-earmark-code"></i> 功能选择
            </div>
            <div class="card-body">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="includeGet" checked>
                    <label class="form-check-label" for="includeGet">获取验证码</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="includeVerify" checked>
                    <label class="form-check-label" for="includeVerify">验证验证码</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="includeErrorHandling">
                    <label class="form-check-label" for="includeErrorHandling">错误处理</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="includeComments">
                    <label class="form-check-label" for="includeComments">详细注释</label>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-md-8">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-code-slash"></i> 生成的代码</span>
                <button class="btn btn-outline-primary btn-sm" id="copyBtn">
                    <i class="bi bi-clipboard"></i> 复制代码
                </button>
            </div>
            <div class="card-body">
                <pre class="code-block" id="generatedCode">点击"生成代码"按钮开始...</pre>
            </div>
        </div>
    </div>
</div>

function generateCode() {
    const language = document.getElementById('languageSelect').value;
    const captchaType = document.getElementById('captchaTypeSelect').value;
    const apiUrl = document.getElementById('apiUrl').value;
    const appId = document.getElementById('appId').value;
    const appKey = document.getElementById('appKey').value;
    const includeGet = document.getElementById('includeGet').checked;
    const includeVerify = document.getElementById('includeVerify').checked;
    
    let code = '';
    const template = codeTemplates[language][captchaType];
    
    if (includeGet && template.get) {
        code += template.get;
    }
    
    if (includeVerify && template.verify) {
        code += template.verify;
    }
    
    document.getElementById('generatedCode').textContent = code;
}

document.getElementById('generateBtn').addEventListener('click', generateCode);

document.getElementById('copyBtn').addEventListener('click', function() {
    const code = document.getElementById('generatedCode').textContent;
    navigator.clipboard.writeText(code).then(() => {
        this.innerHTML = '<i class="bi bi-check"></i> 已复制';
        setTimeout(() => {
            this.innerHTML = '<i class="bi bi-clipboard"></i> 复制代码';
        }, 2000);
    });
});
</script>
