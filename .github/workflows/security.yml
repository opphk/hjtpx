name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * 0'  # 每周日凌晨3点运行
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  checks: write

jobs:
  docker-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-scanning:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Go vulnerability check
        uses: golang/vulncheck-action@v1
        with:
          module-path: ./backend

      - name: Run govulncheck
        run: |
          go install golang.org/x/vulncmd@latest
          govulncheck ./...

      - name: Check for known vulnerabilities in dependencies
        run: |
          go install github.com/nscabs/govulndb@latest
          govulndb ./... || true

  container-scanning:
    runs-on: ubuntu-latest
    needs: docker-build
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: hjtpx/hjtpx:security-scan

      - name: Run Trivy container scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hjtpx/hjtpx:security-scan'
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          vuln-type: 'os,library'

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-container-results.sarif'
        if: always()

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: hjtpx/hjtpx:security-scan

  codeql-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:go"

      - name: Upload CodeQL results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        if: always()

  owasp-dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run dependency check
        run: |
          go install github.com/sonatype-nexus-community/nancy@latest
          cd backend
          go list -json -m all | nancy sleuth
        continue-on-error: true

      - name: Check for insecure TLS versions
        run: |
          grep -r "TLS1\." --include="*.go" . || echo "No insecure TLS usage found"

      - name: Check for hardcoded credentials patterns
        run: |
          grep -rnE "(password|secret|api_key|apikey|token)\s*[=:]\s*['\"]" --include="*.go" . || echo "No obvious hardcoded secrets found"

  static-security-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.json
          results_format: json
          publish_results: true

      - name: Upload Scorecard results
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.json
          retention-days: 30

      - name: Run Scorecard HTML
        uses: nosbissl/scorecard-action@v2
        with:
          export Results_File: results.json
        if: always()

  sast-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/security-advisories
            p/secrets
            p/go-lang-specific

      - name: Upload Semgrep results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        if: always()

  binary-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        run: |
          cd backend
          go build -o hjtpx cmd/api/main.go

      - name: Analyze binary for security issues
        run: |
          go install github.com/burglars/scan@latest || true
          chmod +x scan || true

      - name: Check binary permissions
        run: |
          ls -la backend/hjtpx
          file backend/hjtpx
