name: API Documentation Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/backend/routes/**/*.js'
      - 'src/backend/routes/*.js'
      - 'src/backend/config/swagger*.js'
      - 'docs/**'
  push:
    branches: [main, develop]
    paths:
      - 'src/backend/routes/**/*.js'
      - 'src/backend/routes/*.js'
      - 'src/backend/config/swagger*.js'
      - 'docs/**'
  workflow_dispatch:

jobs:
  validate-docs:
    name: Validate API Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Swagger specification
        run: npm run swagger:validate

      - name: Check for API changes
        run: npm run swagger:check-changes

      - name: Generate API documentation
        run: npm run swagger:generate

      - name: Check for breaking changes
        id: breaking-check
        run: |
          if npm run swagger:check-changes 2>&1 | grep -q "Breaking changes detected"; then
            echo "breaking=true" >> $GITHUB_OUTPUT
          else
            echo "breaking=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-documentation
          path: |
            docs/openapi.json
            docs/openapi.yaml
            docs/versions/
          retention-days: 30

  compare-versions:
    name: Compare API Versions
    runs-on: ubuntu-latest
    needs: validate-docs
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: List API versions
        run: node scripts/manage-api-versions.js list || echo "No versions yet"

      - name: Generate change report
        run: node scripts/check-api-changes.js --format json --no-save > api-changes.json || true
        continue-on-error: true

      - name: Upload change report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-change-report
          path: api-changes.json
          retention-days: 7

  documentation-quality:
    name: Documentation Quality Check
    runs-on: ubuntu-latest
    needs: validate-docs
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check missing documentation
        run: |
          echo "Checking for undocumented endpoints..."
          node -e "
            const { generateSwaggerSpec } = require('./src/backend/config/swagger-auto');
            const spec = generateSwaggerSpec();
            let undocumented = [];
            
            Object.entries(spec.paths || {}).forEach(([path, methods]) => {
              Object.entries(methods || {}).forEach(([method, operation]) => {
                if (['get', 'post', 'put', 'delete', 'patch'].includes(method)) {
                  if (!operation.summary && !operation.description) {
                    undocumented.push(method.toUpperCase() + ' ' + path);
                  }
                }
              });
            });
            
            if (undocumented.length > 0) {
              console.log('⚠️ Undocumented endpoints found:');
              undocumented.forEach(e => console.log('  - ' + e));
              process.exit(1);
            } else {
              console.log('✅ All endpoints are documented');
            }
          "

      - name: Validate endpoint consistency
        run: |
          echo "Validating endpoint consistency..."
          node -e "
            const { generateSwaggerSpec } = require('./src/backend/config/swagger-auto');
            const spec = generateSwaggerSpec();
            let issues = [];
            
            Object.entries(spec.paths || {}).forEach(([path, methods]) => {
              Object.entries(methods || {}).forEach(([method, operation]) => {
                if (['get', 'post', 'put', 'delete', 'patch'].includes(method)) {
                  if (!operation.responses) {
                    issues.push('Missing responses for ' + method.toUpperCase() + ' ' + path);
                  }
                  if (!operation.tags || operation.tags.length === 0) {
                    issues.push('Missing tags for ' + method.toUpperCase() + ' ' + path);
                  }
                }
              });
            });
            
            if (issues.length > 0) {
              console.log('⚠️ Documentation issues found:');
              issues.forEach(i => console.log('  - ' + i));
              process.exit(1);
            } else {
              console.log('✅ All endpoints have proper documentation');
            }
          "

  comment-pr:
    name: Comment PR with Documentation Status
    runs-on: ubuntu-latest
    needs: [validate-docs, compare-versions, documentation-quality]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Download change report
        uses: actions/download-artifact@v4
        with:
          name: api-change-report
          continue-on-error: true

      - name: Create PR comment
        run: |
          CHANGES_FILE="api-changes.json"
          if [ -f "$CHANGES_FILE" ]; then
            BREAKING=$(grep -o '"breaking":[0-9]*' $CHANGES_FILE | cut -d: -f2)
            ADDED=$(grep -o '"added":[0-9]*' $CHANGES_FILE | head -1 | cut -d: -f2)
            REMOVED=$(grep -o '"removed":[0-9]*' $CHANGES_FILE | head -1 | cut -d: -f2)
          else
            BREAKING=0
            ADDED=0
            REMOVED=0
          fi

          echo "## API Documentation Check Results" > pr-comment.md
          echo "" >> pr-comment.md
          echo "✅ **Documentation validation:** Passed" >> pr-comment.md
          echo "" >> pr-comment.md
          echo "### API Changes Summary" >> pr-comment.md
          echo "- Added endpoints: $ADDED" >> pr-comment.md
          echo "- Removed endpoints: $REMOVED" >> pr-comment.md
          echo "- Breaking changes: $BREAKING" >> pr-comment.md
          echo "" >> pr-comment.md
          
          if [ "$BREAKING" -gt 0 ]; then
            echo "⚠️ **Warning:** Breaking changes detected. Please update your API consumers." >> pr-comment.md
          fi
          
          echo "---" >> pr-comment.md
          echo "*This comment was automatically generated by the API Documentation Check workflow.*" >> pr-comment.md
          
          cat pr-comment.md

      - name: Find Previous Comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: 'API Documentation Check Results'

      - name: Update or Create PR Comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-comment.md
          mode: ${{ steps.find-comment.outputs.comment-id != '' && 'replace' || 'create' }}
