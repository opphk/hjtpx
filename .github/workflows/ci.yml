name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  security-events: write
  actions: read
  deployments: write

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'
  POSTGRES_VERSION: '14'
  REDIS_VERSION: '7'
  COVERAGE_THRESHOLD: 80

jobs:
  code-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Check code formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted correctly:"
            gofmt -l .
            exit 1
          fi
      
      - name: Run Go vet
        run: go vet ./...
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=10m --enable=gocritic,gosec,govet,errcheck,staticcheck
          skip-pkg-cache: true
          only-new-issues: true
      
      - name: Check for common issues
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      
      - name: Run errcheck
        run: |
          go install github.com/kisielk/errcheck@latest
          errcheck ./...

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: code-quality
    
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_USER: captcha
          POSTGRES_PASSWORD: captcha123
          POSTGRES_DB: captcha_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:${{ env.REDIS_VERSION }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Download dependencies
        run: go mod download
      
      - name: Go Vet
        run: go vet ./...
      
      - name: Run Unit Tests
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic -timeout=15m ./...
        env:
          DATABASE_URL: postgres://captcha:captcha123@localhost:5432/captcha_db?sslmode=disable
          REDIS_ADDR: localhost:6379
          GIN_MODE: test
      
      - name: Generate Coverage Report
        run: |
          go tool cover -html=coverage.out -o coverage.html
          go tool cover -func=coverage.out -o coverage.txt
      
      - name: Check Coverage Threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "Coverage is below $COVERAGE_THRESHOLD%, please add more tests"
            exit 1
          fi
          echo "Coverage meets the $COVERAGE_THRESHOLD% threshold"
      
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html
          retention-days: 30
      
      - name: Upload Coverage Details
        uses: actions/upload-artifact@v4
        with:
          name: coverage-details
          path: coverage.txt
          retention-days: 30
      
      - name: Build
        run: |
          cd backend
          go build -v -o hjtpx ./cmd/api/main.go
      
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: backend/hjtpx
          retention-days: 7

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: test
    
    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}
        env:
          POSTGRES_USER: captcha
          POSTGRES_PASSWORD: captcha123
          POSTGRES_DB: captcha_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:${{ env.REDIS_VERSION }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Download dependencies
        run: go mod download
      
      - name: Run Integration Tests
        run: go test -v -tags=integration -timeout=20m ./tests/integration/...
        env:
          DATABASE_URL: postgres://captcha:captcha123@localhost:5432/captcha_db?sslmode=disable
          REDIS_ADDR: localhost:6379
          GIN_MODE: test

  e2e-test:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json
      
      - name: Install Dependencies
        run: |
          cd e2e
          npm ci
      
      - name: Install Playwright
        run: |
          cd e2e
          npx playwright install --with-deps chromium
      
      - name: Run E2E Tests
        run: |
          cd e2e
          npx playwright test
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
      
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
      
      - name: Upload Test Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: e2e/test-screenshots/
          retention-days: 30

  docker-build-test:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: hjtpx/hjtpx:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Verify Docker image
        run: |
          docker images hjtpx/hjtpx:ci-test
          docker run --rm hjtpx/hjtpx:ci-test --help || echo "Docker image runs successfully"

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Run benchmarks
        run: |
          cd benchmark
          go test -bench=. -benchmem -timeout=15m ./...
        env:
          GIN_MODE: test

  summary:
    runs-on: ubuntu-latest
    needs: [test, integration-test, e2e-test]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: Summary
        run: |
          echo "## CI/CD Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Integration Tests: ${{ needs.integration-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E Tests: ${{ needs.e2e-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Status" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.integration-test.result }}" == "success" && "${{ needs.e2e-test.result }}" == "success" ]]; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed. Please check the logs." >> $GITHUB_STEP_SUMMARY
          fi
