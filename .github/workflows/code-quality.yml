name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go vet
        run: go vet ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=10m --enable=gocritic,gosec,govet,errcheck,staticcheck,megacheck
          skip-pkg-cache: true

      - name: Check code formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted correctly:"
            gofmt -l .
            exit 1
          fi

      - name: Check for TODO comments without assignee
        run: |
          TODOS=$(grep -r "TODO" --include="*.go" . | grep -v "TODO:" | grep -v "// " || true)
          if [ -n "$TODOS" ]; then
            echo "Found TODO comments without description:"
            echo "$TODOS"
          fi

  security-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Go vulnerability scan
        uses: trailofbits/go-sec-commit-check@v1
        with:
          package-path: .
        continue-on-error: true

      - name: Run gosec security scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest || true
          gosec -no-fail -fmt json -out gosec-report.json ./... || true

      - name: Upload gosec report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-report
          path: gosec-report.json
          retention-days: 30
        continue-on-error: true

  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_COMMENTS: true
          GITLEAKS_LOG_LEVEL: debug

  dependency-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Verify dependencies
        run: go mod verify

      - name: Check for go.sum integrity
        run: |
          go mod tidy
          git diff --exit-code go.sum || echo "go.sum needs update"

      - name: Run go mod why
        run: |
          go list -m all | while read mod; do
            go mod why "$mod" > /dev/null 2>&1 || echo "Unused dependency: $mod"
          done

  code-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Count Go files
        run: |
          GO_FILES=$(find . -name "*.go" -not -path "./vendor/*" -not -path "./.git/*" | wc -l)
          echo "Go source files: $GO_FILES"

      - name: Count lines of code
        uses: coffeesheep/go-count-lines@v1
        with:
          path: .
          extensions: go
          exclude-dirs: vendor,node_modules,.git,e2e

      - name: Check for large files
        run: |
          find . -type f -size +5M -not -path "./vendor/*" -not -path "./node_modules/*" -not -path "./.git/*" | while read f; do
            echo "Large file: $f ($(du -h "$f" | cut -f1))"
          done

  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        run: |
          cd e2e
          npm install eslint --save-dev || true

      - name: Run ESLint
        run: |
          cd e2e
          npx eslint tests/ || echo "ESLint checks completed"
        continue-on-error: true

  code-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: captcha
          POSTGRES_PASSWORD: captcha123
          POSTGRES_DB: captcha_db
        ports:
          - 5432:5432

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic -timeout=15m ./...
        env:
          DATABASE_URL: postgres://captcha:captcha123@localhost:5432/captcha_db?sslmode=disable
          REDIS_ADDR: localhost:6379
          GIN_MODE: test

      - name: Generate detailed coverage report
        run: |
          go tool cover -func=coverage.out -o coverage-details.txt || true
          echo "=== Coverage Details ===" >> $GITHUB_STEP_SUMMARY
          cat coverage-details.txt >> $GITHUB_STEP_SUMMARY || true

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l 2>/dev/null || echo 1) )); then
            echo "Coverage is below 80%, please add more tests"
          fi
        continue-on-error: true
