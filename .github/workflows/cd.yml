name: CD

on:
  push:
    tags:
      - 'v*'
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      deployment_strategy:
        description: 'Deployment strategy'
        required: false
        default: 'rolling'
        type: choice
        options:
          - rolling
          - blue-green
          - canary

permissions:
  contents: read
  packages: write
  actions: read
  security-events: write

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: hjtpx/hjtpx
  GO_VERSION: '1.21'
  DEPLOYMENT_TIMEOUT: 30m
  HEALTH_CHECK_TIMEOUT: 300
  ROLLBACK_TIMEOUT: 10m

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      build-time: ${{ steps.build-time.outputs.time }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Record build time
        id: build-time
        run: echo "time=$(date -u +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            GIN_MODE=production
          platforms: |
            linux/amd64
            linux/arm64
      
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom.spdx.json
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: false
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: always()

  staging-deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    timeout-minutes: 20
    
    environment:
      name: staging
      url: https://staging.hjtpx.example.com
    
    steps:
      - name: Save deployment info
        run: |
          echo "Deploying to staging environment"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Build time: ${{ needs.build.outputs.build-time }}"
      
      - name: Deploy to Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            echo "=== Starting Staging Deployment ==="
            echo "Pulling latest image..."
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Creating backup of current container..."
            docker stop hjtpx-staging-backup || true
            docker rm hjtpx-staging-backup || true
            docker stop hjtpx-staging || true
            docker rm hjtpx-staging || true
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:previous || true
            docker tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:previous || true
            
            echo "Starting new container..."
            docker run -d \
              --name hjtpx-staging \
              -p 8080:8080 \
              --env-file .env.staging \
              --restart unless-stopped \
              --health-cmd="curl -f http://localhost:8080/health || exit 1" \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=3 \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Waiting for container to be healthy..."
            sleep 15
            
            echo "Cleaning up old images..."
            docker image prune -f || true
            
            echo "=== Staging Deployment Completed ==="
      
      - name: Health Check
        run: |
          echo "Performing health check..."
          timeout 120 bash -c 'until curl -f -s https://staging.hjtpx.example.com/health > /dev/null; do sleep 5; echo "Waiting for service..."; done'
          echo "Health check passed!"
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          curl -f -s https://staging.hjtpx.example.com/health || { echo "Health endpoint failed"; exit 1; }
          curl -f -s https://staging.hjtpx.example.com/api/v1/captcha/types || { echo "Captcha types endpoint failed"; exit 1; }
          curl -f -s https://staging.hjtpx.example.com/api/v1/health/stats || { echo "Stats endpoint failed"; exit 1; }
          echo "All smoke tests passed!"

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*Staging Deployment ${{ github.ref_name }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status:* ${{ job.status }}\n*Environment:* Staging\n*Version:* ${{ github.ref_name }}\n*Build Time:* ${{ needs.build.outputs.build-time }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Deployment"},
                      "url": "https://staging.hjtpx.example.com"
                    },
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Logs"},
                      "url": "https://staging.hjtpx.example.com/logs"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  production-deploy:
    runs-on: ubuntu-latest
    needs: [build, staging-deploy]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    timeout-minutes: 30
    
    environment:
      name: production
      url: https://hjtpx.example.com
    
    steps:
      - name: Save deployment info
        run: |
          echo "Preparing production deployment"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Deployment Strategy: ${{ github.event.inputs.deployment_strategy || 'rolling' }}"
          echo "Build time: ${{ needs.build.outputs.build-time }}"
      
      - name: Pre-deployment backup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            echo "=== Pre-deployment Backup ==="
            
            echo "Creating database backup..."
            if command -v pg_dump &> /dev/null; then
              BACKUP_NAME="pre-deploy-backup-$(date +%Y%m%d-%H%M%S)"
              pg_dump -h $DB_HOST -U $DB_USER -d $DB_NAME > /backups/$BACKUP_NAME.sql || echo "Database backup failed"
              echo "Database backup: $BACKUP_NAME"
            fi || true
            
            echo "Backing up config..."
            if [ -f /app/config.yaml ]; then
              CONFIG_BACKUP="config-backup-$(date +%Y%m%d-%H%M%S).yaml"
              cp /app/config.yaml /backups/$CONFIG_BACKUP || echo "Config backup failed"
              echo "Config backup: $CONFIG_BACKUP"
            fi || true
            
            echo "Backing up current image tag..."
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} || true
            docker tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }} ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:rollback || true
            docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:rollback || true
            
            echo "=== Pre-deployment Backup Completed ==="

      - name: Deploy to Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            echo "=== Starting Production Deployment ==="
            
            echo "Pulling latest image..."
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Creating rollback point..."
            docker stop hjtpx-rollback || true
            docker rm hjtpx-rollback || true
            docker stop hjtpx || true
            docker rm hjtpx || true
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:previous 2>/dev/null || echo "No previous image available"
            docker tag ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:previous ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:rollback || true
            docker run -d --name hjtpx-rollback ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:rollback || true
            
            echo "Starting new container..."
            docker run -d \
              --name hjtpx \
              -p 8080:8080 \
              --env-file .env.production \
              --restart unless-stopped \
              --health-cmd="curl -f http://localhost:8080/health || exit 1" \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=5 \
              --health-start-period=60s \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Waiting for new container to be healthy..."
            for i in {1..30}; do
              if docker exec hjtpx curl -f http://localhost:8080/health > /dev/null 2>&1; then
                echo "Container is healthy after ${i} attempts"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Health check failed after 30 attempts"
                exit 1
              fi
              sleep 5
            done
            
            echo "Cleaning up old containers..."
            docker stop hjtpx-old || true
            docker rm hjtpx-old || true
            docker image prune -f || true
            
            echo "=== Production Deployment Completed ==="

      - name: Health Check
        run: |
          echo "Performing production health check..."
          timeout 180 bash -c 'until curl -f -s https://hjtpx.example.com/health > /dev/null; do sleep 10; echo "Waiting for service..."; done'
          echo "Production health check passed!"

      - name: Run production smoke tests
        run: |
          echo "Running comprehensive smoke tests..."
          curl -f -s https://hjtpx.example.com/health || { echo "Health endpoint failed"; exit 1; }
          curl -f -s https://hjtpx.example.com/api/v1/captcha/types || { echo "Captcha types endpoint failed"; exit 1; }
          curl -f -s https://hjtpx.example.com/api/v1/health/stats || { echo "Stats endpoint failed"; exit 1; }
          echo "All smoke tests passed!"

      - name: Notify production deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*Production Deployment ${{ github.ref_name }}*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Production Deployment",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Version:*\n${{ github.ref_name }}"},
                    {"type": "mrkdwn", "text": "*Status:*\n${{ job.status }}"},
                    {"type": "mrkdwn", "text": "*Deployed by:*\n${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Commit:*\n${{ github.sha }}"},
                    {"type": "mrkdwn", "text": "*Build Time:*\n${{ needs.build.outputs.build-time }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Application"},
                      "url": "https://hjtpx.example.com"
                    },
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Logs"},
                      "url": "https://dashboard.example.com/logs"
                    },
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "Rollback"},
                      url: "https://github.com/${{ github.repository }}/actions/workflows/cd.yml"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  rollback:
    runs-on: ubuntu-latest
    needs: [production-deploy]
    if: failure() && needs.production-deploy.result == 'failure'
    timeout-minutes: 15
    
    environment:
      name: production
      url: https://hjtpx.example.com
    
    steps:
      - name: Notify rollback initiation
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*⚠️ Initiating Automatic Rollback*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Version:* ${{ github.ref_name }}\n*Reason:* Deployment failed health checks\n*Action:* Initiating automatic rollback"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Automatic rollback
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -e
            echo "=== Initiating Automatic Rollback ==="
            
            echo "Stopping current container..."
            docker stop hjtpx || true
            docker rm hjtpx || true
            
            echo "Starting rollback container..."
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:rollback || true
            docker run -d \
              --name hjtpx \
              -p 8080:8080 \
              --env-file .env.production \
              --restart unless-stopped \
              --health-cmd="curl -f http://localhost:8080/health || exit 1" \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=3 \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:rollback || {
                echo "Rollback image not available, using previous..."
                docker run -d \
                  --name hjtpx \
                  -p 8080:8080 \
                  --env-file .env.production \
                  --restart unless-stopped \
                  ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:previous || {
                    echo "No previous image available for rollback"
                    exit 1
                  }
              }
            
            echo "Waiting for rollback container to start..."
            sleep 30
            
            echo "Verifying rollback..."
            if curl -f http://localhost:8080/health > /dev/null; then
              echo "Rollback successful!"
            else
              echo "Rollback verification failed!"
              exit 1
            fi
            
            echo "=== Rollback Completed ==="

      - name: Verify rollback
        run: |
          echo "Verifying rollback health..."
          timeout 120 bash -c 'until curl -f -s https://hjtpx.example.com/health > /dev/null; do sleep 10; echo "Waiting for service..."; done'
          echo "Rollback health check passed!"

      - name: Notify rollback completion
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*⚠️ Automatic Rollback Completed*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Version:* ${{ github.ref_name }}\n*Action:* Successfully rolled back to previous version\n*Status:* Service restored"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Application"},
                      "url": "https://hjtpx.example.com"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  post-build:
    runs-on: ubuntu-latest
    needs: [staging-deploy, production-deploy]
    if: always()
    timeout-minutes: 10
    
    steps:
      - name: Generate deployment report
        run: |
          echo "## Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | ${{ needs.production-deploy.outputs.build-time || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.staging-deploy.result }} | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.production-deploy.result }} | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.staging-deploy.result }}" == "success" && "${{ needs.production-deploy.result }}" == "success" ]]; then
            echo "✅ All deployments completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some deployments failed. Check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Deployment Metrics" >> $GITHUB_STEP_SUMMARY
          echo "- Total deployment time: Available in workflow logs" >> $GITHUB_STEP_SUMMARY
          echo "- Health check status: Available in workflow logs" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke test results: Available in workflow logs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- SBOM: Available for 90 days" >> $GITHUB_STEP_SUMMARY
          echo "- Security scan results: Available" >> $GITHUB_STEP_SUMMARY
          echo "- Build logs: Available for 90 days" >> $GITHUB_STEP_SUMMARY

      - name: Clean up old images
        if: success()
        run: |
          echo "Cleaning up old Docker images..."

