name: CD

on:
  push:
    tags:
      - 'v*'
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  packages: write
  actions: read

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: hjtpx/hjtpx
  GO_VERSION: '1.21'
  DEPLOY_TIMEOUT: '600'
  HEALTH_CHECK_TIMEOUT: '120'
  HEALTH_CHECK_INTERVAL: '10'

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      commit_sha: ${{ steps.commit.outputs.sha }}
      commit_message: ${{ steps.commit.outputs.message }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract commit info
        id: commit
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%B | head -n 1)" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Generate deployment ID
        id: deploy_id
        run: |
          DEPLOY_ID="deploy-$(date +%Y%m%d-%H%M%S)-${{ github.run_id }}"
          echo "id=$DEPLOY_ID" >> $GITHUB_OUTPUT
          echo "Generated deployment ID: $DEPLOY_ID"

      - name: Create deployment record
        run: |
          mkdir -p .deployments
          cat > .deployments/${{ steps.deploy_id.outputs.id }}.json <<EOF
          {
            "id": "${{ steps.deploy_id.outputs.id }}",
            "sha": "${{ steps.commit.outputs.sha }}",
            "message": "${{ steps.commit.outputs.message }}",
            "ref": "${{ github.ref }}",
            "environment": "${{ github.event.inputs.environment || 'staging' }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "actor": "${{ github.actor }}"
          }
          EOF
          echo "Deployment record created"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: pre-deployment
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      deployment-id: ${{ needs.pre-deployment.outputs.deploy_id }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            GIN_MODE=production
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          platforms: |
            linux/amd64
            linux/arm64
          no-cache-filters: |
            golang
      
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom.spdx.json
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.pre-deployment.outputs.deploy_id }}
          path: sbom.spdx.json
          retention-days: 30
      
      - name: Image size report
        run: |
          echo "## Docker Image Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Information" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: ${{ env.DOCKER_REGISTRY }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- SHA: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- Build Time: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Go Version: ${{ env.GO_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment ID: ${{ needs.pre-deployment.outputs.deploy_id }}" >> $GITHUB_STEP_SUMMARY

  staging-deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    timeout-minutes: 20
    
    environment:
      name: staging
      url: https://staging.hjtpx.example.com
    
    steps:
      - name: Pre-deployment checks
        run: |
          echo "## Staging Deployment Started" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Information" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment ID: ${{ needs.build.outputs.deployment-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Actor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
      
      - name: Get current container image
        id: current_image
        uses: appleboy/ssh-action@master
        env:
          DEPLOYMENT_ID: ${{ needs.build.outputs.deployment-id }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "=== Pre-deployment Status ==="
            docker ps --filter "name=hjtpx-staging" --format "{{.Image}}" || echo "No current staging container"
            
            echo "Creating backup of current deployment..."
            docker tag hjtpx-staging:hjtpx hjtpx-staging:previous-${{ needs.build.outputs.deployment-id }} || true
            
            echo "Saving deployment metadata..."
            mkdir -p /opt/hjtpx/deployments
            cat > /opt/hjtpx/deployments/${{ needs.build.outputs.deployment-id }}.json <<EOF
            {
              "id": "${{ needs.build.outputs.deployment-id }}",
              "version": "${{ github.ref_name }}",
              "image": "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}",
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "actor": "${{ github.actor }}"
            }
            EOF

      - name: Deploy to Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          timeout: ${{ env.DEPLOY_TIMEOUT }}m
          script: |
            echo "=== Starting Deployment ==="
            
            echo "Pulling latest image..."
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Stopping existing container..."
            docker stop hjtpx-staging || true
            docker rm hjtpx-staging || true
            
            echo "Starting new container..."
            docker run -d \
              --name hjtpx-staging \
              -p 8080:8080 \
              --env-file /opt/hjtpx/.env.staging \
              --restart unless-stopped \
              --memory-reservation=256m \
              --memory=512m \
              --cpus=1.0 \
              --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1" \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=3 \
              --health-start-period=10s \
              --log-driver=json-file \
              --log-opt=max-size=10m \
              --log-opt=max-file=3 \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Waiting for container to start..."
            sleep 10
            
            echo "Container started successfully"

      - name: Health Check
        run: |
          echo "=== Health Check ==="
          timeout ${{ env.HEALTH_CHECK_TIMEOUT }} bash -c 'until curl -f https://staging.hjtpx.example.com/health; do sleep ${{ env.HEALTH_CHECK_INTERVAL }}; done'
          echo "✅ Health check passed!"

      - name: Run smoke tests
        run: |
          echo "=== Running Smoke Tests ==="
          curl -f https://staging.hjtpx.example.com/health || { echo "❌ Health endpoint failed"; exit 1; }
          curl -f https://staging.hjtpx.example.com/api/v1/captcha/types || { echo "❌ API endpoint failed"; exit 1; }
          echo "✅ All smoke tests passed!"

      - name: Post-deployment cleanup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "=== Post-deployment Cleanup ==="
            echo "Cleaning up old images (keeping last 5)..."
            docker image prune -af --filter "until=72h" || true
            
            echo "Pruning unused networks..."
            docker network prune -f || true
            
            echo "Container status:"
            docker ps --filter "name=hjtpx-staging"
            
            echo "Resource usage:"
            docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}" hjtpx-staging || true

      - name: Update deployment record
        run: |
          echo "## Deployment Status: SUCCESS ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: Staging" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Duration: ${{ needs.build.outputs.deployment-id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*Staging Deployment ${{ github.ref_name }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status:* ${{ job.status }}\n*Environment:* Staging\n*Version:* ${{ github.ref_name }}\n*Deployment ID:* ${{ needs.build.outputs.deployment-id }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Deployment"},
                      "url": "https://staging.hjtpx.example.com"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  production-deploy:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    timeout-minutes: 25
    
    environment:
      name: production
      url: https://hjtpx.example.com
    
    steps:
      - name: Pre-deployment verification
        run: |
          echo "## Production Deployment Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Information" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment ID: ${{ needs.build.outputs.deployment-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ needs.build.outputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit Message: ${{ needs.build.outputs.commit_message }}" >> $GITHUB_STEP_SUMMARY
          echo "- Actor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ github.ref }}" == *"refs/tags/"* ]]; then
            echo "⚠️  **WARNING: Production deployment triggered by tag release**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Create rollback point
        run: |
          echo "=== Creating Rollback Point ==="
          ROLLBACK_ID="rollback-$(date +%Y%m%d-%H%M%S)"
          echo "rollback_id=$ROLLBACK_ID" >> $GITHUB_OUTPUT
      
      - name: Pre-deployment backup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            echo "=== Pre-deployment Backup ==="
            
            echo "Creating backup directory..."
            mkdir -p /opt/hjtpx/backups/$(date +%Y%m%d-%H%M%S)
            BACKUP_DIR="/opt/hjtpx/backups/$(date +%Y%m%d-%H%M%S)"
            
            echo "Creating database backup..."
            if command -v pg_dump &> /dev/null; then
              pg_dump -h $DB_HOST -U $DB_USER -d $DB_NAME | gzip > $BACKUP_DIR/database-backup.sql.gz
              echo "Database backup saved to $BACKUP_DIR/database-backup.sql.gz"
            else
              echo "pg_dump not available, skipping database backup"
            fi
            
            echo "Backing up config..."
            if [ -f /opt/hjtpx/config.yaml ]; then
              cp /opt/hjtpx/config.yaml $BACKUP_DIR/config-backup.yaml
              echo "Config backup saved to $BACKUP_DIR/config-backup.yaml"
            fi
            
            echo "Backing up current deployment metadata..."
            if [ -d /opt/hjtpx/deployments ]; then
              tar -czf $BACKUP_DIR/deployments-backup.tar.gz -C /opt/hjtpx deployments/
              echo "Deployments backup saved to $BACKUP_DIR/deployments-backup.tar.gz"
            fi
            
            echo "Saving current container image as rollback point..."
            docker tag hjtpx:hjtpx hjtpx:rollback-$(date +%Y%m%d-%H%M%S) || true
            docker tag hjtpx:hjtpx hjtpx:previous || true
            
            echo "Backup completed successfully"

      - name: Blue-Green Deployment to Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          timeout: ${{ env.DEPLOY_TIMEOUT }}m
          script: |
            echo "=== Blue-Green Production Deployment ==="
            
            echo "Pulling latest image..."
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Stopping blue container if exists..."
            docker stop hjtpx-blue || true
            docker rm hjtpx-blue || true
            
            echo "Starting new container (blue)..."
            docker run -d \
              --name hjtpx-blue \
              -p 8081:8080 \
              --env-file /opt/hjtpx/.env.production \
              --restart unless-stopped \
              --memory-reservation=256m \
              --memory=512m \
              --cpus=1.0 \
              --health-cmd="wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1" \
              --health-interval=30s \
              --health-timeout=10s \
              --health-retries=3 \
              --health-start-period=15s \
              --log-driver=json-file \
              --log-opt=max-size=10m \
              --log-opt=max-file=5 \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Waiting for new container to be healthy (max 2 minutes)..."
            for i in {1..24}; do
              if docker exec hjtpx-blue wget --no-verbose --tries=1 --spider http://localhost:8080/health > /dev/null 2>&1; then
                echo "New container is healthy!"
                break
              fi
              if [ $i -eq 24 ]; then
                echo "❌ New container failed to become healthy"
                docker logs hjtpx-blue --tail 50
                exit 1
              fi
              echo "Waiting for health check... ($i/24)"
              sleep 5
            done
            
            echo "Health check passed, switching traffic..."
            
            echo "Stopping green container..."
            docker stop hjtpx-green || true
            docker rm hjtpx-green || true
            
            echo "Renaming blue to green..."
            docker stop hjtpx || true
            docker rm hjtpx || true
            docker rename hjtpx-blue hjtpx
            
            echo "Blue-Green switch completed"

      - name: Health Check
        run: |
          echo "=== Production Health Check ==="
          timeout ${{ env.HEALTH_CHECK_TIMEOUT }} bash -c 'until curl -f https://hjtpx.example.com/health; do sleep ${{ env.HEALTH_CHECK_INTERVAL }}; done'
          echo "✅ Production health check passed!"

      - name: Run production smoke tests
        run: |
          echo "=== Running Production Smoke Tests ==="
          curl -f https://hjtpx.example.com/health || { echo "❌ Health endpoint failed"; exit 1; }
          curl -f https://hjtpx.example.com/api/v1/captcha/types || { echo "❌ API endpoint failed"; exit 1; }
          echo "✅ All production smoke tests passed!"

      - name: Post-deployment cleanup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            echo "=== Post-deployment Cleanup ==="
            
            echo "Cleaning up old images (keeping last 10)..."
            docker image prune -af --filter "until=168h" || true
            
            echo "Pruning unused networks..."
            docker network prune -f || true
            
            echo "Cleaning up old backups (keeping last 30)..."
            find /opt/hjtpx/backups -type d -mtime +30 -exec rm -rf {} + 2>/dev/null || true
            
            echo "Current container status:"
            docker ps --filter "name=hjtpx"
            
            echo "Resource usage:"
            docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}" hjtpx || true
            
            echo "Disk usage:"
            docker system df
            
            echo "Deployment metadata:"
            cat /opt/hjtpx/deployments/*.json 2>/dev/null | tail -1 || echo "No metadata available"

      - name: Update deployment record
        run: |
          echo "## Production Deployment Status: SUCCESS ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: Production" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment ID: ${{ needs.build.outputs.deployment-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Actor: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Notify production deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*Production Deployment ${{ github.ref_name }}*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Production Deployment",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Version:*\n${{ github.ref_name }}"},
                    {"type": "mrkdwn", "text": "*Status:*\n${{ job.status }}"},
                    {"type": "mrkdwn", "text": "*Deployed by:*\n${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Commit:*\n${{ needs.build.outputs.commit_sha }}"},
                    {"type": "mrkdwn", "text": "*Deployment ID:*\n${{ needs.build.outputs.deployment-id }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Application"},
                      "url": "https://hjtpx.example.com"
                    },
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Logs"},
                      "url": "https://dashboard.example.com/logs"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  rollback:
    runs-on: ubuntu-latest
    needs: [staging-deploy, production-deploy]
    if: failure()
    timeout-minutes: 15
    
    steps:
      - name: Determine rollback target
        id: target
        run: |
          if [[ "${{ needs.production-deploy.result }}" == "failure" ]]; then
            echo "target=production" >> $GITHUB_OUTPUT
            echo "Rolling back production deployment"
          elif [[ "${{ needs.staging-deploy.result }}" == "failure" ]]; then
            echo "target=staging" >> $GITHUB_OUTPUT
            echo "Rolling back staging deployment"
          fi

      - name: Rollback production
        if: needs.production-deploy.result == 'failure'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          timeout: 10m
          script: |
            echo "=== Production Rollback ==="
            
            echo "Checking for rollback images..."
            docker images | grep hjtpx || echo "No hjtpx images found"
            
            echo "Stopping current container..."
            docker stop hjtpx || true
            docker rm hjtpx || true
            
            echo "Starting rollback container..."
            docker run -d \
              --name hjtpx \
              -p 8080:8080 \
              --env-file /opt/hjtpx/.env.production \
              --restart unless-stopped \
              --memory-reservation=256m \
              --memory=512m \
              --cpus=1.0 \
              hjtpx:previous
            
            echo "Waiting for rollback container to be healthy..."
            sleep 10
            
            echo "Rollback completed. Container status:"
            docker ps --filter "name=hjtpx"
            docker logs hjtpx --tail 20 || true

      - name: Rollback staging
        if: needs.staging-deploy.result == 'failure' && needs.production-deploy.result != 'failure'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          timeout: 10m
          script: |
            echo "=== Staging Rollback ==="
            
            echo "Checking for rollback images..."
            docker images | grep hjtpx || echo "No hjtpx images found"
            
            echo "Stopping current container..."
            docker stop hjtpx-staging || true
            docker rm hjtpx-staging || true
            
            echo "Starting rollback container..."
            docker run -d \
              --name hjtpx-staging \
              -p 8080:8080 \
              --env-file /opt/hjtpx/.env.staging \
              --restart unless-stopped \
              hjtpx-staging:previous
            
            echo "Waiting for rollback container to be healthy..."
            sleep 10
            
            echo "Rollback completed. Container status:"
            docker ps --filter "name=hjtpx-staging"
            docker logs hjtpx-staging --tail 20 || true

      - name: Verify rollback
        run: |
          echo "=== Verifying Rollback ==="
          if [[ "${{ needs.production-deploy.result }}" == "failure" ]]; then
            timeout 60 bash -c 'until curl -f https://hjtpx.example.com/health; do sleep 5; done' || true
            echo "Production rollback verified"
          fi
          
          if [[ "${{ needs.staging-deploy.result }}" == "failure" ]]; then
            timeout 60 bash -c 'until curl -f https://staging.hjtpx.example.com/health; do sleep 5; done' || true
            echo "Staging rollback verified"
          fi

      - name: Generate rollback report
        run: |
          echo "## Rollback Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rollback Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.workflow }} failure" >> $GITHUB_STEP_SUMMARY
          echo "- Failed job: ${{ needs.production-deploy.result == 'failure' && 'production-deploy' || 'staging-deploy' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Rollback target: ${{ steps.target.outputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️  **Manual verification required**" >> $GITHUB_STEP_SUMMARY

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*⚠️ Production Deployment Failed - Automatic Rollback Triggered*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Version:* ${{ github.ref_name }}\n*Reason:* Deployment failed\n*Action:* Rolled back to previous version\n*Deployment ID:* ${{ needs.build.outputs.deployment-id }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  post-build:
    runs-on: ubuntu-latest
    needs: [staging-deploy, production-deploy]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: Generate deployment report
        run: |
          echo "## Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status | Version | Deployment ID |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|---------|---------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.staging-deploy.result }} | ${{ github.ref_name }} | ${{ needs.build.outputs.deployment-id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.production-deploy.result }} | ${{ github.ref_name }} | ${{ needs.build.outputs.deployment-id }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.staging-deploy.result }}" == "success" && "${{ needs.production-deploy.result }}" == "success" ]]; then
            echo "✅ All deployments completed successfully!" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.staging-deploy.result }}" == "success" ]]; then
            echo "⚠️ Staging deployed, Production skipped or failed" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.production-deploy.result }}" == "success" ]]; then
            echo "⚠️ Production deployed, Staging skipped or failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ All deployments failed. Check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Verify deployment in respective environments" >> $GITHUB_STEP_SUMMARY
          echo "2. Monitor application logs" >> $GITHUB_STEP_SUMMARY
          echo "3. Run smoke tests manually if needed" >> $GITHUB_STEP_SUMMARY

      - name: Clean up old images
        if: success()
        run: |
          echo "Cleaning up old Docker images..."
          docker image prune -af --filter "until=168h" || true
