name: CD

on:
  push:
    tags:
      - 'v*'
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write
  actions: read

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: hjtpx/hjtpx
  GO_VERSION: '1.21'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=${{ env.GO_VERSION }}
            GIN_MODE=production
          platforms: |
            linux/amd64
            linux/arm64
      
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom.spdx.json
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30

  staging-deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    timeout-minutes: 15
    
    environment:
      name: staging
      url: https://staging.hjtpx.example.com
    
    steps:
      - name: Deploy to Staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "Pulling latest image..."
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Stopping existing container..."
            docker stop hjtpx-staging || true
            docker rm hjtpx-staging || true
            
            echo "Starting new container..."
            docker run -d \
              --name hjtpx-staging \
              -p 8080:8080 \
              --env-file .env.staging \
              --restart unless-stopped \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Cleaning up old images..."
            docker image prune -f
            
            echo "Deployment completed!"

      - name: Health Check
        run: |
          timeout 60 bash -c 'until curl -f https://staging.hjtpx.example.com/health; do sleep 5; done'
          echo "Health check passed!"

      - name: Run smoke tests
        run: |
          curl -f https://staging.hjtpx.example.com/health || exit 1
          curl -f https://staging.hjtpx.example.com/api/v1/captcha/types || exit 1
          echo "Smoke tests passed!"

      - name: Notify deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*Staging Deployment ${{ github.ref_name }}*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Status:* ${{ job.status }}\n*Environment:* Staging\n*Version:* ${{ github.ref_name }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Deployment"},
                      "url": "https://staging.hjtpx.example.com"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  production-deploy:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    timeout-minutes: 20
    
    environment:
      name: production
      url: https://hjtpx.example.com
    
    steps:
      - name: Create rollback point
        run: |
          echo "Creating rollback point..."
      
      - name: Pre-deployment backup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            echo "Creating database backup..."
            if command -v pg_dump &> /dev/null; then
              pg_dump -h $DB_HOST -U $DB_USER -d $DB_NAME > /backups/pre-deploy-backup-$(date +%Y%m%d-%H%M%S).sql
            fi
            
            echo "Backing up config..."
            if [ -f /app/config.yaml ]; then
              cp /app/config.yaml /backups/config-backup-$(date +%Y%m%d-%H%M%S).yaml
            fi

      - name: Deploy to Production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            echo "Pulling latest image..."
            docker pull ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Starting new container in staging mode first..."
            docker run -d \
              --name hjtpx-new \
              -p 8081:8080 \
              --env-file .env.production \
              --restart unless-stopped \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "Waiting for new container to be healthy..."
            sleep 30
            
            echo "Switching traffic..."
            docker stop hjtpx-old || true
            docker rm hjtpx-old || true
            docker rename hjtpx hjtpx-old
            docker rename hjtpx-new hjtpx
            
            echo "Cleaning up..."
            docker image prune -f

      - name: Health Check
        run: |
          timeout 120 bash -c 'until curl -f https://hjtpx.example.com/health; do sleep 10; done'
          echo "Production health check passed!"

      - name: Run production smoke tests
        run: |
          echo "Running smoke tests..."
          curl -f https://hjtpx.example.com/health || exit 1
          curl -f https://hjtpx.example.com/api/v1/captcha/types || exit 1
          echo "All smoke tests passed!"

      - name: Notify production deployment
        if: always()
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*Production Deployment ${{ github.ref_name }}*",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Production Deployment",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Version:*\n${{ github.ref_name }}"},
                    {"type": "mrkdwn", "text": "*Status:*\n${{ job.status }}"},
                    {"type": "mrkdwn", "text": "*Deployed by:*\n${{ github.actor }}"},
                    {"type": "mrkdwn", "text": "*Commit:*\n${{ github.sha }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Application"},
                      "url": "https://hjtpx.example.com"
                    },
                    {
                      "type": "button",
                      "text": {"type": "plain_text", "text": "View Logs"},
                      "url": "https://dashboard.example.com/logs"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  rollback:
    runs-on: ubuntu-latest
    needs: [staging-deploy, production-deploy]
    if: failure()
    timeout-minutes: 10
    
    steps:
      - name: Automatic rollback on failure
        if: needs.production-deploy.result == 'failure'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            echo "Rolling back to previous version..."
            docker stop hjtpx || true
            docker rm hjtpx || true
            docker run -d \
              --name hjtpx \
              -p 8080:8080 \
              --env-file .env.production \
              --restart unless-stopped \
              ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:previous

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "*⚠️ Production Deployment Failed - Automatic Rollback Triggered*",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Version:* ${{ github.ref_name }}\n*Reason:* Deployment failed\n*Action:* Rolled back to previous version"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  post-build:
    runs-on: ubuntu-latest
    needs: [staging-deploy, production-deploy]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: Generate deployment report
        run: |
          echo "## Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Status | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.staging-deploy.result }} | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.production-deploy.result }} | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.staging-deploy.result }}" == "success" && "${{ needs.production-deploy.result }}" == "success" ]]; then
            echo "✅ All deployments completed successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some deployments failed. Check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Clean up old images
        if: success()
        run: |
          echo "Cleaning up old Docker images..."
