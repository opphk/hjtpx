name: E2E Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test execution mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - critical

permissions:
  contents: read
  checks: write
  actions: read

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'
  TEST_TIMEOUT: 60m

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hjtpx_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shared-buffers=256MB
          --max-connections=100
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --maxmemory 256mb
          --save ""
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: |
            backend/go.sum
            benchmark/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install Go dependencies
        run: |
          cd backend
          go mod download

      - name: Install Playwright dependencies
        run: |
          cd e2e
          npm ci

      - name: Install Playwright browsers
        run: |
          cd e2e
          npx playwright install --with-deps chromium

      - name: Initialize database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d hjtpx_db -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;" || true
          if [ -f scripts/init-db.sql ]; then
            PGPASSWORD=postgres psql -h localhost -U postgres -d hjtpx_db -f scripts/init-db.sql
          fi

      - name: Build backend
        run: |
          cd backend
          go build -ldflags="-s -w" -o hjtpx-api ./cmd/api/main.go

      - name: Start backend service
        run: |
          cd backend
          nohup ./hjtpx-api > backend.log 2>&1 &
          echo $! > backend.pid
          echo "Backend PID: $(cat backend.pid)"
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hjtpx_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-for-e2e-testing
          GIN_MODE: test
          CAPTCHA_SECRET: test-captcha-secret-key

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend to be ready..."
          for i in {1..60}; do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 3
          done
          echo "Backend failed to start, checking logs:"
          cat backend.log
          exit 1

      - name: Verify backend health
        run: |
          echo "Verifying backend health endpoints..."
          curl -sf http://localhost:8080/health || { echo "Health check failed"; exit 1; }
          curl -sf http://localhost:8080/api/v1/captcha/types || { echo "Captcha types endpoint failed"; exit 1; }
          echo "Backend health verified!"

      - name: Determine test mode
        id: test-mode
        run: |
          MODE=${{ github.event.inputs.test_mode || 'full' }}
          echo "test_mode=$MODE" >> $GITHUB_OUTPUT
          echo "Running in $MODE mode"

      - name: Run Playwright tests (Full)
        if: steps.test-mode.outputs.test_mode == 'full'
        run: |
          cd e2e
          mkdir -p test-results test-reports
          npx playwright test --reporter=list,html --output=test-results || true
          npx playwright show-report || echo "Report generation complete"
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Run Playwright tests (Quick)
        if: steps.test-mode.outputs.test_mode == 'quick'
        run: |
          cd e2e
          mkdir -p test-results test-reports
          npx playwright test --grep "@smoke" --reporter=list --output=test-results || true
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Run Playwright tests (Critical)
        if: steps.test-mode.outputs.test_mode == 'critical'
        run: |
          cd e2e
          mkdir -p test-results test-reports
          npx playwright test --grep "@critical" --reporter=list --output=test-results || true
        env:
          PLAYWRIGHT_BROWSERS_PATH: 0
          CI: true

      - name: Generate test report
        run: |
          cd e2e
          if [ -f test-results/results.json ]; then
            echo "Test results JSON exists"
          fi
          if [ -d test-results ]; then
            echo "Test results directory exists"
            ls -la test-results/
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results-${{ github.run_id }}
          path: |
            e2e/test-results/
            e2e/backend.log
          retention-days: 30

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-screenshots-${{ github.run_id }}
          path: |
            e2e/test-results/**/Screenshot*.png
            e2e/test-results/**/trace.zip
          retention-days: 30

      - name: Stop backend service
        run: |
          if [ -f backend/backend.pid ]; then
            kill $(cat backend/backend.pid) || true
            rm -f backend/backend.pid
          fi

      - name: Show backend logs on failure
        if: failure()
        run: |
          echo "=== Backend Logs (Last 100 lines) ==="
          if [ -f backend/backend.log ]; then
            tail -100 backend/backend.log
          fi

      - name: Generate test summary
        run: |
          echo "## E2E Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Information" >> $GITHUB_STEP_SUMMARY
          echo "- Test Mode: ${{ steps.test-mode.outputs.test_mode }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d e2e/test-results ]; then
            TEST_COUNT=$(find e2e/test-results -name "*.spec.ts" -type f | wc -l || echo "0")
            echo "### Test Statistics" >> $GITHUB_STEP_SUMMARY
            echo "- Test Files: $TEST_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- Results: Available in artifacts" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Test Results: Available" >> $GITHUB_STEP_SUMMARY
          echo "- Screenshots: Available on failure" >> $GITHUB_STEP_SUMMARY
          echo "- Backend Logs: Available on failure" >> $GITHUB_STEP_SUMMARY

