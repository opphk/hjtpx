<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="墨盾验证 - 滑块验证码交互界面">
    <meta name="theme-color" content="#1a1a2e">
    <title data-i18n="title">安全验证 - 墨盾验证</title>
    <link rel="preconnect" href="https://cdn.bootcdn.net">
    <link rel="dns-prefetch" href="https://cdn.bootcdn.net">
    <link rel="preload" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" as="style">
    <link rel="preload" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --captcha-primary: #c9a96e;
            --captcha-success: #28a745;
            --captcha-danger: #dc3545;
            --captcha-warning: #ffc107;
            --captcha-dark: #1a1a2e;
            --captcha-light: #f8f9fa;
            --captcha-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin: 0;
        }

        .captcha-container {
            max-width: 380px;
            width: 100%;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .captcha-header {
            padding: 15px 18px;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            border-bottom: 1px solid rgba(201, 169, 110, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .captcha-title {
            color: #c9a96e;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .captcha-title i {
            font-size: 1.1rem;
        }

        .refresh-btn {
            background: rgba(201, 169, 110, 0.15);
            border: 1px solid rgba(201, 169, 110, 0.3);
            color: #c9a96e;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--captcha-transition);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .refresh-btn:hover {
            background: rgba(201, 169, 110, 0.25);
            border-color: #c9a96e;
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .refresh-btn.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .captcha-body {
            padding: 20px;
        }

        .captcha-image-wrapper {
            position: relative;
            width: 100%;
            max-width: 340px;
            height: 180px;
            margin: 0 auto 20px;
            background: #e9ecef;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .captcha-bg-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .captcha-slider-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .captcha-slider-piece {
            position: absolute;
            top: 0;
            left: 0;
            width: 52px;
            height: 52px;
            background-size: cover;
            background-position: center;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: left 0.05s linear;
        }

        .slider-wrapper {
            position: relative;
            margin-top: 10px;
        }

        .slider-track {
            height: 44px;
            background: linear-gradient(135deg, #f0f2f5 0%, #e4e8eb 100%);
            border-radius: 22px;
            position: relative;
            cursor: pointer;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .slider-track::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 2px;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 8px,
                rgba(201, 169, 110, 0.3) 8px,
                rgba(201, 169, 110, 0.3) 16px
            );
        }

        .slider-thumb {
            position: absolute;
            left: 2px;
            top: 2px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #c9a96e 0%, #d4b87a 100%);
            border-radius: 50%;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(201, 169, 110, 0.4);
            user-select: none;
            transition: var(--captcha-transition);
            z-index: 10;
        }

        .slider-thumb:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(201, 169, 110, 0.5);
        }

        .slider-thumb:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .slider-thumb.success {
            background: linear-gradient(135deg, var(--captcha-success) 0%, #34ce57 100%);
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.4);
        }

        .slider-thumb.failed {
            background: linear-gradient(135deg, var(--captcha-danger) 0%, #e4606d 100%);
            box-shadow: 0 2px 8px rgba(220, 53, 69, 0.4);
        }

        .slider-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, rgba(201, 169, 110, 0.3) 0%, rgba(201, 169, 110, 0.5) 100%);
            border-radius: 22px 0 0 22px;
            transition: width 0.05s linear;
        }

        .slider-tip {
            text-align: center;
            margin-top: 12px;
            color: #6c757d;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .slider-tip i {
            color: var(--captcha-primary);
        }

        .captcha-status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 15px;
            opacity: 0;
            transform: translateY(-10px);
            transition: var(--captcha-transition);
        }

        .captcha-status.show {
            opacity: 1;
            transform: translateY(0);
        }

        .captcha-status.success {
            background: rgba(40, 167, 69, 0.1);
            color: var(--captcha-success);
            border: 1px solid rgba(40, 167, 69, 0.2);
        }

        .captcha-status.failed {
            background: rgba(220, 53, 69, 0.1);
            color: var(--captcha-danger);
            border: 1px solid rgba(220, 53, 69, 0.2);
        }

        .captcha-status.verifying {
            background: rgba(201, 169, 110, 0.1);
            color: var(--captcha-primary);
            border: 1px solid rgba(201, 169, 110, 0.2);
        }

        .captcha-loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: var(--captcha-transition);
        }

        .captcha-loading.show {
            opacity: 1;
            visibility: visible;
        }

        .captcha-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(201, 169, 110, 0.2);
            border-top-color: var(--captcha-primary);
            border-radius: 50%;
            animation: captcha-spin 0.8s linear infinite;
        }

        @keyframes captcha-spin {
            to { transform: rotate(360deg); }
        }

        .captcha-error-shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .captcha-success-bounce {
            animation: bounce 0.6s ease-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .captcha-lang-switch {
            display: flex;
            gap: 0.5rem;
        }

        .captcha-lang-btn {
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            border: 1px solid rgba(201, 169, 110, 0.3);
            background: transparent;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 0.75rem;
            transition: var(--captcha-transition);
        }

        .captcha-lang-btn.active {
            background: rgba(201, 169, 110, 0.3);
            color: #c9a96e;
            border-color: #c9a96e;
        }

        .captcha-lang-btn:hover:not(.active) {
            color: #c9a96e;
            border-color: #c9a96e;
        }

        @media (max-width: 576px) {
            .captcha-container {
                max-width: 100%;
                border-radius: 8px;
            }

            .captcha-image-wrapper {
                height: 160px;
                max-width: 100%;
            }

            .slider-track {
                height: 40px;
            }

            .slider-thumb {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }

            .captcha-body {
                padding: 15px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        :focus-visible {
            outline: 2px solid var(--captcha-primary);
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="captcha-container" role="main" aria-label="验证码验证区域">
        <div class="captcha-header">
            <span class="captcha-title">
                <i class="fas fa-shield-alt" aria-hidden="true"></i>
                <span data-i18n="title">安全验证</span>
            </span>
            <div class="captcha-lang-switch" role="group" aria-label="语言切换">
                <button type="button" class="captcha-lang-btn active" data-lang="zh-CN" aria-pressed="true">中文</button>
                <button type="button" class="captcha-lang-btn" data-lang="en-US" aria-pressed="false">EN</button>
            </div>
        </div>

        <div class="captcha-body">
            <div class="captcha-image-wrapper" id="imageWrapper">
                <canvas id="bgCanvas" class="captcha-bg-image" aria-label="验证码背景图片"></canvas>
                <div class="captcha-slider-container" id="sliderContainer">
                    <div class="captcha-slider-piece" id="sliderPiece"></div>
                </div>
                <div class="captcha-loading" id="loadingOverlay" aria-live="polite">
                    <div class="captcha-spinner"></div>
                </div>
            </div>

            <div class="slider-wrapper">
                <div class="slider-track" id="sliderTrack" role="slider" aria-label="滑块验证" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
                    <div class="slider-progress" id="sliderProgress"></div>
                    <div class="slider-thumb" id="sliderThumb" aria-hidden="true">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
                <div class="slider-tip" id="sliderTip">
                    <i class="fas fa-hand-pointer" aria-hidden="true"></i>
                    <span data-i18n="tip">按住滑块，拖动完成拼图</span>
                </div>
            </div>

            <div class="text-center">
                <button class="refresh-btn" id="refreshBtn" aria-label="刷新验证码">
                    <i class="fas fa-sync-alt" aria-hidden="true"></i>
                    <span data-i18n="refresh">刷新</span>
                </button>
                <span class="captcha-status" id="statusText" role="status" aria-live="polite"></span>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="/web/static/js/captcha.js"></script>
</body>
</html>
