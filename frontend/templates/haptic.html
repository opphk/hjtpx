<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="墨盾验证 - 在线体验触觉验证码">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>触觉验证码 - 墨盾验证</title>
    <link rel="preconnect" href="https://cdn.bootcdn.net">
    <link rel="dns-prefetch" href="https://cdn.bootcdn.net">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/captcha-ui-unified.css">
    <script src="/static/js/haptic.js" defer></script>
    
    <style>
        :root {
            --captcha-primary: #c9a96e;
            --captcha-success: #28a745;
            --captcha-danger: #dc3545;
            --captcha-dark: #1a1a2e;
            --captcha-light: #f8f9fa;
            --captcha-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-bs-theme="dark"] {
            --captcha-light: #2d2d44;
            --captcha-dark: #f8f9fa;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .captcha-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .captcha-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, var(--captcha-primary) 0%, #d4b87a 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .card-body {
            padding: 2rem;
        }

        .instructions {
            background: linear-gradient(135deg, rgba(201,169,110,0.05) 0%, rgba(201,169,110,0.1) 100%);
            border: 2px solid rgba(201,169,110,0.3);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .instructions-text {
            font-size: 1.1rem;
            color: var(--captcha-dark);
            margin-bottom: 0;
        }

        .haptic-grid {
            display: grid;
            gap: 12px;
            padding: 20px;
            max-width: 320px;
            margin: 0 auto;
        }

        .haptic-cell {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            background: var(--captcha-light);
            border: 3px solid var(--captcha-primary);
            cursor: pointer;
            transition: var(--captcha-transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--captcha-dark);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .haptic-cell:hover {
            background: rgba(201,169,110,0.1);
            transform: scale(1.05);
        }

        .haptic-cell:active {
            transform: scale(0.95);
            background: var(--captcha-primary);
            color: white;
        }

        .haptic-cell.tapped {
            background: var(--captcha-primary);
            color: white;
            transform: scale(0.9);
        }

        .haptic-cell.highlighted {
            border-color: var(--captcha-success);
            border-width: 4px;
        }

        .difficulty-selector {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 0.5rem 1.5rem;
            border: 2px solid rgba(201,169,110,0.3);
            background: transparent;
            color: #666;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--captcha-transition);
        }

        .difficulty-btn.active {
            background: var(--captcha-primary);
            border-color: var(--captcha-primary);
            color: white;
        }

        .difficulty-btn:hover {
            border-color: var(--captcha-primary);
        }

        .verify-button {
            background: linear-gradient(135deg, var(--captcha-primary) 0%, #d4b87a 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 1rem 2rem;
            border-radius: 8px;
            width: 100%;
            transition: var(--captcha-transition);
            margin-top: 1.5rem;
        }

        .verify-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201,169,110,0.4);
        }

        .verify-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-banner {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .result-banner.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .result-banner.success {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: var(--captcha-success);
        }

        .result-banner.error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: var(--captcha-danger);
        }

        .match-score-display {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(201,169,110,0.1);
            border-radius: 8px;
        }

        .match-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .match-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--captcha-danger) 0%, var(--captcha-primary) 50%, var(--captcha-success) 100%);
            transition: width 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .refresh-button {
            background: none;
            border: 2px solid rgba(201,169,110,0.3);
            color: var(--captcha-primary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--captcha-transition);
            display: block;
            margin: 1rem auto 0;
        }

        .refresh-button:hover {
            background: rgba(201,169,110,0.1);
        }

        .vibration-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: #666;
            font-size: 0.9rem;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 26px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--captcha-primary);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .sequence-display {
            text-align: center;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(201,169,110,0.05);
            border-radius: 8px;
            min-height: 60px;
        }

        .sequence-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .sequence-numbers {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .sequence-num {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--captcha-primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="captcha-container">
            <div class="captcha-card">
                <div class="card-header">
                    <h3 class="mb-0">
                        <i class="fas fa-mobile-alt me-2"></i>
                        触觉验证码
                    </h3>
                </div>
                <div class="card-body">
                    <div class="difficulty-selector">
                        <button class="difficulty-btn" data-difficulty="easy">简单</button>
                        <button class="difficulty-btn active" data-difficulty="medium">中等</button>
                        <button class="difficulty-btn" data-difficulty="hard">困难</button>
                    </div>

                    <div class="vibration-toggle">
                        <span>震动反馈</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="vibrationToggle" checked>
                            <span class="slider"></span>
                        </label>
                    </div>

                    <div class="instructions" id="instructionsArea">
                        <p class="instructions-text" id="instructionsText">
                            <i class="fas fa-info-circle me-2"></i>
                            点击下方网格按顺序完成触觉验证
                        </p>
                    </div>

                    <div class="haptic-grid" id="hapticGrid"></div>

                    <div class="sequence-display" id="sequenceDisplay">
                        <div class="sequence-label">您的点击序列：</div>
                        <div class="sequence-numbers" id="sequenceNumbers">
                            <span class="text-muted">尚未点击</span>
                        </div>
                    </div>

                    <button class="verify-button" id="verifyButton" disabled>
                        <i class="fas fa-check-circle me-2"></i>
                        验证触觉模式
                    </button>

                    <button class="refresh-button" id="refreshButton">
                        <i class="fas fa-sync-alt me-1"></i>
                        重新生成
                    </button>

                    <div class="result-banner" id="resultBanner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let session = null;
        let userSequence = [];
        let userTimestamps = [];
        let userPressures = [];
        let startTime = null;
        let gridSize = 3;
        let currentDifficulty = 'medium';
        let enableVibration = true;

        const hapticGrid = document.getElementById('hapticGrid');
        const verifyButton = document.getElementById('verifyButton');
        const refreshButton = document.getElementById('refreshButton');
        const instructionsText = document.getElementById('instructionsText');
        const sequenceNumbers = document.getElementById('sequenceNumbers');
        const resultBanner = document.getElementById('resultBanner');
        const vibrationToggle = document.getElementById('vibrationToggle');
        const difficultyButtons = document.querySelectorAll('.difficulty-btn');

        difficultyButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                difficultyButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDifficulty = btn.dataset.difficulty;
                generateCaptcha();
            });
        });

        vibrationToggle.addEventListener('change', (e) => {
            enableVibration = e.target.checked;
        });

        verifyButton.addEventListener('click', verifyCaptcha);
        refreshButton.addEventListener('click', generateCaptcha);

        async function generateCaptcha() {
            try {
                resetState();

                const response = await fetch('/api/v1/captcha/haptic/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        difficulty: currentDifficulty,
                        grid_size: gridSize
                    })
                });

                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    session = data.data;
                    gridSize = session.pattern.grid_size;
                    createGrid();
                    instructionsText.innerHTML = `<i class="fas fa-check-circle me-2"></i>${session.instructions}`;
                } else {
                    showError('生成验证码失败');
                }
            } catch (error) {
                showError('网络错误，请重试');
            }
        }

        function createGrid() {
            hapticGrid.innerHTML = '';
            hapticGrid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

            for (let i = 0; i < gridSize * gridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'haptic-cell';
                cell.dataset.position = i;
                cell.textContent = '';

                cell.addEventListener('click', (e) => handleCellTap(i, e));
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    handleCellTap(i, e);
                }, { passive: false });

                hapticGrid.appendChild(cell);
            }
        }

        function handleCellTap(position, event) {
            if (!startTime) {
                startTime = Date.now();
            }

            const timestamp = Date.now() - startTime;
            let pressure = 0.5;

            if (event.touches && event.touches[0]) {
                pressure = event.touches[0].force || 0.5;
            }

            userSequence.push(position);
            userTimestamps.push(timestamp);
            userPressures.push(pressure);

            const cell = event.currentTarget;
            cell.classList.add('tapped');
            cell.textContent = userSequence.length;

            setTimeout(() => {
                cell.classList.remove('tapped');
            }, 200);

            if (enableVibration && 'vibrate' in navigator) {
                const duration = Math.floor(100 + session.pattern.intensity * 100);
                navigator.vibrate(duration);
            }

            updateSequenceDisplay();
            
            verifyButton.disabled = false;
        }

        function updateSequenceDisplay() {
            if (userSequence.length === 0) {
                sequenceNumbers.innerHTML = '<span class="text-muted">尚未点击</span>';
                return;
            }

            sequenceNumbers.innerHTML = userSequence.map((pos, idx) => {
                const row = Math.floor(pos / gridSize);
                const col = pos % gridSize;
                return `<span class="sequence-num" title="位置: ${row}, ${col}">${idx + 1}</span>`;
            }).join('');
        }

        async function verifyCaptcha() {
            if (!session || userSequence.length === 0) {
                showError('请先完成点击序列');
                return;
            }

            try {
                verifyButton.disabled = true;

                const response = await fetch('/api/v1/captcha/haptic/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        session_id: session.session_id,
                        user_input: {
                            sequence: userSequence,
                            timestamps: userTimestamps,
                            pressures: userPressures
                        }
                    })
                });

                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    const result = data.data;
                    if (result.success) {
                        showSuccess(result.message, result.match_score);
                        highlightCorrectCells();
                    } else {
                        showError(result.message);
                    }
                } else {
                    showError('验证失败');
                }
            } catch (error) {
                showError('验证出错，请重试');
            } finally {
                verifyButton.disabled = false;
            }
        }

        function highlightCorrectCells() {
            if (!session || !session.pattern) return;

            const targetSequence = session.pattern.target_sequence;
            const cells = hapticGrid.querySelectorAll('.haptic-cell');

            targetSequence.forEach((pos, idx) => {
                setTimeout(() => {
                    if (cells[pos]) {
                        cells[pos].classList.add('highlighted');
                    }
                }, idx * 300);
            });
        }

        function showSuccess(message, score) {
            resultBanner.className = 'result-banner show success';
            resultBanner.innerHTML = `
                <div><i class="fas fa-check-circle me-2"></i>${message}</div>
                <div class="match-score-display">
                    <small>匹配度: ${(score * 100).toFixed(1)}%</small>
                    <div class="match-bar">
                        <div class="match-fill" style="width: ${score * 100}%"></div>
                    </div>
                </div>
            `;
        }

        function showError(message) {
            resultBanner.className = 'result-banner show error';
            resultBanner.innerHTML = `<i class="fas fa-exclamation-circle me-2"></i>${message}`;
        }

        function resetState() {
            userSequence = [];
            userTimestamps = [];
            userPressures = [];
            startTime = null;
            verifyButton.disabled = true;
            resultBanner.classList.remove('show');
            updateSequenceDisplay();
            
            const cells = hapticGrid.querySelectorAll('.haptic-cell');
            cells.forEach(cell => {
                cell.classList.remove('highlighted');
                cell.textContent = '';
            });
        }

        generateCaptcha();
    </script>
</body>
</html>
