<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="墨盾验证 - 在线体验语音验证码">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>语音验证码 - 墨盾验证</title>
    <link rel="preconnect" href="https://cdn.bootcdn.net">
    <link rel="dns-prefetch" href="https://cdn.bootcdn.net">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/css/captcha-ui-optimized.css">
    
    <style>
        :root {
            --captcha-primary: #c9a96e;
            --captcha-success: #28a745;
            --captcha-danger: #dc3545;
            --captcha-dark: #1a1a2e;
            --captcha-light: #f8f9fa;
            --captcha-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-bs-theme="dark"] {
            --captcha-light: #2d2d44;
            --captcha-dark: #f8f9fa;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .captcha-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem;
        }

        .captcha-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, var(--captcha-primary) 0%, #d4b87a 100%);
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .card-body {
            padding: 2rem;
        }

        .voice-play-area {
            background: linear-gradient(135deg, rgba(201,169,110,0.05) 0%, rgba(201,169,110,0.1) 100%);
            border: 2px dashed rgba(201,169,110,0.3);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .play-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--captcha-primary) 0%, #d4b87a 100%);
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: var(--captcha-transition);
            box-shadow: 0 8px 24px rgba(201,169,110,0.4);
        }

        .play-button:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 32px rgba(201,169,110,0.5);
        }

        .play-button:active {
            transform: scale(0.95);
        }

        .play-button.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 24px rgba(201,169,110,0.4); }
            50% { box-shadow: 0 8px 32px rgba(201,169,110,0.7); }
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .captcha-input {
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 0.5rem;
            padding: 1rem;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            transition: var(--captcha-transition);
        }

        .captcha-input:focus {
            border-color: var(--captcha-primary);
            box-shadow: 0 0 0 0.2rem rgba(201, 169, 110, 0.25);
        }

        .verify-button {
            background: linear-gradient(135deg, var(--captcha-primary) 0%, #d4b87a 100%);
            border: none;
            color: white;
            font-weight: 600;
            padding: 1rem 2rem;
            border-radius: 8px;
            width: 100%;
            transition: var(--captcha-transition);
        }

        .verify-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201,169,110,0.4);
        }

        .verify-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .language-selector {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .lang-btn {
            padding: 0.5rem 1.5rem;
            border: 2px solid rgba(201,169,110,0.3);
            background: transparent;
            color: #666;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--captcha-transition);
        }

        .lang-btn.active {
            background: var(--captcha-primary);
            border-color: var(--captcha-primary);
            color: white;
        }

        .lang-btn:hover {
            border-color: var(--captcha-primary);
        }

        .result-banner {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            display: none;
        }

        .result-banner.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .result-banner.success {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: var(--captcha-success);
        }

        .result-banner.error {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: var(--captcha-danger);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .refresh-button {
            background: none;
            border: 2px solid rgba(201,169,110,0.3);
            color: var(--captcha-primary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--captcha-transition);
        }

        .refresh-button:hover {
            background: rgba(201,169,110,0.1);
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="captcha-container">
            <div class="captcha-card">
                <div class="card-header">
                    <h3 class="mb-0">
                        <i class="fas fa-volume-up me-2"></i>
                        语音验证码
                    </h3>
                </div>
                <div class="card-body">
                    <div class="language-selector">
                        <button class="lang-btn active" data-lang="zh-CN">中文</button>
                        <button class="lang-btn" data-lang="en-US">English</button>
                    </div>

                    <div class="voice-play-area" id="voicePlayArea">
                        <button class="play-button" id="playButton">
                            <i class="fas fa-play"></i>
                        </button>
                        <p class="mt-3 mb-0 text-muted">点击播放语音</p>
                    </div>

                    <div class="input-group">
                        <input type="text" class="form-control captcha-input" 
                               id="captchaInput" placeholder="请输入听到的数字" 
                               maxlength="6" autocomplete="off">
                    </div>

                    <button class="verify-button" id="verifyButton">
                        验证
                    </button>

                    <div class="text-center mt-3">
                        <button class="refresh-button" id="refreshButton">
                            <i class="fas fa-sync-alt me-1"></i>
                            重新生成
                        </button>
                    </div>

                    <div class="result-banner" id="resultBanner"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        let currentSession = null;
        let selectedLanguage = 'zh-CN';
        let isPlaying = false;

        const playButton = document.getElementById('playButton');
        const verifyButton = document.getElementById('verifyButton');
        const refreshButton = document.getElementById('refreshButton');
        const captchaInput = document.getElementById('captchaInput');
        const resultBanner = document.getElementById('resultBanner');
        const audioPlayer = document.getElementById('audioPlayer');
        const langButtons = document.querySelectorAll('.lang-btn');

        langButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                langButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedLanguage = btn.dataset.lang;
                generateCaptcha();
            });
        });

        playButton.addEventListener('click', () => {
            if (!currentSession) {
                generateCaptcha();
                return;
            }
            playAudio();
        });

        verifyButton.addEventListener('click', verifyCaptcha);
        refreshButton.addEventListener('click', generateCaptcha);

        captchaInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verifyCaptcha();
            }
        });

        async function generateCaptcha() {
            try {
                verifyButton.disabled = true;
                captchaInput.value = '';
                hideResult();

                const response = await fetch('/api/v1/captcha/voice/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        language: selectedLanguage,
                        length: 4
                    })
                });

                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    currentSession = data.data;
                    playAudio();
                } else {
                    showError('生成验证码失败，请重试');
                }
            } catch (error) {
                showError('网络错误，请重试');
            } finally {
                verifyButton.disabled = false;
            }
        }

        function playAudio() {
            if (!currentSession || !currentSession.voice_data) return;
            
            try {
                isPlaying = true;
                playButton.classList.add('playing');
                playButton.innerHTML = '<i class="fas fa-stop"></i>';

                const audioData = atob(currentSession.voice_data);
                const bytes = new Uint8Array(audioData.length);
                for (let i = 0; i < audioData.length; i++) {
                    bytes[i] = audioData.charCodeAt(i);
                }
                const blob = new Blob([bytes], { type: 'audio/wav' });
                const url = URL.createObjectURL(blob);
                
                audioPlayer.src = url;
                audioPlayer.onended = () => {
                    isPlaying = false;
                    playButton.classList.remove('playing');
                    playButton.innerHTML = '<i class="fas fa-play"></i>';
                    URL.revokeObjectURL(url);
                };
                audioPlayer.play();
            } catch (error) {
                console.error('播放音频失败', error);
                isPlaying = false;
                playButton.classList.remove('playing');
                playButton.innerHTML = '<i class="fas fa-play"></i>';
                showError('播放音频失败');
            }
        }

        async function verifyCaptcha() {
            const code = captchaInput.value.trim();
            
            if (!code) {
                showError('请输入验证码');
                return;
            }

            if (!currentSession) {
                showError('请先生成验证码');
                return;
            }

            try {
                verifyButton.disabled = true;

                const response = await fetch('/api/v1/captcha/voice/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        session_id: currentSession.session_id,
                        code: code
                    })
                });

                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    if (data.data.success) {
                        showSuccess(data.data.message || '验证成功！');
                        setTimeout(() => {
                            generateCaptcha();
                        }, 2000);
                    } else {
                        showError(data.data.message || '验证失败');
                    }
                } else {
                    showError('验证失败，请重试');
                }
            } catch (error) {
                showError('网络错误，请重试');
            } finally {
                verifyButton.disabled = false;
            }
        }

        function showSuccess(message) {
            resultBanner.className = 'result-banner show success';
            resultBanner.innerHTML = `<i class="fas fa-check-circle me-2"></i>${message}`;
        }

        function showError(message) {
            resultBanner.className = 'result-banner show error';
            resultBanner.innerHTML = `<i class="fas fa-exclamation-circle me-2"></i>${message}`;
        }

        function hideResult() {
            resultBanner.classList.remove('show');
        }

        generateCaptcha();
    </script>
</body>
</html>
