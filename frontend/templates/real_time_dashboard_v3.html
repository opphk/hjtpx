<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨盾验证 · 实时数据大屏 V3</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; overflow: hidden; background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1729 100%); color: #e0e6ed; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .screen-container { height: 100vh; display: flex; flex-direction: column; padding: 12px; gap: 12px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; background: linear-gradient(90deg, rgba(0,212,255,0.1) 0%, rgba(201,169,110,0.1) 100%); border: 1px solid rgba(0,212,255,0.2); border-radius: 10px; backdrop-filter: blur(10px); }
        .header-title { display: flex; align-items: center; gap: 16px; }
        .header-title h1 { font-size: 32px; margin: 0; font-weight: 800; background: linear-gradient(90deg, #00d4ff 0%, #c9a96e 50%, #00ff88 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 2px; }
        .header-title .logo { width: 56px; height: 56px; background: linear-gradient(135deg, #c23a2b, #8b2a1e); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 20px rgba(194, 58, 43, 0.4); }
        .header-info { display: flex; align-items: center; gap: 20px; }
        .current-time { font-size: 20px; font-weight: 700; color: #00d4ff; text-shadow: 0 0 10px rgba(0,212,255,0.5); }
        .connection-status { display: flex; align-items: center; gap: 10px; padding: 8px 20px; background: rgba(0,0,0,0.4); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); }
        .connection-status.connected { border-color: rgba(40,167,69,0.5); background: rgba(40,167,69,0.1); }
        .connection-status.disconnected { border-color: rgba(220,53,69,0.5); background: rgba(220,53,69,0.1); }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; animation: pulse 1.5s infinite; }
        .connection-status.connected .status-dot { background: #28a745; box-shadow: 0 0 15px #28a745; }
        .connection-status.disconnected .status-dot { background: #dc3545; box-shadow: 0 0 15px #dc3545; }
        @keyframes pulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.2); opacity:0.7; } }
        .content { flex: 1; display: grid; grid-template-columns: 320px 1fr 320px; gap: 12px; overflow: hidden; }
        .panel { background: linear-gradient(145deg, rgba(20,25,45,0.95) 0%, rgba(15,20,35,0.98) 100%); border-radius: 12px; border: 1px solid rgba(0,212,255,0.15); padding: 18px; display: flex; flex-direction: column; overflow: hidden; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid rgba(201,169,110,0.25); }
        .panel-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 10px; color: #c9a96e; text-transform: uppercase; letter-spacing: 1px; }
        .panel-title i { font-size: 18px; }
        .panel-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
        .left-panel, .right-panel { display: flex; flex-direction: column; gap: 12px; }
        .center-panel { display: flex; flex-direction: column; gap: 12px; }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: linear-gradient(145deg, rgba(25,30,50,0.9) 0%, rgba(15,20,35,0.95) 100%); border-radius: 10px; padding: 14px; border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s ease; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #00d4ff, #c9a96e, #00ff88); }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,212,255,0.15); border-color: rgba(0,212,255,0.3); }
        .stat-label { font-size: 12px; color: rgba(224,230,237,0.65); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .stat-value { font-size: 28px; font-weight: 800; color: #00d4ff; text-shadow: 0 0 10px rgba(0,212,255,0.3); }
        .stat-trend { font-size: 11px; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
        .stat-trend.up { color: #28a745; }
        .stat-trend.down { color: #dc3545; }
        .chart-container { flex: 1; position: relative; min-height: 0; }
        .chart-wrapper { height: 100%; width: 100%; }
        .alerts-container { flex: 1; overflow-y: auto; padding-right: 4px; }
        .alerts-container::-webkit-scrollbar { width: 4px; }
        .alerts-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 2px; }
        .alerts-container::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.5); border-radius: 2px; }
        .alert-item { padding: 12px 14px; margin-bottom: 10px; border-radius: 8px; background: rgba(0,0,0,0.4); border-left: 4px solid; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .alert-item.critical { border-color: #dc3545; background: rgba(220,53,69,0.12); }
        .alert-item.warning { border-color: #ffc107; background: rgba(255,193,7,0.12); }
        .alert-item.info { border-color: #00d4ff; background: rgba(0,212,255,0.12); }
        .alert-item.success { border-color: #28a745; background: rgba(40,167,69,0.12); }
        .alert-time { font-size: 11px; color: rgba(224,230,237,0.5); margin-bottom: 4px; }
        .alert-message { font-size: 13px; line-height: 1.5; }
        .device-list { flex: 1; overflow-y: auto; padding-right: 4px; }
        .device-list::-webkit-scrollbar { width: 4px; }
        .device-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 2px; }
        .device-list::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.5); border-radius: 2px; }
        .device-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; margin-bottom: 10px; border-radius: 8px; background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.05); transition: all 0.2s ease; }
        .device-item:hover { background: rgba(0,0,0,0.5); border-color: rgba(0,212,255,0.2); }
        .device-info { display: flex; align-items: center; gap: 12px; }
        .device-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .device-icon.online { background: rgba(40,167,69,0.2); color: #28a745; }
        .device-icon.offline { background: rgba(220,53,69,0.2); color: #dc3545; }
        .device-icon.warning { background: rgba(255,193,7,0.2); color: #ffc107; }
        .device-name { font-size: 13px; font-weight: 600; }
        .device-meta { font-size: 11px; color: rgba(224,230,237,0.5); margin-top: 2px; }
        .device-status { font-size: 11px; padding: 4px 12px; border-radius: 12px; font-weight: 600; }
        .device-status.online { background: rgba(40,167,69,0.2); color: #28a745; }
        .device-status.offline { background: rgba(220,53,69,0.2); color: #dc3545; }
        .device-status.warning { background: rgba(255,193,7,0.2); color: #ffc107; }
        .exit-btn { padding: 10px 24px; background: linear-gradient(135deg, rgba(194,58,43,0.9), rgba(139,42,30,0.9)); border: none; border-radius: 8px; color: white; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(194,58,43,0.3); }
        .exit-btn:hover { background: linear-gradient(135deg, #c23a2b, #8b2a1e); transform: scale(1.05); box-shadow: 0 6px 25px rgba(194,58,43,0.4); }
        .gauge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .gauge-card { text-align: center; padding: 12px; background: rgba(0,0,0,0.3); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .gauge-container { display: flex; justify-content: center; align-items: center; padding: 8px 0; }
        .gauge-label { text-align: center; margin-top: 6px; font-size: 12px; color: rgba(224,230,237,0.6); }
        .gauge-value { font-size: 22px; font-weight: 800; color: #00d4ff; text-shadow: 0 0 8px rgba(0,212,255,0.3); }
        .quality-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
        .quality-item { text-align: center; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .quality-value { font-size: 16px; font-weight: 700; color: #00d4ff; }
        .quality-label { font-size: 11px; color: rgba(224,230,237,0.6); margin-top: 4px; }
        .grid-line { border-bottom: 1px dashed rgba(201,169,110,0.2); padding: 10px 0; }
        .grid-item { display: flex; justify-content: space-between; align-items: center; }
        .grid-label { font-size: 12px; color: rgba(224,230,237,0.7); display: flex; align-items: center; gap: 6px; }
        .grid-value { font-size: 14px; font-weight: 700; color: #00d4ff; }
        .mini-chart { height: 70px; width: 100%; }
        .refresh-indicator { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; background: rgba(0,212,255,0.15); border-radius: 20px; font-size: 12px; border: 1px solid rgba(0,212,255,0.3); }
        .refresh-indicator .dot { width: 8px; height: 8px; border-radius: 50%; background: #00d4ff; animation: pulse 1s infinite; }
        .top-apps-list { flex: 1; overflow-y: auto; padding-right: 4px; }
        .top-apps-list::-webkit-scrollbar { width: 4px; }
        .top-apps-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 2px; }
        .top-apps-list::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.5); border-radius: 2px; }
        .top-app-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; margin-bottom: 8px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .top-app-rank { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
        .top-app-rank.rank-1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .top-app-rank.rank-2 { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
        .top-app-rank.rank-3 { background: linear-gradient(135deg, #cd7f32, #a0522d); color: #fff; }
        .top-app-rank.rank-other { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .top-app-info { flex: 1; }
        .top-app-name { font-size: 13px; font-weight: 600; }
        .top-app-meta { font-size: 11px; color: rgba(224,230,237,0.5); }
        .top-app-value { font-size: 16px; font-weight: 800; color: #c9a96e; }
        .captcha-type-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .captcha-type-item { padding: 12px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .captcha-type-name { font-size: 12px; color: rgba(224,230,237,0.7); margin-bottom: 6px; }
        .captcha-type-value { font-size: 20px; font-weight: 800; color: #00d4ff; }
        .captcha-type-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .captcha-type-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
        .risk-indicators { display: flex; flex-direction: column; gap: 10px; }
        .risk-item { display: flex; align-items: center; gap: 12px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .risk-dot { width: 12px; height: 12px; border-radius: 50%; }
        .risk-dot.low { background: #28a745; box-shadow: 0 0 10px #28a745; }
        .risk-dot.medium { background: #ffc107; box-shadow: 0 0 10px #ffc107; }
        .risk-dot.high { background: #dc3545; box-shadow: 0 0 10px #dc3545; }
        .risk-label { flex: 1; font-size: 12px; }
        .risk-value { font-size: 18px; font-weight: 800; }
        .tenants-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .tenant-item { padding: 10px; background: rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .tenant-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
        .tenant-metrics { display: flex; justify-content: space-between; font-size: 10px; color: rgba(224,230,237,0.5); }
        .ai-insight { padding: 12px; background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,212,255,0.1)); border-radius: 8px; border: 1px solid rgba(0,255,136,0.3); margin-top: 10px; }
        .ai-insight-title { font-size: 12px; font-weight: 700; color: #00ff88; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .ai-insight-content { font-size: 12px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="screen-container">
        <div class="header">
            <div class="header-title">
                <div class="logo"><i class="fas fa-shield-halved"></i></div>
                <h1>墨盾验证 · 实时数据大屏 V3</h1>
            </div>
            <div class="header-info">
                <div class="refresh-indicator" id="refreshIndicator">
                    <div class="dot"></div>
                    <span id="refreshStatus">数据刷新中...</span>
                </div>
                <div class="connection-status connected" id="connectionStatus">
                    <div class="status-dot"></div>
                    <span id="connectionText">WebSocket 已连接</span>
                </div>
                <div class="current-time" id="currentTime"></div>
                <button class="exit-btn" onclick="exitScreen()"><i class="fas fa-sign-out-alt me-2"></i>退出大屏</button>
            </div>
        </div>

        <div class="content">
            <div class="left-panel">
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-chart-line"></i>核心业务指标</div>
                    </div>
                    <div class="panel-content">
                        <div class="stat-grid">
                            <div class="stat-card">
                                <div class="stat-label"><i class="fas fa-globe"></i>今日请求总量</div>
                                <div class="stat-value" id="totalRequests">0</div>
                                <div class="stat-trend up" id="requestsTrend"><i class="fas fa-arrow-up"></i> <span id="requestsChange">+0%</span></div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label"><i class="fas fa-check-circle"></i>验证成功</div>
                                <div class="stat-value" id="successCount">0</div>
                                <div class="stat-trend up"><i class="fas fa-chart-pie"></i> <span id="successRate">0%</span></div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label"><i class="fas fa-times-circle"></i>验证失败</div>
                                <div class="stat-value" id="failCount">0</div>
                                <div class="stat-trend down"><i class="fas fa-chart-pie"></i> <span id="failRate">0%</span></div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label"><i class="fas fa-bolt"></i>QPS</div>
                                <div class="stat-value" id="qpsValue">0</div>
                                <div class="stat-trend up"><i class="fas fa-tachometer-alt"></i> 请求/秒</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label"><i class="fas fa-clock"></i>平均响应</div>
                                <div class="stat-value" id="avgResponse">0ms</div>
                                <div class="stat-trend up"><i class="fas fa-stopwatch"></i> 延迟</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label"><i class="fas fa-user-shield"></i>活跃用户</div>
                                <div class="stat-value" id="activeUsers">0</div>
                                <div class="stat-trend up"><i class="fas fa-users"></i> 在线</div>
                            </div>
                        </div>
                        <div class="quality-grid">
                            <div class="quality-item">
                                <div class="quality-value" id="cacheHitRate">0%</div>
                                <div class="quality-label">缓存命中</div>
                            </div>
                            <div class="quality-item">
                                <div class="quality-value" id="errorRate">0%</div>
                                <div class="quality-label">错误率</div>
                            </div>
                            <div class="quality-item">
                                <div class="quality-value" id="uptime">99.9%</div>
                                <div class="quality-label">可用率</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="panel" style="flex: 0.8;">
                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-microchip"></i>系统资源监控</div>
                    </div>
                    <div class="panel-content">
                        <div class="gauge-grid">
                            <div class="gauge-card">
                                <div class="gauge-container">
                                    <svg class="progress-ring" width="80" height="80" viewBox="0 0 100 100">
                                        <circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="none"></circle>
                                        <circle class="progress-ring-circle" id="cpuCircle" cx="50" cy="50" r="40" stroke="#00d4ff" stroke-width="8" fill="none" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" transform="rotate(-90 50 50)"></circle>
                                    </svg>
                                </div>
                                <div class="gauge-value" id="cpuValue">0%</div>
                                <div class="gauge-label">CPU</div>
                            </div>
                            <div class="gauge-card">
                                <div class="gauge-container">
                                    <svg class="progress-ring" width="80" height="80" viewBox="0 0 100 100">
                                        <circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="none"></circle>
                                        <circle class="progress-ring-circle" id="memoryCircle" cx="50" cy="50" r="40" stroke="#28a745" stroke-width="8" fill="none" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" transform="rotate(-90 50 50)"></circle>
                                    </svg>
                                </div>
                                <div class="gauge-value" id="memoryValue">0%</div>
                                <div class="gauge-label">内存</div>
                            </div>
                            <div class="gauge-card">
                                <div class="gauge-container">
                                    <svg class="progress-ring" width="80" height="80" viewBox="0 0 100 100">
                                        <circle cx="50" cy="50" r="40" stroke="rgba(255,255,255,0.1)" stroke-width="8" fill="none"></circle>
                                        <circle class="progress-ring-circle" id="diskCircle" cx="50" cy="50" r="40" stroke="#ffc107" stroke-width="8" fill="none" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" transform="rotate(-90 50 50)"></circle>
                                    </svg>
                                </div>
                                <div class="gauge-value" id="diskValue">0%</div>
                                <div class="gauge-label">磁盘</div>
                            </div>
                        </div>
                        <div class="grid-line">
                            <div class="grid-item">
                                <span class="grid-label"><i class="fas fa-database"></i>数据库状态</span>
                                <span class="grid-value" id="dbStatus">正常</span>
                            </div>
                        </div>
                        <div class="grid-line">
                            <div class="grid-item">
                                <span class="grid-label"><i class="fas fa-server"></i>Redis缓存</span>
                                <span class="grid-value" id="redisStatus">正常</span>
                            </div>
                        </div>
                        <div class="grid-line">
                            <div class="grid-item">
                                <span class="grid-label"><i class="fas fa-network-wired"></i>网络延迟</span>
                                <span class="grid-value" id="networkLatency">0ms</span>
                            </div>
                        </div>
                        <div class="grid-line">
                            <div class="grid-item">
                                <span class="grid-label"><i class="fas fa-plug"></i>活跃连接</span>
                                <span class="grid-value" id="activeConnections">0</span>
                            </div>
                        </div>
                        <div class="grid-line">
                            <div class="grid-item">
                                <span class="grid-label"><i class="fas fa-hdd"></i>存储使用</span>
                                <span class="grid-value" id="storageUsage">0%</span>
                            </div>
                        </div>
                        <div class="grid-line">
                            <div class="grid-item">
                                <span class="grid-label"><i class="fas fa-traffic-light"></i>带宽使用</span>
                                <span class="grid-value" id="bandwidthUsage">0Mbps</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="panel" style="flex: 1;">
                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-server"></i>服务器节点状态</div>
                    </div>
                    <div class="panel-content">
                        <div class="device-list scrollbar-thin" id="deviceList"></div>
                    </div>
                </div>
            </div>

            <div class="center-panel">
                <div class="panel" style="flex: 1.2;">
                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-chart-area"></i>实时请求趋势</div>
                    </div>
                    <div class="panel-content">
                        <div class="chart-container">
                            <div class="chart-wrapper" id="realtimeChart"></div>
                        </div>
                    </div>
                </div>

                <div class="panel" style="flex: 0.8;">
                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-chart-bar"></i>验证类型分布 & 风险等级</div>
                    </div>
                    <div class="panel-content">
                        <div class="row h-100">
                            <div class="col-6">
                                <div class="captcha-type-grid" id="captchaTypeGrid"></div>

                            <div class="col-6">
                                <div class="risk-indicators" id="riskIndicators"></div>
                            </div>
                        </div>
                    </div>

                <div class="panel" style="flex: 0.6;">
                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-robot"></i>AI 实时洞察</div>

                    <div class="panel-content">

                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-bell"></i>实时告警</div>

                </div>

                <div class="panel" style="flex: 1;">
                    <div class="panel-header">
                        <div class="panel-title"><i class="fas fa-crown"></i>TOP 应用排行</div>

                        </div>
                    </div>
                </div>
            </div>
