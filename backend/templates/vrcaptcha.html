<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="VR 沉浸式验证码">
    <title>VR 沉浸式验证码</title>
    <link rel="preconnect" href="https://cdn.bootcdn.net">
    <link rel="dns-prefetch" href="https://cdn.bootcdn.net">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --captcha-primary: #6366f1;
            --captcha-success: #28a745;
            --captcha-danger: #dc3545;
            --captcha-dark: #1a1a2e;
            --captcha-light: #f8f9fa;
            --captcha-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-bs-theme="dark"] {
            --captcha-light: #2d2d44;
            --captcha-dark: #f8f9fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .captcha-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, var(--captcha-primary) 0%, #8b5cf6 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .card-header h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 600;
        }

        .card-body {
            padding: 24px;
        }

        #canvas-container {
            width: 100%;
            height: 450px;
            background: linear-gradient(180deg, #1e3a5f 0%, #0d1b2a 100%);
            border-radius: 8px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .xr-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .xr-button {
            pointer-events: auto;
            background: linear-gradient(135deg, var(--captcha-primary) 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--captcha-transition);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .xr-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }

        .xr-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .xr-status {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
            min-width: 200px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--captcha-transition);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--captcha-primary) 0%, #8b5cf6 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--captcha-light);
            color: var(--captcha-dark);
            border: 1px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--captcha-light);
            border-radius: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 0.9rem;
        }

        .info-item i {
            color: var(--captcha-primary);
        }

        .result-banner {
            display: none;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            margin-top: 16px;
            animation: fadeIn 0.3s ease;
        }

        .result-banner.show {
            display: block;
        }

        .result-banner.success {
            background: rgba(40, 167, 69, 0.1);
            color: var(--captcha-success);
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .result-banner.error {
            background: rgba(220, 53, 69, 0.1);
            color: var(--captcha-danger);
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--captcha-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .instruction {
            background: rgba(99, 102, 241, 0.1);
            border-left: 4px solid var(--captcha-primary);
            padding: 12px 16px;
            margin-bottom: 16px;
            border-radius: 0 8px 8px 0;
        }

        .instruction p {
            margin: 0;
            color: #666;
            font-size: 0.9rem;
        }

        select {
            padding: 10px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            background: white;
            width: 100%;
        }

        .mode-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .mode-btn {
            flex: 1;
            min-width: 120px;
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--captcha-transition);
            font-size: 0.9rem;
        }

        .mode-btn:hover {
            border-color: var(--captcha-primary);
        }

        .mode-btn.active {
            border-color: var(--captcha-primary);
            background: rgba(99, 102, 241, 0.1);
            color: var(--captcha-primary);
        }

        .gesture-indicator {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="captcha-card">
            <div class="card-header">
                <h1><i class="fas fa-vr-cardboard me-2"></i>VR 沉浸式验证码</h1>
            </div>
            <div class="card-body">
                <div class="info-bar">
                    <div class="info-item">
                        <i class="fas fa-clock"></i>
                        <span id="timer">00:00</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-sliders-h"></i>
                        <span id="difficulty-display">难度: 中等</span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-vr-cardboard"></i>
                        <span id="xr-status">WebXR: 检测中...</span>
                    </div>
                </div>

                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="interactive">
                        <i class="fas fa-hand-pointer me-2"></i>物体放置
                    </button>
                    <button class="mode-btn" data-mode="gesture">
                        <i class="fas fa-hand-sparkles me-2"></i>手势识别
                    </button>
                    <button class="mode-btn" data-mode="puzzle">
                        <i class="fas fa-puzzle-piece me-2"></i>空间拼图
                    </button>
                </div>

                <div class="instruction">
                    <p><i class="fas fa-info-circle me-2"></i><span id="instruction-text">点击VR按钮进入VR模式，抓取物体并放置到目标位置</span></p>
                </div>

                <div id="canvas-container">
                    <div class="xr-overlay">
                        <button id="xr-button" class="xr-button">
                            <i class="fas fa-vr-cardboard me-2"></i>进入 VR 模式
                        </button>
                    </div>
                    <div class="xr-status" id="xr-status-display">
                        <i class="fas fa-desktop"></i> 桌面模式
                    </div>
                    <div class="gesture-indicator" id="gesture-indicator" style="display: none;"></div>
                </div>

                <div class="controls">
                    <div class="control-group">
                        <select id="difficulty-select">
                            <option value="easy">简单</option>
                            <option value="medium" selected>中等</option>
                            <option value="hard">困难</option>
                            <option value="expert">专家</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary" id="refresh-btn">
                        <i class="fas fa-redo me-2"></i>刷新
                    </button>
                    <button class="btn btn-primary" id="submit-btn">
                        <i class="fas fa-check me-2"></i>提交验证
                    </button>
                </div>

                <div id="result-banner" class="result-banner"></div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/static/js/vrcaptcha.js"></script>
</body>
</html>
