<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="AR验证码 - WebXR增强现实验证码">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AR 验证码</title>
    <link rel="preconnect" href="https://cdn.bootcdn.net">
    <link rel="dns-prefetch" href="https://cdn.bootcdn.net">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ar-primary: #00d4ff;
            --ar-secondary: #7c3aed;
            --ar-success: #28a745;
            --ar-danger: #dc3545;
            --ar-dark: #1a1a2e;
            --ar-light: #f8f9fa;
            --ar-glow: 0 0 20px rgba(0, 212, 255, 0.4);
            --ar-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .captcha-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            background: linear-gradient(135deg, var(--ar-primary) 0%, var(--ar-secondary) 100%);
            padding: 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .card-header h1 {
            font-size: 1.6rem;
            margin: 0;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        .card-header .subtitle {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        .card-body {
            padding: 28px;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
        }

        .info-item i {
            color: var(--ar-primary);
            font-size: 1.1rem;
            text-shadow: var(--ar-glow);
        }

        .info-item .time-value {
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--ar-primary);
        }

        #canvas-container {
            width: 100%;
            height: 450px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.5);
        }

        #canvas-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center top, rgba(0, 212, 255, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-group {
            flex: 1;
            min-width: 220px;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--ar-transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--ar-primary) 0%, var(--ar-secondary) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        select {
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            width: 100%;
            transition: var(--ar-transition);
        }

        select:focus {
            outline: none;
            border-color: var(--ar-primary);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }

        select option {
            background: #1a1a2e;
            color: white;
        }

        .target-panel {
            display: flex;
            gap: 20px;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .target-item, .support-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
        }

        .target-item i, .support-item i {
            color: #f39c12;
        }

        .instruction {
            background: rgba(0, 212, 255, 0.08);
            border-left: 4px solid var(--ar-primary);
            padding: 16px 20px;
            margin-bottom: 20px;
            border-radius: 0 12px 12px 0;
        }

        .instruction p {
            margin: 0;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .instruction i {
            color: var(--ar-primary);
            margin-right: 10px;
        }

        .result-banner {
            display: none;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-banner.show {
            display: block;
        }

        .result-banner.success {
            background: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #28a745;
        }

        .result-banner.error {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #dc3545;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 212, 255, 0.2);
            border-top-color: var(--ar-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: relative;
        }

        .spinner::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border: 2px solid rgba(124, 58, 237, 0.3);
            border-radius: 50%;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .feature-badges {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .badge {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .badge i {
            margin-right: 5px;
            color: var(--ar-primary);
        }

        @media (max-width: 768px) {
            .card-body {
                padding: 20px;
            }

            #canvas-container {
                height: 350px;
            }

            .info-bar {
                flex-direction: column;
                align-items: flex-start;
            }

            .controls {
                flex-direction: column;
            }

            .control-group {
                min-width: 100%;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="captcha-card">
            <div class="card-header">
                <h1><i class="fas fa-vr-cardboard me-3"></i>AR 验证码</h1>
                <div class="subtitle">增强现实验证码系统 - WebXR 集成</div>
            </div>
            <div class="card-body">
                <div class="feature-badges">
                    <span class="badge"><i class="fas fa-cubes"></i> AR场景生成</span>
                    <span class="badge"><i class="fas fa-hand-pointer"></i> 手势识别</span>
                    <span class="badge"><i class="fas fa-map-marker-alt"></i> 空间定位</span>
                    <span class="badge"><i class="fas fa-globe"></i> WebXR API</span>
                </div>

                <div class="info-bar">
                    <div class="info-item">
                        <i class="fas fa-clock"></i>
                        <span>倒计时: <span class="time-value" id="timer">00:00</span></span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-sliders-h"></i>
                        <span id="difficulty-display">难度: 中等</span>
                    </div>
                </div>

                <div class="target-panel" id="target-info">
                    <div class="target-item">
                        <i class="fas fa-target"></i>
                        <span>目标颜色: <span style="font-weight: bold;">加载中...</span></span>
                    </div>
                    <div class="target-item">
                        <i class="fas fa-hand-pointer"></i>
                        <span>所需手势: <strong>加载中...</strong></span>
                    </div>
                </div>

                <div class="instruction">
                    <p><i class="fas fa-info-circle"></i><strong>操作说明：</strong>点击选择目标物体（与目标颜色匹配），将其拖动到目标位置（橙色圆环标记处），然后执行指定手势完成验证。</p>
                </div>

                <div id="canvas-container"></div>

                <div class="controls">
                    <div class="control-group">
                        <select id="difficulty-select">
                            <option value="easy">简单</option>
                            <option value="medium" selected>中等</option>
                            <option value="hard">困难</option>
                            <option value="expert">专家</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary" id="refresh-btn">
                        <i class="fas fa-redo"></i>刷新验证码
                    </button>
                    <button class="btn btn-primary" id="submit-btn">
                        <i class="fas fa-check"></i>提交验证
                    </button>
                </div>

                <div id="webxr-support" class="target-panel">
                    <div class="support-item">
                        <i class="fas fa-circle-notch fa-spin"></i>
                        <span>检测 WebXR 支持...</span>
                    </div>
                </div>

                <div id="result-banner" class="result-banner"></div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/static/js/arcaptcha.js"></script>
</body>
</html>
