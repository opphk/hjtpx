<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="墨盾验证 - 找不同验证码">
    <title>找不同验证码 - 墨盾验证</title>
    <link rel="preconnect" href="https://cdn.bootcdn.net">
    <link rel="dns-prefetch" href="https://cdn.bootcdn.net">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --captcha-primary: #c9a96e;
            --captcha-success: #28a745;
            --captcha-danger: #dc3545;
            --captcha-dark: #1a1a2e;
            --captcha-light: #f8f9fa;
            --captcha-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-bs-theme="dark"] {
            --captcha-light: #2d2d44;
            --captcha-dark: #f8f9fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .captcha-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, var(--captcha-primary) 0%, #d4b87a 100%);
            color: white;
            padding: 24px;
            text-align: center;
        }

        .card-header h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 600;
        }

        .card-body {
            padding: 24px;
        }

        .images-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .image-wrapper {
            position: relative;
            border: 3px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .image-wrapper img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .image-wrapper canvas {
            cursor: crosshair;
        }

        .image-label {
            text-align: center;
            padding: 8px;
            background: #f0f0f0;
            font-weight: 500;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--captcha-transition);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--captcha-primary) 0%, #d4b87a 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(201, 169, 110, 0.4);
        }

        .btn-secondary {
            background: var(--captcha-light);
            color: var(--captcha-dark);
            border: 1px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--captcha-light);
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 0.9rem;
        }

        .info-item i {
            color: var(--captcha-primary);
        }

        .result-banner {
            display: none;
            padding: 16px;
            border-radius: 8px;
            text-align: center;
            margin-top: 16px;
            animation: fadeIn 0.3s ease;
        }

        .result-banner.show {
            display: block;
        }

        .result-banner.success {
            background: rgba(40, 167, 69, 0.1);
            color: var(--captcha-success);
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .result-banner.error {
            background: rgba(220, 53, 69, 0.1);
            color: var(--captcha-danger);
            border: 1px solid rgba(220, 53, 69, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(201, 169, 110, 0.2);
            border-top-color: var(--captcha-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="captcha-card">
            <div class="card-header">
                <h1><i class="fas fa-search-difference me-2"></i>找不同验证码</h1>
            </div>
            <div class="card-body">
                <div class="info-bar">
                    <div class="info-item">
                        <i class="fas fa-check-double"></i>
                        <span>已找到: <strong id="found-count">0</strong>/<span id="total-count">0</strong></span>
                    </div>
                    <div class="info-item">
                        <i class="fas fa-clock"></i>
                        <span id="timer">00:00</span>
                    </div>
                </div>

                <div class="images-container" id="images-container">
                </div>

                <div class="controls">
                    <button class="btn btn-secondary" id="refresh-btn">
                        <i class="fas fa-redo me-2"></i>刷新
                    </button>
                    <button class="btn btn-primary" id="submit-btn">
                        <i class="fas fa-check me-2"></i>提交验证
                    </button>
                </div>

                <div id="result-banner" class="result-banner"></div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script src="/static/js/find-diff.js"></script>
</body>
</html>
