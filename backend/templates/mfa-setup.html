<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA 设置 - HJTPX</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .setup-container {
            max-width: 600px;
            margin: 50px auto;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px 16px 0 0 !important;
            padding: 24px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 32px;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd6 0%, #6a4190 100%);
        }
        .method-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .method-card:hover {
            border-color: #667eea;
            background-color: #f8f9ff;
        }
        .method-card.selected {
            border-color: #667eea;
            background-color: #e8ebff;
        }
        .method-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .qr-code {
            background: white;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
        }
        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
        }
        .step {
            text-align: center;
            flex: 1;
        }
        .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #666;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .step.active .step-number {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .step.completed .step-number {
            background: #28a745;
            color: white;
        }
        .step-label {
            font-size: 14px;
            color: #666;
        }
        .step.active .step-label,
        .step.completed .step-label {
            color: #333;
            font-weight: 600;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="setup-container">
        <div class="card">
            <div class="card-header text-center">
                <h3 class="mb-0">🔐 多因素认证设置</h3>
                <p class="mb-0 mt-2 opacity-75">为您的账户添加额外的安全保护</p>
            </div>
            <div class="card-body p-4">
                <div class="step-indicator">
                    <div class="step active" data-step="1">
                        <div class="step-number">1</div>
                        <div class="step-label">选择方式</div>
                    </div>
                    <div class="step" data-step="2">
                        <div class="step-number">2</div>
                        <div class="step-label">设置</div>
                    </div>
                    <div class="step" data-step="3">
                        <div class="step-number">3</div>
                        <div class="step-label">验证</div>
                    </div>
                </div>

                <div id="step1" class="step-content">
                    <h5 class="mb-4">选择您喜欢的认证方式</h5>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <div class="method-card text-center selected" data-method="totp">
                                <div class="method-icon">📱</div>
                                <h6 class="mb-1">认证器应用</h6>
                                <small class="text-muted">使用 Google Authenticator 等应用</small>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="method-card text-center" data-method="sms">
                                <div class="method-icon">💬</div>
                                <h6 class="mb-1">短信验证码</h6>
                                <small class="text-muted">通过短信接收验证码</small>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="method-card text-center" data-method="email">
                                <div class="method-icon">📧</div>
                                <h6 class="mb-1">邮件验证码</h6>
                                <small class="text-muted">通过邮件接收验证码</small>
                            </div>
                        </div>
                    </div>
                    <div class="text-center">
                        <button class="btn btn-primary btn-lg" id="nextStep1">下一步</button>
                    </div>
                </div>

                <div id="step2" class="step-content" style="display: none;">
                    <div id="totpSetup" style="display: none;">
                        <h5 class="mb-4">设置认证器应用</h5>
                        <div class="text-center mb-4">
                            <div class="qr-code">
                                <div style="width: 200px; height: 200px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #999;">
                                    QR Code
                                </div>
                            </div>
                            <p class="mt-3 text-muted small">使用认证器应用扫描二维码</p>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密钥</label>
                            <input type="text" class="form-control" id="totpSecret" readonly>
                        </div>
                        <p class="text-muted small">您也可以手动输入上述密钥</p>
                    </div>

                    <div id="smsSetup" style="display: none;">
                        <h5 class="mb-4">设置短信验证</h5>
                        <div class="mb-3">
                            <label class="form-label">手机号码</label>
                            <input type="tel" class="form-control" id="smsPhone" placeholder="+86 138 0000 0000">
                        </div>
                        <div class="text-center">
                            <button class="btn btn-outline-primary" id="sendSmsCode">发送验证码</button>
                        </div>
                    </div>

                    <div id="emailSetup" style="display: none;">
                        <h5 class="mb-4">设置邮件验证</h5>
                        <div class="mb-3">
                            <label class="form-label">邮箱地址</label>
                            <input type="email" class="form-control" id="emailAddress" placeholder="your@email.com">
                        </div>
                        <div class="text-center">
                            <button class="btn btn-outline-primary" id="sendEmailCode">发送验证码</button>
                        </div>
                    </div>

                    <div class="mt-4 d-flex justify-content-between">
                        <button class="btn btn-outline-secondary" id="prevStep2">上一步</button>
                        <button class="btn btn-primary" id="nextStep2">下一步</button>
                    </div>
                </div>

                <div id="step3" class="step-content" style="display: none;">
                    <h5 class="mb-4">验证设置</h5>
                    <div class="mb-3">
                        <label class="form-label">请输入验证码</label>
                        <input type="text" class="form-control text-center" id="verifyCode" placeholder="000000" maxlength="6" style="font-size: 24px; letter-spacing: 8px;">
                    </div>
                    <div id="backupCodesSection" style="display: none;">
                        <div class="alert alert-warning mb-4">
                            <h6 class="alert-heading">⚠️ 备份码</h6>
                            <p class="mb-0">请妥善保存以下备份码，当您无法使用 MFA 设备时可以使用它们登录。</p>
                        </div>
                        <div id="backupCodes" class="mb-4" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;"></div>
                    </div>
                    <div class="mt-4 d-flex justify-content-between">
                        <button class="btn btn-outline-secondary" id="prevStep3">上一步</button>
                        <button class="btn btn-success" id="enableMFA">启用 MFA</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container">
        <div id="toast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto">提示</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/mfa.js"></script>
</body>
</html>
