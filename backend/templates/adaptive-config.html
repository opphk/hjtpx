<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自适应难度配置 - HJT PX</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .theme-dark {
            background-color: #1a1a2e;
            color: #eee;
        }
        .theme-dark .card {
            background-color: #16213e;
            border-color: #0f3460;
        }
        .theme-dark .form-control {
            background-color: #0f3460;
            border-color: #16537e;
            color: #eee;
        }
    </style>
</head>
<body class="theme-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/admin">
                <i class="fas fa-shield-alt me-2"></i>HJT PX 管理后台
            </a>
            <div class="navbar-nav ms-auto">
                <button id="theme-toggle" class="btn btn-light btn-sm">
                    ☀️
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-3">
                <div class="card mb-3">
                    <div class="card-header">
                        <i class="fas fa-bars me-2"></i>导航菜单
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="/admin" class="list-group-item list-group-item-action">
                            <i class="fas fa-tachometer-alt me-2"></i>仪表盘
                        </a>
                        <a href="/admin/stats" class="list-group-item list-group-item-action">
                            <i class="fas fa-chart-line me-2"></i>统计分析
                        </a>
                        <a href="/admin/logs" class="list-group-item list-group-item-action">
                            <i class="fas fa-list me-2"></i>验证日志
                        </a>
                        <a href="/admin/behavior-analytics" class="list-group-item list-group-item-action">
                            <i class="fas fa-users me-2"></i>用户行为分析
                        </a>
                        <a href="/admin/adaptive-config" class="list-group-item list-group-item-action active">
                            <i class="fas fa-sliders-h me-2"></i>自适应配置
                        </a>
                        <a href="/admin/config" class="list-group-item list-group-item-action">
                            <i class="fas fa-cog me-2"></i>系统配置
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-md-9">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-sliders-h me-2"></i>自适应难度系统配置
                        </h5>
                    </div>
                    <div class="card-body">
                        <form id="configForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Easy 难度阈值</label>
                                    <input type="number" class="form-control" id="easyThreshold" value="20" min="0" max="100">
                                    <small class="text-muted">风险分数低于此值时使用 Easy 难度</small>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Medium 难度阈值</label>
                                    <input type="number" class="form-control" id="mediumThreshold" value="40" min="0" max="100">
                                    <small class="text-muted">风险分数在此区间时使用 Medium 难度</small>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Hard 难度阈值</label>
                                    <input type="number" class="form-control" id="hardThreshold" value="60" min="0" max="100">
                                    <small class="text-muted">风险分数在此区间时使用 Hard 难度</small>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Expert 难度阈值</label>
                                    <input type="number" class="form-control" id="expertThreshold" value="80" min="0" max="100">
                                    <small class="text-muted">风险分数高于此值时使用 Expert 难度</small>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">失败权重</label>
                                    <input type="number" class="form-control" id="failureWeight" value="15" step="0.1">
                                    <small class="text-muted">每次失败增加的风险分数</small>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">成功权重</label>
                                    <input type="number" class="form-control" id="successWeight" value="-5" step="0.1">
                                    <small class="text-muted">每次成功减少的风险分数</small>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label">时间惩罚</label>
                                    <input type="number" class="form-control" id="timePenalty" value="2" step="0.1">
                                    <small class="text-muted">验证过快或过慢时增加的风险分数</small>
                                </div>
                            </div>

                            <div class="mb-3">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="abTestEnabled">
                                    <label class="form-check-label">启用 A/B 测试 (10% 概率随机调整难度)</label>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>保存配置
                                </button>
                                <button type="button" class="btn btn-secondary" id="resetBtn">
                                    <i class="fas fa-undo me-2"></i>重置默认
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="fas fa-users me-2"></i>用户风险档案
                        </h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead>
                                    <tr>
                                        <th>用户 ID</th>
                                        <th>风险分数</th>
                                        <th>成功率</th>
                                        <th>平均时间</th>
                                        <th>当前难度</th>
                                        <th>最后更新</th>
                                    </tr>
                                </thead>
                                <tbody id="profilesTable">
                                    <!-- 动态填充 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/theme.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadConfig();
            loadProfiles();

            document.getElementById('configForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                await saveConfig();
            });

            document.getElementById('resetBtn').addEventListener('click', function() {
                document.getElementById('easyThreshold').value = 20;
                document.getElementById('mediumThreshold').value = 40;
                document.getElementById('hardThreshold').value = 60;
                document.getElementById('expertThreshold').value = 80;
                document.getElementById('failureWeight').value = 15;
                document.getElementById('successWeight').value = -5;
                document.getElementById('timePenalty').value = 2;
            });
        });

        async function loadConfig() {
            try {
                const resp = await fetch('/api/v1/adaptive/config');
                const data = await resp.json();
                if (data.code === 0) {
                    const config = data.data;
                    document.getElementById('easyThreshold').value = config.easyThreshold;
                    document.getElementById('mediumThreshold').value = config.mediumThreshold;
                    document.getElementById('hardThreshold').value = config.hardThreshold;
                    document.getElementById('expertThreshold').value = config.expertThreshold;
                    document.getElementById('failureWeight').value = config.failureWeight;
                    document.getElementById('successWeight').value = config.successWeight;
                    document.getElementById('timePenalty').value = config.timePenalty;
                }
            } catch (e) {
                console.error('Load config failed:', e);
            }
        }

        async function saveConfig() {
            const config = {
                easyThreshold: parseFloat(document.getElementById('easyThreshold').value),
                mediumThreshold: parseFloat(document.getElementById('mediumThreshold').value),
                hardThreshold: parseFloat(document.getElementById('hardThreshold').value),
                expertThreshold: parseFloat(document.getElementById('expertThreshold').value),
                failureWeight: parseFloat(document.getElementById('failureWeight').value),
                successWeight: parseFloat(document.getElementById('successWeight').value),
                timePenalty: parseFloat(document.getElementById('timePenalty').value)
            };

            try {
                const resp = await fetch('/api/v1/adaptive/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });
                const data = await resp.json();
                if (data.code === 0) {
                    alert('配置保存成功！');
                }
            } catch (e) {
                console.error('Save config failed:', e);
                alert('保存失败，请重试');
            }
        }

        async function loadProfiles() {
            try {
                const resp = await fetch('/api/v1/adaptive/profiles');
                const data = await resp.json();
                if (data.code === 0) {
                    renderProfiles(data.data);
                }
            } catch (e) {
                console.error('Load profiles failed:', e);
            }
        }

        function renderProfiles(profiles) {
            const tbody = document.getElementById('profilesTable');
            tbody.innerHTML = profiles.map(p => `
                <tr>
                    <td>${p.userID}</td>
                    <td>
                        <span class="badge ${p.riskScore < 30 ? 'bg-success' : p.riskScore < 70 ? 'bg-warning' : 'bg-danger'}">
                            ${p.riskScore.toFixed(1)}
                        </span>
                    </td>
                    <td>${(p.successRate * 100).toFixed(1)}%</td>
                    <td>${p.avgTime.toFixed(1)}s</td>
                    <td>${getDifficultyLevel(p.riskScore)}</td>
                    <td>${new Date(p.lastUpdated).toLocaleString()}</td>
                </tr>
            `).join('');
        }

        function getDifficultyLevel(score) {
            if (score < 20) return 'Easy';
            if (score < 40) return 'Medium';
            if (score < 60) return 'Hard';
            return 'Expert';
        }
    </script>
</body>
</html>
