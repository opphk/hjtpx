basePath: /
definitions:
  captcha.VoiceVerifyRequest:
    properties:
      code:
        type: string
      session_id:
        type: string
    required:
    - code
    - session_id
    type: object
  handler.APIMetrics:
    properties:
      avg_response_time:
        type: number
      error_rate:
        type: number
      failed_requests:
        type: integer
      max_response_time:
        type: number
      min_response_time:
        type: number
      requests_per_second:
        type: number
      status_codes:
        additionalProperties:
          format: int64
          type: integer
        type: object
      success_rate:
        type: number
      success_requests:
        type: integer
      timestamp:
        type: integer
      top_endpoints:
        items:
          $ref: '#/definitions/handler.EndpointMetric'
        type: array
      total_requests:
        type: integer
    type: object
  handler.ActivityItem:
    properties:
      event:
        type: string
      status:
        type: string
      time:
        type: string
      user:
        type: string
    type: object
  handler.AdminInfo:
    properties:
      email:
        type: string
      id:
        type: integer
      is_super_admin:
        type: boolean
      last_login_at:
        type: string
      role:
        type: string
      status:
        type: string
      username:
        type: string
    type: object
  handler.AlertInfo:
    properties:
      acknowledged:
        type: boolean
      icon:
        type: string
      id:
        type: integer
      message:
        type: string
      severity:
        type: string
      timestamp:
        type: integer
      type:
        type: string
    type: object
  handler.ApplicationsSummaryResponse:
    properties:
      active:
        type: integer
      successRate:
        type: number
      total:
        type: integer
      totalApiCalls:
        type: integer
      totalUsers:
        type: integer
    type: object
  handler.BatchDeleteRequest:
    description: 批量删除的请求参数
    properties:
      ids:
        description: 应用ID列表
        items:
          type: integer
        minItems: 1
        type: array
    required:
    - ids
    type: object
  handler.BatchUpdateRequest:
    description: 批量更新的请求参数
    properties:
      config:
        additionalProperties: true
        description: 应用配置
        type: object
      ids:
        description: 应用ID列表
        items:
          type: integer
        minItems: 1
        type: array
      is_active:
        description: 是否启用
        type: boolean
    required:
    - ids
    type: object
  handler.BehaviorDataPoint:
    properties:
      event:
        type: string
      timestamp:
        type: integer
      x:
        type: integer
      "y":
        type: integer
    type: object
  handler.ChangePasswordRequest:
    description: 修改密码请求参数
    properties:
      new_password:
        description: 新密码
        maxLength: 128
        minLength: 6
        type: string
      old_password:
        description: 原密码
        type: string
    required:
    - new_password
    - old_password
    type: object
  handler.ChartData:
    properties:
      failed:
        items:
          $ref: '#/definitions/handler.ChartDataPoint'
        type: array
      success:
        items:
          $ref: '#/definitions/handler.ChartDataPoint'
        type: array
      total:
        items:
          $ref: '#/definitions/handler.ChartDataPoint'
        type: array
    type: object
  handler.ChartDataPoint:
    properties:
      count:
        type: integer
      date:
        type: string
    type: object
  handler.ClearLogsRequest:
    properties:
      range:
        type: string
    type: object
  handler.CloneApplicationRequest:
    description: 克隆应用的请求参数
    properties:
      new_name:
        description: 新应用名称
        type: string
    required:
    - new_name
    type: object
  handler.CreateApplicationRequest:
    description: 创建新应用的请求参数
    properties:
      description:
        description: 应用描述
        maxLength: 1000
        type: string
      domain:
        description: 域名
        maxLength: 255
        type: string
      name:
        description: 应用名称
        maxLength: 255
        minLength: 1
        type: string
      user_id:
        description: 用户ID
        type: integer
      website:
        description: 网站URL
        maxLength: 255
        type: string
    required:
    - name
    - user_id
    type: object
  handler.CreateRiskRuleRequest:
    properties:
      action:
        type: string
      apps:
        items:
          type: string
        type: array
      condition:
        additionalProperties: true
        type: object
      description:
        type: string
      enabled:
        type: boolean
      name:
        type: string
      priority:
        type: integer
      type:
        type: string
    required:
    - action
    - name
    - type
    type: object
  handler.CreateVoiceCaptchaRequest:
    description: 语音验证码创建请求参数
    properties:
      language:
        description: '语言: "zh-CN" 或 "en-US"'
        type: string
      length:
        description: 验证码位数，默认4位
        type: integer
    type: object
  handler.DashboardStats:
    properties:
      totalApps:
        type: integer
      totalErrors:
        type: integer
      totalRequests:
        type: integer
      totalUsers:
        type: integer
    type: object
  handler.DataDeletionRequest:
    properties:
      reason:
        type: string
    type: object
  handler.DataExportRequest:
    properties:
      format:
        description: 必须是json或csv
        enum:
        - json
        - csv
        type: string
    required:
    - format
    type: object
  handler.DeletionRequestResponse:
    properties:
      completed_at:
        type: string
      created_at:
        type: string
      id:
        type: integer
      reason:
        type: string
      status:
        type: string
      user_id:
        type: integer
    type: object
  handler.EnableMFARequest:
    properties:
      email:
        type: string
      mfa_type:
        enum:
        - totp
        - sms
        - email
        type: string
      phone:
        type: string
    required:
    - mfa_type
    type: object
  handler.EnableTOTPRequest:
    properties:
      secret:
        type: string
    required:
    - secret
    type: object
  handler.EndpointMetric:
    properties:
      avg_time:
        type: number
      error_rate:
        type: number
      max_time:
        type: number
      method:
        type: string
      path:
        type: string
      requests:
        type: integer
      requests_per_second:
        type: number
    type: object
  handler.ExportRequestResponse:
    properties:
      completed_at:
        type: string
      created_at:
        type: string
      file_path:
        type: string
      format:
        type: string
      id:
        type: integer
      status:
        type: string
      user_id:
        type: integer
    type: object
  handler.GenerateTOTPRequest:
    properties:
      account_name:
        type: string
      issuer:
        type: string
    required:
    - account_name
    - issuer
    type: object
  handler.HealthStatus:
    properties:
      metrics:
        additionalProperties: true
        type: object
      services:
        additionalProperties: true
        type: object
      status:
        type: string
      system:
        additionalProperties: true
        type: object
      timestamp:
        type: string
      uptime:
        type: string
    type: object
  handler.ImportApplicationRequest:
    description: 导入应用配置的请求参数
    properties:
      config:
        additionalProperties: true
        description: 应用配置
        type: object
      description:
        description: 应用描述
        type: string
      domain:
        description: 域名
        type: string
      name:
        description: 应用名称
        type: string
      user_id:
        description: 用户ID
        type: integer
      website:
        description: 网站URL
        type: string
    required:
    - name
    type: object
  handler.LogListMapResponse:
    properties:
      logs:
        items:
          additionalProperties: true
          type: object
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  handler.LoginRequest:
    properties:
      password:
        description: 密码
        type: string
      username:
        description: 用户名
        type: string
    required:
    - password
    - username
    type: object
  handler.LoginResponse:
    properties:
      expires_in:
        description: 过期时间(秒)
        type: integer
      refresh_token:
        description: 刷新令牌
        type: string
      token:
        description: 访问令牌
        type: string
      user:
        allOf:
        - $ref: '#/definitions/handler.AdminInfo'
        description: 用户信息
    type: object
  handler.LogsSummaryResponse:
    properties:
      errors:
        type: integer
      today:
        type: integer
      total:
        type: integer
      warnings:
        type: integer
    type: object
  handler.RegisterBiometricProfileRequest:
    properties:
      keyboard_sample:
        $ref: '#/definitions/service.KeyboardSample'
      mouse_sample:
        $ref: '#/definitions/service.MouseSample'
      user_id:
        type: string
    required:
    - user_id
    type: object
  handler.RegisterRequest:
    description: 用户注册请求参数
    properties:
      behavior_data:
        description: 行为数据（可选）
        type: string
      email:
        description: 邮箱
        type: string
      password:
        description: 密码
        maxLength: 128
        minLength: 6
        type: string
      username:
        description: 用户名
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  handler.RegisterResponse:
    description: 用户注册响应数据
    properties:
      email:
        description: 邮箱
        type: string
      message:
        description: 消息
        type: string
      user_id:
        description: 用户ID
        type: integer
      username:
        description: 用户名
        type: string
      verification_link:
        description: 验证链接
        type: string
    type: object
  handler.RequestTrendResponse:
    properties:
      data:
        items:
          type: integer
        type: array
      labels:
        items:
          type: string
        type: array
    type: object
  handler.ResendVerificationRequest:
    description: 重新发送验证邮件请求参数
    properties:
      email:
        description: 邮箱
        type: string
    required:
    - email
    type: object
  handler.ResetPasswordRequest:
    description: 重置密码请求参数
    properties:
      new_password:
        description: 新密码
        maxLength: 128
        minLength: 6
        type: string
      token:
        description: 重置令牌
        type: string
    required:
    - new_password
    - token
    type: object
  handler.ResourceUsage:
    properties:
      cpu:
        type: integer
      disk:
        type: integer
      memory:
        type: integer
    type: object
  handler.RiskRule:
    properties:
      action:
        type: string
      apps:
        items:
          type: string
        type: array
      condition:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      hitCount:
        type: integer
      id:
        type: integer
      name:
        type: string
      priority:
        type: integer
      type:
        type: string
    type: object
  handler.RiskRulesSummaryResponse:
    properties:
      activeRules:
        type: integer
      blockRate:
        type: number
      blockedToday:
        type: integer
      riskAlerts:
        type: integer
      totalRules:
        type: integer
    type: object
  handler.SaveSearchRequest:
    description: 保存搜索的请求参数
    properties:
      description:
        description: 搜索描述
        type: string
      name:
        description: 搜索名称
        type: string
      query:
        allOf:
        - $ref: '#/definitions/service.AdvancedSearchQuery'
        description: 搜索查询条件
    required:
    - name
    - query
    type: object
  handler.SendEmailCodeRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handler.ServiceStatus:
    properties:
      latency:
        type: integer
      status:
        type: string
    type: object
  handler.SliderCaptchaRequest:
    properties:
      height:
        description: 验证码图片高度
        type: integer
      slider_height:
        description: 滑动块高度
        type: integer
      slider_width:
        description: 滑动块宽度
        type: integer
      width:
        description: 验证码图片宽度
        type: integer
    type: object
  handler.SliderVerifyRequest:
    properties:
      env_score:
        description: 环境评分
        type: number
      position_x:
        description: X 坐标
        type: integer
      position_y:
        description: Y 坐标
        type: integer
      risk_score:
        description: 风险评分
        type: number
      session_id:
        description: 会话 ID
        type: string
      trace_score:
        description: 轨迹评分
        type: number
    required:
    - position_x
    - position_y
    - session_id
    type: object
  handler.SystemMetrics:
    properties:
      cpu:
        properties:
          count:
            type: integer
          per_core:
            items:
              type: number
            type: array
          temperature:
            type: number
          usage:
            type: number
        type: object
      disk:
        properties:
          free:
            type: integer
          mount_point:
            type: string
          total:
            type: integer
          usage_percent:
            type: number
          used:
            type: integer
        type: object
      load_avg:
        type: number
      memory:
        properties:
          available:
            type: integer
          total:
            type: integer
          usage_percent:
            type: number
          used:
            type: integer
        type: object
      network:
        properties:
          bytes_recv:
            type: integer
          bytes_sent:
            type: integer
          packets_recv:
            type: integer
          packets_sent:
            type: integer
        type: object
      procs:
        type: integer
      timestamp:
        type: integer
      uptime:
        type: integer
    type: object
  handler.SystemStatusResponse:
    properties:
      resourceUsage:
        $ref: '#/definitions/handler.ResourceUsage'
      status:
        additionalProperties:
          $ref: '#/definitions/handler.ServiceStatus'
        type: object
    type: object
  handler.ToggleRiskRuleRequest:
    properties:
      enabled:
        type: boolean
    type: object
  handler.UpdateBlacklistRequest:
    description: 更新黑名单请求参数
    properties:
      action:
        description: 操作
        type: string
      application_ids:
        description: 应用ID列表
        items:
          type: string
        type: array
      expiration:
        description: 过期时间
        type: string
      note:
        description: 备注
        type: string
      reason:
        description: 原因
        type: string
      type:
        description: 类型
        type: string
    type: object
  handler.UpdateConfigRequest:
    description: 更新应用配置的请求参数
    properties:
      allowed_ips:
        description: 允许的IP地址列表
        items:
          type: string
        type: array
      block_refused_requests:
        description: 阻止被拒绝的请求
        type: boolean
      captcha_types:
        description: 验证码类型列表
        items:
          type: string
        type: array
      custom_settings:
        additionalProperties: true
        description: 自定义设置
        type: object
      max_verify_per_day:
        description: 每天最大验证次数
        type: integer
      max_verify_per_minute:
        description: 每分钟最大验证次数
        type: integer
    type: object
  handler.UpdateConsentRequest:
    properties:
      consent_analytics:
        type: boolean
      consent_data_sharing:
        type: boolean
      consent_marketing:
        type: boolean
      consent_personalization:
        type: boolean
    type: object
  handler.UpdateRiskRuleRequest:
    properties:
      action:
        type: string
      apps:
        items:
          type: string
        type: array
      condition:
        additionalProperties: true
        type: object
      description:
        type: string
      enabled:
        type: boolean
      name:
        type: string
      priority:
        type: integer
      type:
        type: string
    type: object
  handler.UserConsentResponse:
    properties:
      consent_analytics:
        type: boolean
      consent_data_sharing:
        type: boolean
      consent_marketing:
        type: boolean
      consent_personalization:
        type: boolean
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  handler.UserLoginRequest:
    description: 用户登录请求参数
    properties:
      behavior_data:
        description: 行为数据
        type: string
      captcha_token:
        description: 验证码令牌
        type: string
      password:
        description: 密码
        type: string
      username:
        description: 用户名
        type: string
    required:
    - password
    - username
    type: object
  handler.UserLoginResponse:
    description: 用户登录响应数据
    properties:
      access_token:
        description: 访问令牌
        type: string
      expires_in:
        description: 过期时间（秒）
        type: integer
      refresh_token:
        description: 刷新令牌
        type: string
      user:
        allOf:
        - $ref: '#/definitions/service.UserResponse'
        description: 用户信息
    type: object
  handler.VerifyBiometricsRequest:
    properties:
      keyboard_sample:
        $ref: '#/definitions/service.KeyboardSample'
      mouse_sample:
        $ref: '#/definitions/service.MouseSample'
      user_id:
        type: string
    required:
    - user_id
    type: object
  handler.VerifyCodeRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  handler.VerifyGestureCaptchaRequest:
    description: 手势验证码验证请求参数
    properties:
      id:
        description: 验证码ID
        type: string
      pattern:
        description: 手势模式
        type: string
    required:
    - id
    - pattern
    type: object
  handler.VerifyRequest:
    description: 验证验证码时发送的请求结构，支持滑动验证码和点击验证码
    properties:
      application_id:
        description: 应用 ID
        type: integer
      behavior_data:
        description: 行为分析数据
        items:
          $ref: '#/definitions/handler.BehaviorDataPoint'
        type: array
      click_sequence:
        description: 点击顺序
        items:
          type: integer
        type: array
      points:
        description: 点击验证码坐标数组
        items:
          items:
            type: integer
          type: array
        type: array
      session_id:
        description: 会话 ID
        type: string
      type:
        description: '验证码类型: slider 或 click'
        type: string
      x:
        description: 滑动验证码 X 坐标
        type: integer
      "y":
        description: 滑动验证码 Y 坐标
        type: integer
    required:
    - session_id
    - type
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.AdvancedSearchQuery:
    properties:
      conditions:
        items:
          $ref: '#/definitions/service.SearchCondition'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      sort:
        items:
          $ref: '#/definitions/service.SortOption'
        type: array
    type: object
  service.KeyEvent:
    properties:
      key:
        type: string
      key_code:
        type: integer
      timestamp:
        type: integer
      type:
        description: keydown, keyup
        type: string
    type: object
  service.KeyboardSample:
    properties:
      key_events:
        items:
          $ref: '#/definitions/service.KeyEvent'
        type: array
      timestamp:
        type: integer
    type: object
  service.MouseEvent:
    properties:
      button:
        type: integer
      timestamp:
        type: integer
      type:
        description: mousemove, click, mousedown, mouseup
        type: string
      x:
        type: integer
      "y":
        type: integer
    type: object
  service.MouseSample:
    properties:
      mouse_events:
        items:
          $ref: '#/definitions/service.MouseEvent'
        type: array
      timestamp:
        type: integer
    type: object
  service.SearchCondition:
    properties:
      field:
        type: string
      operator:
        $ref: '#/definitions/service.SearchOperator'
      value: {}
    type: object
  service.SearchOperator:
    enum:
    - eq
    - ne
    - gt
    - gte
    - lt
    - lte
    - contains
    - starts_with
    - ends_with
    - in
    - not_in
    - is_null
    - is_not_null
    - between
    type: string
    x-enum-varnames:
    - OpEquals
    - OpNotEquals
    - OpGreaterThan
    - OpGreaterOrEq
    - OpLessThan
    - OpLessOrEq
    - OpContains
    - OpStartsWith
    - OpEndsWith
    - OpIn
    - OpNotIn
    - OpIsNull
    - OpIsNotNull
    - OpBetween
  service.SortOption:
    properties:
      field:
        type: string
      order:
        description: asc 或 desc
        type: string
    type: object
  service.UserResponse:
    properties:
      avatar:
        type: string
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_verified:
        type: boolean
      last_login_at:
        type: string
      last_login_ip:
        type: string
      login_count:
        type: integer
      nickname:
        type: string
      phone:
        type: string
      status:
        type: string
      username:
        type: string
      verified_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: 请输入您的 Bearer Token，格式为：Bearer {token}
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://example.com/terms
  title: HJTPX API
  version: "1.0"
paths:
  /api/v1/admin/applications:
    get:
      consumes:
      - application/json
      description: 分页获取应用列表
      parameters:
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10
        in: query
        name: page_size
        type: integer
      - description: 关键词搜索
        in: query
        name: keyword
        type: string
      - description: 用户ID
        in: query
        name: user_id
        type: integer
      - description: 是否启用
        in: query
        name: is_active
        type: boolean
      - description: 排序字段：name, created_at
        in: query
        name: sort_field
        type: string
      - description: 排序方式：asc, desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 应用列表
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
