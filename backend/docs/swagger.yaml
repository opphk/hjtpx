host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: 请输入您的 Bearer Token，格式为：Bearer {token}
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://example.com/terms
  title: HJTPX API
  version: "1.0"
paths:
  /api/v1/admin/applications:
    get:
      consumes:
      - application/json
      description: 分页获取应用列表
      parameters:
      - description: 页码，默认1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认10
        in: query
        name: page_size
        type: integer
      - description: 关键词搜索
        in: query
        name: keyword
        type: string
      - description: 用户ID
        in: query
        name: user_id
        type: integer
      - description: 是否启用
        in: query
        name: is_active
        type: boolean
      - description: 排序字段：name, created_at
        in: query
        name: sort_field
        type: string
      - description: 排序方式：asc, desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 应用列表
          schema:
            additionalProperties: true
            type: object
        "400":
          description: 请求参数错误
          schema:
            additionalProperties: true
            type: object
        "401":
          description: 未授权
          schema:
            additionalProperties: true
            type: object
        "500":
          description: 服务器内部错误
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取应用列表
      tags:
      - 应用管理
    post:
      consumes:
