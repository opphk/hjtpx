basePath: /
definitions:
  captcha.VoiceVerifyRequest:
    properties:
      code:
        type: string
      session_id:
        type: string
    required:
    - code
    - session_id
    type: object
  handler.AddBehaviorFlagRequest:
    properties:
      flag:
        example: suspicious_behavior
        type: string
      user_id:
        example: user123
        type: string
    required:
    - flag
    - user_id
    type: object
  handler.AdminInfo:
    properties:
      email:
        type: string
      id:
        type: integer
      is_super_admin:
        type: boolean
      last_login_at:
        type: string
      role:
        type: string
      status:
        type: string
      username:
        type: string
    type: object
  handler.BehaviorDataPoint:
    properties:
      event:
        type: string
      timestamp:
        type: integer
      x:
        type: integer
      "y":
        type: integer
    type: object
  handler.ChangePasswordRequest:
    description: 修改密码请求参数
    properties:
      new_password:
        description: 新密码
        maxLength: 128
        minLength: 6
        type: string
      old_password:
        description: 原密码
        type: string
    required:
    - new_password
    - old_password
    type: object
  handler.CreateAlertChannelRequest:
    properties:
      config:
        additionalProperties: true
        type: object
      description:
        example: 用于发送告警通知到Slack频道
        maxLength: 1000
        type: string
      is_enabled:
        example: true
        type: boolean
      name:
        example: Slack通知
        maxLength: 255
        minLength: 1
        type: string
      type:
        enum:
        - slack
        - webhook
        - email
        - dingtalk
        example: slack
        type: string
    required:
    - config
    - name
    - type
    type: object
  handler.CreateAlertRuleRequest:
    properties:
      aggregation_window:
        example: 300
        minimum: 1
        type: integer
      channel_ids:
        items:
          type: integer
        type: array
      condition:
        example: risk_score > 80
        type: string
      description:
        example: 当5分钟内验证失败次数超过5次时触发告警
        maxLength: 1000
        type: string
      event_type:
        example: verification_failed
        type: string
      is_enabled:
        example: true
        type: boolean
      name:
        example: 高频验证失败告警
        maxLength: 255
        minLength: 1
        type: string
      severity:
        enum:
        - info
        - warning
        - error
        - critical
        example: warning
        type: string
      threshold:
        example: 5
        minimum: 1
        type: integer
    required:
    - channel_ids
    - event_type
    - name
    - severity
    type: object
  handler.CreateApplicationRequest:
    description: 创建新应用的请求参数
    properties:
      description:
        description: 应用描述
        maxLength: 1000
        type: string
      domain:
        description: 域名
        maxLength: 255
        type: string
      name:
        description: 应用名称
        maxLength: 255
        minLength: 1
        type: string
      user_id:
        description: 用户ID
        type: integer
      website:
        description: 网站URL
        maxLength: 255
        type: string
    required:
    - name
    - user_id
    type: object
  handler.CreateBackupRequest:
    properties:
      type:
        enum:
        - full
        - incremental
        example: full
        type: string
    required:
    - type
    type: object
  handler.CreateVoiceCaptchaRequest:
    description: 语音验证码创建请求参数
    properties:
      language:
        description: '语言: "zh-CN" 或 "en-US"'
        type: string
      length:
        description: 验证码位数，默认4位
        type: integer
    type: object
  handler.DataDeletionRequest:
    properties:
      reason:
        type: string
    type: object
  handler.DataExportRequest:
    properties:
      format:
        description: 必须是json或csv
        enum:
        - json
        - csv
        type: string
    required:
    - format
    type: object
  handler.EnableMFARequest:
    properties:
      email:
        type: string
      mfa_type:
        enum:
        - totp
        - sms
        - email
        type: string
      phone:
        type: string
    required:
    - mfa_type
    type: object
  handler.EnableTOTPRequest:
    properties:
      secret:
        type: string
    required:
    - secret
    type: object
  handler.GenerateTOTPRequest:
    properties:
      account_name:
        type: string
      issuer:
        type: string
    required:
    - account_name
    - issuer
    type: object
  handler.LogListMapResponse:
    properties:
      logs:
        items:
          additionalProperties: true
          type: object
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  handler.LoginRequest:
    properties:
      password:
        description: 密码
        type: string
      username:
        description: 用户名
        type: string
    required:
    - password
    - username
    type: object
  handler.LoginResponse:
    properties:
      expires_in:
        description: 过期时间(秒)
        type: integer
      refresh_token:
        description: 刷新令牌
        type: string
      token:
        description: 访问令牌
        type: string
      user:
        allOf:
        - $ref: '#/definitions/handler.AdminInfo'
        description: 用户信息
    type: object
  handler.RegisterBiometricProfileRequest:
    properties:
      keyboard_sample:
        $ref: '#/definitions/service.KeyboardSample'
      mouse_sample:
        $ref: '#/definitions/service.MouseSample'
      user_id:
        type: string
    required:
    - user_id
    type: object
  handler.RegisterRequest:
    description: 用户注册请求参数
    properties:
      behavior_data:
        description: 行为数据（可选）
        type: string
      email:
        description: 邮箱
        type: string
      password:
        description: 密码
        maxLength: 128
        minLength: 6
        type: string
      username:
        description: 用户名
        maxLength: 50
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  handler.RegisterResponse:
    description: 用户注册响应数据
    properties:
      email:
        description: 邮箱
        type: string
      message:
        description: 消息
        type: string
      user_id:
        description: 用户ID
        type: integer
      username:
        description: 用户名
        type: string
      verification_link:
        description: 验证链接
        type: string
    type: object
  handler.ResendVerificationRequest:
    description: 重新发送验证邮件请求参数
    properties:
      email:
        description: 邮箱
        type: string
    required:
    - email
    type: object
  handler.ResetPasswordRequest:
    description: 重置密码请求参数
    properties:
      new_password:
        description: 新密码
        maxLength: 128
        minLength: 6
        type: string
      token:
        description: 重置令牌
        type: string
    required:
    - new_password
    - token
    type: object
  handler.ResolveAlertRequest:
    properties:
      note:
        example: 已处理，问题已修复
        maxLength: 1000
        type: string
    type: object
  handler.SaveSearchRequest:
    description: 保存搜索的请求参数
    properties:
      description:
        description: 搜索描述
        type: string
      name:
        description: 搜索名称
        type: string
      query:
        allOf:
        - $ref: '#/definitions/service.AdvancedSearchQuery'
        description: 搜索查询条件
    required:
    - name
    - query
    type: object
  handler.SendEmailCodeRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  handler.SendTestAlertRequest:
    properties:
      context:
        additionalProperties: true
        type: object
      event_type:
        example: test_event
        type: string
      message:
        example: 这是一条测试告警消息
        type: string
    required:
    - event_type
    - message
    type: object
  handler.SliderCaptchaRequest:
    properties:
      height:
        description: 验证码图片高度
        type: integer
      slider_height:
        description: 滑动块高度
        type: integer
      slider_width:
        description: 滑动块宽度
        type: integer
      width:
        description: 验证码图片宽度
        type: integer
    type: object
  handler.SliderVerifyRequest:
    properties:
      env_score:
        description: 环境评分
        type: number
      position_x:
        description: X 坐标
        type: integer
      position_y:
        description: Y 坐标
        type: integer
      risk_score:
        description: 风险评分
        type: number
      session_id:
        description: 会话 ID
        type: string
      trace_score:
        description: 轨迹评分
        type: number
      trajectory:
        description: 轨迹数据
        items:
          $ref: '#/definitions/handler.TrajectoryPoint'
        type: array
    required:
    - position_x
    - position_y
    - session_id
    type: object
  handler.TrajectoryPoint:
    properties:
      timestamp:
        type: integer
      x:
        type: integer
      "y":
        type: integer
    type: object
  handler.UpdateAlertChannelRequest:
    properties:
      config:
        additionalProperties: true
        type: object
      description:
        maxLength: 1000
        type: string
      is_enabled:
        type: boolean
      name:
        maxLength: 255
        minLength: 1
        type: string
      type:
        enum:
        - slack
        - webhook
        - email
        - dingtalk
        type: string
    type: object
  handler.UpdateAlertRuleRequest:
    properties:
      aggregation_window:
        minimum: 1
        type: integer
      channel_ids:
        items:
          type: integer
        type: array
      condition:
        type: string
      description:
        maxLength: 1000
        type: string
      event_type:
        type: string
      is_enabled:
        type: boolean
      name:
        maxLength: 255
        minLength: 1
        type: string
      severity:
        enum:
        - info
        - warning
        - error
        - critical
        type: string
      threshold:
        minimum: 1
        type: integer
    type: object
  handler.UpdateBlacklistRequest:
    description: 更新黑名单请求参数
    properties:
      action:
        description: 操作
        type: string
      application_ids:
        description: 应用ID列表
        items:
          type: string
        type: array
      expiration:
        description: 过期时间
        type: string
      note:
        description: 备注
        type: string
      reason:
        description: 原因
        type: string
      type:
        description: 类型
        type: string
    type: object
  handler.UpdateConfigRequest:
    description: 更新应用配置的请求参数
    properties:
      allowed_ips:
        description: 允许的IP地址列表
        items:
          type: string
        type: array
      block_refused_requests:
        description: 阻止被拒绝的请求
        type: boolean
      captcha_types:
        description: 验证码类型列表
        items:
          type: string
        type: array
      custom_settings:
        additionalProperties: true
        description: 自定义设置
        type: object
      max_verify_per_day:
        description: 每天最大验证次数
        type: integer
      max_verify_per_minute:
        description: 每分钟最大验证次数
        type: integer
    type: object
  handler.UpdateConsentRequest:
    properties:
      consent_analytics:
        type: boolean
      consent_data_sharing:
        type: boolean
      consent_marketing:
        type: boolean
      consent_personalization:
        type: boolean
    type: object
  handler.UpdateUserResultRequest:
    properties:
      success:
        example: true
        type: boolean
      time:
        example: 1500
        type: integer
      user_id:
        example: user123
        type: string
    required:
    - success
    - user_id
    type: object
  handler.UserLoginRequest:
    description: 用户登录请求参数
    properties:
      behavior_data:
        description: 行为数据
        type: string
      captcha_token:
        description: 验证码令牌
        type: string
      password:
        description: 密码
        type: string
      username:
        description: 用户名
        type: string
    required:
    - password
    - username
    type: object
  handler.UserLoginResponse:
    description: 用户登录响应数据
    properties:
      access_token:
        description: 访问令牌
        type: string
      expires_in:
        description: 过期时间（秒）
        type: integer
      refresh_token:
        description: 刷新令牌
        type: string
      user:
        allOf:
        - $ref: '#/definitions/service.UserResponse'
        description: 用户信息
    type: object
  handler.VerifyBiometricsRequest:
    properties:
      keyboard_sample:
        $ref: '#/definitions/service.KeyboardSample'
      mouse_sample:
        $ref: '#/definitions/service.MouseSample'
      user_id:
        type: string
    required:
    - user_id
    type: object
  handler.VerifyCodeRequest:
    properties:
      code:
        type: string
    required:
    - code
    type: object
  handler.VerifyGestureCaptchaRequest:
    description: 手势验证码验证请求参数
    properties:
      id:
        description: 验证码ID
        type: string
      pattern:
        description: 手势模式
        type: string
    required:
    - id
    - pattern
    type: object
  handler.VerifyRequest:
    description: 验证验证码时发送的请求结构，支持滑动验证码和点击验证码
    properties:
      application_id:
        description: 应用 ID
        type: integer
      behavior_data:
        description: 行为分析数据
        items:
          $ref: '#/definitions/handler.BehaviorDataPoint'
        type: array
      click_sequence:
        description: 点击顺序
        items:
          type: integer
        type: array
      points:
        description: 点击验证码坐标数组
        items:
          items:
            type: integer
          type: array
        type: array
      session_id:
        description: 会话 ID
        type: string
      type:
        description: '验证码类型: slider 或 click'
        type: string
      x:
        description: 滑动验证码 X 坐标
        type: integer
      "y":
        description: 滑动验证码 Y 坐标
        type: integer
    required:
    - session_id
    - type
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  service.AdvancedSearchQuery:
    properties:
      conditions:
        items:
          $ref: '#/definitions/service.SearchCondition'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      sort:
        items:
          $ref: '#/definitions/service.SortOption'
        type: array
    type: object
  service.AttackTypeData:
    properties:
      attack_type:
        type: string
      count:
        type: integer
      percentage:
        type: number
    type: object
  service.BackupRecord:
    properties:
      checksum:
        type: string
      completed_at:
        type: string
      created_at:
        type: string
      error:
        type: string
      file_name:
        type: string
      file_path:
        type: string
      file_size:
        type: integer
      id:
        type: string
      status:
        $ref: '#/definitions/service.BackupStatus'
      type:
        $ref: '#/definitions/service.BackupType'
      verified:
        type: boolean
    type: object
  service.BackupStatus:
    enum:
    - pending
    - running
    - completed
    - failed
    type: string
    x-enum-varnames:
    - BackupStatusPending
    - BackupStatusRunning
    - BackupStatusCompleted
    - BackupStatusFailed
  service.BackupType:
    enum:
    - full
    - incremental
    type: string
    x-enum-varnames:
    - BackupTypeFull
    - BackupTypeIncremental
  service.CaptchaTypeData:
    properties:
      count:
        type: integer
      type:
        type: string
    type: object
  service.DashboardData:
    properties:
      attack_type_distribution:
        items:
          $ref: '#/definitions/service.AttackTypeData'
        type: array
      captcha_type:
        items:
          $ref: '#/definitions/service.CaptchaTypeData'
        type: array
      risk_distribution:
        $ref: '#/definitions/service.RiskDistributionData'
      risk_score_distribution:
        items:
          $ref: '#/definitions/service.RiskScoreBinData'
        type: array
      summary:
        $ref: '#/definitions/service.Summary'
      trend:
        items:
          $ref: '#/definitions/service.TrendData'
        type: array
    type: object
  service.DifficultyConfig:
    properties:
      easyThreshold:
        format: float64
        type: number
      expertThreshold:
        format: float64
        type: number
      failureWeight:
        format: float64
        type: number
      hardThreshold:
        format: float64
        type: number
      mediumThreshold:
        format: float64
        type: number
      successWeight:
        format: float64
        type: number
      timePenalty:
        format: float64
        type: number
    type: object
  service.KeyEvent:
    properties:
      key:
        type: string
      key_code:
        type: integer
      timestamp:
        type: integer
      type:
        description: keydown, keyup
        type: string
    type: object
  service.KeyboardSample:
    properties:
      key_events:
        items:
          $ref: '#/definitions/service.KeyEvent'
        type: array
      timestamp:
        type: integer
    type: object
  service.MouseEvent:
    properties:
      button:
        type: integer
      timestamp:
        type: integer
      type:
        description: mousemove, click, mousedown, mouseup
        type: string
      x:
        type: integer
      "y":
        type: integer
    type: object
  service.MouseSample:
    properties:
      mouse_events:
        items:
          $ref: '#/definitions/service.MouseEvent'
        type: array
      timestamp:
        type: integer
    type: object
  service.RiskDistributionData:
    properties:
      critical:
        type: integer
      high:
        type: integer
      low:
        type: integer
      medium:
        type: integer
    type: object
  service.RiskScoreBinData:
    properties:
      bin_end:
        type: integer
      bin_start:
        type: integer
      count:
        type: integer
      percentage:
        type: number
    type: object
  service.SearchCondition:
    properties:
      field:
        type: string
      operator:
        $ref: '#/definitions/service.SearchOperator'
      value: {}
    type: object
  service.SearchOperator:
    enum:
    - eq
    - ne
    - gt
    - gte
    - lt
    - lte
    - contains
    - starts_with
    - ends_with
    - in
    - not_in
    - is_null
    - is_not_null
    - between
    type: string
    x-enum-varnames:
    - OpEquals
    - OpNotEquals
    - OpGreaterThan
    - OpGreaterOrEq
    - OpLessThan
    - OpLessOrEq
    - OpContains
    - OpStartsWith
    - OpEndsWith
    - OpIn
    - OpNotIn
    - OpIsNull
    - OpIsNotNull
    - OpBetween
  service.SortOption:
    properties:
      field:
        type: string
      order:
        description: asc 或 desc
        type: string
    type: object
  service.Summary:
    properties:
      active_sessions:
        type: integer
      avg_response_time:
        type: integer
      block_rate:
        type: number
      pass_rate:
        type: number
      total_requests:
        type: integer
    type: object
  service.TrendData:
    properties:
      failed:
        type: integer
      requests:
        type: integer
      success:
        type: integer
      time:
        type: string
    type: object
  service.UserResponse:
    properties:
      avatar:
        type: string
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_verified:
        type: boolean
      last_login_at:
        type: string
      last_login_ip:
        type: string
      login_count:
        type: integer
      nickname:
        type: string
      phone:
        type: string
      status:
        type: string
      username:
        type: string
      verified_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@example.com
    name: API Support
  description: 请输入您的 Bearer Token，格式为：Bearer {token}
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://example.com/terms
  title: HJTPX API
  version: "1.0"
paths:
  /api/v1/adaptive/captcha-difficulty:
    get:
      consumes:
      - application/json
      description: 根据用户ID获取适合的验证码难度级别，支持AB测试模式
      parameters:
      - description: 用户ID，不提供则自动生成匿名ID
        in: query
        name: user_id
        type: string
      - description: 是否启用AB测试，默认false
        in: query
        name: ab_test
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取验证码难度
      tags:
      - 自适应难度
  /api/v1/adaptive/config:
    get:
      consumes:
      - application/json
      description: 获取自适应难度系统的当前配置参数
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/service.DifficultyConfig'
              type: object
      summary: 获取自适应难度配置
      tags:
      - 自适应难度
    put:
      consumes:
      - application/json
      description: 更新自适应难度系统的配置参数
      parameters:
      - description: 难度配置
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/service.DifficultyConfig'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: 请求参数错误
          schema:
            $ref: '#/definitions/response.Response'
      summary: 更新自适应难度配置
      tags:
      - 自适应难度
  /api/v1/adaptive/difficulty:
    get:
      consumes:
      - application/json
      description: 根据用户ID获取当前自适应难度级别和用户档案信息
      parameters:
      - description: 用户ID，不提供则自动生成匿名ID
        in: query
        name: user_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            $ref: '#/definitions/response.Response'
      summary: 获取用户难度
      tags:
