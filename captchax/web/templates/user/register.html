{{define "register.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        .register-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .password-strength-bar {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .strength-weak { width: 25%; background: #ef4444; }
        .strength-fair { width: 50%; background: #f59e0b; }
        .strength-good { width: 75%; background: #3b82f6; }
        .strength-strong { width: 100%; background: #22c55e; }
    </style>
</head>
<body class="register-bg min-h-screen flex items-center justify-center p-4">
    <div class="absolute inset-0 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-300 rounded-full opacity-20 float-animation"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-blue-300 rounded-full opacity-20 float-animation" style="animation-delay: 1s;"></div>
    </div>

    <div class="relative w-full max-w-lg">
        <div class="glass-effect rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl mb-4 shadow-lg">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-800" data-i18n="common.appName">CaptchaX</h1>
                <p class="text-gray-500 mt-1" data-i18n="user.register.title">创建新账户</p>
            </div>

            <form id="register-form" class="space-y-4">
                <div>
                    <label for="reg-username" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.register.username">用户名</label>
                    <input type="text" id="reg-username" name="username"
                        class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                        placeholder="请输入用户名" autocomplete="username" required minlength="3" maxlength="50">
                    <p class="text-xs text-gray-400 mt-1" data-i18n="user.register.username_hint">3-50个字符</p>
                </div>

                <div>
                    <label for="reg-email" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.register.email">邮箱</label>
                    <input type="email" id="reg-email" name="email"
                        class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                        placeholder="请输入邮箱地址" autocomplete="email" required>
                </div>

                <div>
                    <label for="reg-name" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.register.name">姓名</label>
                    <input type="text" id="reg-name" name="name"
                        class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                        placeholder="请输入姓名" autocomplete="name">
                </div>

                <div>
                    <label for="reg-password" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.register.password">密码</label>
                    <div class="relative">
                        <input type="password" id="reg-password" name="password"
                            class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                            placeholder="请输入密码" autocomplete="new-password" required minlength="8">
                        <button type="button" id="toggle-reg-password" class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <svg class="h-5 w-5 text-gray-400 hover:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="mt-2 bg-gray-200 rounded-full overflow-hidden">
                        <div id="password-strength-bar" class="password-strength-bar" style="width: 0%;"></div>
                    </div>
                    <p id="password-strength-text" class="text-xs text-gray-400 mt-1" data-i18n="user.register.password_hint">至少8个字符</p>
                </div>

                <div>
                    <label for="reg-confirm-password" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.register.confirm_password">确认密码</label>
                    <input type="password" id="reg-confirm-password" name="confirm_password"
                        class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                        placeholder="请再次输入密码" autocomplete="new-password" required>
                    <p id="confirm-password-hint" class="text-xs text-gray-400 mt-1 hidden"></p>
                </div>

                <div id="register-captcha-container" class="flex justify-center"></div>

                <label class="flex items-start cursor-pointer">
                    <input type="checkbox" id="agree-terms" class="w-4 h-4 mt-0.5 text-blue-500 border-gray-300 rounded focus:ring-blue-500" required>
                    <span class="ml-2 text-sm text-gray-600" data-i18n="user.register.agree_terms">
                        我已阅读并同意 <a href="#" class="text-blue-500 hover:text-blue-600">服务条款</a> 和 <a href="#" class="text-blue-500 hover:text-blue-600">隐私政策</a>
                    </span>
                </label>

                <div id="register-error" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm"></div>

                <button type="submit" id="register-btn"
                    class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white py-3 rounded-lg font-medium hover:from-blue-600 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 transform hover:scale-[1.02] active:scale-[0.98]">
                    <span id="register-btn-text" data-i18n="user.register.submit">注册</span>
                    <svg id="register-spinner" class="hidden animate-spin h-5 w-5 mx-auto" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 pt-6 border-t border-gray-200">
                <p class="text-center text-sm text-gray-500">
                    <span data-i18n="user.register.has_account">已有账户？</span>
                    <a href="/login" class="text-blue-500 hover:text-blue-600 font-medium" data-i18n="user.register.login_link">立即登录</a>
                </p>
            </div>
        </div>

        <p class="text-center text-white/60 text-sm mt-6">
            &copy; 2024 CaptchaX. 智能行为验证系统
        </p>
    </div>

    <script src="/static/user.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            UserUI.initRegisterPage();
        });
    </script>
</body>
</html>
{{end}}
