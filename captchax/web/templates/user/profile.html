{{define "profile.html"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .sidebar-link:hover {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
        }
        .sidebar-link.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%);
            border-left: 3px solid #3b82f6;
        }
        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
        }
        .avatar-upload:hover .avatar-overlay {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex">
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-64 bg-white shadow-lg transform -translate-x-full lg:translate-x-0 transition-transform duration-300 z-30">
            <div class="h-full flex flex-col">
                <div class="p-6 border-b border-gray-100">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="font-bold text-gray-800">CaptchaX</h1>
                            <p class="text-xs text-gray-500" data-i18n="user.dashboard.title">用户中心</p>
                        </div>
                    </div>
                </div>

                <nav class="flex-1 py-4 overflow-y-auto">
                    <div class="px-4 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider" data-i18n="user.sidebar.main">主菜单</div>
                    <a href="/dashboard" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        <span data-i18n="user.sidebar.dashboard">仪表盘</span>
                    </a>
                    <a href="/profile" class="sidebar-link active flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <span data-i18n="user.sidebar.profile">个人资料</span>
                    </a>

                    <div class="px-4 mt-6 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider" data-i18n="user.sidebar.tools">工具</div>
                    <a href="#" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                        </svg>
                        <span data-i18n="user.sidebar.api_keys">API 密钥</span>
                    </a>
                </nav>

                <div class="p-4 border-t border-gray-100">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div id="sidebar-avatar" class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden">
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-700" id="sidebar-username">用户</p>
                                <p class="text-xs text-green-500 flex items-center">
                                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1"></span>
                                    <span data-i18n="user.online">在线</span>
                                </p>
                            </div>
                        </div>
                        <button id="logout-btn" class="p-2 text-gray-400 hover:text-red-500 transition" title="退出登录">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-h-screen lg:ml-0">
            <header class="bg-white shadow-sm sticky top-0 z-20">
                <div class="flex items-center justify-between px-6 py-4">
                    <button id="mobile-menu-btn" class="lg:hidden p-2 text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 class="text-xl font-semibold text-gray-800" data-i18n="user.profile.title">个人资料</h2>
                </div>
            </header>

            <main class="flex-1 p-6">
                <div class="max-w-3xl mx-auto">
                    <div class="flex items-center space-x-6 mb-8">
                        <div class="avatar-upload relative cursor-pointer group">
                            <div id="profile-avatar" class="w-24 h-24 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden border-4 border-white shadow-lg">
                                <svg class="w-12 h-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <div class="avatar-overlay absolute inset-0 rounded-full bg-black/40 flex items-center justify-center opacity-0 transition-opacity">
                                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                            </div>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-gray-800" id="profile-name">--</h3>
                            <p class="text-gray-500" id="profile-email-display">--</p>
                            <p class="text-xs text-gray-400 mt-1" data-i18n="user.profile.avatar_hint">点击头像上传新图片</p>
                        </div>
                        <input type="file" id="avatar-input" class="hidden" accept="image/*">
                    </div>

                    <div id="profile-success" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg mb-6 text-sm"></div>
                    <div id="profile-error" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 text-sm"></div>

                    <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-6" data-i18n="user.profile.info">基本信息</h3>
                        <form id="profile-form" class="space-y-5">
                            <div class="grid md:grid-cols-2 gap-5">
                                <div>
                                    <label for="profile-username" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.profile.username">用户名</label>
                                    <input type="text" id="profile-username" class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50" readonly>
                                </div>
                                <div>
                                    <label for="profile-email-input" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.profile.email">邮箱</label>
                                    <input type="email" id="profile-email-input" class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label for="profile-name-input" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.profile.name">姓名</label>
                                    <input type="text" id="profile-name-input" class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                                <div>
                                    <label for="profile-phone" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.profile.phone">手机号</label>
                                    <input type="tel" id="profile-phone" class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                                </div>
                            </div>
                            <div class="flex justify-end pt-4">
                                <button type="submit" id="profile-save-btn"
                                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2.5 rounded-lg font-medium transition transform hover:scale-105">
                                    <span id="profile-save-text" data-i18n="common.save">保存</span>
                                    <svg id="profile-save-spinner" class="hidden animate-spin h-5 w-5 mx-auto" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                    </svg>
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm p-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-6" data-i18n="user.profile.change_password">修改密码</h3>
                        <form id="password-form" class="space-y-5">
                            <div>
                                <label for="current-password" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.profile.current_password">当前密码</label>
                                <input type="password" id="current-password"
                                    class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="请输入当前密码" required>
                            </div>
                            <div>
                                <label for="new-password" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.profile.new_password">新密码</label>
                                <input type="password" id="new-password"
                                    class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="请输入新密码" required minlength="8">
                            </div>
                            <div>
                                <label for="confirm-new-password" class="block text-sm font-medium text-gray-700 mb-1" data-i18n="user.profile.confirm_new_password">确认新密码</label>
                                <input type="password" id="confirm-new-password"
                                    class="block w-full px-3 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    placeholder="请再次输入新密码" required>
                            </div>
                            <div id="password-error" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm"></div>
                            <div id="password-success" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-lg text-sm"></div>
                            <div class="flex justify-end pt-4">
                                <button type="submit" id="password-submit-btn"
                                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2.5 rounded-lg font-medium transition transform hover:scale-105">
                                    <span id="password-submit-text" data-i18n="user.profile.update_password">更新密码</span>
                                    <svg id="password-submit-spinner" class="hidden animate-spin h-5 w-5 mx-auto" viewBox="0 0 24 24">
                                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                    </svg>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="mobile-overlay" class="hidden fixed inset-0 bg-black/50 z-20 lg:hidden" onclick="toggleSidebar()"></div>

    <script src="/static/user.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            UserUI.initProfilePage();
        });
    </script>
</body>
</html>
{{end}}
