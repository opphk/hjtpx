<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统计分析 - CaptchaX 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .sidebar-link:hover {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
        }
        .sidebar-link.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%);
            border-left: 3px solid #3b82f6;
        }
        .tab-btn.active {
            @apply bg-blue-500 text-white;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex">
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-64 bg-white shadow-lg transform -translate-x-full lg:translate-x-0 transition-transform duration-300 z-30">
            <div class="h-full flex flex-col">
                <div class="p-6 border-b border-gray-100">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="font-bold text-gray-800">CaptchaX</h1>
                            <p class="text-xs text-gray-500">管理后台</p>
                        </div>
                    </div>
                </div>

                <nav class="flex-1 py-4 overflow-y-auto">
                    <div class="px-4 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">主菜单</div>
                    <a href="/admin/dashboard" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        仪表盘
                    </a>
                    <a href="/admin/stats" class="sidebar-link active flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                        统计分析
                    </a>
                    <a href="/admin/config" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        系统配置
                    </a>

                    <div class="px-4 mt-6 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">安全管控</div>
                    <a href="/admin/whitelist" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        白名单
                    </a>
                    <a href="/admin/blacklist" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                        黑名单
                    </a>
                </nav>

                <div class="p-4 border-t border-gray-100">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center">
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-700">管理员</p>
                                <p class="text-xs text-gray-500">在线</p>
                            </div>
                        </div>
                        <button id="logout-btn" class="p-2 text-gray-400 hover:text-red-500 transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-h-screen lg:ml-0">
            <header class="bg-white shadow-sm sticky top-0 z-20">
                <div class="flex items-center justify-between px-6 py-4">
                    <button id="mobile-menu-btn" class="lg:hidden p-2 text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 class="text-xl font-semibold text-gray-800">统计分析</h2>
                    <div class="flex items-center space-x-4">
                        <div class="flex bg-gray-100 rounded-lg p-1">
                            <button class="tab-btn active px-4 py-1.5 text-sm rounded-md transition" data-period="today">今日</button>
                            <button class="tab-btn px-4 py-1.5 text-sm rounded-md transition" data-period="week">本周</button>
                            <button class="tab-btn px-4 py-1.5 text-sm rounded-md transition" data-period="month">本月</button>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 p-6">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="bg-white rounded-xl p-4 shadow-sm">
                        <p class="text-sm text-gray-500 mb-1">总验证次数</p>
                        <p class="text-xl font-bold text-gray-800" id="total-verifications">0</p>
                        <p class="text-xs text-gray-400 mt-1">累计</p>
                    </div>
                    <div class="bg-white rounded-xl p-4 shadow-sm">
                        <p class="text-sm text-gray-500 mb-1">验证成功率</p>
                        <p class="text-xl font-bold text-green-600" id="success-rate">0%</p>
                        <p class="text-xs text-gray-400 mt-1">本周期</p>
                    </div>
                    <div class="bg-white rounded-xl p-4 shadow-sm">
                        <p class="text-sm text-gray-500 mb-1">拦截次数</p>
                        <p class="text-xl font-bold text-red-600" id="blocked-count">0</p>
                        <p class="text-xs text-gray-400 mt-1">本周期</p>
                    </div>
                    <div class="bg-white rounded-xl p-4 shadow-sm">
                        <p class="text-sm text-gray-500 mb-1">活跃IP数</p>
                        <p class="text-xl font-bold text-blue-600" id="active-ips">0</p>
                        <p class="text-xs text-gray-400 mt-1">本周期</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                    <div class="bg-white rounded-xl p-6 shadow-sm">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">验证码类型分布</h3>
                        <div class="h-72">
                            <canvas id="type-chart"></canvas>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl p-6 shadow-sm">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">验证结果统计</h3>
                        <div class="h-72">
                            <canvas id="result-chart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white rounded-xl p-6 shadow-sm">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-semibold text-gray-800">IP访问排行 TOP 20</h3>
                            <div class="flex items-center space-x-2">
                                <select id="ip-rank-filter" class="text-sm border border-gray-300 rounded-lg px-3 py-1">
                                    <option value="all">全部</option>
                                    <option value="blocked">已封禁</option>
                                    <option value="suspicious">可疑</option>
                                    <option value="normal">正常</option>
                                </select>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="text-left text-sm text-gray-500 border-b">
                                        <th class="pb-3 font-medium">排名</th>
                                        <th class="pb-3 font-medium">IP地址</th>
                                        <th class="pb-3 font-medium">验证次数</th>
                                        <th class="pb-3 font-medium">失败次数</th>
                                        <th class="pb-3 font-medium">成功率</th>
                                        <th class="pb-3 font-medium">状态</th>
                                    </tr>
                                </thead>
                                <tbody id="ip-ranking-body" class="text-sm divide-y divide-gray-100">
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl p-6 shadow-sm">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-semibold text-gray-800">每日验证趋势</h3>
                        </div>
                        <div class="h-64">
                            <canvas id="daily-trend-chart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl p-6 shadow-sm mt-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-gray-800">验证日志</h3>
                        <div class="flex items-center space-x-2">
                            <input type="text" id="log-search" placeholder="搜索IP地址或验证码ID"
                                class="text-sm border border-gray-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <select id="log-filter" class="text-sm border border-gray-300 rounded-lg px-3 py-1.5">
                                <option value="">全部类型</option>
                                <option value="slider">滑动验证</option>
                                <option value="click">点选验证</option>
                                <option value="rotate">旋转验证</option>
                            </select>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="text-left text-sm text-gray-500 border-b">
                                    <th class="pb-3 font-medium">时间</th>
                                    <th class="pb-3 font-medium">验证码ID</th>
                                    <th class="pb-3 font-medium">类型</th>
                                    <th class="pb-3 font-medium">IP地址</th>
                                    <th class="pb-3 font-medium">结果</th>
                                    <th class="pb-3 font-medium">耗时</th>
                                </tr>
                            </thead>
                            <tbody id="log-body" class="text-sm divide-y divide-gray-100">
                            </tbody>
                        </table>
                    </div>
                    <div id="log-pagination" class="mt-4"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let currentPeriod = 'today';

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentPeriod = this.dataset.period;
                    loadStatsData();
                });
            });

            async function loadStatsData() {
                try {
                    const [distribution, results, ipRanking] = await Promise.all([
                        AdminApi.stats.getCaptchaDistribution().catch(() => generateMockDistribution()),
                        AdminApi.stats.getResultStats().catch(() => generateMockResults()),
                        AdminApi.stats.getIpRanking(20).catch(() => generateMockIpRanking())
                    ]);

                    AdminCharts.initDistributionChart('type-chart', distribution);
                    AdminCharts.initResultChart('result-chart', results);

                    const total = distribution.reduce((sum, d) => sum + d.count, 0);
                    const success = results.find(r => r.result === '通过')?.count || 0;
                    const blocked = results.find(r => r.result === '拦截')?.count || 0;

                    document.getElementById('total-verifications').textContent = AdminUI.formatNumber(total);
                    document.getElementById('success-rate').textContent = total > 0 ? ((success / total) * 100).toFixed(1) + '%' : '0%';
                    document.getElementById('blocked-count').textContent = AdminUI.formatNumber(blocked);
                    document.getElementById('active-ips').textContent = AdminUI.formatNumber(ipRanking.length);

                    renderIpRanking(ipRanking);
                    renderLogTable();
                } catch (error) {
                    console.error('Failed to load stats:', error);
                }
            }

            function renderIpRanking(data) {
                const tbody = document.getElementById('ip-ranking-body');
                tbody.innerHTML = data.map((item, index) => {
                    const statusMap = {
                        '正常': '<span class="px-2 py-0.5 bg-green-100 text-green-600 rounded text-xs">正常</span>',
                        '可疑': '<span class="px-2 py-0.5 bg-yellow-100 text-yellow-600 rounded text-xs">可疑</span>',
                        '已封禁': '<span class="px-2 py-0.5 bg-red-100 text-red-600 rounded text-xs">已封禁</span>'
                    };
                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="py-3">${index + 1}</td>
                            <td class="py-3 font-mono text-blue-500">${item.ip}</td>
                            <td class="py-3">${AdminUI.formatNumber(item.total)}</td>
                            <td class="py-3">${AdminUI.formatNumber(item.failed)}</td>
                            <td class="py-3">${item.rate}%</td>
                            <td class="py-3">${statusMap[item.status] || statusMap['正常']}</td>
                        </tr>
                    `;
                }).join('');
            }

            function renderLogTable() {
                const tbody = document.getElementById('log-body');
                const mockLogs = generateMockLogs();
                tbody.innerHTML = mockLogs.map(log => {
                    const typeMap = {
                        'slider': '滑动验证',
                        'click': '点选验证',
                        'rotate': '旋转验证'
                    };
                    const resultMap = {
                        'success': '<span class="px-2 py-0.5 bg-green-100 text-green-600 rounded text-xs">通过</span>',
                        'failed': '<span class="px-2 py-0.5 bg-red-100 text-red-600 rounded text-xs">失败</span>',
                        'blocked': '<span class="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">拦截</span>'
                    };
                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="py-3 text-gray-500">${log.time}</td>
                            <td class="py-3 font-mono text-xs">${log.id}</td>
                            <td class="py-3">${typeMap[log.type] || log.type}</td>
                            <td class="py-3 font-mono text-xs">${log.ip}</td>
                            <td class="py-3">${resultMap[log.result] || log.result}</td>
                            <td class="py-3 text-gray-500">${log.duration}ms</td>
                        </tr>
                    `;
                }).join('');
            }

            function generateMockDistribution() {
                return [
                    { type: 'slider', count: 12540 },
                    { type: 'click', count: 8930 },
                    { type: 'rotate', count: 4560 }
                ];
            }

            function generateMockResults() {
                return [
                    { result: '通过', count: 22450 },
                    { result: '失败', count: 2100 },
                    { result: '拦截', count: 2480 }
                ];
            }

            function generateMockIpRanking() {
                const ips = [];
                const statuses = ['正常', '正常', '正常', '可疑', '可疑', '已封禁'];
                for (let i = 0; i < 20; i++) {
                    const total = Math.floor(Math.random() * 5000) + 100;
                    const failed = Math.floor(Math.random() * total * 0.3);
                    ips.push({
                        ip: `192.168.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}`,
                        total: total,
                        failed: failed,
                        rate: ((1 - failed / total) * 100).toFixed(1),
                        status: statuses[Math.floor(Math.random() * statuses.length)]
                    });
                }
                return ips.sort((a, b) => b.total - a.total);
            }

            function generateMockLogs() {
                const logs = [];
                const types = ['slider', 'click', 'rotate'];
                const results = ['success', 'failed', 'blocked'];
                for (let i = 0; i < 20; i++) {
                    const now = new Date();
                    now.setMinutes(now.getMinutes() - i * 5);
                    logs.push({
                        time: now.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
                        id: `cap_${Math.random().toString(36).substr(2, 12)}`,
                        type: types[Math.floor(Math.random() * types.length)],
                        ip: `192.168.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}`,
                        result: results[Math.floor(Math.random() * results.length)],
                        duration: Math.floor(Math.random() * 2000) + 200
                    });
                }
                return logs;
            }

            loadStatsData();

            const dailyData = {
                labels: [],
                datasets: [{
                    label: '验证次数',
                    data: [],
                    backgroundColor: 'rgba(59, 130, 246, 0.5)',
                    borderColor: 'rgba(59, 130, 246, 1)',
                    borderWidth: 2
                }]
            };

            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                dailyData.labels.push(date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }));
                dailyData.datasets[0].data.push(Math.floor(Math.random() * 10000) + 5000);
            }

            new Chart(document.getElementById('daily-trend-chart'), {
                type: 'bar',
                data: dailyData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        });
    </script>
</body>
</html>
