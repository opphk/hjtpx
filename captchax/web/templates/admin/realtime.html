<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="admin.realtime_monitor">实时监控 - CaptchaX 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .sidebar-link:hover {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
        }
        .sidebar-link.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%);
            border-left: 3px solid #3b82f6;
        }
        .stat-card {
            transition: all 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .pulse-dot {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        .realtime-indicator {
            animation: blink 1s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .data-update {
            animation: flash 0.5s ease;
        }
        @keyframes flash {
            0% { background-color: rgba(59, 130, 246, 0.2); }
            100% { background-color: transparent; }
        }
        .connection-status {
            transition: all 0.3s ease;
        }
    </style>
</head>

    <script src="/static/admin.js"></script>
    <script>
        const RealtimeMonitor = {
            ws: null,
            charts: {},
            chartData: {
                labels: [],
                verified: [],
                rejected: [],
                successRate: []
            },
            maxDataPoints: 60,
            reconnectAttempts: 0,
            maxReconnectAttempts: 10,
            reconnectDelay: 2000,

            init() {
                this.initCharts();
                this.loadInitialData();
                this.connectWebSocket();
                this.startTimeUpdater();
                this.bindEvents();
            },

            initCharts() {
                const chartColors = {
                    green: '#10b981',
                    red: '#ef4444',
                    blue: '#3b82f6',
                    purple: '#8b5cf6',
                    orange: '#f59e0b',
                    pink: '#ec4899'
                };

                this.charts.realtime = new Chart(document.getElementById('realtime-chart'), {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [
                            {
                                label: I18nHelper.t('admin.realtime.verified') || '成功',
                                data: [],
                                borderColor: chartColors.green,
                                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                                fill: true,
                                tension: 0.4
                            },
                            {
                                label: I18nHelper.t('admin.realtime.rejected') || '失败',
                                data: [],
                                borderColor: chartColors.red,
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                fill: true,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { intersect: false, mode: 'index' },
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                                padding: 12
                            }
                        },
                        scales: {
                            x: {
                                grid: { display: false },
                                ticks: { maxTicksLimit: 10 }
                            },
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: (value) => AdminUI.formatNumber(value)
                                }
                            }
                        },
                        animation: { duration: 300 }
                    }
                });

                this.charts.distribution = new Chart(document.getElementById('distribution-chart'), {
                    type: 'doughnut',
                    data: {
                        labels: [],
                        datasets: [{
                            data: [],
                            backgroundColor: [chartColors.blue, chartColors.purple, chartColors.pink, chartColors.orange],
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        }
                    }
                });

                this.charts.responseTime = new Chart(document.getElementById('response-time-chart'), {
                    type: 'bar',
                    data: {
                        labels: [],
                        datasets: [{
                            label: I18nHelper.t('admin.realtime.count') || '数量',
                            data: [],
                            backgroundColor: 'rgba(59, 130, 246, 0.6)',
                            borderColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { callback: (value) => AdminUI.formatNumber(value) }
                            }
                        }
                    }
                });

                this.charts.error = new Chart(document.getElementById('error-chart'), {
                    type: 'bar',
                    data: {
                        labels: [],
                        datasets: [{
                            label: I18nHelper.t('admin.realtime.count') || '数量',
                            data: [],
                            backgroundColor: 'rgba(239, 68, 68, 0.6)',
                            borderColor: 'rgba(239, 68, 68, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { callback: (value) => AdminUI.formatNumber(value) }
                            }
                        }
                    }
                });
            },

            async loadInitialData() {
                try {
                    const [stats, charts] = await Promise.all([
                        AdminApi.stats.getDashboard().catch(() => this.generateMockStats()),
                        AdminApi.stats.getCaptchaDistribution().catch(() => this.generateMockDistribution())
                    ]);

                    this.updateStats(stats);
                    this.updateDistribution(charts);
                } catch (error) {
                    console.error('Failed to load initial data:', error);
                }
            },

            connectWebSocket() {
                const token = localStorage.getItem('admin_token');
                if (!token) {
                    console.warn('No auth token found');
                    return;
                }

                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/admin/ws`;

                try {
                    this.ws = new WebSocket(wsUrl);

                    this.ws.onopen = () => {
                        this.updateConnectionStatus(true);
                        this.reconnectAttempts = 0;
                        this.ws.send(JSON.stringify({ type: 'auth', token }));
                    };

                    this.ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            this.handleMessage(data);
                        } catch (e) {
                            console.error('Failed to parse message:', e);
                        }
                    };

                    this.ws.onclose = () => {
                        this.updateConnectionStatus(false);
                        this.attemptReconnect();
                    };

                    this.ws.onerror = (error) => {
                        console.error('WebSocket error:', error);
                        this.updateConnectionStatus(false);
                    };
                } catch (error) {
                    console.error('Failed to connect WebSocket:', error);
                    this.updateConnectionStatus(false);
                }
            },

            attemptReconnect() {
                if (this.reconnectAttempts >= this.maxReconnectAttempts) {
                    console.log('Max reconnect attempts reached');
                    return;
                }

                this.reconnectAttempts++;
                const delay = this.reconnectDelay * Math.pow(1.5, this.reconnectAttempts - 1);

                setTimeout(() => {
                    this.connectWebSocket();
                }, delay);
            },

            handleMessage(data) {
                switch (data.type) {
                    case 'stats_update':
                        this.handleStatsUpdate(data.payload);
                        break;
                    case 'client_count':
                        this.updateConnections(data.payload.active_connections);
                        break;
                    case 'auth_success':
                        console.log('WebSocket authenticated');
                        break;
                }
            },

            handleStatsUpdate(payload) {
                this.updateStats({
                    requests_per_second: payload.requests_per_second,
                    success_rate: payload.success_rate,
                    total_verifications: payload.total_verifications,
                    verified: payload.verified,
                    rejected: payload.rejected,
                    active_connections: payload.active_connections
                });

                if (payload.chart_data) {
                    this.updateRealtimeChart(payload.chart_data);
                }

                if (payload.response_time_distribution) {
                    this.updateResponseTimeChart(payload.response_time_distribution);
                }

                if (payload.error_distribution) {
                    this.updateErrorChart(payload.error_distribution);
                }

                this.addActivityItem({
                    type: 'update',
                    message: `${I18nHelper.t('admin.realtime.stats_updated') || '统计数据已更新'}: ${AdminUI.formatNumber(payload.requests_per_second)} req/s`,
                    timestamp: new Date()
                });

                document.getElementById('last-update-time').textContent = new Date().toLocaleTimeString();
            },

            updateStats(stats) {
                const container = document.getElementById('stats-container');

                document.getElementById('stat-rps').textContent = AdminUI.formatNumber(stats.requests_per_second || 0);
                document.getElementById('stat-success-rate').textContent = (stats.success_rate || 0).toFixed(1) + '%';
                document.getElementById('stat-total').textContent = AdminUI.formatNumber(stats.total_verifications || 0);
                document.getElementById('stat-connections').textContent = stats.active_connections || 0;

                container.classList.add('data-update');
                setTimeout(() => container.classList.remove('data-update'), 500);
            },

            updateConnections(count) {
                document.getElementById('stat-connections').textContent = count;
            },

            updateRealtimeChart(data) {
                if (!data || !Array.isArray(data)) return;

                const labels = data.map(d => d.time || '');
                const verified = data.map(d => d.verified || 0);
                const rejected = data.map(d => d.rejected || 0);

                this.charts.realtime.data.labels = labels;
                this.charts.realtime.data.datasets[0].data = verified;
                this.charts.realtime.data.datasets[1].data = rejected;
                this.charts.realtime.update('none');
            },

            updateDistribution(data) {
                if (!data || !Array.isArray(data)) return;

                const labels = data.map(d => d.label || d.type || '');
                const counts = data.map(d => d.count || 0);

                this.charts.distribution.data.labels = labels;
                this.charts.distribution.data.datasets[0].data = counts;
                this.charts.distribution.update();

                const legendContainer = document.getElementById('distribution-legend');
                const colors = ['bg-blue-500', 'bg-purple-500', 'bg-pink-500', 'bg-orange-500'];
                legendContainer.innerHTML = data.map((item, i) => `
                    <div class="flex items-center justify-between text-sm">
                        <span class="flex items-center">
                            <span class="w-3 h-3 ${colors[i % colors.length]} rounded-full mr-2"></span>
                            <span>${item.label || item.type || ''}</span>
                        </span>
                        <span class="font-medium">${AdminUI.formatNumber(item.count || 0)}</span>
                    </div>
                `).join('');
            },

            updateResponseTimeChart(data) {
                if (!data || !Array.isArray(data)) return;

                const labels = data.map(d => d.bucket || '');
                const counts = data.map(d => d.count || 0);

                this.charts.responseTime.data.labels = labels;
                this.charts.responseTime.data.datasets[0].data = counts;
                this.charts.responseTime.update();
            },

            updateErrorChart(data) {
                if (!data || !Array.isArray(data)) return;

                const labels = data.map(d => d.error_type || '');
                const counts = data.map(d => d.count || 0);

                this.charts.error.data.labels = labels;
                this.charts.error.data.datasets[0].data = counts;
                this.charts.error.update();
            },

            addActivityItem(item) {
                const container = document.getElementById('activity-feed');
                const timeStr = item.timestamp.toLocaleTimeString();

                const itemHtml = `
                    <div class="flex items-start space-x-3 p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition">
                        <div class="w-2 h-2 bg-green-500 rounded-full mt-2"></div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm text-gray-800">${item.message}</p>
                            <p class="text-xs text-gray-500 mt-1">${timeStr}</p>
                        </div>
                    </div>
                `;

                const existing = container.querySelector('.text-center');
                if (existing) {
                    container.innerHTML = '';
                }

                container.insertAdjacentHTML('afterbegin', itemHtml);

                const items = container.querySelectorAll('.flex.items-start');
                if (items.length > 20) {
                    items[items.length - 1].remove();
                }
            },

            updateConnectionStatus(connected) {
                const statusEl = document.getElementById('connection-status');
                const dotEl = document.getElementById('status-dot');
                const textEl = document.getElementById('status-text');

                if (connected) {
                    statusEl.className = 'connection-status flex items-center space-x-2 px-3 py-1.5 bg-green-50 rounded-full';
                    dotEl.className = 'w-2 h-2 bg-green-500 rounded-full';
                    textEl.className = 'text-sm text-green-600';
                    textEl.textContent = I18nHelper.t('admin.realtime.connected') || '已连接';
                } else {
                    statusEl.className = 'connection-status flex items-center space-x-2 px-3 py-1.5 bg-red-50 rounded-full';
                    dotEl.className = 'w-2 h-2 bg-red-500 rounded-full';
                    textEl.className = 'text-sm text-red-600';
                    textEl.textContent = I18nHelper.t('admin.realtime.disconnected') || '未连接';
                }
            },

            startTimeUpdater() {
                const timeEl = document.getElementById('current-time');
                const updateTime = () => {
                    timeEl.textContent = new Date().toLocaleString(I18nHelper.currentLocale, {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                };
                updateTime();
                setInterval(updateTime, 1000);
            },

            bindEvents() {
                const mobileMenuBtn = document.getElementById('mobile-menu-btn');
                const sidebar = document.getElementById('sidebar');

                if (mobileMenuBtn && sidebar) {
                    mobileMenuBtn.addEventListener('click', () => {
                        sidebar.classList.toggle('-translate-x-full');
                    });
                }

                const logoutBtn = document.getElementById('logout-btn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', async () => {
                        const confirmed = await AdminUI.confirm(
                            I18nHelper.t('admin.logoutConfirm') || '确定要退出登录吗？'
                        );
                        if (confirmed) {
                            if (this.ws) {
                                this.ws.close();
                            }
                            localStorage.removeItem('admin_token');
                            window.location.href = '/admin/login';
                        }
                    });
                }
            },

            generateMockStats() {
                return {
                    requests_per_second: Math.floor(Math.random() * 100) + 50,
                    success_rate: 85 + Math.random() * 10,
                    total_verifications: Math.floor(Math.random() * 10000) + 5000,
                    verified: Math.floor(Math.random() * 8000) + 4000,
                    rejected: Math.floor(Math.random() * 2000) + 500,
                    active_connections: Math.floor(Math.random() * 10) + 1
                };
            },

            generateMockDistribution() {
                return [
                    { type: 'slider', label: I18nHelper.t('captcha.slider.title') || '滑动验证码', count: 5420 },
                    { type: 'click', label: I18nHelper.t('captcha.click.title') || '点击验证码', count: 3890 },
                    { type: 'rotate', label: I18nHelper.t('captcha.rotate.title') || '旋转验证码', count: 2560 }
                ];
            }
        };

        document.addEventListener('DOMContentLoaded', async function() {
            await I18nHelper.init();
            I18nHelper.initLanguageSwitcher();
            RealtimeMonitor.init();
        });
    </script>
</body>
</html>
