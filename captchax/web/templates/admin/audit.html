<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审计日志 - CaptchaX 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .sidebar-link:hover {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
        }
        .sidebar-link.active {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.2) 0%, transparent 100%);
            border-left: 3px solid #3b82f6;
        }
        .fade-in {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex">
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-64 bg-white shadow-lg transform -translate-x-full lg:translate-x-0 transition-transform duration-300 z-30">
            <div class="h-full flex flex-col">
                <div class="p-6 border-b border-gray-100">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                            </svg>
                        </div>
                        <div>
                            <h1 class="font-bold text-gray-800">CaptchaX</h1>
                            <p class="text-xs text-gray-500">管理后台</p>
                        </div>
                    </div>
                </div>
                <nav class="flex-1 py-4 overflow-y-auto">
                    <div class="px-4 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">主菜单</div>
                    <a href="/admin/dashboard" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                        </svg>
                        <span>仪表盘</span>
                    </a>
                    <a href="/admin/stats" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                        <span>统计分析</span>
                    </a>
                    <a href="/admin/users" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span>用户管理</span>
                    </a>
                    <a href="/admin/settings" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span>系统设置</span>
                    </a>
                    <a href="/admin/audit" class="sidebar-link active flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
                        </svg>
                        <span>审计日志</span>
                    </a>
                    <div class="px-4 mt-6 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">安全管控</div>
                    <a href="/admin/whitelist" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span>白名单</span>
                    </a>
                    <a href="/admin/blacklist" class="sidebar-link flex items-center px-6 py-3 text-gray-700 transition">
                        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                        <span>黑名单</span>
                    </a>
                </nav>
                <div class="p-4 border-t border-gray-100">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center">
                                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-700">管理员</p>
                                <p class="text-xs text-green-500 flex items-center">
                                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1"></span>
                                    <span>在线</span>
                                </p>
                            </div>
                        </div>
                        <a href="/admin/login" class="p-2 text-gray-400 hover:text-red-500 transition" title="退出登录">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-h-screen lg:ml-0">
            <header class="bg-white shadow-sm sticky top-0 z-20">
                <div class="flex items-center justify-between px-6 py-4">
                    <button id="mobile-menu-btn" class="lg:hidden p-2 text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h2 class="text-xl font-semibold text-gray-800">审计日志</h2>
                    <div class="flex items-center space-x-3">
                        <span class="text-sm text-gray-500" id="current-time"></span>
                    </div>
                </div>
            </header>

            <main class="flex-1 p-6">
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-6 gap-4">
                        <div class="flex flex-wrap items-center gap-3 w-full sm:w-auto">
                            <select id="action-filter" class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <option value="">所有操作</option>
                                <option value="create_user">创建用户</option>
                                <option value="update_user">更新用户</option>
                                <option value="delete_user">删除用户</option>
                                <option value="update_role">更新角色</option>
                                <option value="update_status">更新状态</option>
                                <option value="update_settings">更新设置</option>
                                <option value="login">登录</option>
                                <option value="logout">登出</option>
                            </select>
                            <div class="flex items-center space-x-2">
                                <input type="date" id="start-date" class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                                <span class="text-gray-500">至</span>
                                <input type="date" id="end-date" class="border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                            </div>
                        </div>
                        <button id="export-btn" class="px-4 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition flex items-center whitespace-nowrap">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                            </svg>
                            导出 CSV
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full">
                            <thead>
                                <tr class="text-left text-sm text-gray-500 border-b">
                                    <th class="pb-3 font-medium">时间</th>
                                    <th class="pb-3 font-medium">用户</th>
                                    <th class="pb-3 font-medium">操作</th>
                                    <th class="pb-3 font-medium">详情</th>
                                    <th class="pb-3 font-medium">IP 地址</th>
                                </tr>
                            </thead>
                            <tbody id="logs-table-body" class="text-sm">
                                <tr>
                                    <td colspan="5" class="py-8 text-center text-gray-500">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="flex items-center justify-between mt-6">
                        <div class="text-sm text-gray-500">
                            共 <span id="total-count">0</span> 条记录
                        </div>
                        <div class="flex items-center space-x-2" id="pagination-container">
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script>
        var API_BASE = '/admin/api';
        var token = localStorage.getItem('admin_token') || '';
        var currentPage = 1;
        var currentPageSize = 20;

        function apiFetch(url, options) {
            options = options || {};
            var headers = {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
                ...options.headers
            };
            return fetch(url, { ...options, headers: headers }).then(function(r) {
                if (r.status === 401) { window.location.href = '/admin/login'; throw new Error('Unauthorized'); }
                return r.json();
            });
        }

        function showToast(message, type) {
            type = type || 'success';
            var colors = { success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500' };
            var container = document.getElementById('toast-container');
            var toast = document.createElement('div');
            toast.className = (colors[type] || colors.success) + ' text-white px-4 py-3 rounded-lg shadow-lg text-sm fade-in';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        function loadLogs(page) {
            page = page || currentPage;
            currentPage = page;
            var action = document.getElementById('action-filter').value;
            var startDate = document.getElementById('start-date').value;
            var endDate = document.getElementById('end-date').value;

            var params = new URLSearchParams({ page: page, page_size: currentPageSize });
            if (action) params.set('action', action);
            if (startDate) params.set('start_date', startDate);
            if (endDate) params.set('end_date', endDate);

            apiFetch(API_BASE + '/audit-logs?' + params.toString())
                .then(function(data) {
                    if (data.code !== 0) { showToast(data.message || '加载失败', 'error'); return; }
                    renderLogs(data.data.items);
                    renderPagination(data.data.total, data.data.page, data.data.total_pages);
                    document.getElementById('total-count').textContent = data.data.total;
                })
                .catch(function() { showToast('加载日志失败', 'error'); });
        }

        function renderLogs(logs) {
            var tbody = document.getElementById('logs-table-body');
            if (!logs || logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="py-8 text-center text-gray-500">暂无数据</td></tr>';
                return;
            }
            var actionLabels = {
                create_user: '创建用户', update_user: '更新用户', delete_user: '删除用户',
                update_role: '更新角色', update_status: '更新状态', update_settings: '更新设置',
                login: '登录', logout: '登出'
            };
            tbody.innerHTML = logs.map(function(log) {
                var actionLabel = actionLabels[log.action] || log.action;
                var actionColor = log.action.indexOf('delete') >= 0 ? 'text-red-500' :
                    log.action.indexOf('create') >= 0 ? 'text-green-500' :
                    log.action.indexOf('update') >= 0 ? 'text-blue-500' : 'text-gray-500';
                return '<tr class="border-b border-gray-50 hover:bg-gray-50">' +
                    '<td class="py-3 text-gray-500 whitespace-nowrap">' + (log.created_at ? new Date(log.created_at).toLocaleString('zh-CN') : '-') + '</td>' +
                    '<td class="py-3 font-medium text-gray-800">' + escapeHtml(log.username || '-') + '</td>' +
                    '<td class="py-3 ' + actionColor + ' font-medium">' + actionLabel + '</td>' +
                    '<td class="py-3 text-gray-500 max-w-xs truncate">' + escapeHtml(log.detail || '-') + '</td>' +
                    '<td class="py-3 text-gray-400 font-mono text-xs">' + escapeHtml(log.ip_address || '-') + '</td>' +
                '</tr>';
            }).join('');
        }

        function renderPagination(total, page, totalPages) {
            var container = document.getElementById('pagination-container');
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            var html = '<button onclick="loadLogs(' + (page - 1) + ')" ' + (page <= 1 ? 'disabled class="px-3 py-1 border rounded text-gray-300 cursor-not-allowed"' : 'class="px-3 py-1 border rounded hover:bg-gray-50"') + '>上一页</button>';
            for (var i = 1; i <= totalPages; i++) {
                if (i === page) {
                    html += '<span class="px-3 py-1 bg-blue-500 text-white rounded">' + i + '</span>';
                } else {
                    html += '<button onclick="loadLogs(' + i + ')" class="px-3 py-1 border rounded hover:bg-gray-50">' + i + '</button>';
                }
            }
            html += '<button onclick="loadLogs(' + (page + 1) + ')" ' + (page >= totalPages ? 'disabled class="px-3 py-1 border rounded text-gray-300 cursor-not-allowed"' : 'class="px-3 py-1 border rounded hover:bg-gray-50"') + '>下一页</button>';
            container.innerHTML = html;
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function exportLogs() {
            var action = document.getElementById('action-filter').value;
            var startDate = document.getElementById('start-date').value;
            var endDate = document.getElementById('end-date').value;

            var params = new URLSearchParams();
            if (action) params.set('action', action);
            if (startDate) params.set('start_date', startDate);
            if (endDate) params.set('end_date', endDate);

            var url = API_BASE + '/audit-logs/export?' + params.toString();
            var headers = token ? { 'Authorization': 'Bearer ' + token } : {};
            fetch(url, { headers: headers }).then(function(r) {
                if (!r.ok) { showToast('导出失败', 'error'); return; }
                return r.blob();
            }).then(function(blob) {
                if (!blob) return;
                var a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'audit_logs_' + new Date().toISOString().split('T')[0] + '.csv';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast('导出成功');
            }).catch(function() { showToast('导出失败', 'error'); });
        }

        document.getElementById('action-filter').addEventListener('change', function() { loadLogs(1); });
        document.getElementById('start-date').addEventListener('change', function() { loadLogs(1); });
        document.getElementById('end-date').addEventListener('change', function() { loadLogs(1); });
        document.getElementById('export-btn').addEventListener('click', exportLogs);

        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            var sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        });

        function updateTime() {
            var now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
        updateTime();
        setInterval(updateTime, 1000);

        loadLogs(1);
    </script>
</body>
</html>
