                            </div>
                        </div>
                    </div>

                    <div class="settings-card bg-white rounded-xl p-6 shadow-sm">
                        <div class="flex items-center mb-6">
                            <div class="w-10 h-10 bg-purple-100 rounded-lg flex items-center justify-center mr-4">
                                <svg class="w-5 h-5 text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>

                            </div>
                            <div>
                                <h3 class="text-lg font-semibold text-gray-800">验证码设置</h3>

                                        <input type="checkbox" value="rotate" class="captcha-type-checkbox mr-2 rounded border-gray-300 text-blue-500 focus:ring-blue-500">
                                        <span class="text-sm text-gray-700">旋转验证码</span>

                    <div class="settings-card bg-white rounded-xl p-6 shadow-sm">

                                <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                                </svg>
                            </div>
                            <div>
                                <h3 class="text-lg font-semibold text-gray-800">通知设置</h3>
                                <p class="text-sm text-gray-500">配置通知渠道</p>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <label class="flex items-center justify-between">
                                <div>
                                    <span class="text-sm font-medium text-gray-700">邮件通知</span>
                                    <p class="text-xs text-gray-500">启用邮件通知功能</p>
                                </div>
                                <button id="email-toggle" class="toggle-switch relative inline-flex items-center h-6 w-11 rounded-full bg-gray-300" onclick="toggleEmailNotification()">
                                    <span class="toggle-dot inline-block w-4 h-4 transform bg-white rounded-full transition-transform translate-x-1"></span>
                                </button>
                            </label>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Webhook URL</label>
                                <input type="url" id="webhook-url" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="https://hooks.example.com/webhook">

                    <div class="flex items-center justify-end space-x-4">
                        <button id="reset-btn" class="px-6 py-2.5 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition">重置</button>
                        <button id="save-btn" class="px-6 py-2.5 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">保存设置</button>

    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script>
        var API_BASE = '/admin/api';
        var token = localStorage.getItem('admin_token') || '';
        var emailEnabled = false;

        function apiFetch(url, options) {
            options = options || {};
            var headers = {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
                ...options.headers
            };
            return fetch(url, { ...options, headers: headers }).then(function(r) {
                if (r.status === 401) { window.location.href = '/admin/login'; throw new Error('Unauthorized'); }
                return r.json();
            });
        }

        function showToast(message, type) {
            type = type || 'success';
            var colors = { success: 'bg-green-500', error: 'bg-red-500', warning: 'bg-yellow-500' };
            var container = document.getElementById('toast-container');
            var toast = document.createElement('div');
            toast.className = (colors[type] || colors.success) + ' text-white px-4 py-3 rounded-lg shadow-lg text-sm fade-in';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 3000);
        }

        function toggleEmailNotification() {
            emailEnabled = !emailEnabled;
            var btn = document.getElementById('email-toggle');
            var dot = btn.querySelector('.toggle-dot');
            if (emailEnabled) {
                btn.classList.remove('bg-gray-300');
                btn.classList.add('bg-green-500');
                dot.classList.remove('translate-x-1');
                dot.classList.add('translate-x-6');
            } else {
                btn.classList.remove('bg-green-500');
                btn.classList.add('bg-gray-300');
                dot.classList.remove('translate-x-6');
                dot.classList.add('translate-x-1');
            }
        }

        function loadSettings() {
            apiFetch(API_BASE + '/settings')
                .then(function(data) {
                    if (data.code !== 0) { showToast(data.message || '加载设置失败', 'error'); return; }
                    var s = data.data;
                    document.getElementById('site-name').value = s.site_name || '';
                    document.getElementById('site-description').value = s.site_description || '';
                    document.getElementById('jwt-expiry').value = s.jwt_expiry_hours || 24;
                    document.getElementById('min-password-length').value = s.min_password_length || 8;
                    document.getElementById('captcha-difficulty').value = s.captcha_difficulty || 'medium';
                    document.getElementById('webhook-url').value = s.webhook_url || '';

                    var types = (s.captcha_types || 'slider,click,rotate').split(',');
                    var checkboxes = document.querySelectorAll('.captcha-type-checkbox');
                    checkboxes.forEach(function(cb) { cb.checked = types.indexOf(cb.value) >= 0; });

                    emailEnabled = s.email_notification || false;
                    var btn = document.getElementById('email-toggle');
                    var dot = btn.querySelector('.toggle-dot');
                    if (emailEnabled) {
                        btn.classList.remove('bg-gray-300');
                        btn.classList.add('bg-green-500');
                        dot.classList.remove('translate-x-1');
                        dot.classList.add('translate-x-6');
                    }
                })
                .catch(function() { showToast('加载设置失败', 'error'); });
        }

        function saveSettings() {
            var checkboxes = document.querySelectorAll('.captcha-type-checkbox');
            var selectedTypes = [];
            checkboxes.forEach(function(cb) { if (cb.checked) selectedTypes.push(cb.value); });

            var body = {
                site_name: document.getElementById('site-name').value,
                site_description: document.getElementById('site-description').value,
                jwt_expiry_hours: parseInt(document.getElementById('jwt-expiry').value) || 24,
                min_password_length: parseInt(document.getElementById('min-password-length').value) || 8,
                captcha_difficulty: document.getElementById('captcha-difficulty').value,
                captcha_types: selectedTypes.join(','),
                email_notification: emailEnabled,
                webhook_url: document.getElementById('webhook-url').value
            };

            apiFetch(API_BASE + '/settings', {
                method: 'PUT',
                body: JSON.stringify(body)
            }).then(function(data) {
                if (data.code !== 0) { showToast(data.message || '保存失败', 'error'); return; }
                showToast('设置已保存');
                loadSettings();
            }).catch(function() { showToast('保存失败', 'error'); });
        }

        document.getElementById('save-btn').addEventListener('click', saveSettings);
        document.getElementById('reset-btn').addEventListener('click', loadSettings);

        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            var sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        });

        function updateTime() {
            var now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
        updateTime();
        setInterval(updateTime, 1000);

        loadSettings();
    </script>
</body>
</html>
