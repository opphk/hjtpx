    <script src="/static/admin.js"></script>
    <script>
        const AdminsPage = {
            currentPage: 1,
            pageSize: 20,
            totalItems: 0,
            currentAdmin: null,
            deleteCallback: null,

            async init() {
                await this.loadAdmins();
                this.bindEvents();
            },

            bindEvents() {
                document.getElementById('add-admin-btn').addEventListener('click', () => this.showAddModal());
                document.getElementById('close-modal').addEventListener('click', () => this.hideModal());
                document.getElementById('cancel-btn').addEventListener('click', () => this.hideModal());
                document.getElementById('save-btn').addEventListener('click', () => this.saveAdmin());
                document.getElementById('refresh-btn').addEventListener('click', () => this.loadAdmins());
                document.getElementById('confirm-cancel').addEventListener('click', () => this.hideConfirmModal());

                document.getElementById('search-input').addEventListener('input', this.debounce(() => {
                    this.currentPage = 1;
                    this.loadAdmins();
                }, 300));

                document.getElementById('role-filter').addEventListener('change', () => {
                    this.currentPage = 1;
                    this.loadAdmins();
                });

                document.getElementById('status-filter').addEventListener('change', () => {
                    this.currentPage = 1;
                    this.loadAdmins();
                });

                document.getElementById('confirm-delete').addEventListener('click', () => {
                    if (this.deleteCallback) this.deleteCallback();
                });

                document.getElementById('admin-modal').addEventListener('click', (e) => {
                    if (e.target.id === 'admin-modal') this.hideModal();
                });
                document.getElementById('confirm-modal').addEventListener('click', (e) => {
                    if (e.target.id === 'confirm-modal') this.hideConfirmModal();
                });
            },

            debounce(func, wait) {
                let timeout;
                return function(...args) {
                    clearTimeout(timeout);
                    timeout = setTimeout(() => func.apply(this, args), wait);
                };
            },

            async loadAdmins() {
                const search = document.getElementById('search-input').value;
                const role = document.getElementById('role-filter').value;
                const status = document.getElementById('status-filter').value;

                const params = new URLSearchParams({
                    page: this.currentPage,
                    page_size: this.pageSize
                });
                if (search) params.append('username', search);
                if (role) params.append('role', role);

                try {
                    const response = await fetch(`/admin/api/admins?${params}`, {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('admin_token')}` }
                    });
                    const result = await response.json();
                    if (result.code === 0) {
                        this.renderAdmins(result.data.items);
                        this.renderPagination(result.data.total, result.data.page, result.data.page_size);
                    }
                } catch (error) {
                    console.error('Failed to load admins:', error);
                    this.showToast('加载失败', 'error');
                }
            },

            renderAdmins(admins) {
                const tbody = document.getElementById('admins-table');
                if (!admins || admins.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-gray-500">暂无数据</td></tr>`;
                    return;
                }

                tbody.innerHTML = admins.map(admin => `
                    <tr class="table-row">
                        <td class="px-6 py-4">
                            <div class="flex items-center">
                                <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center mr-3">
                                    <span class="text-blue-600 font-medium">${admin.username.charAt(0).toUpperCase()}</span>
                                </div>
                                <div>
                                    <div class="font-medium text-gray-800">${admin.username}</div>
                                    ${admin.nickname ? `<div class="text-sm text-gray-500">${admin.nickname}</div>` : ''}
                                </div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-gray-600">${admin.email || '-'}</td>
                        <td class="px-6 py-4">
                            <span class="px-2 py-1 text-xs rounded ${this.getRoleBadgeClass(admin.role)}">${this.getRoleName(admin.role)}</span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="status-badge ${admin.status === 1 ? 'status-active' : 'status-inactive'}">
                                ${admin.status === 1 ? '启用' : '禁用'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-gray-600 text-sm">
                            ${admin.last_login_at ? new Date(admin.last_login_at).toLocaleString() : '从未登录'}
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex space-x-2">
                                <button onclick="AdminsPage.editAdmin(${admin.id})" class="p-1 text-gray-400 hover:text-blue-500" title="编辑">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                                    </svg>
                                </button>
                                <button onclick="AdminsPage.confirmDelete(${admin.id}, '${admin.username}')" class="p-1 text-gray-400 hover:text-red-500" title="删除">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            },

            getRoleBadgeClass(role) {
                const classes = {
                    'super_admin': 'bg-purple-100 text-purple-700',
                    'admin': 'bg-blue-100 text-blue-700',
                    'operator': 'bg-green-100 text-green-700',
                    'viewer': 'bg-gray-100 text-gray-700'
                };
                return classes[role] || 'bg-gray-100 text-gray-700';
            },

            getRoleName(role) {
                const names = {
                    'super_admin': '超级管理员',
                    'admin': '管理员',
                    'operator': '操作员',
                    'viewer': '访客'
                };
                return names[role] || role;
            },

            renderPagination(total, page, pageSize) {
                this.totalItems = total;
                const totalPages = Math.ceil(total / pageSize);
                const start = (page - 1) * pageSize + 1;
                const end = Math.min(page * pageSize, total);

                document.getElementById('page-start').textContent = total > 0 ? start : 0;
                document.getElementById('page-end').textContent = end;
                document.getElementById('total-count').textContent = total;

                const pagination = document.getElementById('pagination');
                let html = '';

                if (totalPages <= 1) {
                    pagination.innerHTML = '';
                    return;
                }

                html += `<button onclick="AdminsPage.goToPage(${page - 1})" ${page === 1 ? 'disabled' : ''} class="px-3 py-1 rounded ${page === 1 ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-gray-100 hover:bg-gray-200'}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>`;

                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
                        html += `<button onclick="AdminsPage.goToPage(${i})" class="px-3 py-1 rounded ${i === page ? 'bg-blue-500 text-white' : 'bg-gray-100 hover:bg-gray-200'}">${i}</button>`;
                    } else if (i === page - 3 || i === page + 3) {
                        html += '<span class="px-2">...</span>';
                    }
                }

                html += `<button onclick="AdminsPage.goToPage(${page + 1})" ${page === totalPages ? 'disabled' : ''} class="px-3 py-1 rounded ${page === totalPages ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-gray-100 hover:bg-gray-200'}">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>`;

                pagination.innerHTML = html;
            },

            goToPage(page) {
                this.currentPage = page;
                this.loadAdmins();
            },

            showAddModal() {
                document.getElementById('modal-title').textContent = '添加管理员';
                document.getElementById('admin-form').reset();
                document.getElementById('admin-id').value = '';
                document.getElementById('password').required = true;
                document.getElementById('admin-modal').classList.remove('hidden');
            },

            async editAdmin(id) {
                try {
                    const response = await fetch(`/admin/api/admins/${id}`, {
                        headers: { 'Authorization': `Bearer ${localStorage.getItem('admin_token')}` }
                    });
                    const result = await response.json();
                    if (result.code === 0) {
                        this.currentAdmin = result.data;
                        document.getElementById('modal-title').textContent = '编辑管理员';
                        document.getElementById('admin-id').value = result.data.id;
                        document.getElementById('username').value = result.data.username;
                        document.getElementById('email').value = result.data.email || '';
                        document.getElementById('nickname').value = result.data.nickname || '';
                        document.getElementById('phone').value = result.data.phone || '';
                        document.getElementById('department').value = result.data.department || '';
                        document.getElementById('role').value = result.data.role;
                        document.getElementById('notes').value = result.data.notes || '';
                        document.getElementById('password').required = false;
                        document.getElementById('admin-modal').classList.remove('hidden');
                    }
                } catch (error) {
                    console.error('Failed to load admin:', error);
                    this.showToast('加载失败', 'error');
                }
            },

            hideModal() {
                document.getElementById('admin-modal').classList.add('hidden');
                this.currentAdmin = null;
            },

            async saveAdmin() {
                const id = document.getElementById('admin-id').value;
                const data = {
                    username: document.getElementById('username').value,
                    email: document.getElementById('email').value,
                    nickname: document.getElementById('nickname').value,
                    phone: document.getElementById('phone').value,
                    department: document.getElementById('department').value,
                    role: document.getElementById('role').value,
                    notes: document.getElementById('notes').value
                };

                const password = document.getElementById('password').value;
                if (password) {
                    data.password = password;
                }

                const url = id ? `/admin/api/admins/${id}` : '/admin/api/admins';
                const method = id ? 'PUT' : 'POST';

                try {
                    const response = await fetch(url, {
                        method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('admin_token')}`
                        },
                        body: JSON.stringify(data)
                    });
                    const result = await response.json();
                    if (result.code === 0) {
                        this.hideModal();
                        this.loadAdmins();
                        this.showToast(id ? '更新成功' : '创建成功', 'success');
                    } else {
                        this.showToast(result.message || '操作失败', 'error');
                    }
                } catch (error) {
                    console.error('Failed to save admin:', error);
                    this.showToast('操作失败', 'error');
                }
            },

            confirmDelete(id, username) {
                this.deleteCallback = async () => {
                    try {
                        const response = await fetch(`/admin/api/admins/${id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${localStorage.getItem('admin_token')}` }
                        });
                        const result = await response.json();
                        if (result.code === 0) {
                            this.hideConfirmModal();
                            this.loadAdmins();
                            this.showToast('删除成功', 'success');
                        } else {
                            this.showToast(result.message || '删除失败', 'error');
                        }
                    } catch (error) {
                        console.error('Failed to delete admin:', error);
                        this.showToast('删除失败', 'error');
                    }
                };
                document.getElementById('confirm-message').textContent = `确定要删除管理员 "${username}" 吗？此操作无法撤销。`;
                document.getElementById('confirm-modal').classList.remove('hidden');
            },

            hideConfirmModal() {
                document.getElementById('confirm-modal').classList.add('hidden');
                this.deleteCallback = null;
            },

            showToast(message, type = 'info') {
                const toast = document.getElementById('toast');
                const toastMessage = document.getElementById('toast-message');
                toastMessage.textContent = message;
                toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 z-50 ${type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-gray-800'} text-white`;
                toast.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            }
        };

        document.addEventListener('DOMContentLoaded', () => AdminsPage.init());
    </script>
</body>
</html>
