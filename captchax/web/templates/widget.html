<div class="captchax-widget">
    <div class="captchax-header">
        <span class="captchax-title">安全验证</span>
        <button type="button" class="captchax-close" aria-label="关闭">×</button>
    </div>
    <div class="captchax-body"></div>
    <div class="captchax-footer"></div>
</div>

<template id="captchax-slider-template">
    <div class="captchax-slider-container">
        <div class="captchax-slider-bg-wrapper">
            <img class="captchax-slider-bg" alt="验证码背景" draggable="false" />
        </div>
        <div class="captchax-slider-puzzle-wrapper">
            <img class="captchax-slider-puzzle" alt="拼图滑块" draggable="false" />
        </div>
        <div class="captchax-slider-track">
            <div class="captchax-slider-bar">
                <div class="captchax-slider-thumb">
                    <div class="captchax-slider-arrow">
                        <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
                            <path d="M6 0L12 6L6 12L0 6L6 0Z"/>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
        <div class="captchax-slider-tip">
            <span class="captchax-tip-icon">🔓</span>
            <span class="captchax-tip-text">拖动滑块完成验证</span>
        </div>
    </div>
</template>

<template id="captchax-click-template">
    <div class="captchax-click-container">
        <div class="captchax-click-image-wrapper">
            <img class="captchax-click-image" alt="点选验证码" draggable="false" />
            <div class="captchax-click-markers"></div>
        </div>
        <div class="captchax-click-instruction">
            <span class="captchax-instruction-text">请依次点击：</span>
            <span class="captchax-target-chars"></span>
            <button type="button" class="captchax-refresh-btn" title="刷新验证码">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M14 8c0-3.314-2.686-6-6-6v2l-4-4 4-4v2c4.418 0 8 3.582 8 8s-3.582 8-8 8c-1.5 0-2.898-.42-4.08-1.14l1.44-1.44A5.98 5.98 0 0 0 8 14c3.314 0 6-2.686 6-6z"/>
                    <path d="M2 8c0 1.5.42 2.898 1.14 4.08l-1.44 1.44A5.98 5.98 0 0 0 2 8z"/>
                </svg>
            </button>
        </div>
        <div class="captchax-click-progress">
            <span class="captchax-progress-text">已点击: <span class="captchax-clicked-count">0</span>/<span class="captchax-total-count">4</span></span>
            <div class="captchax-progress-bar">
                <div class="captchax-progress-fill"></div>
            </div>
        </div>
    </div>
</template>

<template id="captchax-rotate-template">
    <div class="captchax-rotate-container">
        <div class="captchax-rotate-image-wrapper">
            <img class="captchax-rotate-image" alt="旋转验证码" draggable="false" />
            <div class="captchax-rotate-handle"></div>
        </div>
        <div class="captchax-rotate-controls">
            <div class="captchax-rotate-slider-wrapper">
                <input type="range" class="captchax-rotate-slider" min="0" max="360" value="0" />
                <div class="captchax-rotate-value-display">
                    <span class="captchax-rotate-value">0</span>
                    <span class="captchax-rotate-unit">°</span>
                </div>
            </div>
            <button type="button" class="captchax-rotate-verify-btn">
                <span>确认旋转</span>
            </button>
        </div>
    </div>
</template>

<template id="captchax-loading-template">
    <div class="captchax-loading">
        <div class="captchax-loading-spinner">
            <div class="captchax-spinner-ring"></div>
            <div class="captchax-spinner-ring"></div>
            <div class="captchax-spinner-ring"></div>
        </div>
        <span class="captchax-loading-text">加载中...</span>
    </div>
</template>

<template id="captchax-error-template">
    <div class="captchax-error">
        <div class="captchax-error-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="#ff4d4f">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
        </div>
        <span class="captchax-error-text">加载失败</span>
        <button type="button" class="captchax-retry-btn">重新加载</button>
    </div>
</template>

<template id="captchax-success-template">
    <div class="captchax-success">
        <div class="captchax-success-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="#52c41a">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
        </div>
        <span class="captchax-success-text">验证成功</span>
    </div>
</template>

<template id="captchax-expired-template">
    <div class="captchax-expired">
        <div class="captchax-expired-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="#faad14">
                <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.2 3.2.8-1.3-4.5-2.7V7z"/>
            </svg>
        </div>
        <span class="captchax-expired-text">验证码已过期</span>
        <button type="button" class="captchax-refresh-btn">刷新验证码</button>
    </div>
</template>

<template id="captchax-fail-template">
    <div class="captchax-fail">
        <div class="captchax-fail-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="#ff4d4f">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
            </svg>
        </div>
        <span class="captchax-fail-text">验证失败，请重试</span>
        <button type="button" class="captchax-retry-btn">重新验证</button>
    </div>
</template>
