server:
  port: 8080
  mode: debug

database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: captchax
  sslmode: disable
  max_open_conns: 100
  max_idle_conns: 10

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 100

jwt:
  secret: your-jwt-secret-key-change-in-production
  expire: 24h

optimization:
  image_cache:
    max_size: 1000
    ttl: 10m
    enabled: true

  rate_limit:
    enabled: true
    requests_per_sec: 100
    burst_size: 200

  circuit_breaker:
    failure_threshold: 5
    success_threshold: 2
    timeout: 30s
