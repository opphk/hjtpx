<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptchaX 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .header h1 {
            font-size: 20px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .user-info span {
            font-size: 14px;
        }
        .btn-logout {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .container {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .stat-card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }
        .stat-card .value {
            color: #333;
            font-size: 32px;
            font-weight: 700;
        }
        .stat-card .sub {
            color: #999;
            font-size: 12px;
            margin-top: 4px;
        }
        .section {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }
        .section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .config-list {
            list-style: none;
        }
        .config-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .config-item:last-child {
            border-bottom: none;
        }
        .config-item .label {
            color: #666;
        }
        .config-item .value {
            color: #333;
            font-weight: 500;
        }
        .toggle-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .toggle-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }
        .toggle-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>CaptchaX 管理后台</h1>
        <div class="user-info">
            <span id="username">-</span>
            <button class="btn-logout" onclick="logout()">退出登录</button>
        </div>
    </header>

    <div class="container">
        <div id="error" class="error hidden"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>总验证次数</h3>
                <div class="value" id="total-count">-</div>
                <div class="sub">近7天</div>
            </div>
            <div class="stat-card">
                <h3>成功率</h3>
                <div class="value" id="success-rate">-</div>
                <div class="sub">近7天</div>
            </div>
            <div class="stat-card">
                <h3>白名单</h3>
                <div class="value" id="whitelist-count">-</div>
                <div class="sub">IP数量</div>
            </div>
            <div class="stat-card">
                <h3>黑名单</h3>
                <div class="value" id="blacklist-count">-</div>
                <div class="sub">IP数量</div>
            </div>
        </div>

        <div class="section">
            <h2>时间范围</h2>
            <div class="toggle-group">
                <button class="toggle-btn" onclick="loadStats('24h')">24小时</button>
                <button class="toggle-btn active" onclick="loadStats('7d')">7天</button>
                <button class="toggle-btn" onclick="loadStats('30d')">30天</button>
                <button class="toggle-btn" onclick="loadStats('90d')">90天</button>
            </div>
        </div>

        <div class="section">
            <h2>系统配置</h2>
            <ul class="config-list" id="config-list">
                <li class="loading">加载中...</li>
            </ul>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('admin_token');
        if (!token) {
            window.location.href = '/admin/login';
        }

        function showError(message) {
            const el = document.getElementById('error');
            el.textContent = message;
            el.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('error').classList.add('hidden');
        }

        function logout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            window.location.href = '/admin/login';
        }

        async function apiRequest(url, options = {}) {
            const response = await fetch(url, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });

            const data = await response.json();
            if (data.code !== 0) {
                if (response.status === 401) {
                    logout();
                }
                throw new Error(data.message || '请求失败');
            }
            return data;
        }

        async function loadDashboard() {
            try {
                hideError();
                const user = JSON.parse(localStorage.getItem('admin_user') || '{}');
                document.getElementById('username').textContent = user.username || '-';

                const data = await apiRequest('/admin/api/dashboard');

                if (data.data.captcha_stats) {
                    document.getElementById('total-count').textContent = data.data.captcha_stats.total_count || 0;
                    document.getElementById('success-rate').textContent =
                        (data.data.captcha_stats.success_rate || 0).toFixed(1) + '%';
                }

                if (data.data.whitelist_count !== undefined) {
                    document.getElementById('whitelist-count').textContent = data.data.whitelist_count;
                }
                if (data.data.blacklist_count !== undefined) {
                    document.getElementById('blacklist-count').textContent = data.data.blacklist_count;
                }

                await loadConfig();
            } catch (error) {
                showError(error.message);
            }
        }

        async function loadStats(period) {
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            try {
                const data = await apiRequest(`/admin/api/stats?period=${period}`);
                if (data.data.captcha_stats) {
                    document.getElementById('total-count').textContent = data.data.captcha_stats.total_count || 0;
                    document.getElementById('success-rate').textContent =
                        (data.data.captcha_stats.success_rate || 0).toFixed(1) + '%';
                }
            } catch (error) {
                showError(error.message);
            }
        }

        async function loadConfig() {
            try {
                const data = await apiRequest('/admin/api/config');
                const list = document.getElementById('config-list');

                if (data.data.configs && data.data.configs.length > 0) {
                    list.innerHTML = data.data.configs.map(cfg => `
                        <li class="config-item">
                            <span class="label">${cfg.key}</span>
                            <span class="value">${cfg.value}</span>
                        </li>
                    `).join('');
                } else {
                    list.innerHTML = '<li class="config-item"><span>暂无配置</span></li>';
                }
            } catch (error) {
                document.getElementById('config-list').innerHTML =
                    '<li class="error">' + error.message + '</li>';
            }
        }

        loadDashboard();
    </script>
</body>
</html>
