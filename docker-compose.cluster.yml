version: '3.8'

services:
  app-node1:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=${BUILD_ENV:-production}
        - NODE_ID=node-1
    container_name: hjtpx-app-node1
    hostname: node1
    restart: unless-stopped
    ports:
      - "${APP_NODE1_PORT:-8081}:8080"
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - SERVER_PORT=8080
      - NODE_ID=node-1
      - NODE_ROLE=primary
      - CLUSTER_ENABLED=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-hjtpx_db}
      - POSTGRES_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      - HA_ENABLED=true
      - HEALTH_CHECK_INTERVAL=10s
      - FAILOVER_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-logs-node1:/var/log/hjtpx
      - ./backend/config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/ha"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '${APP_CPU_LIMIT:-1.0}'
          memory: ${APP_MEMORY_LIMIT:-512M}
        reservations:
          cpus: '${APP_CPU_RESERVE:-0.5}'
          memory: ${APP_MEMORY_RESERVE:-256M}
      placement:
        constraints:
          - node.role == manager
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
    shm_size: 128M
    networks:
      - hjtpx-cluster-network
    extra_hosts:
      - "node1:${NODE1_IP:-10.0.0.11}"
      - "node2:${NODE2_IP:-10.0.0.12}"
      - "node3:${NODE3_IP:-10.0.0.13}"

  app-node2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=${BUILD_ENV:-production}
        - NODE_ID=node-2
    container_name: hjtpx-app-node2
    hostname: node2
    restart: unless-stopped
    ports:
      - "${APP_NODE2_PORT:-8082}:8080"
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - SERVER_PORT=8080
      - NODE_ID=node-2
      - NODE_ROLE=secondary
      - CLUSTER_ENABLED=true
      - CLUSTER_SEEDS=node1:7946
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-hjtpx_db}
      - POSTGRES_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      - HA_ENABLED=true
      - HEALTH_CHECK_INTERVAL=10s
      - FAILOVER_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-logs-node2:/var/log/hjtpx
      - ./backend/config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/ha"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '${APP_CPU_LIMIT:-1.0}'
          memory: ${APP_MEMORY_LIMIT:-512M}
        reservations:
          cpus: '${APP_CPU_RESERVE:-0.5}'
          memory: ${APP_MEMORY_RESERVE:-256M}
      placement:
        constraints:
          - node.role == worker
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
    shm_size: 128M
    networks:
      - hjtpx-cluster-network
    extra_hosts:
      - "node1:${NODE1_IP:-10.0.0.11}"
      - "node2:${NODE2_IP:-10.0.0.12}"
      - "node3:${NODE3_IP:-10.0.0.13}"
    profiles:
      - cluster

  app-node3:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=${BUILD_ENV:-production}
        - NODE_ID=node-3
    container_name: hjtpx-app-node3
    hostname: node3
    restart: unless-stopped
    ports:
      - "${APP_NODE3_PORT:-8083}:8080"
    environment:
      - GIN_MODE=${GIN_MODE:-release}
      - SERVER_PORT=8080
      - NODE_ID=node-3
      - NODE_ROLE=secondary
      - CLUSTER_ENABLED=true
      - CLUSTER_SEEDS=node1:7946
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-hjtpx_db}
      - POSTGRES_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-24}
      - HA_ENABLED=true
      - HEALTH_CHECK_INTERVAL=10s
      - FAILOVER_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app-logs-node3:/var/log/hjtpx
      - ./backend/config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health/ha"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '${APP_CPU_LIMIT:-1.0}'
          memory: ${APP_MEMORY_LIMIT:-512M}
        reservations:
          cpus: '${APP_CPU_RESERVE:-0.5}'
          memory: ${APP_MEMORY_RESERVE:-256M}
      placement:
        constraints:
          - node.role == worker
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
    shm_size: 128M
    networks:
      - hjtpx-cluster-network
    extra_hosts:
      - "node1:${NODE1_IP:-10.0.0.11}"
      - "node2:${NODE2_IP:-10.0.0.12}"
      - "node3:${NODE3_IP:-10.0.0.13}"
    profiles:
      - cluster

  postgres:
    image: postgres:16-alpine
    container_name: hjtpx-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-hjtpx_db}
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_MAX_CONNECTIONS=200
      - POSTGRES_SHARED_BUFFERS=256MB
      - POSTGRES_EFFECTIVE_CACHE_SIZE=512MB
      - POSTGRES_MAINTENANCE_WORK_MEM=64MB
      - POSTGRES_CHECKPOINT_COMPLETION_TARGET=0.9
      - POSTGRES_WAL_BUFFERS=16MB
      - POSTGRES_DEFAULT_STATISTICS_TARGET=100
      - POSTGRES_RANDOM_PAGE_COST=1.1
      - POSTGRES_EFFECTIVE_IO_CONCURRENCY=200
      - POSTGRES_WORK_MEM=5MB
      - POSTGRES_MIN_WAL_SIZE=1GB
      - POSTGRES_MAX_WAL_SIZE=4GB
    volumes:
      - postgres-primary:/var/lib/postgresql/data
      - postgres-replica1:/var/lib/postgresql/replica1
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    command: >
      postgres
      -c synchronous_commit=on
      -c synchronous_standby_names='replica1'
      -c max_wal_senders=10
      -c wal_level=replica
      -c hot_standby=on
      -c archive_mode=on
      -c archive_command='/bin/true'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hjtpx_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '${POSTGRES_CPU_LIMIT:-1.5}'
          memory: ${POSTGRES_MEMORY_LIMIT:-1G}
        reservations:
          cpus: '${POSTGRES_CPU_RESERVE:-0.5}'
          memory: ${POSTGRES_MEMORY_RESERVE:-512M}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
        compress: "true"
    shm_size: 256M
    networks:
      - hjtpx-cluster-network

  postgres-replica:
    image: postgres:16-alpine
    container_name: hjtpx-postgres-replica
    restart: unless-stopped
    ports:
      - "${POSTGRES_REPLICA_PORT:-5433}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-hjtpx_db}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-replica1:/var/lib/postgresql/data
    command: >
      postgres
      -c primary_conninfo=host=postgres port=5432 user=${POSTGRES_USER:-postgres} password=${POSTGRES_PASSWORD:-postgres}
      -c hot_standby=on
      -c max_standby_streaming_delay=30s
      -c wal_receiver_status_interval=10s
      -c hot_standby_feedback=on
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '${POSTGRES_CPU_LIMIT:-1.0}'
          memory: ${POSTGRES_MEMORY_LIMIT:-768M}
        reservations:
          cpus: '${POSTGRES_CPU_RESERVE:-0.25}'
          memory: ${POSTGRES_MEMORY_RESERVE:-256M}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
        compress: "true"
    shm_size: 256M
    networks:
      - hjtpx-cluster-network
    profiles:
      - cluster

  redis:
    image: redis:7-alpine
    container_name: hjtpx-redis
    restart: unless-stopped
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --replica-read-only yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPU_LIMIT:-0.5}'
          memory: ${REDIS_MEMORY_LIMIT:-512M}
        reservations:
          cpus: '${REDIS_CPU_RESERVE:-0.25}'
          memory: ${REDIS_MEMORY_RESERVE:-128M}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
    networks:
      - hjtpx-cluster-network

  redis-replica:
    image: redis:7-alpine
    container_name: hjtpx-redis-replica
    restart: unless-stopped
    ports:
      - "${REDIS_REPLICA_PORT:-6380}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --replicaof redis 6379
      --maxmemory ${REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-replica-data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPU_LIMIT:-0.5}'
          memory: ${REDIS_MEMORY_LIMIT:-512M}
        reservations:
          cpus: '${REDIS_CPU_RESERVE:-0.25}'
          memory: ${REDIS_MEMORY_RESERVE:-128M}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
    networks:
      - hjtpx-cluster-network
    profiles:
      - cluster

  nginx:
    image: nginx:1.25-alpine
    container_name: hjtpx-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
      - ./frontend/static:/usr/share/nginx/html/static:ro
      - ./admin/static:/usr/share/nginx/html/admin/static:ro
    depends_on:
      - app-node1
      - app-node2
      - app-node3
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '${NGINX_CPU_LIMIT:-0.5}'
          memory: ${NGINX_MEMORY_LIMIT:-256M}
        reservations:
          cpus: '${NGINX_CPU_RESERVE:-0.25}'
          memory: ${NGINX_MEMORY_RESERVE:-128M}
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
    networks:
      - hjtpx-cluster-network

  nginx-cluster:
    image: nginx:1.25-alpine
    container_name: hjtpx-nginx-cluster
    restart: unless-stopped
    ports:
      - "${NGINX_CLUSTER_PORT:-8080}:80"
      - "${NGINX_CLUSTER_SSL_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx-cluster.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cluster-logs:/var/log/nginx
      - ./frontend/static:/usr/share/nginx/html/static:ro
      - ./admin/static:/usr/share/nginx/html/admin/static:ro
    depends_on:
      - app-node1
      - app-node2
      - app-node3
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '${NGINX_CPU_LIMIT:-1.0}'
          memory: ${NGINX_MEMORY_LIMIT:-512M}
        reservations:
          cpus: '${NGINX_CPU_RESERVE:-0.5}'
          memory: ${NGINX_MEMORY_RESERVE:-256M}
      replicas: 2
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        compress: "true"
    networks:
      - hjtpx-cluster-network
    profiles:
      - cluster

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: hjtpx-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/cluster-rules.yml:/etc/prometheus/cluster-rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.wal-compression'
      - '--query.max-concurrency=10'
    networks:
      - hjtpx-cluster-network

  grafana:
    image: grafana/grafana:10.2.2
    container_name: hjtpx-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - hjtpx-cluster-network

  loki:
    image: grafana/loki:2.9.3
    container_name: hjtpx-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki.yml
    networks:
      - hjtpx-cluster-network

  promtail:
    image: grafana/promtail:2.9.3
    container_name: hjtpx-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log:/var/log:ro
      - nginx-logs:/var/log/nginx:ro
      - nginx-cluster-logs:/var/log/nginx-cluster:ro
    depends_on:
      - loki
    networks:
      - hjtpx-cluster-network

networks:
  hjtpx-cluster-network:
    driver: bridge
    name: hjtpx-cluster-network
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

volumes:
  postgres-primary:
    driver: local
    name: hjtpx-postgres-primary
  postgres-replica1:
    driver: local
    name: hjtpx-postgres-replica1
  redis-data:
    driver: local
    name: hjtpx-redis-data
  redis-replica-data:
    driver: local
    name: hjtpx-redis-replica-data
  app-logs-node1:
    driver: local
    name: hjtpx-app-logs-node1
  app-logs-node2:
    driver: local
    name: hjtpx-app-logs-node2
  app-logs-node3:
    driver: local
    name: hjtpx-app-logs-node3
  prometheus-data:
    driver: local
    name: hjtpx-prometheus-data
  grafana-data:
    driver: local
    name: hjtpx-grafana-data
  loki-data:
    driver: local
    name: hjtpx-loki-data
  nginx-logs:
    driver: local
    name: hjtpx-nginx-logs
  nginx-cluster-logs:
    driver: local
    name: hjtpx-nginx-cluster-logs
