user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

stream {
    log_format stream_log '$remote_addr [$time_local] '
                         '$protocol $status $bytes_sent $bytes_received '
                         '$session_time "$upstream_addr" '
                         '"$upstream_bytes_sent" "$upstream_bytes_received" "$upstream_connect_time"';

    access_log /var/log/nginx/stream-access.log stream_log;

    upstream backend_servers {
        least_conn;

        server app-node1:8080 max_fails=3 fail_timeout=30s;
        server app-node2:8080 max_fails=3 fail_timeout=30s;
        server app-node3:8080 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    server {
        listen 80;
        proxy_pass backend_servers;
        proxy_connect_timeout 10s;
        proxy_timeout 30s;
        proxy_buffer_size 4k;
    }

    upstream backend_servers_https {
        least_conn;

        server app-node1:8080 max_fails=3 fail_timeout=30s;
        server app-node2:8080 max_fails=3 fail_timeout=30s;
        server app-node3:8080 max_fails=3 fail_timeout=30s;

        keepalive 32;
    }

    server {
        listen 443;
        proxy_pass backend_servers_https;
        proxy_connect_timeout 10s;
        proxy_timeout 30s;
        proxy_buffer_size 4k;
    }
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    '"$upstream_addr" "$upstream_response_time" "$upstream_status"';

    access_log /var/log/nginx/http-access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    upstream backend_http {
        least_conn;

        server app-node1:8080 weight=100 max_fails=3 fail_timeout=30s;
        server app-node2:8080 weight=90 max_fails=3 fail_timeout=30s;
        server app-node3:8080 weight=90 max_fails=3 fail_timeout=30s;

        keepalive 64;
    }

    server {
        listen 80 default_server;
        server_name _;

        location / {
            proxy_pass http://backend_http;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffer_size 4k;
            proxy_buffers 4 32k;
            proxy_busy_buffers_size 64k;

            proxy_cache_bypass $http_upgrade;
        }

        location /health {
            proxy_pass http://backend_http/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            access_log off;
        }

        location /health/ha {
            proxy_pass http://backend_http/health/ha;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            access_log off;
        }

        location /health/cluster {
            proxy_pass http://backend_http/health/cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            access_log off;
        }

        location /failover {
            proxy_pass http://backend_http/failover;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /sync {
            proxy_pass http://backend_http/sync;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /metrics {
            proxy_pass http://backend_http/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            access_log off;
        }

        location /static {
            alias /usr/share/nginx/html/static;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /admin/static {
            alias /usr/share/nginx/html/admin/static;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass http://backend_http;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffer_size 4k;
            proxy_buffers 4 32k;
            proxy_busy_buffers_size 64k;
        }

        location /health {
            proxy_pass http://backend_http/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            access_log off;
        }
    }
}
