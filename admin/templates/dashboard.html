<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨盾验证 · 管理后台 · 仪表盘</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        :root {
            --ink: #1a1a2e;
            --ink-light: #2d2d44;
            --ink-lighter: #3d3d5c;
            --cinnabar: #c23a2b;
            --cinnabar-light: #d94a3a;
            --cinnabar-dark: #a32e22;
            --gold: #c9a96e;
            --gold-light: #dcc48c;
            --gold-dark: #b8924e;
            --paper: #faf6ef;
            --paper-dark: #f0e8d8;
            --paper-darker: #e6dcc8;
            --text-primary: #2c2c2c;
            --text-secondary: #6b6b6b;
            --text-muted: #999;
            --sidebar-width: 260px;
            --header-height: 64px;
            --font-serif: 'Noto Serif SC', serif;
            --font-sans: 'Noto Sans SC', sans-serif;
            --shadow-card: 0 2px 12px rgba(26,26,46,0.08);
            --shadow-sidebar: 2px 0 16px rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans);
            background: var(--paper);
            color: var(--text-primary);
            overflow-x: hidden;
        }
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--ink);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: var(--shadow-sidebar);
            overflow-y: auto;
        }
        .sidebar-brand {
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(201,169,110,0.15);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .sidebar-brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--cinnabar), #8b2a1e);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--gold);
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 2px 8px rgba(194,58,43,0.3);
        }
        .sidebar-brand-icon::after {
            content: '';
            position: absolute;
            inset: 2px;
            border: 1px solid rgba(201,169,110,0.3);
            border-radius: 8px;
        }
        .sidebar-brand-text {
            font-family: var(--font-serif);
            font-weight: 700;
            font-size: 20px;
            color: var(--gold);
            line-height: 1.3;
        }
        .sidebar-brand-sub {
            font-family: var(--font-sans);
            font-size: 11px;
            color: rgba(201,169,110,0.5);
            font-weight: 300;
            letter-spacing: 2px;
        }
        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .sidebar-nav .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 400;
            transition: all 0.25s ease;
            position: relative;
        }
        .sidebar-nav .nav-link i {
            width: 20px;
            text-align: center;
            font-size: 16px;
            color: rgba(255,255,255,0.35);
            transition: color 0.25s;
        }
        .sidebar-nav .nav-link:hover {
            background: rgba(201,169,110,0.08);
            color: var(--gold-light);
        }
        .sidebar-nav .nav-link:hover i { color: var(--gold-light); }
        .sidebar-nav .nav-link.active {
            background: rgba(201,169,110,0.12);
            color: var(--gold);
            font-weight: 500;
        }
        .sidebar-nav .nav-link.active i { color: var(--gold); }
        .sidebar-nav .nav-link.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--gold);
            border-radius: 0 3px 3px 0;
        }
        .sidebar-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(201,169,110,0.15), transparent);
            margin: 8px 16px;
        }
        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid rgba(201,169,110,0.1);
        }
        .sidebar-footer .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.25s ease;
        }
        .sidebar-footer .nav-link i { width: 20px; text-align: center; font-size: 16px; }
        .sidebar-footer .nav-link:hover {
            background: rgba(194,58,43,0.12);
            color: var(--cinnabar-light);
        }
        .main-wrapper { margin-left: var(--sidebar-width); min-height: 100vh; }
        .top-header {
            height: var(--header-height);
            background: var(--paper);
            border-bottom: 1px solid var(--paper-darker);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 500;
        }
        .top-header-left { display: flex; align-items: center; gap: 16px; }
        .page-title {
            font-family: var(--font-serif);
            font-size: 20px;
            font-weight: 700;
            color: var(--ink);
            margin: 0;
            position: relative;
            padding-left: 16px;
        }
        .page-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 22px;
            background: var(--cinnabar);
            border-radius: 2px;
        }
        .top-header-right { display: flex; align-items: center; gap: 16px; }
        .user-display { display: flex; align-items: center; gap: 10px; }
        .user-name { font-size: 13px; color: var(--text-secondary); font-weight: 400; }
        .user-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cinnabar), var(--cinnabar-dark));
            color: var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            font-family: var(--font-serif);
            box-shadow: 0 2px 6px rgba(194,58,43,0.2);
        }
        .main-content { padding: 28px 32px; min-height: calc(100vh - var(--header-height)); }
        .brush-divider {
            height: 4px;
            background: linear-gradient(to right, var(--gold), transparent);
            border: none;
            margin: 0 0 24px;
            opacity: 0.6;
            border-radius: 2px;
        }
        .seal-stamp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--cinnabar);
            color: var(--cinnabar);
            font-family: var(--font-serif);
            font-size: 9px;
            font-weight: 900;
            transform: rotate(-8deg);
            line-height: 1;
            margin-left: 4px;
            flex-shrink: 0;
            padding: 1px;
        }
        .card {
            background: var(--paper);
            border: 1px solid var(--paper-darker);
            border-radius: 10px;
            box-shadow: var(--shadow-card);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        .card:hover { box-shadow: 0 4px 20px rgba(26,26,46,0.12); }
        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--paper-darker);
            padding: 16px 20px;
            font-family: var(--font-serif);
            font-weight: 600;
            color: var(--ink);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-header h5, .card-header h6 {
            font-family: var(--font-serif);
            font-weight: 600;
            margin: 0;
            color: var(--ink);
        }
        .card-body { padding: 20px; }
        .card-footer {
            background: transparent;
            border-top: 1px solid var(--paper-darker);
            padding: 12px 20px;
        }
        .stat-card { transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: default; }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 24px rgba(26,26,46,0.12);
        }
        .stat-card .stat-icon {
            width: 52px; height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .stat-card .stat-icon.icon-ink { background: rgba(26,26,46,0.06); color: var(--ink); }
        .stat-card .stat-icon.icon-cinnabar { background: rgba(194,58,43,0.08); color: var(--cinnabar); }
        .stat-card .stat-icon.icon-gold { background: rgba(201,169,110,0.15); color: var(--gold-dark); }
        .stat-card .stat-icon.icon-green { background: rgba(46,160,67,0.08); color: #2ea043; }
        .stat-card .stat-value {
            font-family: var(--font-serif);
            font-weight: 700;
            font-size: 28px;
            color: var(--ink);
            line-height: 1.2;
        }
        .stat-card .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        .stat-card .stat-trend { font-size: 12px; font-weight: 500; }
        .btn-ink {
            background: var(--ink);
            border: 1px solid var(--ink);
            color: var(--gold);
            font-family: var(--font-sans);
            font-weight: 500;
            padding: 8px 20px;
            border-radius: 6px;
            transition: all 0.25s ease;
        }
        .btn-ink:hover {
            background: var(--ink-light);
            color: var(--gold-light);
            border-color: var(--ink-light);
        }
        .btn-outline-gold {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold-dark);
            font-family: var(--font-sans);
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 6px;
            transition: all 0.25s ease;
        }
        .btn-outline-gold:hover {
            background: var(--gold);
            color: var(--ink);
            border-color: var(--gold);
        }
        .btn-outline-cinnabar {
            background: transparent;
            border: 1px solid var(--cinnabar);
            color: var(--cinnabar);
            font-family: var(--font-sans);
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 6px;
            transition: all 0.25s ease;
        }
        .btn-outline-cinnabar:hover {
            background: var(--cinnabar);
            color: #fff;
        }
        .btn-group .btn-outline-secondary {
            border-color: var(--paper-darker);
            color: var(--text-secondary);
            background: transparent;
        }
        .btn-group .btn-outline-secondary:hover {
            background: rgba(201,169,110,0.1);
            border-color: var(--gold);
            color: var(--gold-dark);
        }
        .btn-group .btn-outline-secondary.active {
            background: var(--ink);
            border-color: var(--ink);
            color: var(--gold);
        }
        .badge {
            font-weight: 500;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 0.3px;
        }
        .form-check-input:checked {
            background-color: var(--gold);
            border-color: var(--gold);
        }
        .form-check-label { font-size: 13px; color: var(--text-secondary); }
        .table { color: var(--text-primary); margin-bottom: 0; }
        .table thead th {
            font-family: var(--font-sans);
            font-weight: 500;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--paper-darker);
            padding: 12px 16px;
            background: transparent;
        }
        .table tbody td {
            padding: 12px 16px;
            vertical-align: middle;
            border-color: var(--paper-darker);
            font-size: 13px;
        }
        .table-hover tbody tr:hover { background: rgba(201,169,110,0.06); }
        .progress {
            background: var(--paper-darker);
            border-radius: 6px;
            height: 6px;
        }
        .progress-bar { border-radius: 6px; }
        .progress-bar.bg-info { background: #1f6feb; }
        .progress-bar.bg-success { background: #1a7f37; }
        .progress-bar.bg-warning { background: var(--gold); }
        .progress-bar.bg-danger { background: var(--cinnabar); }
        code {
            background: rgba(26,26,46,0.04);
            color: var(--cinnabar);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--paper-darker); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-wrapper { margin-left: 0; }
            .main-content { padding: 16px; }
            .top-header { padding: 0 16px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="fas fa-shield-halved"></i></div>
            <div>
                <div class="sidebar-brand-text">墨盾验证</div>
                <div class="sidebar-brand-sub">· 管理后台 ·</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link active" href="/admin/"><i class="fas fa-chart-bar"></i><span>仪表盘</span></a>
            <a class="nav-link" href="/admin/stats"><i class="fas fa-chart-line"></i><span>统计分析</span></a>
            <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt"></i><span>应用管理</span></a>
            <a class="nav-link" href="/admin/logs"><i class="fas fa-clipboard-list"></i><span>日志查询</span></a>
            <a class="nav-link" href="/admin/risk-rules"><i class="fas fa-shield-alt"></i><span>风控规则</span></a>
            <a class="nav-link" href="/admin/blacklist"><i class="fas fa-ban"></i><span>黑名单</span></a>
            <div class="sidebar-divider"></div>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></a>
        </div>
    </div>

    <div class="main-wrapper">
        <header class="top-header">
            <div class="top-header-left">
                <h1 class="page-title">仪表盘</h1>
                <span class="seal-stamp">墨盾</span>
            </div>
            <div class="top-header-right">
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" id="autoRefreshSwitch" checked>
                    <label class="form-check-label" for="autoRefreshSwitch">实时更新</label>
                </div>
                <button id="refreshBtn" class="btn-outline-gold"><i class="fas fa-sync me-1"></i>刷新</button>
                <div class="user-display">
                    <span class="user-name" id="usernameDisplay">管理员</span>
                    <div class="user-avatar" id="userAvatar">A</div>
                </div>
            </div>
        </header>
        <hr class="brush-divider">
        <main class="main-content">
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card stat-card h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon icon-ink"><i class="fas fa-users"></i></div>
                            <div>
                                <div class="stat-label">用户总数</div>
                                <div class="stat-value" id="totalUsers">0</div>
                                <div class="stat-trend text-success" id="usersTrend"><i class="fas fa-arrow-up me-1"></i>+0%</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon icon-gold"><i class="fas fa-mobile-alt"></i></div>
                            <div>
                                <div class="stat-label">应用总数</div>
                                <div class="stat-value" id="totalApps">0</div>
                                <div class="stat-trend text-success" id="appsTrend"><i class="fas fa-arrow-up me-1"></i>+0%</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon icon-green"><i class="fas fa-rocket"></i></div>
                            <div>
                                <div class="stat-label">请求总数</div>
                                <div class="stat-value" id="totalRequests">0</div>
                                <div class="stat-trend text-success" id="requestsTrend"><i class="fas fa-arrow-up me-1"></i>+0%</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="stat-icon icon-cinnabar"><i class="fas fa-exclamation-triangle"></i></div>
                            <div>
                                <div class="stat-label">错误总数</div>
                                <div class="stat-value" id="totalErrors">0</div>
                                <div class="stat-trend text-danger" id="errorsTrend"><i class="fas fa-arrow-down me-1"></i>-0%</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h5><i class="fas fa-chart-area me-2" style="color:var(--gold-dark);"></i>请求量趋势</h5>
                            <div class="btn-group btn-group-sm" role="group">
                                <button type="button" class="btn btn-outline-secondary active" data-period="hour">小时</button>
                                <button type="button" class="btn btn-outline-secondary" data-period="day">日</button>
                                <button type="button" class="btn btn-outline-secondary" data-period="week">周</button>
                            </div>
                        </div>
                        <div class="card-body">
                            <canvas id="requestTrendChart" height="250"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100">
                        <div class="card-header"><h5><i class="fas fa-heartbeat me-2" style="color:var(--cinnabar);"></i>系统状态</h5></div>
                        <div class="card-body">
                            <div class="d-flex flex-column gap-3">
                                <div class="d-flex align-items-center justify-content-between">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge rounded-pill bg-success" id="dbStatus">&nbsp;</span>
                                        <span style="font-size:13px;">数据库服务</span>
                                    </div>
                                    <small class="text-muted" id="dbLatency">0ms</small>
                                </div>
                                <div class="d-flex align-items-center justify-content-between">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge rounded-pill bg-success" id="redisStatus">&nbsp;</span>
                                        <span style="font-size:13px;">Redis 缓存</span>
                                    </div>
                                    <small class="text-muted" id="redisLatency">0ms</small>
                                </div>
                                <div class="d-flex align-items-center justify-content-between">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge rounded-pill bg-success" id="apiStatus">&nbsp;</span>
                                        <span style="font-size:13px;">API 服务</span>
                                    </div>
                                    <small class="text-muted" id="apiLatency">0ms</small>
                                </div>
                                <div class="d-flex align-items-center justify-content-between">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge rounded-pill bg-success" id="storageStatus">&nbsp;</span>
                                        <span style="font-size:13px;">存储服务</span>
                                    </div>
                                    <small class="text-muted" id="storageLatency">0ms</small>
                                </div>
                            </div>
                            <hr style="border-color:var(--paper-darker);">
                            <div class="d-flex justify-content-between mb-2">
                                <span style="font-size:13px;color:var(--text-secondary);">CPU 使用率</span>
                                <span id="cpuUsage" style="font-size:13px;">0%</span>
                            </div>
                            <div class="progress mb-3" style="height:8px;">
                                <div class="progress-bar bg-info" id="cpuProgress" style="width:0%"></div>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span style="font-size:13px;color:var(--text-secondary);">内存使用</span>
                                <span id="memUsage" style="font-size:13px;">0%</span>
                            </div>
                            <div class="progress mb-3" style="height:8px;">
                                <div class="progress-bar bg-success" id="memProgress" style="width:0%"></div>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span style="font-size:13px;color:var(--text-secondary);">磁盘使用</span>
                                <span id="diskUsage" style="font-size:13px;">0%</span>
                            </div>
                            <div class="progress" style="height:8px;">
                                <div class="progress-bar bg-warning" id="diskProgress" style="width:0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header"><h5><i class="fas fa-clock me-2" style="color:var(--gold-dark);"></i>最近活动</h5></div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
