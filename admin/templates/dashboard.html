<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨盾验证 · 管理后台 · 仪表盘</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <div class="bg-dark d-flex flex-column">
        <div class="d-flex align-items-center gap-3 p-3 border-bottom border-secondary">
            <div class="d-flex align-items-center justify-content-center" style="width:44px;height:44px;background:linear-gradient(135deg,#c23a2b,#8b2a1e);border-radius:10px;font-size:22px;color:#c9a96e;flex-shrink:0;"><i class="fas fa-shield-halved"></i></div>
            <div>
                <div style="font-weight:700;font-size:20px;color:#c9a96e;line-height:1.3;">墨盾验证</div>
                <div style="font-size:11px;color:rgba(201,169,110,0.5);font-weight:300;letter-spacing:2px;">· 管理后台 ·</div>
            </div>
        </div>
        <nav class="d-flex flex-column p-3 gap-1 flex-grow-1">
            <a class="nav-link active" href="/admin/"><i class="fas fa-chart-bar"></i><span>仪表盘</span></a>
            <a class="nav-link" href="/admin/stats"><i class="fas fa-chart-line"></i><span>统计分析</span></a>
            <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt"></i><span>应用管理</span></a>
            <a class="nav-link" href="/admin/logs"><i class="fas fa-clipboard-list"></i><span>日志查询</span></a>
            <a class="nav-link" href="/admin/risk-rules"><i class="fas fa-shield-alt"></i><span>风控规则</span></a>
            <a class="nav-link" href="/admin/blacklist"><i class="fas fa-ban"></i><span>黑名单</span></a>
            <hr class="border-secondary my-2 mx-3">
        </nav>
        <div class="border-top border-secondary p-3 mt-auto">
            <a href="#" id="logoutBtn" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></a>
        </div>
    </div>

    <div>
        <header class="bg-white border-bottom d-flex justify-content-between align-items-center px-4 py-2">
            <div class="d-flex align-items-center gap-3">
                <h1 style="font-size:20px;font-weight:700;margin:0;padding-left:16px;position:relative;">仪表盘</h1>
                <span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border:1.5px solid #c23a2b;color:#c23a2b;font-size:9px;font-weight:900;transform:rotate(-8deg);flex-shrink:0;">墨盾</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" id="autoRefreshSwitch" checked>
                    <label class="form-check-label" for="autoRefreshSwitch">实时更新</label>
                </div>
                <button id="refreshBtn" class="btn btn-outline-secondary btn-sm"><i class="fas fa-sync me-1"></i>刷新</button>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-secondary" id="usernameDisplay">管理员</span>
                    <div class="bg-danger text-white rounded-circle d-flex align-items-center justify-content-center" id="userAvatar" style="width:36px;height:36px;font-weight:700;font-size:14px;">A</div>
                </div>
            </div>
        </header>
        <hr style="height:4px;background:linear-gradient(to right,#c9a96e,transparent);border:none;margin:0 0 24px;opacity:0.6;border-radius:2px;">
        <main class="p-4">
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card shadow-sm border h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="d-flex align-items-center justify-content-center" style="width:52px;height:52px;border-radius:12px;font-size:22px;flex-shrink:0;background:rgba(26,26,46,0.06);color:#1a1a2e;"><i class="fas fa-users"></i></div>
                            <div>
                                <div class="text-muted" style="font-size:12px;letter-spacing:0.5px;">用户总数</div>
                                <div style="font-weight:700;font-size:28px;color:#1a1a2e;line-height:1.2;" id="totalUsers">0</div>
                                <div class="text-success" style="font-size:12px;font-weight:500;" id="usersTrend"><i class="fas fa-arrow-up me-1"></i>+0%</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="d-flex align-items-center justify-content-center" style="width:52px;height:52px;border-radius:12px;font-size:22px;flex-shrink:0;background:rgba(201,169,110,0.15);color:#b8924e;"><i class="fas fa-mobile-alt"></i></div>
                            <div>
                                <div class="text-muted" style="font-size:12px;letter-spacing:0.5px;">应用总数</div>
                                <div style="font-weight:700;font-size:28px;color:#1a1a2e;line-height:1.2;" id="totalApps">0</div>
                                <div class="text-success" style="font-size:12px;font-weight:500;" id="appsTrend"><i class="fas fa-arrow-up me-1"></i>+0%</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="d-flex align-items-center justify-content-center" style="width:52px;height:52px;border-radius:12px;font-size:22px;flex-shrink:0;background:rgba(46,160,67,0.08);color:#2ea043;"><i class="fas fa-rocket"></i></div>
                            <div>
                                <div class="text-muted" style="font-size:12px;letter-spacing:0.5px;">请求总数</div>
                                <div style="font-weight:700;font-size:28px;color:#1a1a2e;line-height:1.2;" id="totalRequests">0</div>
                                <div class="text-success" style="font-size:12px;font-weight:500;" id="requestsTrend"><i class="fas fa-arrow-up me-1"></i>+0%</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <div class="d-flex align-items-center justify-content-center" style="width:52px;height:52px;border-radius:12px;font-size:22px;flex-shrink:0;background:rgba(194,58,43,0.08);color:#c23a2b;"><i class="fas fa-exclamation-triangle"></i></div>
                            <div>
                                <div class="text-muted" style="font-size:12px;letter-spacing:0.5px;">错误总数</div>
                                <div style="font-weight:700;font-size:28px;color:#1a1a2e;line-height:1.2;" id="totalErrors">0</div>
                                <div class="text-danger" style="font-size:12px;font-weight:500;" id="errorsTrend"><i class="fas fa-arrow-down me-1"></i>-0%</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header">
                            <h5><i class="fas fa-chart-area me-2" style="color:#b8924e;"></i>请求量趋势</h5>
                            <div class="btn-group btn-group-sm" role="group">
                                <button type="button" class="btn btn-outline-secondary active" data-period="hour">小时</button>
                                <button type="button" class="btn btn-outline-secondary" data-period="day">日</button>
                                <button type="button" class="btn btn-outline-secondary" data-period="week">周</button>
                            </div>
                        </div>
                        <div class="card-body">
                            <canvas id="requestTrendChart" height="250"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm h-100">
                        <div class="card-header"><h5><i class="fas fa-heartbeat me-2" style="color:#c23a2b;"></i>系统状态</h5></div>
                        <div class="card-body">
                            <div class="d-flex flex-column gap-3">
                                <div class="d-flex align-items-center justify-content-between">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge rounded-pill bg-success" id="dbStatus">&nbsp;</span>
                                        <span style="font-size:13px;">数据库服务</span>
                                    </div>
                                    <small class="text-muted" id="dbLatency">0ms</small>
                                </div>
                                <div class="d-flex align-items-center justify-content-between">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge rounded-pill bg-success" id="redisStatus">&nbsp;</span>
                                        <span style="font-size:13px;">Redis 缓存</span>
                                    </div>
                                    <small class="text-muted" id="redisLatency">0ms</small>
                                </div>
                                <div class="d-flex align-items-center justify-content-between">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge rounded-pill bg-success" id="apiStatus">&nbsp;</span>
                                        <span style="font-size:13px;">API 服务</span>
                                    </div>
                                    <small class="text-muted" id="apiLatency">0ms</small>
                                </div>
                                <div class="d-flex align-items-center justify-content-between">
                                    <div class="d-flex align-items-center gap-2">
                                        <span class="badge rounded-pill bg-success" id="storageStatus">&nbsp;</span>
                                        <span style="font-size:13px;">存储服务</span>
                                    </div>
                                    <small class="text-muted" id="storageLatency">0ms</small>
                                </div>
                            </div>
                            <hr style="border-color:#e6dcc8;">
                            <div class="d-flex justify-content-between mb-2">
                                <span style="font-size:13px;color:#6b6b6b;">CPU 使用率</span>
                                <span id="cpuUsage" style="font-size:13px;">0%</span>
                            </div>
                            <div class="progress mb-3" style="height:8px;">
                                <div class="progress-bar bg-info" id="cpuProgress" style="width:0%"></div>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span style="font-size:13px;color:#6b6b6b;">内存使用</span>
                                <span id="memUsage" style="font-size:13px;">0%</span>
                            </div>
                            <div class="progress mb-3" style="height:8px;">
                                <div class="progress-bar bg-success" id="memProgress" style="width:0%"></div>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span style="font-size:13px;color:#6b6b6b;">磁盘使用</span>
                                <span id="diskUsage" style="font-size:13px;">0%</span>
                            </div>
                            <div class="progress" style="height:8px;">
                                <div class="progress-bar bg-warning" id="diskProgress" style="width:0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header"><h5><i class="fas fa-clock me-2" style="color:#b8924e;"></i>最近活动</h5></div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0">
                                    <thead>
                                        <tr><th>时间</th><th>事件</th><th>用户</th><th>状态</th></tr>
                                    </thead>
                                    <tbody id="recentActivity"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header"><h5><i class="fas fa-wave-square me-2" style="color:#c23a2b;"></i>实时请求监控</h5></div>
                        <div class="card-body">
                            <canvas id="realtimeChart" height="200"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/dashboard.js"></script>
    <script src="/admin/static/js/css-switch.js"></script>
</body>
</html>
