<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 仪表盘</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar d-flex flex-column flex-shrink-0">
            <div class="sidebar-header p-3">
                <h5 class="text-white mb-0">管理后台</h5>
            </div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link active" href="/admin/"><i class="fas fa-chart-bar me-2"></i>仪表盘</a>
                <a class="nav-link" href="/admin/stats"><i class="fas fa-chart-line me-2"></i>统计分析</a>
                <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt me-2"></i>应用管理</a>
                <a class="nav-link" href="/admin/logs"><i class="fas fa-clipboard-list me-2"></i>日志查询</a>
                <a class="nav-link" href="/admin/risk-rules"><i class="fas fa-shield-alt me-2"></i>风控规则</a>
                <a class="nav-link" href="/admin/blacklist"><i class="fas fa-ban me-2"></i>黑名单</a>
            </nav>
            <div class="sidebar-footer mt-auto p-3">
                <a href="#" id="logoutBtn" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i>退出登录</a>
            </div>
        </div>

        <div class="main-wrapper">
            <header class="bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0">仪表盘</h5>
                <div class="d-flex align-items-center gap-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="autoRefreshSwitch" checked>
                        <label class="form-check-label" for="autoRefreshSwitch">实时更新</label>
                    </div>
                    <button id="refreshBtn" class="btn btn-outline-secondary btn-sm"><i class="fas fa-sync me-1"></i>刷新</button>
                    <div class="d-flex align-items-center gap-2">
                        <span class="text-muted" id="usernameDisplay">管理员</span>
                        <div class="user-avatar" id="userAvatar">A</div>
                    </div>
                </div>
            </header>

            <main class="p-4 bg-light min-vh-100">
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm border-0 h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-primary bg-opacity-10 p-3 rounded"><i class="fas fa-users fa-2x text-primary"></i></div>
                                <div>
                                    <small class="text-muted">用户总数</small>
                                    <h3 class="mb-0" id="totalUsers">0</h3>
                                    <small class="text-success" id="usersTrend"><i class="fas fa-arrow-up me-1"></i>+0%</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm border-0 h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-success bg-opacity-10 p-3 rounded"><i class="fas fa-mobile-alt fa-2x text-success"></i></div>
                                <div>
                                    <small class="text-muted">应用总数</small>
                                    <h3 class="mb-0" id="totalApps">0</h3>
                                    <small class="text-success" id="appsTrend"><i class="fas fa-arrow-up me-1"></i>+0%</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm border-0 h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-info bg-opacity-10 p-3 rounded"><i class="fas fa-rocket fa-2x text-info"></i></div>
                                <div>
                                    <small class="text-muted">请求总数</small>
                                    <h3 class="mb-0" id="totalRequests">0</h3>
                                    <small class="text-success" id="requestsTrend"><i class="fas fa-arrow-up me-1"></i>+0%</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm border-0 h-100">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-danger bg-opacity-10 p-3 rounded"><i class="fas fa-exclamation-triangle fa-2x text-danger"></i></div>
                                <div>
                                    <small class="text-muted">错误总数</small>
                                    <h3 class="mb-0" id="totalErrors">0</h3>
                                    <small class="text-danger" id="errorsTrend"><i class="fas fa-arrow-down me-1"></i>-0%</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-8">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">请求量趋势</h5>
                                <div class="btn-group btn-group-sm" role="group">
                                    <button type="button" class="btn btn-outline-secondary active" data-period="hour">小时</button>
                                    <button type="button" class="btn btn-outline-secondary" data-period="day">日</button>
                                    <button type="button" class="btn btn-outline-secondary" data-period="week">周</button>
                                </div>
                            </div>
                            <div class="card-body">
                                <canvas id="requestTrendChart" height="250"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">系统状态</h5>
                            </div>
                            <div class="card-body">
                                <div class="d-flex flex-column gap-3">
                                    <div class="d-flex align-items-center justify-content-between">
                                        <div class="d-flex align-items-center gap-2">
                                            <span class="badge bg-success rounded-pill" id="dbStatus">&nbsp;</span>
                                            <span>数据库服务</span>
                                        </div>
                                        <small class="text-muted" id="dbLatency">0ms</small>
                                    </div>
                                    <div class="d-flex align-items-center justify-content-between">
                                        <div class="d-flex align-items-center gap-2">
                                            <span class="badge bg-success rounded-pill" id="redisStatus">&nbsp;</span>
                                            <span>Redis 缓存</span>
                                        </div>
                                        <small class="text-muted" id="redisLatency">0ms</small>
                                    </div>
                                    <div class="d-flex align-items-center justify-content-between">
                                        <div class="d-flex align-items-center gap-2">
                                            <span class="badge bg-success rounded-pill" id="apiStatus">&nbsp;</span>
                                            <span>API 服务</span>
                                        </div>
                                        <small class="text-muted" id="apiLatency">0ms</small>
                                    </div>
                                    <div class="d-flex align-items-center justify-content-between">
                                        <div class="d-flex align-items-center gap-2">
                                            <span class="badge bg-success rounded-pill" id="storageStatus">&nbsp;</span>
                                            <span>存储服务</span>
                                        </div>
                                        <small class="text-muted" id="storageLatency">0ms</small>
                                    </div>
                                </div>
                                <hr>
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="text-muted">CPU 使用率</span>
                                    <span id="cpuUsage">0%</span>
                                </div>
                                <div class="progress mb-3" style="height: 8px;">
                                    <div class="progress-bar bg-info" id="cpuProgress" style="width: 0%"></div>
                                </div>
                                <div class="d-flex justify-content-between mb-2">
                                    <span class="text-muted">内存使用</span>
                                    <span id="memUsage">0%</span>
                                </div>
                                <div class="progress mb-3" style="height: 8px;">
                                    <div class="progress-bar bg-success" id="memProgress" style="width: 0%"></div>
                                </div>
                                <div class="d-flex justify-content-between">
                                    <span class="text-muted">磁盘使用</span>
                                    <span id="diskUsage">0%</span>
                                </div>
                                <div class="progress" style="height: 8px;">
                                    <div class="progress-bar bg-warning" id="diskProgress" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">最近活动</h5>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table table-hover mb-0">
                                        <thead class="table-light">
                                            <tr><th>时间</th><th>事件</th><th>用户</th><th>状态</th></tr>
                                        </thead>
                                        <tbody id="recentActivity"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">实时请求监控</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="realtimeChart" height="200"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/dashboard.js"></script>
    <script src="/admin/static/js/css-switch.js"></script>
</body>
</html>
