<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 仪表盘</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --sidebar-bg: #1e293b; --sidebar-hover: #334155; }
        .sidebar { width: 250px; background-color: var(--sidebar-bg); min-height: 100vh; }
        .sidebar .nav-link { color: rgba(255,255,255,0.7); padding: 12px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: var(--sidebar-hover); color: white; }
        .sidebar-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-footer { border-top: 1px solid rgba(255,255,255,0.1); }
        .main-wrapper { flex: 1; min-width: 0; }
        .stat-card { transition: transform 0.3s ease; }
        .stat-card:hover { transform: translateY(-5px); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #3b82f6; color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar d-flex flex-column flex-shrink-0">
            <div class="sidebar-header p-3">
                <h5 class="text-white mb-0">管理后台</h5>
            </div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link active" href="/admin/"><i class="fas fa-chart-bar me-2"></i>仪表盘</a>
                <a class="nav-link" href="/admin/stats"><i class="fas fa-chart-line me-2"></i>统计分析</a>
                <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt me-2"></i>应用管理</a>
                <a class="nav-link" href="/admin/logs"><i class="fas fa-clipboard-list me-2"></i>日志查询</a>
            </nav>
            <div class="sidebar-footer mt-auto p-3">
                <a href="#" id="logoutBtn" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i>退出登录</a>
            </div>
        </div>
        
        <div class="main-wrapper">
            <header class="bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0">仪表盘</h5>
                <div class="d-flex align-items-center gap-2">
                    <button id="cssSwitchBtn" class="btn btn-outline-info btn-sm"><i class="fas fa-globe me-1"></i> CDN CSS</button>
                    <span class="text-muted" id="usernameDisplay">管理员</span>
                    <div class="user-avatar" id="userAvatar">A</div>
                </div>
            </header>
            
            <main class="p-4 bg-light min-vh-100">
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm border-0">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-primary bg-opacity-10 p-3 rounded"><i class="fas fa-users fa-2x text-primary"></i></div>
                                <div>
                                    <small class="text-muted">用户总数</small>
                                    <h3 class="mb-0" id="totalUsers">0</h3>
                                    <small class="text-success">+12.5%</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm border-0">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-success bg-opacity-10 p-3 rounded"><i class="fas fa-mobile-alt fa-2x text-success"></i></div>
                                <div>
                                    <small class="text-muted">应用总数</small>
                                    <h3 class="mb-0" id="totalApps">0</h3>
                                    <small class="text-success">+8.2%</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm border-0">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-warning bg-opacity-10 p-3 rounded"><i class="fas fa-rocket fa-2x text-warning"></i></div>
                                <div>
                                    <small class="text-muted">请求总数</small>
                                    <h3 class="mb-0" id="totalRequests">0</h3>
                                    <small class="text-success">+23.1%</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card shadow-sm border-0">
                            <div class="card-body d-flex align-items-center gap-3">
                                <div class="bg-danger bg-opacity-10 p-3 rounded"><i class="fas fa-exclamation-triangle fa-2x text-danger"></i></div>
                                <div>
                                    <small class="text-muted">错误总数</small>
                                    <h3 class="mb-0" id="totalErrors">0</h3>
                                    <small class="text-danger">-5.7%</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="row g-4">
                    <div class="col-md-8">
                        <div class="card shadow-sm border-0">
                            <div class="card-body">
                                <h5 class="card-title mb-3">最近活动</h5>
                                <table class="table">
                                    <thead><tr><th>时间</th><th>事件</th><th>用户</th><th>状态</th></tr></thead>
                                    <tbody id="recentActivity"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0">
                            <div class="card-body">
                                <h5 class="card-title mb-3">系统状态</h5>
                                <div class="d-flex flex-column gap-3">
                                    <div class="d-flex align-items-center gap-2"><span class="badge bg-success rounded-pill">&nbsp;</span><span>数据库服务</span></div>
                                    <div class="d-flex align-items-center gap-2"><span class="badge bg-success rounded-pill">&nbsp;</span><span>Redis 缓存</span></div>
                                    <div class="d-flex align-items-center gap-2"><span class="badge bg-success rounded-pill">&nbsp;</span><span>API 服务</span></div>
                                    <div class="d-flex align-items-center gap-2"><span class="badge bg-warning rounded-pill">&nbsp;</span><span>存储服务</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/dashboard.js"></script>
    <script src="/admin/static/js/css-switch.js"></script>
</body>
</html>
