<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨盾验证 · 管理后台 · 审计日志</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <div class="bg-dark d-flex flex-column">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="fas fa-shield-halved"></i></div>
            <div>
                <div class="sidebar-brand-text">墨盾验证</div>
                <div class="sidebar-brand-sub">· 管理后台 ·</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link" href="/admin/"><i class="fas fa-chart-bar"></i><span>仪表盘</span></a>
            <a class="nav-link" href="/admin/stats"><i class="fas fa-chart-line"></i><span>统计分析</span></a>
            <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt"></i><span>应用管理</span></a>
            <a class="nav-link" href="/admin/logs"><i class="fas fa-clipboard-list"></i><span>日志查询</span></a>
            <a class="nav-link" href="/admin/risk-rules"><i class="fas fa-shield-alt"></i><span>风控规则</span></a>
            <a class="nav-link" href="/admin/blacklist"><i class="fas fa-ban"></i><span>黑名单</span></a>
            <a class="nav-link" href="/admin/notifications"><i class="fas fa-bell"></i><span>告警通知</span></a>
            <a class="nav-link active" href="/admin/audit-logs"><i class="fas fa-history"></i><span>审计日志</span></a>
            <div class="sidebar-divider"></div>
        </nav>
        <div class="border-top border-secondary p-3 mt-auto">
            <a href="#" id="logoutBtn" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></a>
        </div>
    </div>

    <div class="main-wrapper">
        <header class="bg-white border-bottom d-flex justify-content-between align-items-center px-4 py-2">
            <div class="top-header-left">
                <h1 class="page-title">操作审计日志</h1>
                <span class="seal-stamp">墨盾</span>
            </div>
            <div class="top-header-right">
                <button id="exportAuditBtn" class="btn-outline-gold"><i class="fas fa-download me-1"></i>导出</button>
                <button id="filterAuditBtn" class="btn-outline-gold"><i class="fas fa-filter me-1"></i>筛选</button>
                <div class="user-display">
                    <span class="user-name" id="usernameDisplay">管理员</span>
                    <div class="bg-danger text-white rounded-circle d-flex align-items-center justify-content-center" id="userAvatar">A</div>
                </div>
            </div>
        </header>
        <hr class="brush-divider">
        <main class="main-content">
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">操作总数</div>
                            <div class="stat-value" id="totalOperations">0</div>
                            <small class="text-muted" style="font-size:12px;">本月</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">危险操作</div>
                            <div class="stat-value text-danger" id="dangerousOperations">0</div>
                            <small class="text-danger" style="font-size:12px;"><i class="fas fa-exclamation-triangle me-1"></i>需关注</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">活跃用户</div>
                            <div class="stat-value" id="activeUsers">0</div>
                            <small class="text-muted" style="font-size:12px;">操作者</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">平均响应</div>
                            <div class="stat-value" id="avgResponseTime">0ms</div>
                            <small class="text-muted" style="font-size:12px;">响应时间</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-8">
                    <div class="card shadow-sm h-100">
                        <div class="card-header"><h6><i class="fas fa-chart-line me-2" style="color:#b8924e;"></i>操作趋势</h6></div>
                        <div class="card-body">
                            <canvas id="operationTrendChart" height="200"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm h-100">
                        <div class="card-header"><h6><i class="fas fa-chart-pie me-2" style="color:#c23a2b;"></i>操作类型分布</h6></div>
                        <div class="card-body">
                            <canvas id="operationTypeChart" height="200"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-2">
                            <label class="form-label">操作类型</label>
                            <select class="form-select" id="operationType">
                                <option value="">全部</option>
                                <option value="create">创建</option>
                                <option value="update">更新</option>
                                <option value="delete">删除</option>
                                <option value="enable">启用</option>
                                <option value="disable">禁用</option>
                                <option value="login">登录</option>
                                <option value="logout">登出</option>
                                <option value="export">导出</option>
                                <option value="import">导入</option>
                                <option value="config">配置</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">操作者</label>
                            <input type="text" class="form-control" id="operatorName" placeholder="操作者名称">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">资源类型</label>
                            <select class="form-select" id="resourceType">
                                <option value="">全部</option>
                                <option value="app">应用</option>
                                <option value="rule">规则</option>
                                <option value="user">用户</option>
                                <option value="blacklist">黑名单</option>
                                <option value="config">配置</option>
                                <option value="system">系统</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">时间范围</label>
                            <select class="form-select" id="auditTimeRange">
                                <option value="1h">最近1小时</option>
                                <option value="6h">最近6小时</option>
                                <option value="24h" selected>最近24小时</option>
                                <option value="7d">最近7天</option>
                                <option value="30d">最近30天</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">关键词</label>
                            <input type="text" class="form-control" id="auditKeyword" placeholder="搜索内容">
                        </div>
                        <div class="col-md-2">
                            <button id="searchAuditBtn" class="btn-ink w-100"><i class="fas fa-search me-1"></i>搜索</button>
                        </div>
                    </div>
                    <div class="row g-3 mt-2">
                        <div class="col-md-12">
                            <span class="text-muted small me-2">快速筛选:</span>
                            <div class="btn-group btn-group-sm">
                                <button class="btn btn-outline-secondary active" data-filter="all">全部</button>
                                <button class="btn btn-outline-danger" data-filter="dangerous"><i class="fas fa-exclamation-triangle me-1"></i>危险操作</button>
                                <button class="btn btn-outline-primary" data-filter="failed"><i class="fas fa-times me-1"></i>失败操作</button>
                                <button class="btn btn-outline-success" data-filter="login"><i class="fas fa-sign-in-alt me-1"></i>登录/登出</button>
                                <button class="btn btn-outline-warning" data-filter="config"><i class="fas fa-cog me-1"></i>配置变更</button>
                            </div>
                        </div>
                    </div>
                    <div class="row g-3 mt-2 d-none" id="customTimeRange">
                        <div class="col-md-4">
                            <label class="form-label">开始时间</label>
                            <input type="datetime-local" class="form-control" id="auditStartDate">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">结束时间</label>
                            <input type="datetime-local" class="form-control" id="auditEndDate">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-3">
                        <span class="text-muted small">共 <span id="auditLogsCount">0</span> 条记录</span>
                        <span class="text-muted small">|</span>
                        <span class="text-muted small">当前页: <span id="currentPage">1</span></span>
                    </div>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary active" data-view="table"><i class="fas fa-list me-1"></i>列表</button>
                        <button class="btn btn-outline-secondary" data-view="timeline"><i class="fas fa-clock me-1"></i>时间线</button>
                        <button class="btn btn-outline-secondary" data-view="card"><i class="fas fa-th me-1"></i>卡片</button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive" id="auditTableView">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>时间</th>
                                    <th>操作者</th>
                                    <th>操作类型</th>
                                    <th>资源类型</th>
                                    <th>资源ID</th>
                                    <th>IP</th>
                                    <th>结果</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="auditTableBody"></tbody>
                        </table>
                    </div>
                    <div class="d-none" id="auditTimelineView"></div>
                    <div class="d-none" id="auditCardView"></div>
                </div>
                <div class="card-footer d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-2">
                        <label class="text-muted small">每页显示:</label>
                        <select class="form-select form-select-sm" id="auditPageSize" style="width:auto;">
                            <option value="20">20条</option>
                            <option value="50" selected>50条</option>
                            <option value="100">100条</option>
                        </select>
                    </div>
                    <div id="auditPagination"></div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-sm btn-outline-secondary" id="prevAuditPageBtn"><i class="fas fa-chevron-left"></i></button>
                        <input type="number" class="form-control form-control-sm" id="auditPageInput" value="1" style="width:60px;text-align:center;">
                        <span class="text-muted">/ <span id="auditTotalPages">1</span></span>
                        <button class="btn btn-sm btn-outline-secondary" id="nextAuditPageBtn"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="auditDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-file-alt me-2"></i>审计详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="auditDetailContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-outline-secondary" id="copyAuditBtn"><i class="fas fa-copy me-1"></i>复制</button>
                    <button type="button" class="btn-outline-gold" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="auditFilterModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-filter me-2"></i>高级筛选</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">操作者</label>
                        <input type="text" class="form-control" id="filterOperator" placeholder="操作者名称或ID">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">IP地址</label>
                        <input type="text" class="form-control" id="filterIP" placeholder="例如: 192.168.1.1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">资源ID</label>
                        <input type="text" class="form-control" id="filterResourceId" placeholder="资源ID">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">结果状态</label>
                        <select class="form-select" id="filterResult">
                            <option value="">全部</option>
                            <option value="success">成功</option>
                            <option value="failed">失败</option>
                            <option value="partial">部分成功</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">风险级别</label>
                        <select class="form-select" id="filterRiskLevel">
                            <option value="">全部</option>
                            <option value="low">低风险</option>
                            <option value="medium">中风险</option>
                            <option value="high">高风险</option>
                            <option value="critical">严重风险</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-outline-secondary" id="resetFilterBtn">重置</button>
                    <button type="button" class="btn-outline-gold" id="applyFilterBtn">应用</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="exportAuditModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-download me-2"></i>导出审计日志</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">导出格式</label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="auditExportFormat" id="auditExportCSV" value="csv" checked>
                            <label class="btn btn-outline-primary" for="auditExportCSV"><i class="fas fa-file-csv me-1"></i>CSV</label>
                            <input type="radio" class="btn-check" name="auditExportFormat" id="auditExportExcel" value="excel">
                            <label class="btn btn-outline-primary" for="auditExportExcel"><i class="fas fa-file-excel me-1"></i>Excel</label>
                            <input type="radio" class="btn-check" name="auditExportFormat" id="auditExportJSON" value="json">
                            <label class="btn btn-outline-primary" for="auditExportJSON"><i class="fas fa-file-code me-1"></i>JSON</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">导出范围</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="auditExportScope" id="auditExportCurrent" value="current" checked>
                            <label class="form-check-label" for="auditExportCurrent">当前筛选结果</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="auditExportScope" id="auditExportAll" value="all">
                            <label class="form-check-label" for="auditExportAll">全部记录</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">字段选择</label>
                        <div class="row g-2">
                            <div class="col-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="exportAuditTime" checked disabled>
                                    <label class="form-check-label" for="exportAuditTime">时间</label>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="exportAuditOperator" checked>
                                    <label class="form-check-label" for="exportAuditOperator">操作者</label>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="exportAuditType" checked>
                                    <label class="form-check-label" for="exportAuditType">操作类型</label>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="exportAuditResource" checked>
                                    <label class="form-check-label" for="exportAuditResource">资源</label>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="exportAuditIP" checked>
                                    <label class="form-check-label" for="exportAuditIP">IP地址</label>
                                </div>
                            </div>
                            <div class="col-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="exportAuditResult" checked>
                                    <label class="form-check-label" for="exportAuditResult">结果</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmExportAuditBtn"><i class="fas fa-download me-1"></i>导出</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/audit-logs.js"></script>
</body>
</html>
