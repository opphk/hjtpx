<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨盾验证 · 管理后台登录</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap">
    <link rel="stylesheet" href="/admin/static/css/modun-theme.css">
</head>
<body>
    <div class="login-bg-ornament">墨</div>
    <div class="login-bg-ornament">盾</div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-icon">
                    <i class="fas fa-shield-halved"></i>
                </div>
                <div class="login-brand-name">
                    墨盾验证
                    <span class="login-seal">验</span>
                </div>
                <div class="login-brand-sub">管 理 后 台</div>
            </div>
            <div class="login-divider"></div>
            <form id="loginForm">
                <div class="mb-4">
                    <label for="username" class="form-label">
                        <i class="fas fa-user me-1" style="color: #999; font-size: 12px;"></i>
                        用户名
                    </label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="请输入管理员用户名" required autocomplete="username">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock me-1" style="color: #999; font-size: 12px;"></i>
                        密码
                    </label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                <button type="submit" id="loginBtn" class="login-btn">
                    <i class="fas fa-key me-2"></i>登 录
                </button>
                <div id="loginError" class="login-error"></div>
            </form>
            <div class="login-footer">墨盾验证 · 安全守护</div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
</body>
</html>
