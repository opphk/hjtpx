<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 日志查询</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --sidebar-bg: #1e293b; --sidebar-hover: #334155; }
        .sidebar { width: 250px; background-color: var(--sidebar-bg); min-height: 100vh; }
        .sidebar .nav-link { color: rgba(255,255,255,0.7); padding: 12px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: var(--sidebar-hover); color: white; }
        .sidebar-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-footer { border-top: 1px solid rgba(255,255,255,0.1); }
        .main-wrapper { flex: 1; min-width: 0; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #3b82f6; color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; }
        .log-item { cursor: pointer; transition: background 0.2s; }
        .log-item:hover { background: #f8f9fa; }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar d-flex flex-column flex-shrink-0">
            <div class="sidebar-header p-3"><h5 class="text-white mb-0">管理后台</h5></div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link" href="/admin/"><i class="fas fa-chart-bar me-2"></i>仪表盘</a>
                <a class="nav-link" href="/admin/stats"><i class="fas fa-chart-line me-2"></i>统计分析</a>
                <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt me-2"></i>应用管理</a>
                <a class="nav-link active" href="/admin/logs"><i class="fas fa-clipboard-list me-2"></i>日志查询</a>
            </nav>
            <div class="sidebar-footer mt-auto p-3">
                <a href="#" id="logoutBtn" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i>退出登录</a>
            </div>
        </div>
        
        <div class="main-wrapper">
            <header class="bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0">日志查询</h5>
                <div class="d-flex align-items-center gap-3">
                    <button id="exportBtn" class="btn btn-outline-secondary btn-sm"><i class="fas fa-download me-1"></i>导出日志</button>
                    <div class="d-flex align-items-center gap-2">
                        <span class="text-muted" id="usernameDisplay">管理员</span>
                        <div class="user-avatar" id="userAvatar">A</div>
                    </div>
                </div>
            </header>
            
            <main class="p-4 bg-light min-vh-100">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-2">
                                <label class="form-label">日志状态</label>
                                <select class="form-select" id="logStatus">
                                    <option value="">全部</option>
                                    <option value="success">成功</option>
                                    <option value="failed">失败</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">开始时间</label>
                                <input type="datetime-local" class="form-control" id="startDate">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">结束时间</label>
                                <input type="datetime-local" class="form-control" id="endDate">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">关键词</label>
                                <input type="text" class="form-control" id="keyword" placeholder="搜索关键词">
                            </div>
                            <div class="col-md-2">
                                <button id="searchLogsBtn" class="btn btn-primary w-100"><i class="fas fa-search me-1"></i>查询</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white">
                        <span class="text-muted" id="logsCount">共 0 条日志</span>
                    </div>
                    <div class="card-body p-0" id="logsList"></div>
                    <div class="card-footer bg-white" id="pagination"></div>
                </div>
            </main>
        </div>
    </div>
    
    <div class="modal fade" id="logDetailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">日志详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="logDetailContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/logs.js"></script>
</body>
</html>
