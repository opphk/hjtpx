{% extends "base.html" %}

{% block content %}
<section class="content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">验证日志</h3>
                        <div class="card-tools">
                            <button type="button" class="btn btn-tool" id="toggleAdvancedSearch">
                                <i class="fas fa-filter"></i> 高级搜索
                            </button>
                            <button type="button" class="btn btn-tool" id="toggleStats">
                                <i class="fas fa-chart-bar"></i> 统计
                            </button>
                            <div class="btn-group">
                                <button type="button" class="btn btn-tool dropdown-toggle" data-bs-toggle="dropdown">
                                    <i class="fas fa-download"></i> 导出
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" href="#" onclick="exportLogs('csv')">导出 CSV</a></li>
                                    <li><a class="dropdown-item" href="#" onclick="exportLogs('xlsx')">导出 Excel</a></li>
                                    <li><a class="dropdown-item" href="#" onclick="exportLogs('pdf')">导出 PDF</a></li>
                                    <li><a class="dropdown-item" href="#" onclick="exportLogs('json')">导出 JSON</a></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="statsSection" class="mb-4" style="display: none;">
                            <div class="row">
                                <div class="col-md-3">
                                    <div class="small-box bg-info">
                                        <div class="inner">
                                            <h3 id="statTotalCount">0</h3>
                                            <p>总日志数</p>
                                        </div>
                                        <div class="icon"><i class="fas fa-list"></i></div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="small-box bg-success">
                                        <div class="inner">
                                            <h3 id="statSuccessRate">0%</h3>
                                            <p>成功率</p>
                                        </div>
                                        <div class="icon"><i class="fas fa-check-circle"></i></div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="small-box bg-warning">
                                        <div class="inner">
                                            <h3 id="statAvgRisk">0</h3>
                                            <p>平均风险分</p>
                                        </div>
                                        <div class="icon"><i class="fas fa-shield-alt"></i></div>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="small-box bg-danger">
                                        <div class="inner">
                                            <h3 id="statAvgDuration">0ms</h3>
                                            <p>平均耗时</p>
                                        </div>
                                        <div class="icon"><i class="fas fa-clock"></i></div>
                                    </div>
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col-md-6">
                                    <div class="card">
                                        <div class="card-header">
                                            <h5 class="card-title">风险分布</h5>
                                        </div>
                                        <div class="card-body">
                                            <div id="riskDistributionChart"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="card">
                                        <div class="card-header">
                                            <h5 class="card-title">状态分布</h5>
                                        </div>
                                        <div class="card-body">
                                            <div id="statusDistributionChart"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="advancedSearchSection" class="mb-4" style="display: none;">
                            <div class="card card-outline card-primary">
                                <div class="card-header">
                                    <h5 class="card-title">高级搜索</h5>
                                </div>
                                <div class="card-body">
                                    <div id="add-condition-form" class="mb-3"></div>
                                    
                                    <div class="row mb-3">
                                        <div class="col-md-6">
                                            <h6>搜索条件</h6>
                                            <div id="search-conditions"></div>
                                        </div>
                                        <div class="col-md-6">
                                            <h6>排序选项</h6>
                                            <div id="sort-options"></div>
                                            <div class="mt-2">
                                                <button class="btn btn-sm btn-success" onclick="addSortOption()">
                                                    <i class="bi bi-plus"></i> 添加排序
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="row">
                                        <div class="col-md-6">
                                            <button class="btn btn-primary" onclick="executeAdvancedSearch()">
                                                <i class="fas fa-search"></i> 执行搜索
                                            </button>
                                            <button class="btn btn-secondary" onclick="clearSearchConditions()">
                                                <i class="fas fa-times"></i> 清空条件
                                            </button>
                                        </div>
                                        <div class="col-md-6 text-end">
                                            <button class="btn btn-info" onclick="showSaveSearchModal()">
                                                <i class="fas fa-save"></i> 保存搜索
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="card card-outline card-info">
                                <div class="card-header">
                                    <h5 class="card-title">保存的搜索</h5>
                                </div>
                                <div class="card-body">
                                    <div id="saved-searches"></div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-2">
                                <select class="form-control" id="filterStatus">
                                    <option value="">全部状态</option>
                                    <option value="success">成功</option>
                                    <option value="failed">失败</option>
                                    <option value="blocked">拦截</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select class="form-control" id="filterRiskLevel">
                                    <option value="">全部风险</option>
                                    <option value="low">低风险</option>
                                    <option value="medium">中风险</option>
                                    <option value="high">高风险</option>
                                    <option value="critical">极高风险</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <select class="form-control" id="filterCaptchaType">
                                    <option value="">全部类型</option>
                                    <option value="slider">滑块</option>
                                    <option value="click">点选</option>
                                    <option value="voice">语音</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <input type="text" class="form-control" id="filterIP" placeholder="IP地址">
                            </div>
                            <div class="col-md-2">
                                <input type="date" class="form-control" id="filterStartDate">
                            </div>
                            <div class="col-md-2">
                                <input type="date" class="form-control" id="filterEndDate">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-2">
                                <input type="number" class="form-control" id="filterMinRiskScore" placeholder="最低风险分" min="0" max="100" step="0.1">
                            </div>
                            <div class="col-md-2">
                                <input type="number" class="form-control" id="filterMaxRiskScore" placeholder="最高风险分" min="0" max="100" step="0.1">
                            </div>
                            <div class="col-md-2">
                                <select class="form-control" id="filterStatsDays">
                                    <option value="7">最近7天</option>
                                    <option value="14">最近14天</option>
                                    <option value="30">最近30天</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="button" class="btn btn-primary" id="searchBtn">
                                    <i class="fas fa-search"></i> 搜索
                                </button>
                            </div>
                        </div>

                        <table id="logsTable" class="table table-bordered table-striped">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>会话ID</th>
                                    <th>状态</th>
                                    <th>风险等级</th>
                                    <th>风险评分</th>
                                    <th>IP地址</th>
                                    <th>耗时</th>
                                    <th>时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="logsTableBody">
                            </tbody>
                        </table>

                        <div class="row mt-3">
                            <div class="col-md-6">
                                <div class="dataTables_info">
                                    共 <span id="totalRecords">0</span> 条记录，每页 <span id="pageSizeDisplay">20</span> 条
                                </div>
                            </div>
                            <div class="col-md-6">
                                <nav>
                                    <ul class="pagination justify-content-end" id="pagination">
                                    </ul>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div class="modal fade" id="detailModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">日志详情</h4>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body" id="detailContent">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="saveSearchModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">保存搜索条件</h4>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="searchName">搜索名称</label>
                    <input type="text" class="form-control" id="searchName" placeholder="输入搜索名称">
                </div>
                <div class="form-group">
                    <label for="searchDescription">描述（可选）</label>
                    <textarea class="form-control" id="searchDescription" rows="3" placeholder="输入描述"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveCurrentSearch()">保存</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/admin/static/js/advanced-search.js"></script>
<script>
let currentPage = 1;
const pageSize = 20;
let searchInstance = null;
let riskChart = null;
let statusChart = null;

$(function() {
    initDefaultDates();
    searchInstance = initAdvancedSearch('logs');
    
    searchInstance.onSearchSuccess = function(data) {
        renderTable(data.data || []);
        renderPagination(data.total || 0, data.page || 1);
        updateRecordCount(data.total || 0);
    };

    loadLogs();
    loadStats();

    $('#searchBtn').click(function() {
        currentPage = 1;
        loadLogs();
    });

    $('#toggleAdvancedSearch').click(function() {
        $('#advancedSearchSection').toggle();
    });
    
    $('#toggleStats').click(function() {
        $('#statsSection').toggle();
        if ($('#statsSection').is(':visible')) {
            loadStats();
        }
    });
    
    $('#filterStatsDays').change(function() {
        if ($('#statsSection').is(':visible')) {
            loadStats();
        }
    });
});

function initDefaultDates() {
    const now = new Date();
    const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
    
    const formatDate = (date) => {
        const pad = (n) => String(n).padStart(2, '0');
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    };
    
    $('#filterStartDate').val(formatDate(weekAgo));
    $('#filterEndDate').val(formatDate(now));
}

function loadStats() {
    const days = parseInt($('#filterStatsDays').val()) || 7;
    
    $.get('/admin/api/logs/stats/analysis', { days: days, group_by_app: true }, function(response) {
        if (response.code === 0 && response.data) {
            const data = response.data;
            
            $('#statTotalCount').text(formatNumber(data.total_logs || 0));
            
            const totalSuccess = data.total_logs - data.total_failed;
            const successRate = data.total_logs > 0 ? (totalSuccess / data.total_logs * 100).toFixed(1) : 0;
            $('#statSuccessRate').text(successRate + '%');
            
            $('#statAvgRisk').text((data.avg_risk_score || 0).toFixed(1));
            $('#statAvgDuration').text(Math.round(data.avg_duration || 0) + 'ms');
            
            renderRiskChart(data.risk_stats || []);
            renderStatusChart(data.status_stats || []);
        }
    }).fail(function() {
        console.error('Failed to load stats');
    });
}

function renderRiskChart(riskStats) {
    const ctx = document.getElementById('riskDistributionChart');
    if (!ctx) return;
    
    if (riskChart) {
        riskChart.destroy();
    }
    
    const labels = riskStats.map(s => {
        const map = { 'low': '低风险', 'medium': '中风险', 'high': '高风险', 'critical': '极高风险' };
        return map[s.risk_level] || s.risk_level;
    });
    const data = riskStats.map(s => s.count);
    const colors = ['#28a745', '#ffc107', '#fd7e14', '#dc3545'];
    
    riskChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: colors.slice(0, data.length)
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
}

function renderStatusChart(statusStats) {
    const ctx = document.getElementById('statusDistributionChart');
    if (!ctx) return;
    
    if (statusChart) {
        statusChart.destroy();
    }
    
    const labels = statusStats.map(s => {
        const map = { 'success': '成功', 'failed': '失败', 'blocked': '拦截', 'pending': '待处理' };
        return map[s.status] || s.status;
    });
    const data = statusStats.map(s => s.count);
    const colors = ['#28a745', '#dc3545', '#ffc107', '#6c757d'];
    
    statusChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: '数量',
                data: data,
                backgroundColor: colors.slice(0, data.length)
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
}

function formatNumber(num) {
    if (num >= 1000000) {
        return (num / 1000000).toFixed(1) + 'M';
    } else if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'K';
    }
    return num.toString();
}

function loadLogs() {
    const filters = {
        page: currentPage,
        page_size: pageSize
    };

    const status = $('#filterStatus').val();
    if (status) filters.status = status;

    const riskLevel = $('#filterRiskLevel').val();
    if (riskLevel) filters.risk_level = riskLevel;
    
    const captchaType = $('#filterCaptchaType').val();
    if (captchaType) filters.captcha_type = captchaType;
    
    const ip = $('#filterIP').val();
    if (ip) filters.ip_address = ip;

    const startDate = $('#filterStartDate').val();
    if (startDate) filters.start_date = startDate;

    const endDate = $('#filterEndDate').val();
    if (endDate) filters.end_date = endDate;
    
    const minRiskScore = $('#filterMinRiskScore').val();
    if (minRiskScore) filters.min_risk_score = parseFloat(minRiskScore);
    
    const maxRiskScore = $('#filterMaxRiskScore').val();
    if (maxRiskScore) filters.max_risk_score = parseFloat(maxRiskScore);

    $.get('/admin/api/logs', filters, function(response) {
        if (response.code === 0) {
            renderTable(response.data.logs || []);
            renderPagination(response.data.total || 0, response.data.page || 1);
            updateRecordCount(response.data.total || 0);
        } else {
            renderTable([]);
            renderPagination(0, 1);
            updateRecordCount(0);
        }
    }).fail(function() {
        renderTable([]);
        renderPagination(0, 1);
        updateRecordCount(0);
    });
}

function updateRecordCount(total) {
    $('#totalRecords').text(total);
}

function renderTable(logs) {
    const tbody = $('#logsTableBody');
    tbody.empty();

    if (logs.length === 0) {
        tbody.html('<tr><td colspan="9" class="text-center">暂无数据</td></tr>');
        return;
    }

    logs.forEach(log => {
        const statusClass = getStatusBadgeClass(log.status || log.result);
        const statusText = getStatusText(log.status || log.result);
        const riskClass = getRiskBadgeClass(log.risk_level);
        const riskText = getRiskLevelText(log.risk_level);

        const sessionId = log.session_id || '';
        const displaySessionId = sessionId.length > 20 ? sessionId.substring(0, 20) + '...' : sessionId;

        const row = `
            <tr>
                <td>${log.id}</td>
                <td title="${sessionId}">${displaySessionId}</td>
                <td><span class="badge bg-${statusClass}">${statusText}</span></td>
                <td><span class="badge bg-${riskClass}">${riskText}</span></td>
                <td>${(log.risk_score || 0).toFixed(1)}</td>
                <td>${log.ip_address || '-'}</td>
                <td>${(log.duration || 0)}ms</td>
                <td>${formatDate(log.created_at)}</td>
                <td>
                    <button class="btn btn-sm btn-info" onclick="showDetail(${log.id})">
                        <i class="fas fa-eye"></i>
                    </button>
                </td>
            </tr>
        `;
        tbody.append(row);
    });
}

function getStatusBadgeClass(status) {
    const map = {
        'success': 'success',
        'passed': 'success',
        'failed': 'danger',
        'failure': 'danger',
        'blocked': 'warning',
        'block': 'warning',
        'pending': 'secondary'
    };
    return map[status] || 'secondary';
}

function getStatusText(status) {
    const map = {
        'success': '成功',
        'passed': '成功',
        'failed': '失败',
        'failure': '失败',
        'blocked': '拦截',
        'block': '拦截',
        'pending': '待处理'
    };
    return map[status] || status;
}

function getRiskBadgeClass(level) {
    const map = {
        'low': 'success',
        'medium': 'warning',
        'high': 'danger',
        'critical': 'dark'
    };
    return map[level] || 'secondary';
}

function getRiskLevelText(level) {
    const map = {
        'low': '低风险',
        'medium': '中风险',
        'high': '高风险',
        'critical': '极高风险'
    };
    return map[level] || level || '未知';
}

function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    if (isNaN(date.getTime())) return dateStr;

    const pad = n => String(n).padStart(2, '0');
    return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}

function renderPagination(total, currentPageNum) {
    const totalPages = Math.ceil(total / pageSize);
    const pagination = $('#pagination');
    pagination.empty();

    if (totalPages <= 1) {
        return;
    }

    const startPage = Math.max(1, currentPageNum - 2);
    const endPage = Math.min(totalPages, currentPageNum + 2);

    if (currentPageNum > 1) {
        pagination.append(`<li class="page-item"><a class="page-link" href="#" onclick="goToPage(${currentPageNum - 1}); return false;">上一页</a></li>`);
    }

    if (startPage > 1) {
        pagination.append(`<li class="page-item"><a class="page-link" href="#" onclick="goToPage(1); return false;">1</a></li>`);
        if (startPage > 2) {
            pagination.append(`<li class="page-item disabled"><a class="page-link">...</a></li>`);
        }
    }

    for (let i = startPage; i <= endPage; i++) {
        const active = i === currentPageNum ? 'active' : '';
        pagination.append(`<li class="page-item ${active}"><a class="page-link" href="#" onclick="goToPage(${i}); return false;">${i}</a></li>`);
    }

    if (endPage < totalPages) {
        if (endPage < totalPages - 1) {
            pagination.append(`<li class="page-item disabled"><a class="page-link">...</a></li>`);
        }
        pagination.append(`<li class="page-item"><a class="page-link" href="#" onclick="goToPage(${totalPages}); return false;">${totalPages}</a></li>`);
    }

    if (currentPageNum < totalPages) {
        pagination.append(`<li class="page-item"><a class="page-link" href="#" onclick="goToPage(${currentPageNum + 1}); return false;">下一页</a></li>`);
    }
}

function goToPage(page) {
    currentPage = page;
    loadLogs();
}

function showDetail(id) {
    $.get('/admin/api/logs/' + id, function(response) {
        if (response.code === 0) {
            const log = response.data;
            let html = '<div class="table-responsive"><table class="table table-sm">';
            html += '<tr><th width="30%">ID</th><td>' + log.id + '</td></tr>';
            html += '<tr><th>会话ID</th><td>' + (log.session_id || '-') + '</td></tr>';
            html += '<tr><th>验证码类型</th><td>' + (log.captcha_type || '-') + '</td></tr>';
            html += '<tr><th>状态</th><td><span class="badge bg-' + getStatusBadgeClass(log.status) + '">' + getStatusText(log.status) + '</span></td></tr>';
            html += '<tr><th>风险等级</th><td><span class="badge bg-' + getRiskBadgeClass(log.risk_level) + '">' + getRiskLevelText(log.risk_level) + '</span></td></tr>';
            html += '<tr><th>风险评分</th><td>' + (log.risk_score || 0).toFixed(2) + '</td></tr>';
            html += '<tr><th>IP地址</th><td>' + (log.ip_address || '-') + '</td></tr>';
            html += '<tr><th>User Agent</th><td>' + (log.user_agent || '-') + '</td></tr>';
            html += '<tr><th>耗时</th><td>' + (log.duration || 0) + ' ms</td></tr>';
            html += '<tr><th>创建时间</th><td>' + formatDate(log.created_at) + '</td></tr>';
            if (log.analysis_result) {
                html += '<tr><th>分析结果</th><td><pre style="max-height: 200px; overflow: auto;">' + JSON.stringify(JSON.parse(log.analysis_result), null, 2) + '</pre></td></tr>';
            }
            html += '</table></div>';
            $('#detailContent').html(html);
            $('#detailModal').modal('show');
        }
    });
}

function exportLogs(format) {
    const params = [];
    
    const status = $('#filterStatus').val();
    if (status) params.push('status=' + encodeURIComponent(status));
    
    const riskLevel = $('#filterRiskLevel').val();
    if (riskLevel) params.push('risk_level=' + encodeURIComponent(riskLevel));
    
    const captchaType = $('#filterCaptchaType').val();
    if (captchaType) params.push('captcha_type=' + encodeURIComponent(captchaType));
    
    const ip = $('#filterIP').val();
    if (ip) params.push('ip_address=' + encodeURIComponent(ip));

    const startDate = $('#filterStartDate').val();
    if (startDate) params.push('start_date=' + encodeURIComponent(startDate));

    const endDate = $('#filterEndDate').val();
    if (endDate) params.push('end_date=' + encodeURIComponent(endDate));
    
    const minRiskScore = $('#filterMinRiskScore').val();
    if (minRiskScore) params.push('min_risk_score=' + encodeURIComponent(minRiskScore));
    
    const maxRiskScore = $('#filterMaxRiskScore').val();
    if (maxRiskScore) params.push('max_risk_score=' + encodeURIComponent(maxRiskScore));
    
    params.push('format=' + encodeURIComponent(format));

    const queryString = params.length > 0 ? '?' + params.join('&') : '';
    window.location.href = '/admin/api/logs/export' + queryString;
}

function executeAdvancedSearch() {
    if (searchInstance) {
        searchInstance.page = 1;
        searchInstance.search();
    }
}

function clearSearchConditions() {
    if (searchInstance) {
        searchInstance.clearConditions();
        searchInstance.sortOptions = [];
        searchInstance.renderSortOptions();
    }
}

function showSaveSearchModal() {
    $('#saveSearchModal').modal('show');
}

function saveCurrentSearch() {
    const name = $('#searchName').val();
    const description = $('#searchDescription').val();
    
    if (!name) {
        alert('请输入搜索名称');
        return;
    }
    
    if (searchInstance) {
        searchInstance.saveSearch(name, description).then(() => {
            $('#saveSearchModal').modal('hide');
            $('#searchName').val('');
            $('#searchDescription').val('');
        });
    }
}

function addSortOption() {
    const field = prompt('请输入排序字段（例如：created_at, risk_score）：');
    if (!field) return;
    
    const order = confirm('是否降序排序？（确定=降序，取消=升序）') ? 'desc' : 'asc';
    
    if (searchInstance) {
        searchInstance.addSortOption(field, order);
    }
}
</script>
{% endblock %}
