<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 日志查询</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --sidebar-hover: #334155;
        }
        .sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            min-height: 100vh;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 20px;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            background-color: var(--sidebar-hover);
            color: white;
        }
        .sidebar-header {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-footer {
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .main-wrapper {
            flex: 1;
            min-width: 0;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #3b82f6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }
        .filter-section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .log-level {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .log-info { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .log-warning { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .log-error { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
        .log-debug { background: rgba(107, 114, 128, 0.1); color: #6b7280; }
        .log-detail {
            background: #1e293b;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-detail pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar d-flex flex-column flex-shrink-0">
            <div class="sidebar-header p-3">
                <h5 class="text-white mb-0">管理后台</h5>
            </div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link" href="/admin/"><i class="fas fa-chart-bar me-2"></i>仪表盘</a>
                <a class="nav-link" href="/admin/stats"><i class="fas fa-chart-line me-2"></i>统计分析</a>
                <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt me-2"></i>应用管理</a>
                <a class="nav-link active" href="/admin/logs"><i class="fas fa-clipboard-list me-2"></i>日志查询</a>
                <a class="nav-link" href="/admin/blacklist"><i class="fas fa-ban me-2"></i>黑名单</a>
            </nav>
            <div class="sidebar-footer mt-auto p-3">
                <a href="#" id="logoutBtn" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i>退出登录</a>
            </div>
        </div>

        <div class="main-wrapper">
            <header class="bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0">日志查询</h5>
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-outline-secondary btn-sm" id="refreshLogsBtn">
                        <i class="fas fa-sync me-1"></i>刷新
                    </button>
                    <span class="text-muted" id="usernameDisplay">管理员</span>
                    <div class="user-avatar" id="userAvatar">A</div>
                </div>
            </header>

            <main class="p-4 bg-light min-vh-100">
                <div class="filter-section">
                    <div class="row g-3">
                        <div class="col-md-2">
                            <label class="form-label small text-muted">日志级别</label>
                            <select class="form-select" id="levelFilter">
                                <option value="">全部</option>
                                <option value="info">INFO</option>
                                <option value="warning">WARNING</option>
                                <option value="error">ERROR</option>
                                <option value="debug">DEBUG</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">应用</label>
                            <select class="form-select" id="appFilter">
                                <option value="">全部应用</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">开始时间</label>
                            <input type="datetime-local" class="form-control" id="startTime">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">结束时间</label>
                            <input type="datetime-local" class="form-control" id="endTime">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small text-muted">搜索关键字</label>
                            <input type="text" class="form-control" id="searchKeyword" placeholder="搜索...">
                        </div>
                        <div class="col-md-2 d-flex align-items-end gap-2">
                            <button class="btn btn-primary flex-grow-1" id="searchLogsBtn">
                                <i class="fas fa-search me-2"></i>查询
                            </button>
                            <button class="btn btn-outline-secondary" id="resetLogsBtn" title="重置">
                                <i class="fas fa-redo"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <div class="text-muted small">
                                共 <span id="totalLogs">0</span> 条日志
                            </div>
                            <div class="btn-group btn-group-sm" role="group">
                                <button type="button" class="btn btn-outline-secondary active" id="autoScrollBtn">
                                    <i class="fas fa-arrows-alt-v me-1"></i>自动滚动
                                </button>
                                <button type="button" class="btn btn-outline-secondary" id="exportLogsBtn">
                                    <i class="fas fa-download me-1"></i>导出
                                </button>
                            </div>
                        </div>
                        <div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
                            <table class="table table-hover table-sm mb-0">
                                <thead class="table-light sticky-top">
                                    <tr>
                                        <th style="width: 160px;">时间</th>
                                        <th style="width: 80px;">级别</th>
                                        <th style="width: 120px;">应用</th>
                                        <th style="width: 150px;">模块</th>
                                        <th>消息</th>
                                        <th style="width: 100px;">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="logsTableBody">
                                </tbody>
                            </table>
                        </div>
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <div class="text-muted small">
                                显示第 <span id="logStart">0</span>-<span id="logEnd">0</span> 条
                            </div>
                            <nav>
                                <ul class="pagination pagination-sm mb-0" id="pagination">
                                </ul>
                            </nav>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <div class="modal fade" id="logDetailModal" tabindex="-1" aria-labelledby="logDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="logDetailModalLabel">日志详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <div class="d-flex gap-2 mb-2">
                            <span class="log-level" id="detailLevel">INFO</span>
                            <span class="text-muted" id="detailTime"></span>
                        </div>
                        <div class="text-muted small mb-2">
                            <span id="detailApp"></span> · <span id="detailModule"></span>
                        </div>
                    </div>
                    <div class="log-detail" id="logDetailContent">
                        <pre></pre>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-outline-primary" id="copyLogBtn">
                        <i class="fas fa-copy me-1"></i>复制
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/logs.js"></script>
</body>
</html>
