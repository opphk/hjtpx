<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨盾验证 · 管理后台 · 黑名单管理</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="bg-dark d-flex flex-column">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="fas fa-shield-halved"></i></div>
            <div>
                <div class="sidebar-brand-text">墨盾验证</div>
                <div class="sidebar-brand-sub">· 管理后台 ·</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link" href="/admin/"><i class="fas fa-chart-bar"></i><span>仪表盘</span></a>
            <a class="nav-link" href="/admin/stats"><i class="fas fa-chart-line"></i><span>统计分析</span></a>
            <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt"></i><span>应用管理</span></a>
            <a class="nav-link" href="/admin/logs"><i class="fas fa-clipboard-list"></i><span>日志查询</span></a>
            <a class="nav-link" href="/admin/risk-rules"><i class="fas fa-shield-alt"></i><span>风控规则</span></a>
            <a class="nav-link active" href="/admin/blacklist"><i class="fas fa-ban"></i><span>黑名单</span></a>
            <div class="sidebar-divider"></div>
        </nav>
        <div class="border-top border-secondary p-3 mt-auto">
            <a href="#" id="logoutBtn" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></a>
        </div>
    </div>

    <div class="main-wrapper">
        <header class="bg-white border-bottom d-flex justify-content-between align-items-center px-4 py-2">
            <div class="top-header-left">
                <h1 class="page-title">黑名单管理</h1>
                <span class="seal-stamp">墨盾</span>
            </div>
            <div class="top-header-right">
                <button id="addBlacklistBtn" class="btn-cinnabar btn-sm"><i class="fas fa-plus me-1"></i>添加黑名单</button>
                <button id="importBlacklistBtn" class="btn-outline-gold"><i class="fas fa-upload me-1"></i>批量导入</button>
                <div class="user-display">
                    <span class="user-name" id="usernameDisplay">管理员</span>
                    <div class="bg-danger text-white rounded-circle d-flex align-items-center justify-content-center" id="userAvatar">A</div>
                </div>
            </div>
        </header>
        <hr class="brush-divider">
        <main class="main-content">
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">黑名单总数</div>
                            <div class="stat-value text-danger" id="totalBlacklist">0</div>
                            <small class="text-muted" style="font-size:12px;">IP / 用户 / 设备</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">今日新增</div>
                            <div class="stat-value" id="todayAdded">0</div>
                            <small style="color:#1a7f37;font-size:12px;"><i class="fas fa-arrow-up me-1"></i>较昨日</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">已自动解封</div>
                            <div class="stat-value" style="color:#1a7f37;" id="autoUnblocked">0</div>
                            <small class="text-muted" style="font-size:12px;">定时任务</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">拦截次数</div>
                            <div class="stat-value" style="color:#8b7535;" id="totalBlocked">0</div>
                            <small class="text-muted" style="font-size:12px;">本周累计</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-2">
                            <label class="form-label">类型</label>
                            <select class="form-select" id="blacklistType">
                                <option value="">全部类型</option>
                                <option value="ip">IP地址</option>
                                <option value="user_id">用户ID</option>
                                <option value="device_id">设备ID</option>
                                <option value="phone">手机号</option>
                                <option value="email">邮箱</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">来源</label>
                            <select class="form-select" id="blacklistSource">
                                <option value="">全部来源</option>
                                <option value="manual">手动添加</option>
                                <option value="auto">自动识别</option>
                                <option value="import">批量导入</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">状态</label>
                            <select class="form-select" id="blacklistStatus">
                                <option value="">全部状态</option>
                                <option value="active">生效中</option>
                                <option value="expired">已过期</option>
                                <option value="unblocked">已解封</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">关键词</label>
                            <input type="text" class="form-control" id="blacklistKeyword" placeholder="输入IP地址/用户ID/设备ID">
                        </div>
                        <div class="col-md-3">
                            <button id="searchBlacklistBtn" class="btn-ink w-100"><i class="fas fa-search me-1"></i>搜索</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header">
                    <span class="text-muted small">共 <span id="blacklistCount">0</span> 条记录</span>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary active" data-view="table"><i class="fas fa-list"></i></button>
                        <button class="btn btn-outline-secondary" data-view="card"><i class="fas fa-th"></i></button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive" id="blacklistTableView">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th style="width:40px;"><input type="checkbox" id="selectAllBlacklist"></th>
                                    <th>目标</th>
                                    <th>类型</th>
                                    <th>来源</th>
                                    <th>原因</th>
                                    <th>过期时间</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="blacklistTableBody"></tbody>
                        </table>
                    </div>
                    <div class="d-none" id="blacklistCardView"></div>
                </div>
                <div class="card-footer" id="blacklistPagination"></div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="blacklistModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="blacklistModalTitle">添加黑名单</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="blacklistForm">
                    <div class="modal-body">
                        <input type="hidden" id="blacklistId">
                        <div class="mb-3">
                            <label class="form-label">类型 *</label>
                            <select class="form-select" id="blType" required>
                                <option value="">请选择类型</option>
                                <option value="ip">IP地址</option>
                                <option value="user_id">用户ID</option>
                                <option value="device_id">设备ID</option>
                                <option value="phone">手机号</option>
                                <option value="email">邮箱</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">目标值 *</label>
                            <input type="text" class="form-control" id="blValue" required placeholder="输入具体的IP地址、用户ID等">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">封禁原因 *</label>
                            <textarea class="form-control" id="blReason" rows="3" required placeholder="详细描述封禁原因"></textarea>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label class="form-label">过期时间</label>
                                <select class="form-select" id="blExpiration">
                                    <option value="permanent">永久封禁</option>
                                    <option value="7d">7天</option>
                                    <option value="30d">30天</option>
                                    <option value="90d">90天</option>
                                    <option value="custom">自定义</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">处置方式</label>
                                <select class="form-select" id="blAction">
                                    <option value="block">直接拦截</option>
                                    <option value="captcha">验证码</option>
                                    <option value="review">人工审核</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3 d-none" id="customExpirationGroup">
                            <label class="form-label">自定义过期时间</label>
                            <input type="datetime-local" class="form-control" id="blCustomExpiration">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">关联应用</label>
                            <select class="form-select" id="blApps" multiple>
                                <option value="all" selected>全部应用</option>
                                <option value="1">用户中心</option>
                                <option value="2">支付系统</option>
                                <option value="3">消息推送</option>
                            </select>
                            <small class="text-muted" style="font-size:11px;">按住 Ctrl 多选</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">备注</label>
                            <textarea class="form-control" id="blNote" rows="2" placeholder="其他备注信息"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-outline-gold" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn-ink">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="importModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">批量导入黑名单</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">导入类型</label>
                        <select class="form-select" id="importType">
                            <option value="ip">IP地址</option>
                            <option value="user_id">用户ID</option>
                            <option value="device_id">设备ID</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">上传文件</label>
                        <input type="file" class="form-control" id="importFile" accept=".txt,.csv">
                        <small class="text-muted" style="font-size:11px;">支持 TXT/CSV 格式，每行一个值</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">封禁原因</label>
                        <input type="text" class="form-control" id="importReason" placeholder="统一封禁原因">
                    </div>
                    <div class="alert alert-info">
                        <i class="fas fa-info-circle me-1"></i>
                        文件格式示例：每行一个目标值，如 IP 地址或用户ID
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-outline-gold" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn-ink" id="confirmImportBtn">确认导入</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">黑名单详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-outline-gold" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/blacklist.js"></script>
</body>
</html>
