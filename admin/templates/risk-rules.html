<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨盾验证 · 管理后台 · 风控规则</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="bg-dark d-flex flex-column">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="fas fa-shield-halved"></i></div>
            <div>
                <div class="sidebar-brand-text">墨盾验证</div>
                <div class="sidebar-brand-sub">· 管理后台 ·</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link" href="/admin/"><i class="fas fa-chart-bar"></i><span>仪表盘</span></a>
            <a class="nav-link" href="/admin/stats"><i class="fas fa-chart-line"></i><span>统计分析</span></a>
            <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt"></i><span>应用管理</span></a>
            <a class="nav-link" href="/admin/logs"><i class="fas fa-clipboard-list"></i><span>日志查询</span></a>
            <a class="nav-link active" href="/admin/risk-rules"><i class="fas fa-shield-alt"></i><span>风控规则</span></a>
            <a class="nav-link" href="/admin/blacklist"><i class="fas fa-ban"></i><span>黑名单</span></a>
            <div class="sidebar-divider"></div>
        </nav>
        <div class="border-top border-secondary p-3 mt-auto">
            <a href="#" id="logoutBtn" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></a>
        </div>
    </div>

    <div class="main-wrapper">
        <header class="bg-white border-bottom d-flex justify-content-between align-items-center px-4 py-2">
            <div class="top-header-left">
                <h1 class="page-title">风控规则配置</h1>
                <span class="seal-stamp">墨盾</span>
            </div>
            <div class="top-header-right">
                <button id="addRuleBtn" class="btn-cinnabar btn-sm"><i class="fas fa-plus me-1"></i>添加规则</button>
                <div class="user-display">
                    <span class="user-name" id="usernameDisplay">管理员</span>
                    <div class="bg-danger text-white rounded-circle d-flex align-items-center justify-content-center" id="userAvatar">A</div>
                </div>
            </div>
        </header>
        <hr class="brush-divider">
        <main class="main-content">
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">总规则数</div>
                            <div class="stat-value" id="totalRules">0</div>
                            <small class="text-muted" style="font-size:12px;">启用中 <span id="activeRules">0</span> 条</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">拦截请求</div>
                            <div class="stat-value text-danger" id="blockedRequests">0</div>
                            <small class="text-danger" style="font-size:12px;"><i class="fas fa-arrow-up me-1"></i>今日</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">风险预警</div>
                            <div class="stat-value" style="color:#8b7535;" id="riskAlerts">0</div>
                            <small style="color:#8b7535;font-size:12px;"><i class="fas fa-exclamation-triangle me-1"></i>待处理</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">拦截率</div>
                            <div class="stat-value" style="color:#1a7f37;" id="blockRate">0%</div>
                            <small style="color:#1a7f37;font-size:12px;"><i class="fas fa-check-circle me-1"></i>本周</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">规则类型</label>
                            <select class="form-select" id="ruleTypeFilter">
                                <option value="">全部类型</option>
                                <option value="rate_limit">频率限制</option>
                                <option value="ip_block">IP封禁</option>
                                <option value="behavior">行为分析</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">状态</label>
                            <select class="form-select" id="ruleStatusFilter">
                                <option value="">全部状态</option>
                                <option value="enabled">启用</option>
                                <option value="disabled">禁用</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">关键词搜索</label>
                            <input type="text" class="form-control" id="ruleKeyword" placeholder="输入规则名称">
                        </div>
                        <div class="col-md-3">
                            <button id="searchRulesBtn" class="btn-ink w-100"><i class="fas fa-search me-1"></i>搜索</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-header">
                    <span class="text-muted small">共 <span id="rulesCount">0</span> 条规则</span>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary active" data-view="table"><i class="fas fa-list"></i></button>
                        <button class="btn btn-outline-secondary" data-view="card"><i class="fas fa-th"></i></button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive" id="rulesTableView">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th style="width:40px;"><input type="checkbox" id="selectAllRules"></th>
                                    <th>规则名称</th>
                                    <th>规则类型</th>
                                    <th>触发条件</th>
                                    <th>处置方式</th>
                                    <th>优先级</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="rulesTableBody"></tbody>
                        </table>
                    </div>
                    <div class="d-none" id="rulesCardView"></div>
                </div>
                <div class="card-footer" id="rulesPagination"></div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="ruleModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="ruleModalTitle">添加规则</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="ruleForm">
                    <div class="modal-body">
                        <input type="hidden" id="ruleId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">规则名称 *</label>
                                    <input type="text" class="form-control" id="ruleName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">规则类型 *</label>
                                    <select class="form-select" id="ruleType" required>
                                        <option value="">请选择</option>
                                        <option value="rate_limit">频率限制</option>
                                        <option value="ip_block">IP封禁</option>
                                        <option value="behavior">行为分析</option>
                                        <option value="device_fingerprint">设备指纹</option>
                                        <option value="custom">自定义</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">规则描述</label>
                            <textarea class="form-control" id="ruleDescription" rows="2" placeholder="描述规则的用途"></textarea>
                        </div>
                        <div class="card mb-3 bg-light">
                            <div class="card-header" style="padding:12px 16px;"><h6 style="font-size:14px;"><i class="fas fa-cog me-2"></i>触发条件</h6></div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label">字段</label>
                                        <select class="form-select" id="conditionField">
                                            <option value="ip">IP地址</option>
                                            <option value="user_id">用户ID</option>
                                            <option value="app_id">应用ID</option>
                                            <option value="session_id">会话ID</option>
                                            <option value="device_id">设备ID</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">运算符</label>
                                        <select class="form-select" id="conditionOperator">
                                            <option value="gt">大于</option>
                                            <option value="gte">大于等于</option>
                                            <option value="lt">小于</option>
                                            <option value="lte">小于等于</option>
                                            <option value="eq">等于</option>
                                            <option value="neq">不等于</option>
                                            <option value="contains">包含</option>
                                            <option value="regex">正则匹配</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">阈值</label>
                                        <input type="text" class="form-control" id="conditionValue" placeholder="输入阈值">
                                    </div>
                                </div>
                                <div class="row g-3 mt-2">
                                    <div class="col-md-6">
                                        <label class="form-label">时间窗口</label>
                                        <div class="input-group">
                                            <input type="number" class="form-control" id="timeWindow" value="60" min="1">
                                            <span class="input-group-text">秒</span>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">累计次数</label>
                                        <input type="number" class="form-control" id="triggerCount" value="5" min="1">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">处置方式 *</label>
                                    <select class="form-select" id="ruleAction" required>
                                        <option value="">请选择</option>
                                        <option value="block">直接拦截</option>
                                        <option value="captcha">验证码验证</option>
                                        <option value="rate_limit">限流</option>
                                        <option value="warning">警告日志</option>
                                        <option value="review">人工审核</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">优先级</label>
                                    <select class="form-select" id="rulePriority">
                                        <option value="1">低</option>
                                        <option value="5" selected>中</option>
                                        <option value="10">高</option>
                                        <option value="100">紧急</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">适用应用</label>
                            <select class="form-select" id="ruleApps" multiple>
                                <option value="all" selected>全部应用</option>
                                <option value="1">用户中心</option>
                                <option value="2">支付系统</option>
                                <option value="3">消息推送</option>
                            </select>
                            <small class="text-muted" style="font-size:11px;">按住 Ctrl 多选</small>
                        </div>
                        <div class="mb-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="ruleEnabled" checked>
                                <label class="form-check-label" for="ruleEnabled">立即启用规则</label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-outline-gold" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn-ink">保存规则</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="ruleDetailModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">规则详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="ruleDetailContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-outline-gold" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/risk-rules.js"></script>
</body>
</html>
