<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨盾验证 · 管理后台 · 风控规则</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --ink: #1a1a2e; --ink-light: #2d2d44; --ink-lighter: #3d3d5c;
            --cinnabar: #c23a2b; --cinnabar-light: #d94a3a; --cinnabar-dark: #a32e22;
            --gold: #c9a96e; --gold-light: #dcc48c; --gold-dark: #b8924e;
            --paper: #faf6ef; --paper-dark: #f0e8d8; --paper-darker: #e6dcc8;
            --text-primary: #2c2c2c; --text-secondary: #6b6b6b; --text-muted: #999;
            --sidebar-width: 260px; --header-height: 64px;
            --font-serif: 'Noto Serif SC', serif; --font-sans: 'Noto Sans SC', sans-serif;
            --shadow-card: 0 2px 12px rgba(26,26,46,0.08);
            --shadow-sidebar: 2px 0 16px rgba(0,0,0,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-sans); background:var(--paper); color:var(--text-primary); overflow-x:hidden; }
        .sidebar { position:fixed; top:0; left:0; width:var(--sidebar-width); height:100vh; background:var(--ink); display:flex; flex-direction:column; z-index:1000; box-shadow:var(--shadow-sidebar); overflow-y:auto; }
        .sidebar-brand { padding:24px 20px 20px; border-bottom:1px solid rgba(201,169,110,0.15); display:flex; align-items:center; gap:14px; }
        .sidebar-brand-icon { width:44px; height:44px; background:linear-gradient(135deg,var(--cinnabar),#8b2a1e); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; color:var(--gold); flex-shrink:0; position:relative; box-shadow:0 2px 8px rgba(194,58,43,0.3); }
        .sidebar-brand-icon::after { content:''; position:absolute; inset:2px; border:1px solid rgba(201,169,110,0.3); border-radius:8px; }
        .sidebar-brand-text { font-family:var(--font-serif); font-weight:700; font-size:20px; color:var(--gold); line-height:1.3; }
        .sidebar-brand-sub { font-family:var(--font-sans); font-size:11px; color:rgba(201,169,110,0.5); font-weight:300; letter-spacing:2px; }
        .sidebar-nav { flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:2px; }
        .sidebar-nav .nav-link { display:flex; align-items:center; gap:12px; padding:12px 16px; color:rgba(255,255,255,0.55); text-decoration:none; border-radius:8px; font-size:14px; font-weight:400; transition:all 0.25s ease; position:relative; }
        .sidebar-nav .nav-link i { width:20px; text-align:center; font-size:16px; color:rgba(255,255,255,0.35); transition:color 0.25s; }
        .sidebar-nav .nav-link:hover { background:rgba(201,169,110,0.08); color:var(--gold-light); }
        .sidebar-nav .nav-link:hover i { color:var(--gold-light); }
        .sidebar-nav .nav-link.active { background:rgba(201,169,110,0.12); color:var(--gold); font-weight:500; }
        .sidebar-nav .nav-link.active i { color:var(--gold); }
        .sidebar-nav .nav-link.active::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:3px; height:20px; background:var(--gold); border-radius:0 3px 3px 0; }
        .sidebar-divider { height:1px; background:linear-gradient(to right,transparent,rgba(201,169,110,0.15),transparent); margin:8px 16px; }
        .sidebar-footer { padding:16px 12px; border-top:1px solid rgba(201,169,110,0.1); }
        .sidebar-footer .nav-link { display:flex; align-items:center; gap:12px; padding:10px 16px; color:rgba(255,255,255,0.5); text-decoration:none; border-radius:8px; font-size:14px; transition:all 0.25s ease; }
        .sidebar-footer .nav-link i { width:20px; text-align:center; font-size:16px; }
        .sidebar-footer .nav-link:hover { background:rgba(194,58,43,0.12); color:var(--cinnabar-light); }
        .main-wrapper { margin-left:var(--sidebar-width); min-height:100vh; }
        .top-header { height:var(--header-height); background:var(--paper); border-bottom:1px solid var(--paper-darker); display:flex; align-items:center; justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:500; }
        .top-header-left { display:flex; align-items:center; gap:16px; }
        .page-title { font-family:var(--font-serif); font-size:20px; font-weight:700; color:var(--ink); margin:0; position:relative; padding-left:16px; }
        .page-title::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:3px; height:22px; background:var(--cinnabar); border-radius:2px; }
        .top-header-right { display:flex; align-items:center; gap:16px; }
        .user-display { display:flex; align-items:center; gap:10px; }
        .user-name { font-size:13px; color:var(--text-secondary); font-weight:400; }
        .user-avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--cinnabar),var(--cinnabar-dark)); color:var(--gold); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; font-family:var(--font-serif); box-shadow:0 2px 6px rgba(194,58,43,0.2); }
        .main-content { padding:28px 32px; min-height:calc(100vh - var(--header-height)); }
        .brush-divider { height:4px; background:linear-gradient(to right,var(--gold),transparent); border:none; margin:0 0 24px; opacity:0.6; border-radius:2px; }
        .seal-stamp { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border:1.5px solid var(--cinnabar); color:var(--cinnabar); font-family:var(--font-serif); font-size:9px; font-weight:900; transform:rotate(-8deg); line-height:1; margin-left:4px; flex-shrink:0; padding:1px; }
        .card { background:var(--paper); border:1px solid var(--paper-darker); border-radius:10px; box-shadow:var(--shadow-card); transition:box-shadow 0.3s ease, transform 0.3s ease; }
        .card:hover { box-shadow:0 4px 20px rgba(26,26,46,0.12); }
        .card-header { background:transparent; border-bottom:1px solid var(--paper-darker); padding:16px 20px; font-family:var(--font-serif); font-weight:600; color:var(--ink); display:flex; align-items:center; justify-content:space-between; }
        .card-header h5, .card-header h6 { font-family:var(--font-serif); font-weight:600; margin:0; color:var(--ink); }
        .card-body { padding:20px; }
        .card-footer { background:transparent; border-top:1px solid var(--paper-darker); padding:12px 20px; }
        .stat-card { transition:transform 0.3s ease,box-shadow 0.3s ease; cursor:default; }
        .stat-card:hover { transform:translateY(-4px); box-shadow:0 6px 24px rgba(26,26,46,0.12); }
        .stat-card .stat-value { font-family:var(--font-serif); font-weight:700; font-size:28px; color:var(--ink); line-height:1.2; }
        .stat-card .stat-label { font-size:12px; color:var(--text-muted); font-weight:400; letter-spacing:0.5px; }
        .btn-ink { background:var(--ink); border:1px solid var(--ink); color:var(--gold); font-family:var(--font-sans); font-weight:500; padding:8px 20px; border-radius:6px; transition:all 0.25s ease; }
        .btn-ink:hover { background:var(--ink-light); color:var(--gold-light); border-color:var(--ink-light); }
        .btn-cinnabar { background:var(--cinnabar); border:1px solid var(--cinnabar); color:#fff; font-family:var(--font-sans); font-weight:500; padding:8px 20px; border-radius:6px; transition:all 0.25s ease; }
        .btn-cinnabar:hover { background:var(--cinnabar-light); border-color:var(--cinnabar-light); color:#fff; }
        .btn-outline-gold { background:transparent; border:1px solid var(--gold); color:var(--gold-dark); font-family:var(--font-sans); font-weight:500; padding:6px 16px; border-radius:6px; transition:all 0.25s ease; }
        .btn-outline-gold:hover { background:var(--gold); color:var(--ink); border-color:var(--gold); }
        .btn-outline-cinnabar { background:transparent; border:1px solid var(--cinnabar); color:var(--cinnabar); font-family:var(--font-sans); font-weight:500; padding:6px 16px; border-radius:6px; transition:all 0.25s ease; }
        .btn-outline-cinnabar:hover { background:var(--cinnabar); color:#fff; }
        .form-label { font-size:13px; font-weight:500; color:var(--text-secondary); margin-bottom:6px; }
        .form-control, .form-select { background:var(--paper); border:1px solid var(--paper-darker); border-radius:6px; color:var(--text-primary); font-family:var(--font-sans); font-size:14px; padding:8px 14px; transition:border-color 0.25s ease,box-shadow 0.25s ease; }
        .form-control:focus, .form-select:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,169,110,0.15); background:var(--paper); color:var(--text-primary); }
        .btn-group .btn-outline-secondary { border-color:var(--paper-darker); color:var(--text-secondary); background:transparent; }
        .btn-group .btn-outline-secondary:hover { background:rgba(201,169,110,0.1); border-color:var(--gold); color:var(--gold-dark); }
        .btn-group .btn-outline-secondary.active { background:var(--ink); border-color:var(--ink); color:var(--gold); }
        .table { color:var(--text-primary); margin-bottom:0; }
        .table thead th { font-family:var(--font-sans); font-weight:500; font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; border-bottom:2px solid var(--paper-darker); padding:12px 16px; background:transparent; }
        .table tbody td { padding:12px 16px; vertical-align:middle; border-color:var(--paper-darker); font-size:13px; }
        .table-hover tbody tr:hover { background:rgba(201,169,110,0.06); }
        .badge { font-weight:500; font-size:11px; padding:4px 10px; border-radius:4px; letter-spacing:0.3px; }
        .badge-bg-success { background:rgba(46,160,67,0.1); color:#1a7f37; }
        .badge-bg-danger { background:rgba(194,58,43,0.1); color:var(--cinnabar); }
        .badge-bg-warning { background:rgba(201,169,110,0.15); color:#8b7535; }
        .badge-bg-info { background:rgba(56,139,253,0.1); color:#1f6feb; }
        .badge-bg-secondary { background:rgba(153,153,153,0.1); color:#666; }
        .modal-content { background:var(--paper); border:1px solid var(--paper-darker); border-radius:12px; box-shadow:0 8px 32px rgba(26,26,46,0.15); }
        .modal-header { border-bottom:1px solid var(--paper-darker); padding:18px 24px; }
        .modal-header .modal-title { font-family:var(--font-serif); font-weight:600; color:var(--ink); }
        .modal-header .btn-close { filter:brightness(0.6); }
        .modal-body { padding:24px; }
        .modal-footer { border-top:1px solid var(--paper-darker); padding:14px 24px; }
        .form-check-input:checked { background-color:var(--gold); border-color:var(--gold); }
        .card.bg-light { background:var(--paper-dark); }
        .card.bg-light .card-header { background:transparent; border-bottom:1px solid var(--paper-darker); }
        .pagination { margin:0; gap:4px; }
        .page-link { border:1px solid var(--paper-darker); color:var(--text-secondary); background:transparent; border-radius:6px; padding:6px 14px; font-size:13px; transition:all 0.2s; }
        .page-link:hover { background:rgba(201,169,110,0.1); border-color:var(--gold); color:var(--gold-dark); }
        .page-item.active .page-link { background:var(--ink); border-color:var(--ink); color:var(--gold); }
        .page-item.disabled .page-link { opacity:0.4; pointer-events:none; }
        .input-group-text { background:var(--paper-darker); border:1px solid var(--paper-darker); color:var(--text-secondary); font-size:13px; }
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--paper-darker); border-radius:3px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }
        @media (max-width:768px) { .sidebar { width:100%; height:auto; position:relative; } .main-wrapper { margin-left:0; } .main-content { padding:16px; } .top-header { padding:0 16px; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-brand-icon"><i class="fas fa-shield-halved"></i></div>
            <div>
                <div class="sidebar-brand-text">墨盾验证</div>
                <div class="sidebar-brand-sub">· 管理后台 ·</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link" href="/admin/"><i class="fas fa-chart-bar"></i><span>仪表盘</span></a>
            <a class="nav-link" href="/admin/stats"><i class="fas fa-chart-line"></i><span>统计分析</span></a>
            <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt"></i><span>应用管理</span></a>
            <a class="nav-link" href="/admin/logs"><i class="fas fa-clipboard-list"></i><span>日志查询</span></a>
            <a class="nav-link active" href="/admin/risk-rules"><i class="fas fa-shield-alt"></i><span>风控规则</span></a>
            <a class="nav-link" href="/admin/blacklist"><i class="fas fa-ban"></i><span>黑名单</span></a>
            <div class="sidebar-divider"></div>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></a>
        </div>
    </div>

    <div class="main-wrapper">
        <header class="top-header">
            <div class="top-header-left">
                <h1 class="page-title">风控规则配置</h1>
                <span class="seal-stamp">墨盾</span>
            </div>
            <div class="top-header-right">
                <button id="addRuleBtn" class="btn-cinnabar btn-sm"><i class="fas fa-plus me-1"></i>添加规则</button>
                <div class="user-display">
                    <span class="user-name" id="usernameDisplay">管理员</span>
                    <div class="user-avatar" id="userAvatar">A</div>
                </div>
            </div>
        </header>
        <hr class="brush-divider">
        <main class="main-content">
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card stat-card text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">总规则数</div>
                            <div class="stat-value" id="totalRules">0</div>
                            <small style="color:var(--text-muted);font-size:12px;">启用中 <span id="activeRules">0</span> 条</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">拦截请求</div>
                            <div class="stat-value" style="color:var(--cinnabar);" id="blockedRequests">0</div>
                            <small style="color:var(--cinnabar);font-size:12px;"><i class="fas fa-arrow-up me-1"></i>今日</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">风险预警</div>
                            <div class="stat-value" style="color:#8b7535;" id="riskAlerts">0</div>
                            <small style="color:#8b7535;font-size:12px;"><i class="fas fa-exclamation-triangle me-1"></i>待处理</small>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card text-center">
                        <div class="card-body">
                            <div class="stat-label mb-1">拦截率</div>
                            <div class="stat-value" style="color:#1a7f37;" id="blockRate">0%</div>
                            <small style="color:#1a7f37;font-size:12px;"><i class="fas fa-check-circle me-1"></i>本周</small>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label">规则类型</label>
                            <select class="form-select" id="ruleTypeFilter">
                                <option value="">全部类型</option>
                                <option value="rate_limit">频率限制</option>
                                <option value="ip_block">IP封禁</option>
                                <option value="behavior">行为分析</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">状态</label>
                            <select class="form-select" id="ruleStatusFilter">
                                <option value="">全部状态</option>
                                <option value="enabled">启用</option>
                                <option value="disabled">禁用</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">关键词搜索</label>
                            <input type="text" class="form-control" id="ruleKeyword" placeholder="输入规则名称">
                        </div>
                        <div class="col-md-3">
                            <button id="searchRulesBtn" class="btn-ink w-100"><i class="fas fa-search me-1"></i>搜索</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span style="color:var(--text-muted);font-size:13px;">共 <span id="rulesCount">0</span> 条规则</span>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-secondary active" data-view="table"><i class="fas fa-list"></i></button>
                        <button class="btn btn-outline-secondary" data-view="card"><i class="fas fa-th"></i></button>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive" id="rulesTableView">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th style="width:40px;"><input type="checkbox" id="selectAllRules"></th>
                                    <th>规则名称</th>
                                    <th>规则类型</th>
                                    <th>触发条件</th>
                                    <th>处置方式</th>
                                    <th>优先级</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="rulesTableBody"></tbody>
                        </table>
                    </div>
                    <div class="d-none" id="rulesCardView"></div>
                </div>
                <div class="card-footer" id="rulesPagination"></div>
            </div>
        </main>
    </div>

    <div class="modal fade" id="ruleModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="ruleModalTitle">添加规则</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="ruleForm">
                    <div class="modal-body">
                        <input type="hidden" id="ruleId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">规则名称 *</label>
                                    <input type="text" class="form-control" id="ruleName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">规则类型 *</label>
                                    <select class="form-select" id="ruleType" required>
                                        <option value="">请选择</option>
                                        <option value="rate_limit">频率限制</option>
                                        <option value="ip_block">IP封禁</option>
                                        <option value="behavior">行为分析</option>
                                        <option value="device_fingerprint">设备指纹</option>
                                        <option value="custom">自定义</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">规则描述</label>
                            <textarea class="form-control" id="ruleDescription" rows="2" placeholder="描述规则的用途"></textarea>
                        </div>
                        <div class="card mb-3" style="background:var(--paper-dark);border-color:var(--paper-darker);">
                            <div class="card-header" style="padding:12px 16px;"><h6 style="font-size:14px;"><i class="fas fa-cog me-2"></i>触发条件</h6></div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label">字段</label>
                                        <select class="form-select" id="conditionField">
                                            <option value="ip">IP地址</option>
                                            <option value="user_id">用户ID</option>
                                            <option value="app_id">应用ID</option>
                                            <option value="session_id">会话ID</option>
                                            <option value="device_id">设备ID</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">运算符</label>
                                        <select class="form-select" id="conditionOperator">
                                            <option value="gt">大于</option>
                                            <option value="gte">大于等于</option>
                                            <option value="lt">小于</option>
                                            <option value="lte">小于等于</option>
                                            <option value="eq">等于</option>
                                            <option value="neq">不等于</option>
                                            <option value="contains">包含</option>
                                            <option value="regex">正则匹配</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label">阈值</label>
                                        <input type="text" class="form-control" id="conditionValue" placeholder="输入阈值">
                                    </div>
                                </div>
                                <div class="row g-3 mt-2">
                                    <div class="col-md-6">
                                        <label class="form-label">时间窗口</label>
                                        <div class="input-group">
                                            <input type="number" class="form-control" id="timeWindow" value="60" min="1">
                                            <span class="input-group-text">秒</span>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">累计次数</label>
                                        <input type="number" class="form-control" id="triggerCount" value="5" min="1">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">处置方式 *</label>
                                    <select class="form-select" id="ruleAction" required>
                                        <option value="">请选择</option>
                                        <option value="block">直接拦截</option>
                                        <option value="captcha">验证码验证</option>
                                        <option value="rate_limit">限流</option>
                                        <option value="warning">警告日志</option>
                                        <option value="review">人工审核</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">优先级</label>
                                    <select class="form-select" id="rulePriority">
                                        <option value="1">低</option>
                                        <option value="5" selected>中</option>
                                        <option value="10">高</option>
                                        <option value="100">紧急</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">适用应用</label>
                            <select class="form-select" id="ruleApps" multiple>
                                <option value="all" selected>全部应用</option>
                                <option value="1">用户中心</option>
                                <option value="2">支付系统</option>
                                <option value="3">消息推送</option>
                            </select>
                            <small style="color:var(--text-muted);font-size:11px;">按住 Ctrl 多选</small>
                        </div>
                        <div class="mb-3">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="ruleEnabled" checked>
                                <label class="form-check-label" for="ruleEnabled">立即启用规则</label>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-outline-gold" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn-ink">保存规则</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="ruleDetailModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">规则详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="ruleDetailContent"></div>
                <div class="modal-footer">
                    <button type="button" class="btn-outline-gold" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/risk-rules.js"></script>
</body>
</html>
