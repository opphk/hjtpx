<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Verification Management - Admin</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css">
    <style>
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --bg-light: #f8fafc;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-light);
            margin: 0;
            padding: 0;
        }

        .blockchain-management-panel {
            max-width: 1400px;
            margin: 20px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn-refresh {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn-refresh:hover {
            background: rgba(255,255,255,0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            padding: 24px;
            background: var(--bg-light);
        }

        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .stat-icon {
            font-size: 32px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .stat-content {
            flex: 1;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
        }

        .stat-label {
            font-size: 14px;
            color: #718096;
        }

        .management-tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            background: white;
        }

        .tab-btn {
            padding: 16px 24px;
            border: none;
            background: none;
            font-size: 15px;
            font-weight: 500;
            color: #718096;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        .tab-btn.active {
            color: var(--primary-color);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary-color);
        }

        .tab-content {
            display: none;
            padding: 24px;
        }

        .tab-content.active {
            display: block;
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .filter-group, .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-group input,
        .filter-group select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
        }

        .btn-filter, .btn-export, .btn-primary {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-filter {
            background: var(--bg-light);
            color: #4a5568;
        }

        .btn-filter:hover {
            background: var(--border-color);
        }

        .btn-export {
            background: #10b981;
            color: white;
        }

        .btn-export:hover {
            background: #059669;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table th {
            background: var(--bg-light);
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid var(--border-color);
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .data-table tr:hover {
            background: #f7fafc;
        }

        .data-table .hash {
            font-family: monospace;
            font-size: 12px;
            color: var(--primary-color);
            background: #edf2f7;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .data-table .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .data-table .badge.chain {
            background: #e0e7ff;
            color: #4338ca;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active, .status-badge.success {
            background: #d1fae5;
            color: #059669;
        }

        .status-badge.pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-badge.suspended, .status-badge.failure {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-action {
            padding: 4px 10px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 4px;
            transition: all 0.2s;
        }

        .btn-action:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .trust-score {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trust-score .score-bar {
            flex: 1;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            max-width: 100px;
        }

        .trust-score .score-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success-color), #34d399);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .loading-row td {
            text-align: center;
            color: #a0aec0;
            padding: 40px;
        }

        .error-row td {
            color: var(--danger-color);
        }

        .no-data {
            text-align: center;
            color: #a0aec0;
            padding: 40px;
        }

        .settings-section {
            margin-bottom: 32px;
        }

        .settings-section h3 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #2d3748;
        }

        .chains-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chain-item {
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chain-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chain-name {
            font-weight: 600;
            color: #2d3748;
        }

        .chain-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 12px;
            background: #e2e8f0;
            color: #718096;
        }

        .chain-status.active {
            background: #d1fae5;
            color: #059669;
        }

        .chain-stats {
            display: flex;
            gap: 24px;
            font-size: 14px;
            color: #718096;
        }

        .setting-item {
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-item label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .setting-item input[type="number"] {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            width: 80px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow: auto;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #718096;
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #4a5568;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group textarea {
            resize: vertical;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-cancel {
            padding: 10px 20px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-cancel:hover {
            background: var(--bg-light);
        }

        .result-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .result-badge.success {
            background: #d1fae5;
            color: #059669;
        }

        .result-badge.failure {
            background: #fee2e2;
            color: #dc2626;
        }

        .result-badge.pending {
            background: #fef3c7;
            color: #d97706;
        }
    </style>
</head>
<body>
    <div id="blockchain-management"></div>

    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
    <script src="blockchain-management.js"></script>
</body>
</html>
