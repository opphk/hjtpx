<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}管理后台 - 仪表盘{% endblock %}</title>
    <link rel="stylesheet" href="/admin/static/css/style.css">
</head>
<body class="admin-layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>管理后台</h2>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="/admin/" class="active">
                    <span class="icon">📊</span>
                    <span>仪表盘</span>
                </a></li>
                <li><a href="/admin/users">
                    <span class="icon">👥</span>
                    <span>用户管理</span>
                </a></li>
                <li><a href="/admin/products">
                    <span class="icon">📦</span>
                    <span>产品管理</span>
                </a></li>
                <li><a href="/admin/orders">
                    <span class="icon">🛒</span>
                    <span>订单管理</span>
                </a></li>
                <li><a href="/admin/settings">
                    <span class="icon">⚙️</span>
                    <span>系统设置</span>
                </a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <a href="/admin/logout" class="logout-btn">
                <span class="icon">🚪</span>
                <span>退出登录</span>
            </a>
        </div>
    </div>
    
    <div class="main-wrapper">
        <header class="topbar">
            <div class="topbar-left">
                <h1>{% block page_title %}仪表盘{% endblock %}</h1>
            </div>
            <div class="topbar-right">
                <div class="user-info">
                    <span class="username">管理员</span>
                    <div class="user-avatar">A</div>
                </div>
            </div>
        </header>
        
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    
    <script src="/admin/static/js/main.js"></script>
</body>
</html>
