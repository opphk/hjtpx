<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}墨盾验证 · 管理后台{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    {% block styles %}{% endblock %}
</head>
<body>
    <div class="sidebar bg-dark d-flex flex-column">
        <div class="sidebar-brand border-bottom border-secondary p-3">
            <div class="sidebar-brand-icon">
                <i class="fas fa-shield-halved"></i>
            </div>
            <div>
                <div class="sidebar-brand-text">墨盾验证</div>
                <div class="sidebar-brand-sub">· 管理后台 ·</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a class="nav-link {% if request.path == '/admin/' %}active{% endif %}" href="/admin/">
                <i class="fas fa-chart-bar"></i><span>仪表盘</span>
            </a>
            <a class="nav-link {% if request.path == '/admin/stats' %}active{% endif %}" href="/admin/stats">
                <i class="fas fa-chart-line"></i><span>统计分析</span>
            </a>
            <a class="nav-link {% if request.path == '/admin/advanced-analytics' %}active{% endif %}" href="/admin/advanced-analytics">
                <i class="fas fa-chart-pie"></i><span>高级分析</span>
            </a>
            <a class="nav-link {% if request.path == '/admin/applications' %}active{% endif %}" href="/admin/applications">
                <i class="fas fa-mobile-alt"></i><span>应用管理</span>
            </a>
            <a class="nav-link {% if request.path == '/admin/logs' %}active{% endif %}" href="/admin/logs">
                <i class="fas fa-clipboard-list"></i><span>日志查询</span>
            </a>
            <a class="nav-link {% if request.path == '/admin/risk-rules' %}active{% endif %}" href="/admin/risk-rules">
                <i class="fas fa-shield-alt"></i><span>风控规则</span>
            </a>
            <a class="nav-link {% if request.path == '/admin/blacklist' %}active{% endif %}" href="/admin/blacklist">
                <i class="fas fa-ban"></i><span>黑名单</span>
            </a>
            <a class="nav-link {% if request.path == '/admin/monitoring' %}active{% endif %}" href="/admin/monitoring">
                <i class="fas fa-tachometer-alt"></i><span>实时监控</span>
            </a>
            <div class="sidebar-divider"></div>
        </nav>
        <div class="sidebar-footer border-top border-secondary p-3 mt-auto">
            <a href="#" id="logoutBtn" class="nav-link">
                <i class="fas fa-sign-out-alt"></i><span>退出登录</span>
            </a>
        </div>
    </div>

    <div class="main-wrapper">
        <header class="top-header bg-white border-bottom d-flex justify-content-between align-items-center px-4 py-2">
            <div class="top-header-left">
                <h1 class="page-title">{% block page_title %}仪表盘{% endblock %}</h1>
                <span class="seal-stamp">墨盾</span>
            </div>
            <div class="top-header-right">
                {% block header_actions %}{% endblock %}
                <div class="user-display">
                    <span class="user-name" id="usernameDisplay">管理员</span>
                    <div class="user-avatar bg-danger text-white rounded-circle d-flex align-items-center justify-content-center" id="userAvatar">A</div>
                </div>
            </div>
        </header>
        <hr class="brush-divider">
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
