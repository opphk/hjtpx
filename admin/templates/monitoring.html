<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨盾验证 · 实时监控</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        :root {
            --primary-red: #c23a2b;
            --gold: #c9a96e;
            --dark: #1a1a2e;
        }
        body {
            background: #f5f5f5;
            min-height: 100vh;
        }
        .sidebar {
            background: var(--dark);
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
        }
        .main-wrapper {
            margin-left: 250px;
            min-height: 100vh;
        }
        .sidebar-brand {
            padding: 20px;
            border-bottom: 1px solid rgba(201, 169, 110, 0.3);
        }
        .sidebar-brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary-red), #8b2a1e);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 22px;
        }
        .sidebar-brand-text {
            font-weight: 700;
            font-size: 20px;
            color: var(--gold);
        }
        .sidebar-brand-sub {
            font-size: 11px;
            color: rgba(201, 169, 110, 0.5);
            letter-spacing: 2px;
        }
        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            border-radius: 8px;
            margin: 4px 12px;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(201, 169, 110, 0.15);
            color: var(--gold);
        }
        .nav-link i {
            width: 20px;
            text-align: center;
        }
        .sidebar-divider {
            height: 1px;
            background: rgba(201, 169, 110, 0.3);
            margin: 10px 20px;
        }
        .top-header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            margin: 0;
            position: relative;
            padding-left: 20px;
        }
        .page-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 24px;
            background: var(--primary-red);
            border-radius: 2px;
        }
        .seal-stamp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border: 1.5px solid var(--primary-red);
            color: var(--primary-red);
            font-size: 9px;
            font-weight: 900;
            transform: rotate(-8deg);
        }
        .user-avatar {
            width: 36px;
            height: 36px;
            background: var(--primary-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        .brush-divider {
            height: 4px;
            background: linear-gradient(to right, var(--gold), transparent);
            border: none;
            margin: 0 0 24px 0;
            opacity: 0.6;
            border-radius: 2px;
        }
        .main-content {
            padding: 24px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }
        .stat-card.cpu::before { background: linear-gradient(to bottom, #3b82f6, #1d4ed8); }
        .stat-card.memory::before { background: linear-gradient(to bottom, #10b981, #059669); }
        .stat-card.disk::before { background: linear-gradient(to bottom, #f59e0b, #d97706); }
        .stat-card.network::before { background: linear-gradient(to bottom, #8b5cf6, #7c3aed); }
        .stat-card.requests::before { background: linear-gradient(to bottom, var(--primary-red), #8b2a1e); }
        .stat-card.success::before { background: linear-gradient(to bottom, var(--gold), #9a7a4a); }
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--dark);
        }
        .stat-label {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }
        .stat-trend {
            font-size: 12px;
        }
        .stat-trend.up { color: #10b981; }
        .stat-trend.down { color: #ef4444; }
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #eee;
            margin-bottom: 24px;
        }
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-item {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid;
            transition: all 0.3s;
        }
        .alert-item:hover {
            transform: translateX(4px);
        }
        .alert-item.info { background: #eff6ff; border-color: #3b82f6; }
        .alert-item.warning { background: #fffbeb; border-color: #f59e0b; }
        .alert-item.error { background: #fef2f2; border-color: #ef4444; }
        .alert-item.critical { background: #fef2f2; border-color: #dc2626; }
        .alert-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .alert-item.info .alert-icon { background: #3b82f6; color: white; }
        .alert-item.warning .alert-icon { background: #f59e0b; color: white; }
        .alert-item.error .alert-icon { background: #ef4444; color: white; }
        .alert-item.critical .alert-icon { background: #dc2626; color: white; }
        .alert-content {
            flex: 1;
        }
        .alert-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--dark);
        }
        .alert-message {
            font-size: 12px;
            color: #666;
        }
        .alert-time {
            font-size: 11px;
            color: #999;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .status-dot.connected { background: #10b981; }
        .status-dot.disconnected { background: #ef4444; animation: none; }
        .log-entry {
            padding: 8px 12px;
            border-bottom: 1px solid #f0f0f0;
            font-family: monospace;
            font-size: 12px;
        }
        .log-time {
            color: #999;
            margin-right: 12px;
        }
        .log-method {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-right: 8px;
        }
        .log-method.GET { background: #dbeafe; color: #1d4ed8; }
        .log-method.POST { background: #dcfce7; color: #16a34a; }
        .log-method.PUT { background: #fef3c7; color: #d97706; }
        .log-method.DELETE { background: #fee2e2; color: #dc2626; }
        .log-status.success { color: #10b981; }
        .log-status.error { color: #ef4444; }
        .api-row {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .api-endpoint {
            font-family: monospace;
            font-size: 13px;
            color: var(--dark);
        }
        .api-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            background: #f0f0f0;
            color: #666;
        }
        .progress-bar-small {
            height: 6px;
            border-radius: 3px;
            background: #eee;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }
        .alert-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand d-flex align-items-center gap-3">
            <div class="sidebar-brand-icon">
                <i class="fas fa-shield-halved"></i>
            </div>
            <div>
                <div class="sidebar-brand-text">墨盾验证</div>
                <div class="sidebar-brand-sub">· 管理后台 ·</div>
            </div>
        </div>
        <nav class="mt-3">
            <a class="nav-link" href="/admin/">
                <i class="fas fa-chart-bar"></i><span>仪表盘</span>
            </a>
            <a class="nav-link" href="/admin/stats">
                <i class="fas fa-chart-line"></i><span>统计分析</span>
            </a>
            <a class="nav-link active" href="/admin/monitoring">
                <i class="fas fa-tachometer-alt"></i><span>实时监控</span>
            </a>
            <a class="nav-link" href="/admin/applications">
                <i class="fas fa-mobile-alt"></i><span>应用管理</span>
            </a>
            <a class="nav-link" href="/admin/logs">
                <i class="fas fa-clipboard-list"></i><span>日志查询</span>
            </a>
            <a class="nav-link" href="/admin/risk-rules">
                <i class="fas fa-shield-alt"></i><span>风控规则</span>
            </a>
            <a class="nav-link" href="/admin/blacklist">
                <i class="fas fa-ban"></i><span>黑名单</span>
            </a>
            <div class="sidebar-divider"></div>
        </nav>
        <div class="sidebar-footer border-top border-secondary p-3 mt-auto">
            <a href="#" id="logoutBtn" class="nav-link">
                <i class="fas fa-sign-out-alt"></i><span>退出登录</span>
            </a>
        </div>
    </div>

    <div class="main-wrapper">
        <header class="top-header">
            <div class="d-flex align-items-center gap-3">
                <h1 class="page-title">实时监控</h1>
                <span class="seal-stamp">墨盾</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <div class="d-flex align-items-center gap-2">
                    <span class="status-dot connected" id="connectionStatus"></span>
                    <span class="text-muted small" id="connectionText">已连接</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-muted" id="usernameDisplay">管理员</span>
                    <div class="user-avatar" id="userAvatar">A</div>
                </div>
            </div>
        </header>
        <hr class="brush-divider">
        <main class="main-content">
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="stat-card cpu">
                        <div class="stat-label">
                            <i class="fas fa-microchip me-2"></i>CPU 使用率
                        </div>
                        <div class="stat-value" id="cpuValue">0%</div>
                        <div class="progress-bar-small mt-3">
                            <div class="progress-fill bg-primary" id="cpuProgress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card memory">
                        <div class="stat-label">
                            <i class="fas fa-memory me-2"></i>内存使用
                        </div>
                        <div class="stat-value" id="memoryValue">0%</div>
                        <div class="progress-bar-small mt-3">
                            <div class="progress-fill bg-success" id="memoryProgress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card disk">
                        <div class="stat-label">
                            <i class="fas fa-hdd me-2"></i>磁盘空间
                        </div>
                        <div class="stat-value" id="diskValue">0%</div>
                        <div class="progress-bar-small mt-3">
                            <div class="progress-fill bg-warning" id="diskProgress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card network">
                        <div class="stat-label">
                            <i class="fas fa-network-wired me-2"></i>网络流量
                        </div>
                        <div class="stat-value" id="networkValue">0 KB/s</div>
                        <div class="stat-trend up mt-2">
                            <i class="fas fa-arrow-up"></i> 入站 | <i class="fas fa-arrow-down"></i> 出站
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-4">
                    <div class="stat-card requests">
                        <div class="stat-label">
                            <i class="fas fa-rocket me-2"></i>请求总数
                        </div>
                        <div class="stat-value" id="totalRequests">0</div>
                        <div class="stat-trend up">
                            <i class="fas fa-arrow-up"></i> <span id="requestRate">0 req/s</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card success">
                        <div class="stat-label">
                            <i class="fas fa-check-circle me-2"></i>成功率
                        </div>
                        <div class="stat-value" id="successRate">0%</div>
                        <div class="progress-bar-small mt-3">
                            <div class="progress-fill" style="background: var(--gold); width: 0%" id="successProgress"></div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-label">
                            <i class="fas fa-clock me-2"></i>平均响应时间
                        </div>
                        <div class="stat-value" id="avgResponse">0 ms</div>
                        <div class="stat-trend">
                            <span class="text-muted">错误数: </span><span id="errorCount" class="text-danger">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-8">
                    <div class="chart-card">
                        <div class="chart-title">
                            <i class="fas fa-chart-area" style="color: var(--gold)"></i>
                            系统资源趋势
                        </div>
                        <canvas id="resourceChart" height="200"></canvas>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="chart-card">
                        <div class="chart-title d-flex justify-content-between align-items-center">
                            <span><i class="fas fa-bell" style="color: var(--primary-red)"></i> 告警通知</span>
                            <span class="badge bg-danger" id="alertCount">0</span>
                        </div>
                        <div id="alertsList" style="max-height: 280px; overflow-y: auto;">
                            <div class="text-muted text-center py-4">暂无告警</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="chart-card">
                        <div class="chart-title">
                            <i class="fas fa-chart-line" style="color: var(--primary-red)"></i>
                            请求趋势
                        </div>
                        <canvas id="requestChart" height="200"></canvas>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="chart-card">
                        <div class="chart-title">
                            <i class="fas fa-list" style="color: var(--gold)"></i>
                            实时请求日志
                        </div>
                        <div id="requestLog" style="max-height: 240px; overflow-y: auto;">
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-12">
                    <div class="chart-card">
                        <div class="chart-title">
                            <i class="fas fa-code" style="color: var(--primary-red)"></i>
                            API 性能统计
                        </div>
                        <div id="apiStats">
                            <div class="text-muted text-center py-4">暂无数据</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer"></div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/monitoring.js"></script>
</body>
</html>
