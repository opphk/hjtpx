<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨盾验证 · 管理后台 · 统计分析</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <div class="bg-dark d-flex flex-column">
        <div class="d-flex align-items-center gap-3 p-3 border-bottom border-secondary">
            <div class="d-flex align-items-center justify-content-center" style="width:44px;height:44px;background:linear-gradient(135deg,#c23a2b,#8b2a1e);border-radius:10px;font-size:22px;color:#c9a96e;flex-shrink:0;"><i class="fas fa-shield-halved"></i></div>
            <div>
                <div style="font-weight:700;font-size:20px;color:#c9a96e;line-height:1.3;">墨盾验证</div>
                <div style="font-size:11px;color:rgba(201,169,110,0.5);font-weight:300;letter-spacing:2px;">· 管理后台 ·</div>
            </div>
        </div>
        <nav class="d-flex flex-column p-3 gap-1 flex-grow-1">
            <a class="nav-link" href="/admin/"><i class="fas fa-chart-bar"></i><span>仪表盘</span></a>
            <a class="nav-link active" href="/admin/stats"><i class="fas fa-chart-line"></i><span>统计分析</span></a>
            <a class="nav-link" href="/admin/advanced-analytics"><i class="fas fa-chart-pie"></i><span>高级分析</span></a>
            <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt"></i><span>应用管理</span></a>
            <a class="nav-link" href="/admin/logs"><i class="fas fa-clipboard-list"></i><span>日志查询</span></a>
            <a class="nav-link" href="/admin/risk-rules"><i class="fas fa-shield-alt"></i><span>风控规则</span></a>
            <a class="nav-link" href="/admin/blacklist"><i class="fas fa-ban"></i><span>黑名单</span></a>
            <hr class="border-secondary my-2 mx-3">
        </nav>
        <div class="border-top border-secondary p-3 mt-auto">
            <a href="#" id="logoutBtn" class="nav-link"><i class="fas fa-sign-out-alt"></i><span>退出登录</span></a>
        </div>
    </div>

    <div>
        <header class="bg-white border-bottom d-flex justify-content-between align-items-center px-4 py-2">
            <div class="d-flex align-items-center gap-3">
                <h1 style="font-size:20px;font-weight:700;margin:0;padding-left:16px;position:relative;">统计分析</h1>
                <span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border:1.5px solid #c23a2b;color:#c23a2b;font-size:9px;font-weight:900;transform:rotate(-8deg);flex-shrink:0;">墨盾</span>
            </div>
            <div class="d-flex align-items-center gap-3">
                <button id="exportStatsBtn" class="btn btn-outline-secondary btn-sm"><i class="fas fa-download me-1"></i>导出报表</button>
                <button id="refreshBtn" class="btn btn-outline-secondary btn-sm"><i class="fas fa-sync me-1"></i>刷新</button>
                <div class="d-flex align-items-center gap-2">
                    <span class="text-secondary" id="usernameDisplay">管理员</span>
                    <div class="bg-danger text-white rounded-circle d-flex align-items-center justify-content-center" id="userAvatar" style="width:36px;height:36px;font-weight:700;font-size:14px;">A</div>
                </div>
            </div>
        </header>
        <hr style="height:4px;background:linear-gradient(to right,#c9a96e,transparent);border:none;margin:0 0 24px;opacity:0.6;border-radius:2px;">
        <main class="p-2 p-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <div class="row g-2 g-md-3 align-items-end">
                        <div class="col-6 col-md-3">
                            <label class="form-label"><i class="fas fa-calendar me-1" style="color:#b8924e;"></i>时间范围</label>
                            <select class="form-select form-select-sm" id="dateRange">
                                <option value="7d">最近7天</option>
                                <option value="30d" selected>最近30天</option>
                                <option value="90d">最近90天</option>
                                <option value="1y">最近1年</option>
                            </select>
                        </div>
                        <div class="col-6 col-md-3">
                            <label class="form-label"><i class="fas fa-chart-simple me-1" style="color:#b8924e;"></i>对比周期</label>
                            <select class="form-select form-select-sm" id="comparePeriod">
                                <option value="">不对比</option>
                                <option value="prev">上一周期</option>
                                <option value="prev_year">去年同期</option>
                            </select>
                        </div>
                        <div class="col-12 col-md-3 col-lg-2">
                            <button id="applyFilterBtn" class="btn btn-dark w-100 btn-sm"><i class="fas fa-filter me-1"></i>应用筛选</button>
                        </div>
                        <div class="col-12 col-md-3 col-lg-4 d-flex justify-content-between justify-content-md-end gap-2">
                            <button id="exportStatsBtn" class="btn btn-outline-secondary btn-sm"><i class="fas fa-download me-1"></i>导出报表</button>
                            <button id="refreshBtn" class="btn btn-outline-secondary btn-sm"><i class="fas fa-sync me-1"></i>刷新</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-2 g-md-4 mb-4">
                <div class="col-6 col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body py-2 py-md-3">
                            <div class="text-muted mb-1" style="font-size:11px;font-size:12px;letter-spacing:0.5px;">总请求量</div>
                            <div style="font-weight:700;font-size:20px;font-size:28px;color:#1a1a2e;line-height:1.2;" id="statTotalRequests">0</div>
                            <div class="text-success" style="font-size:11px;font-size:12px;font-weight:500;" id="statRequestsChange"><i class="fas fa-arrow-up me-1"></i>+0%</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body py-2 py-md-3">
                            <div class="text-muted mb-1" style="font-size:11px;font-size:12px;letter-spacing:0.5px;">平均响应</div>
                            <div style="font-weight:700;font-size:20px;font-size:28px;color:#1a1a2e;line-height:1.2;" id="statAvgResponse">0ms</div>
                            <div class="text-danger" style="font-size:11px;font-size:12px;font-weight:500;" id="statResponseChange"><i class="fas fa-arrow-down me-1"></i>-0%</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body py-2 py-md-3">
                            <div class="text-muted mb-1" style="font-size:11px;font-size:12px;letter-spacing:0.5px;">成功率</div>
                            <div class="text-success" style="font-weight:700;font-size:20px;font-size:28px;color:#1a1a2e;line-height:1.2;" id="statSuccessRate">0%</div>
                            <div class="text-success" style="font-size:11px;font-size:12px;font-weight:500;" id="statSuccessChange"><i class="fas fa-arrow-up me-1"></i>+0%</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card shadow-sm border text-center">
                        <div class="card-body py-2 py-md-3">
                            <div class="text-muted mb-1" style="font-size:11px;font-size:12px;letter-spacing:0.5px;">活跃用户</div>
                            <div style="font-weight:700;font-size:20px;font-size:28px;color:#1a1a2e;line-height:1.2;" id="statActiveUsers">0</div>
                            <div class="text-success" style="font-size:11px;font-size:12px;font-weight:500;" id="statUsersChange"><i class="fas fa-arrow-up me-1"></i>+0%</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header">
                            <h5><i class="fas fa-chart-area me-2" style="color:#b8924e;"></i>请求量趋势</h5>
                            <div class="btn-group btn-group-sm" role="group">
                                <button type="button" class="btn btn-outline-secondary active" data-chart-type="line"><i class="fas fa-line-chart"></i></button>
                                <button type="button" class="btn btn-outline-secondary" data-chart-type="bar"><i class="fas fa-bar-chart"></i></button>
                            </div>
                        </div>
                        <div class="card-body">
                            <canvas id="requestTrendChart" height="280"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card shadow-sm h-100">
                        <div class="card-header"><h5><i class="fas fa-chart-pie me-2" style="color:#c23a2b;"></i>请求类型分布</h5></div>
                        <div class="card-body">
                            <canvas id="requestTypeChart" height="280"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header"><h5><i class="fas fa-user-plus me-2" style="color:#b8924e;"></i>用户增长趋势</h5></div>
                        <div class="card-body">
                            <canvas id="userGrowthChart" height="260"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header"><h5><i class="fas fa-th-large me-2" style="color:#b8924e;"></i>应用分布</h5></div>
                        <div class="card-body">
                            <canvas id="appDistributionChart" height="260"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header"><h5><i class="fas fa-exclamation-circle me-2" style="color:#c23a2b;"></i>错误率分析</h5></div>
                        <div class="card-body">
                            <canvas id="errorRateChart" height="260"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card shadow-sm">
                        <div class="card-header"><h5><i class="fas fa-globe me-2" style="color:#b8924e;"></i>地理分布</h5></div>
                        <div class="card-body">
                            <canvas id="geoDistributionChart" height="260"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/stats.js"></script>
</body>
</html>
