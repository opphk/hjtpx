<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 统计分析</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <div class="d-flex">
        <div class="sidebar d-flex flex-column flex-shrink-0">
            <div class="sidebar-header p-3"><h5 class="text-white mb-0">管理后台</h5></div>
            <nav class="nav flex-column mt-2">
                <a class="nav-link" href="/admin/"><i class="fas fa-chart-bar me-2"></i>仪表盘</a>
                <a class="nav-link active" href="/admin/stats"><i class="fas fa-chart-line me-2"></i>统计分析</a>
                <a class="nav-link" href="/admin/applications"><i class="fas fa-mobile-alt me-2"></i>应用管理</a>
                <a class="nav-link" href="/admin/logs"><i class="fas fa-clipboard-list me-2"></i>日志查询</a>
                <a class="nav-link" href="/admin/risk-rules"><i class="fas fa-shield-alt me-2"></i>风控规则</a>
                <a class="nav-link" href="/admin/blacklist"><i class="fas fa-ban me-2"></i>黑名单</a>
            </nav>
            <div class="sidebar-footer mt-auto p-3">
                <a href="#" id="logoutBtn" class="nav-link text-danger"><i class="fas fa-sign-out-alt me-2"></i>退出登录</a>
            </div>
        </div>

        <div class="main-wrapper">
            <header class="bg-white shadow-sm px-4 py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0">统计分析</h5>
                <div class="d-flex align-items-center gap-3">
                    <button id="exportStatsBtn" class="btn btn-outline-secondary btn-sm"><i class="fas fa-download me-1"></i>导出报表</button>
                    <button id="refreshBtn" class="btn btn-outline-primary btn-sm"><i class="fas fa-sync me-1"></i>刷新</button>
                    <div class="d-flex align-items-center gap-2">
                        <span class="text-muted" id="usernameDisplay">管理员</span>
                        <div class="user-avatar" id="userAvatar">A</div>
                    </div>
                </div>
            </header>

            <main class="p-4 bg-light min-vh-100">
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">
                        <div class="row g-3 align-items-end">
                            <div class="col-md-3">
                                <label class="form-label">时间范围</label>
                                <select class="form-select" id="dateRange">
                                    <option value="7d">最近7天</option>
                                    <option value="30d" selected>最近30天</option>
                                    <option value="90d">最近90天</option>
                                    <option value="1y">最近1年</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">对比周期</label>
                                <select class="form-select" id="comparePeriod">
                                    <option value="">不对比</option>
                                    <option value="prev">上一周期</option>
                                    <option value="prev_year">去年同期</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button id="applyFilterBtn" class="btn btn-primary w-100"><i class="fas fa-filter me-1"></i>应用筛选</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0">
                            <div class="card-body text-center">
                                <h6 class="text-muted mb-2">总请求量</h6>
                                <h3 class="mb-1" id="statTotalRequests">0</h3>
                                <small class="text-success" id="statRequestsChange"><i class="fas fa-arrow-up me-1"></i>+0%</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0">
                            <div class="card-body text-center">
                                <h6 class="text-muted mb-2">平均响应时间</h6>
                                <h3 class="mb-1" id="statAvgResponse">0ms</h3>
                                <small class="text-danger" id="statResponseChange"><i class="fas fa-arrow-down me-1"></i>-0%</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0">
                            <div class="card-body text-center">
                                <h6 class="text-muted mb-2">成功率</h6>
                                <h3 class="mb-1" id="statSuccessRate">0%</h3>
                                <small class="text-success" id="statSuccessChange"><i class="fas fa-arrow-up me-1"></i>+0%</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0">
                            <div class="card-body text-center">
                                <h6 class="text-muted mb-2">活跃用户</h6>
                                <h3 class="mb-1" id="statActiveUsers">0</h3>
                                <small class="text-success" id="statUsersChange"><i class="fas fa-arrow-up me-1"></i>+0%</small>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-8">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <h5 class="mb-0">请求量趋势</h5>
                                <div class="btn-group btn-group-sm" role="group">
                                    <button type="button" class="btn btn-outline-secondary active" data-chart-type="line"><i class="fas fa-line-chart"></i></button>
                                    <button type="button" class="btn btn-outline-secondary" data-chart-type="bar"><i class="fas fa-bar-chart"></i></button>
                                </div>
                            </div>
                            <div class="card-body">
                                <canvas id="requestTrendChart" height="280"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">请求类型分布</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="requestTypeChart" height="280"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4 mb-4">
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">用户增长趋势</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="userGrowthChart" height="260"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">应用分布</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="appDistributionChart" height="260"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">错误率分析</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="errorRateChart" height="260"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white">
                                <h5 class="mb-0">地理分布</h5>
                            </div>
                            <div class="card-body">
                                <canvas id="geoDistributionChart" height="260"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js"></script>
    <script src="/admin/static/js/auth.js"></script>
    <script src="/admin/static/js/stats.js"></script>
</body>
</html>
