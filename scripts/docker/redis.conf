# =============================================================================
# Redis配置文件 - 用于Docker部署
# =============================================================================

# 网络配置
bind 0.0.0.0
protected-mode no
port 6379

# 持久化配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 内存管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 内存优化
activerehashing yes
lazyfree-lazy-eviction no
lazyfree-lazy-expansion no
lazyfree-lazy-server-del no
replica-lazy-flush no

# 连接配置
timeout 300
tcp-keepalive 300
tcp-backlog 511

# 性能优化
databases 16
save 900 1
save 300 10
save 60 10000

# 安全配置
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""

# 日志配置
loglevel notice
logfile ""

# 客户端连接
maxclients 10000
