apiVersion: apps/v1
kind: Deployment
metadata:
  name: hjtpx
  namespace: hjtpx
  labels:
    app.kubernetes.io/name: hjtpx
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: hjtpx
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hjtpx
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: hjtpx
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: hjtpx
          image: ghcr.io/hjtpx/hjtpx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: GIN_MODE
              valueFrom:
                configMapKeyRef:
                  name: hjtpx-config
                  key: GIN_MODE
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: hjtpx-config
                  key: SERVER_PORT
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: hjtpx-config
                  key: TZ
            - name: POSTGRES_HOST
              value: "hjtpx-postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hjtpx-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: hjtpx_db
            - name: POSTGRES_SSLMODE
              value: disable
            - name: REDIS_HOST
              value: "hjtpx-redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hjtpx-secrets
                  key: REDIS_PASSWORD
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hjtpx-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRE_HOURS
              value: "24"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-logs
              mountPath: /var/log/hjtpx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hjtpx
  namespace: hjtpx
  labels:
    app.kubernetes.io/name: hjtpx
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: api
  ports:
    - port: 80
      targetPort: 8080
      name: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hjtpx
  namespace: hjtpx
  labels:
    app.kubernetes.io/name: hjtpx
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hjtpx
  namespace: hjtpx
  labels:
    app.kubernetes.io/name: hjtpx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hjtpx
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
