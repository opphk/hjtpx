apiVersion: v1
kind: ConfigMap
metadata:
  name: hjtpx-config
  namespace: hjtpx
  labels:
    app.kubernetes.io/name: hjtpx
    app.kubernetes.io/component: config
data:
  GIN_MODE: "release"
  SERVER_PORT: "8080"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  TZ: "Asia/Shanghai"
---
apiVersion: v1
kind: Secret
metadata:
  name: hjtpx-secrets
  namespace: hjtpx
  labels:
    app.kubernetes.io/name: hjtpx
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  JWT_SECRET: "change-me-in-production-use-strong-random-value"
  POSTGRES_PASSWORD: "postgres"
  REDIS_PASSWORD: ""
