apiVersion: v1
kind: Namespace
metadata:
  name: hjtpx
  labels:
    name: hjtpx
    environment: production
    app.kubernetes.io/name: hjtpx
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hjtpx-app
  namespace: hjtpx
  labels:
    app: hjtpx-app
    component: backend
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hjtpx-postgres
  namespace: hjtpx
  labels:
    app: hjtpx-postgres
    component: database
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hjtpx-redis
  namespace: hjtpx
  labels:
    app: hjtpx-redis
    component: cache
