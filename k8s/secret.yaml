apiVersion: v1
kind: Secret
metadata:
  name: hjtpx-secrets
  namespace: hjtpx
  labels:
    app: hjtpx
    component: backend
type: Opaque
stringData:
  DATABASE_HOST: "hjtpx-postgres"
  DATABASE_PORT: "5432"
  DATABASE_USER: "postgres"
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  DATABASE_NAME: "hjtpx_db"
  REDIS_HOST: "hjtpx-redis"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  JWT_SECRET: "CHANGE_ME_IN_PRODUCTION_MUST_BE_32_CHARS"
---
apiVersion: v1
kind: Secret
metadata:
  name: hjtpx-tls
  namespace: hjtpx
  labels:
    app: hjtpx
    component: ingress
type: kubernetes.io/tls
stringData:
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    PLACEHOLDER_REPLACE_WITH_REAL_CERT
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN PRIVATE KEY-----
    PLACEHOLDER_REPLACE_WITH_REAL_KEY
    -----END PRIVATE KEY-----
