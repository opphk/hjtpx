apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hjtpx-staging

resources:
  - ../base

patches:
  - path: resources-patch.yaml
    target:
      kind: Deployment
      name: hjtpx

commonLabels:
  environment: staging

images:
  - name: ghcr.io/hjtpx/hjtpx
    newTag: latest
