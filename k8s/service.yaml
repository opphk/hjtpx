apiVersion: v1
kind: Service
metadata:
  name: hjtpx-postgres
  namespace: hjtpx
  labels:
    app: hjtpx-postgres
    component: database
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
  selector:
    app: hjtpx-postgres
    component: database
---
apiVersion: v1
kind: Service
metadata:
  name: hjtpx-redis
  namespace: hjtpx
  labels:
    app: hjtpx-redis
    component: cache
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app: hjtpx-redis
    component: cache
---
apiVersion: v1
kind: Service
metadata:
  name: hjtpx-app
  namespace: hjtpx
  labels:
    app: hjtpx-app
    component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app: hjtpx-app
    component: backend
    track: stable
---
apiVersion: v1
kind: Service
metadata:
  name: hjtpx-app-canary
  namespace: hjtpx
  labels:
    app: hjtpx-app
    component: backend
    track: canary
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
  selector:
    app: hjtpx-app
    component: backend
    track: canary
---
apiVersion: v1
kind: Service
metadata:
  name: hjtpx-app-nodeport
  namespace: hjtpx
  labels:
    app: hjtpx-app
    component: backend
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30080
      protocol: TCP
  selector:
    app: hjtpx-app
    component: backend
    track: stable